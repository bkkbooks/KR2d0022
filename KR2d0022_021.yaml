body:
  text: 後漢書補逸卷二十一監察御史姚之駰撰司馬彪續後漢書第四朱俊俊字公偉㑹稽人少好學為郡功曹察孝廉舉進士以討黃巾功拜車騎將軍纍遷河南尹董卓見俊外甚親納而心忌之俊亦陰備焉關東兵起卓議移都俊輒止卓卓雖憚俊然貪其名重乃表拜太僕以自副俊被召不肯受拜因進曰國不宜遷必孤天下望成山東之結臣不見其可也有司詰曰召君受拜而君拒之不問徙事而君陳之何也俊曰副相國非臣所堪也遷都非計臣之所急也辭所不堪進臣所急臣之所宜也有司曰遷都之事初無此計也就有未露何所受聞俊曰相國董卓為臣說之臣聞之于相國有司不能屈朝廷稱服焉後為太尉李傕郭汜相攻劫質天下公卿俊性剛即發病而卒案俊見謝書俊辭副相後尋移書州郡請師討卓及卓既誅傕汜作亂陶謙與諸豪傑共推俊為太師同討傕等奉迎天子而俊反就傕徵復為太僕尹起莘譏其屈身從逆忠智俱失良不誣也辭副相一假范書語稍詳此深得減字法劉繇繇父輿一名方山陽太守案劉繇字正禮東萊牟平人見吳志繇祖父本師受經傳博學群書號為通儒舉賢良方正為般長卒官何進進字遂高南陽人太后異母兄也進本屠家子父曰真真死後進以妹倚黃門得入掖庭有寵光和三年立為皇后進由是貴幸中平元年黃巾起進拜大將軍案進南陽宛人何進欲誅中常侍趙忠等乃詐令武猛都尉丁原放兵數千人為賊于河內稱黑山伯以誅忠等為辭燒平陰河津幕府人舍以怖太后案進為勳戚元輔不能以誠動太后乃招賊焚劫毒民脅主卒使漢室崩壞誰之咎與袁紹使客張津說進曰黃門常侍秉權日久永樂太后與諸常侍專通財利將軍宜整頓天下為海內除患進以為然遂與紹結謀案進謀誅宦寺紹實贊之而進以猶豫不决卒至身喪國危是不能盡聽紹言之故也劉虞是時用劉虞為幽州劉焉為益州劉表為荆州賈琮為冀州虞等皆海內清名之士或從列卿尚書以選為牧伯各以本秩居任舊典傳車參駕施赤為帷裳案虞見謝書周羣建安七年越嶲有男子化為女人時羣言哀帝時亦有此將易代之祥也至二十五年獻帝果封于山陽十二年十月有星孛于鶉尾荆州分野羣以為荆州牧將死而失士明年秋劉表卒曹公平荆州十七年十二月星孛于五諸侯羣以為西方專據土地者皆將失土是時劉璋據益州張魯據漢中韓遂據凉州宋建據抱罕明年曹公遣偏將擊凉州十九年獲宋建韓遂逃于羌中被殺其年秋璋失益州二十年秋曹公攻漢中張魯降案羣字仲直巴西閬中人少受學于父舒專心候業言多竒中蜀志有傳董卓太尉黃琬司徒楊彪司空荀爽俱詣卓卓言昔高祖都關中十一世後中興更都洛陽從光武至今復十一世案石苞室䜟宜復還都長安坐中皆驚愕無敢應者彪曰遷都改制天下大事皆當因民之心隨時之宜昔盤庚五遷殷民胥怨作三篇以曉之往者王莽篡逆變亂五常更始赤眉之時焚燒長安殘害百姓民人流亡百無一在光武受命更都洛邑此其宜者也今方建立聖主光隆漢祚而無故捐宫廟棄園陵恐百姓驚愕不解此意必麋沸蟻聚以致擾亂石苞室䜟妖邪之書豈可信用卓作色曰楊彪公欲沮國家計邪關東方亂所在賊起崤函險固國之重防又隴右取材功夫不難杜陵南山下有孝武故陶處作磚瓦一朝可辦宫室官府蓋何足言百姓小民何足與議若有前郤我以大兵驅之豈得自在百寮皆恐怖失色琬謂卓曰此大事楊公之語得無重思卓罷坐即日令司𨽻奏彪及琬皆免官大駕即西卓部燒洛陽城內掃地殄盡又收諸富室以罪惡沒入其財物無辜而死者不可勝計案此條見華書其范書入楊彪傳中華與范俱作兩問兩答後入卓作色語如見當日情事似更勝也合觀三書之筆華排奡司馬漭漾范簡雋今之史也耀文則范優矣劉備劉備字𤣥德涿郡人漢景帝子中山靖王勝之後案昭烈正位蜀漢親承大統名正言順本無可疑陳夀志三國僅以列國待漢已不知正統所在今續書乃儕之列傳直署姓名是不知春秋之義者也曹騰騰父節字元偉素以仁厚稱鄰人有亡豕者與節豕相類詣門認之節不與爭後所亡豕自還其家豕主人大慙送所認豕并辭謝節節笑而受之由是鄉黨貴歎焉長子伯興次子仲興次子叔興騰字季興少除黃門從官永寧元年鄧太后詔黃門令選中黃門從官年少溫謹者侍皇太子書騰應其選太子特親愛騰飲食賞賜與衆有異順帝即位為小黃門遷至中常侍大長秋騰在省闥三十餘年歷事四帝未嘗有過好進達賢能終無所毁傷其所稱薦若陳留虞放邊韶南陽延固張溫𢎞農張奐潁川堂溪典等皆致位公卿而不伐其善蜀郡太守因計吏修敬於騰益州刺史种皓於函谷關搜得其箋上太守并奏騰內臣外交所不當為請免官治罪帝曰箋自外來騰書不出非其罪也乃寢皓奏騰不以介意常稱歎皓以為得事上之節皓後為司徒語人曰今日為公乃曹常侍恩也騰之行事皆此類也桓帝即位以騰先帝舊臣忠孝彰著封費亭侯加位特進太和三年追尊騰曰高皇帝案騰沛國譙人范列宦者傳此乃曹魏受禪後增飾誇美司馬因之殊不足據曹嵩嵩字巨高質性敦慎所在忠孝為司𨽻校尉靈帝擢拜大司農大鴻臚代崔烈為太尉黃初元年追尊嵩曰太皇帝案嵩亦見范書曹騰傳袁紹檄文稱操父嵩乞丐擕養魏志亦云嵩為騰養子莫能審其生出本未曹瞞傳云嵩夏侯氏之子其淵源可哂如此章懷注引續漢志云靈帝時賣官嵩以貨得拜大司農而此又稱其代崔烈為太尉則亦銅臭之續耳此條出裴松之魏志注不知何所徵據以為敦愌忠孝也封禪刻玉建武二十二年上許梁松等奏乃求元封時故事議封禪所施用有司奏當刻玉璽一枚方三寸玉版方五寸案封禪事見東觀記世祖屢降明詔謙讓不遑而諸臣固請之且以䜟文迎合豈以元封故事為聖祖舊章耶封石上以用石功難又欲及二月封故詔梁松欲因故封石空檢更加封而已松上疏爭之以為承天之敬尤宜章明奉圖書之瑞尤宜明著今因舊封竄寄玉牒故石下恐非重受命之義案范書同今岱頂無字碑世傳為秦始皇立辨之者曰秦碑在玉女池上李斯篆書不當又有此碑且史記云始皇上泰山立石封記其下云刻所立石是秦石有文字之證封禪書則云武帝東上泰山泰山之草木葉未生乃令人上石立之泰山顚此言立石而不言刻石是漢石無文字之證其說近似然風俗通載孝武時立石泰山顛石高二丈一尺刻之云云合十一句四十五字據此則漢碑亦未嘗無字也駰意無字碑非碑也即范志所稱用方石再纍置壇中其中藏石牒玉檢者不則即長一丈厚一尺之距石也相傳一巡方惡其疑天下命撤之甫動其蓋雷風驟作說雖近怪然其中有物焉則斷斷無疑趾石封禪太山又有趾石皆再纍枚長一丈厚一尺廣二尺皆在圓壇上案趾石范作距石祠泰山三十二年二月二十二日辛卯晨燎祭天于泰山下或曰泰山雖已從食于祡祭今親升告功宜有禮祭于是使謁者以一牲特于常祠泰山處告祠泰山如親耕貙劉先祠先農先虞故事案常祠泰山處意即岱廟也今廟在山麓壯麗特甚中有斯篆雍𨽻漢柏唐槐其餘名蹟甚多而山巔祠宇以祀碧霞元君世人以為泰山府君之女考張華博物志有泰山神女避灌壇令事干寶搜神記云後漢胡母班為泰山府君致書于女壻河伯則泰山有女不誣正不必曲引黃帝遣玉女之事以傅㑹之耳嘗見元泰定帝碑有云每年燒香的上頭得來香錢物件只教先生每收掌者詞雖鄙俚亦可知元君廟香火自來甚盛云改元以建武三十二年為中元元年復博奉高嬴勿出元年租芻藁以吉日刻玉牒書函藏金匱璽印封今案自古帝王多改元以應符瑞雖光武亦且不免厯上以康熙紀元厯五十餘年未嘗一改將來春秋數傳之無窮豈非千古盛德事刻石正月詔梁松等復案索河洛䜟文言九世封禪事者松等列奏乃許焉使太山郡及魯刻石又直取完青石不必五色刻方石中命容玉牒二月上至奉高遣侍御史與蘭臺令史將工先上山刻石案范志全載刻石文中多托引緯書殊不足採金泥玉璽檢用金縷五周以水銀和金以為泥玉璽一方寸二分一枚方五寸案范志同袁宏云神道貞一其用不煩故藉用白茅器用陶匏然則封禪之禮簡易可也白函玉牒非天地之性也斯言良然親封時御輦升山日中後到上即位于壇南北靣尚書令奉玉牒檢皇帝以寸二分璽親封之藏玉牒已以石覆訖尚書令以五寸印封石檢畢皇帝再拜禪祭地于梁陰以高后配山川羣神從祀焉案此詳見馬第伯封禪儀記驪山火焚茂陵圯金函玉檢安在哉故後世人主以不封禪為高三老五更養三老五更先吉日司徒上太傅若講師故三公人名用其德行年耆高者三公一人為三老次卿一人為五更皆服絺綌大袍單衣皂緣領袖中衣冠進賢扶玉杖五更亦如之案此見范禮儀志三老五更之解世多聚訟康成注禮記曰皆年老更事致仕者也名三五者取象三辰五星又一注曰皆老人更知三德五事者也應劭漢官儀曰三者道成于天地人老者久也舊也五者訓于五品更者五世長子更更相代言其能以善道改更已也宋均注孝經援神契曰三老老人知天地之事者五更老人知五行更代事者蔡雍明堂論曰更應作叟書者以相似誤耳數說未能决是蔡論近之祠南郊正月上丁祠南郊案上丁取後甲三日之義與上辛先甲一也范同高禖仲春之月立高禖壇祀以特牲案范志壇作祠養老仲秋之月縣道皆案戶比民年始七十者授之以玉杖餔之以糜粥八十九十禮有加玉杖長九尺端以鳩鳥為飾鳩者不噎之鳥也欲老人不噎案古者最重養老之禮自膠庠闕制惟東漢稍為近古此禮不行已數千載近世鄉飲一制稍存具文今天子加意耆耉于康熙五十二年癸巳恩禮特至皇乎萬壽時賜宴賜銀命天潢執爵盛乎養老之與蓋與虞燕夏饗同其隆矣凖代管截管為律吹以考聲列以物氣道之本也術家以聲微而難知其分數不明故作凖以代之案凖亦作准其形如瑟十三弦隱間九尺取其分數調校樂器則宫商易辨若尺寸小長則六十宫商相與微濁若分數加短則六十微羽類皆小清其制出自京房也天竺國天竺國一名身毒在大月氏東南修浮圖佛道以成俗不殺伐其國有諸香石蜜胡椒薑黑鹽和帝時每遣使貢獻後西域反叛乃絶案此見范西域傳世傳明帝夢見金人遣使問佛道法遂于中國圖畫形像即此國也人死復生獻帝初平中長沙人姓桓死月餘其母聞棺中有聲發之遂生占曰至陰為陽下人為王其後曹公由匹庶起案此見范五行志萬金堂中平二年造萬金堂于西園案堂名萬金與臺惜百金者相去何如濯龍園濯龍園在洛陽西北角助蠶貴人助蠶玳瑁叉加簮珥案丁孚漢儀皇后親蠶之禮最盛故助蠶之飾亦然靈臺靈臺者乃周家之所造臺也圖書術籍珍玩寶怪皆所藏也案靈臺見前玉鈎玦桓帝時光祿吏舍壁下夜有青氣視之得玉鈎玦鈎長七寸二分玦五寸四分各一枚身中皆雕鏤案寶器入土久必自出今秦漢玉鈎玦多有藏玩何足紀也孔雀西南夷曰滇池出孔雀西域條支國出孔雀案今滇池在雲南府城南非復夷地矣大寒光和六年冬大寒北海東萊琅邪井中冰厚尺餘案冬日地氣下騰故井水恆溫雖燕山直北見寒時汲井其氣如蒸也氷厚尺餘毋乃過實日行日行南陸謂之夏日行北陸謂之冬案二語見范厯法志至日至日御前殿合八能之士陳八音聽樂均度晷影候鐘律權土灰效陰陽也夏至止鼓鑄案范志載八能士禮儀甚煩夏至亦然送故季冬星回歲終勞農享臘以送故也又十二月立土牛六頭于國都羣縣城外丑地送大寒案月令章句曰是月之㑹建丑丑為牛寒將極故出其物類以示送達之且以升陽也作厯昔者聖人之作厯也觀璿璣之運三光之作道之發斂景之長短斗綱所建青龍所躔參伍以變錯綜其數而制術焉案范厯法志首假與此同四分厯黃帝徴能術者為四分之厯詔張盛京房鮑業等以四分厯請與待詔楊岑等共課歲餘盛等所中多四分之厯始頗施行案太初厯冬至日在牽牛古黃帝夏殷周魯冬至日在建星太初厯施行百餘年失天益逺邊韶疏引洪範五紀論曰民間亦有黃帝諸厯不如史官之明即四分厯之法也此詔在永平五年時猶未能遽改至章帝元和中始下詔改行四分復古制矣京房前漢人考范志作景防是業作鄴晷景長短立夏之日晷長四尺二寸八分日道斂北去極彌近其景彌短近短乃極夏乃至焉案此亦見范志前條六宗平帝元始中謂六宗為易卦六子之氣水火雷風山澤也光武中興遵而不改至安帝即位初改六宗為天地四方之宗祠于雒陽之北戌亥之地案六宗見東觀記日食建武二年春正月甲子朔日有食之在危八度虛危齊地賊張步擁兵據齊至五年乃破三年五月乙卯晦日有食之在栁十四度栁河南也時樊崇謀作亂其七月伏誅六年九月丙寅晦日有食之史官不覺郡以聞案日食之故自漢末劉洪作乾象厯稍發明之然交食之法猶未詳著至陳張賓始分內外限隋張胄元始得其當食不食之由宋沈括以為黃道與月道如兩環相叠而􅘁差凡日月同在一度相遇則日為之食正一度相對則月為之食其說甚明蓋同在一度則日在上月魄在下掩之故非朔不食正一度相對則地影蔽月謂之暗虛故非望不食然而交食必護者亦敬天之怒之意耳國朝設欽天監先期推算時刻分抄內外諸司皆臨時救護正此意也建武時厯學未精其日食占驗尤不足據社稷壇光武立社稷于雒陽在宗廟之右皆方壇四面及中各依方色無屋有墻門而已案范志無四面句馬融周禮注曰王者五社太社在中門之外惟松東社八里惟柏西社九里惟栗南社七里惟梓北社六里惟槐此蓋又以五色土依其方面而立之耳大魚東萊北海海水溢時出大魚二枚長八九丈高二丈餘案今海濵居民有以魚骨架屋者又以骨節作臼舂米不足異也葦方笥建寧中京都長者皆以葦方笥為裝具時有識者竊言葦笥郡國讞篋也後黨人禁錮㑹赦有疑者皆讞廷尉人名悉入方笥中案此條文筆簡淨大勝范志語女子復生武陵女子李娥年六十餘死瘞于域中有行人聞冡中有聲告家人出之案范志女子死十四日復活詳見于寶搜神記呂母子呂母子名育為游徼犯罪案呂母事見東觀記荆州牧牧某攻新市兵大敗欲北歸隨武等復遮擊之鈎牧車屏泥刺殺其驂乘然不敢殺牧案荆牧史闕其名范略見更始傳中續書當同之考城考城故菑案陳留風俗傳章帝惡菑名改為考城漁涪津犍為郡南安縣有漁涪津在縣北臨大江南案范載吳漢與公孫述將戰于漁涪津即此地志闕太白入斗永初二年正月己亥太白入北斗中以為貴相凶也又京師及郡國四十一雨水鄧太后專政也案范書楊厚傳鄧太后問厚災異厚以為諸王子多在京師容有非常宜各還本國太后從之星尋滅不見又尅水退日期皆如所言客星閏十月十七日夜客星氣白廣二尺長五丈起天苑西南案郎顗對尚書七事之五即此顗言變見西方亦應三輔凡金氣為變發在秋節恐立秋以後趙魏關西有羌寇之患後果然駕驢帝駕四驢躬自操轡京師轉相放效夫驢者乃服重致逺上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢也案時驢價乃與馬齊執政如驢無怪驊騮之困于鹽車也兩頭兒上西門外女子生兒兩頭異肩共胸以為不祥墮地棄之其後政在私門上下無别兩頭之象案范志同異草郡國生異草其狀龍蛇鳥獸頭目毛羽足翅皆具是歲黃巾賊起漢遂微弱案范志以為此草妖也風俗通曰草亦作人狀操持兵弩萬象偹具雀懷陵上有雀萬數悲鳴鬬殺天戒若曰諸懷爵祿而尊厚者還自相害也案范志此為何進及諸大臣滅亡之徵侯非侯時京師童謡曰侯非侯王非王千乘萬騎上北邙案獻帝未有爵號為假圭等所執公卿百僚皆隨其後到河上乃得還案邙范志作芒后服皇太后皇后入太廟服紺上皂下蠶青上縹下簪珥珥耳璫垂珠也又皇后太后簪以玳瑁長一尺端為花勝左右各一橫簮之太后入廟為花勝上為鳯以翡翠為毛羽案此乃太皇太后皇太后入廟服制連皇后者誤太子車皇太子安車朱輪青蓋畫轓文輈五彩案此見輿服志皇子同拜諸侯王拜諸侯王之儀百官㑹位定御史授璽綬儺先臘一日儺逐疫鬼冗從僕射將之逐惡鬼于禁中案儺禮詳見范禮儀志詔獄武帝置中都官獄二十六所先皆省惟廷尉及洛陽有詔獄龍鱗龍鱗御刀也案范志載佩刀刀有魚鱗名印璽印璽王玉押銀鏤文貴人長公主銅鏤救日日有變割羊以禮社用救日變執事者冠長冠衣皂單衣絳領袖緑中衣絳袴絑以行禮如故事案白虎通曰日食必救之陰侵陽也公羊傳曰日有食之鼓用牲于社漢世近古故有割羊之制宗祀永平二年正月宗祀光武于明堂以配五帝時羣􅒼藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭祠老人星仲秋祠老人星于國南郊案是月行養老之禮故有是祠范志祠作祀嘉瓜芝草安帝元初三年平陸有瓜異本同蒂共生一瓜時以為嘉瓜章帝建初五年零陵獻芝草冠安帝立皇太子令謁高祖廟大夫從冠兩梁進賢洗馬冠高山案進賢冠古緇布冠也中二千石以下至博士兩梁高山冠一曰側注法冠一曰柱後高五寸以纚為展筒鐵柱卷執法者服之或謂之獬豸冠案胡廣說曰左傳有南冠而縶者則楚冠也秦滅楚以其君服賜執法近臣御史服之荀綽晉百官表注曰鐡柱言至厲直不曲撓虎賁武騎皆鶡冠以其鬬死乃止故趙武靈王以表武士制案荀綽百官表注曰冠插兩鶡今羽林冠戴孔雀翎次者藍翎步搖步搖以黃金為山題貫白珠桂枝相糾八爵九華熊虎赤羆天鹿辟邪諧不諧更始時南方有童謡云諧不諧在赤眉得不得在河北後更始為赤眉所殺是不諧也光武由河北而興是得之也案范志同南方作南陽野蠶建武二年野蠶成繭野民收其絮案此見范光武紀星主牽牛主關梁織女主瓜果迎氣立秋迎氣西郊樂奏黃鐘之宫歌西皓舞雲翹育命所以養時訓也立秋之日夜漏未盡五刻京師百官皆衣白絁皂領緑中衣迎氣西郊立冬之日衣皂衣迎氣北郊亦如之案范志迎氣奏樂惟先立秋十八日迎氣黃郊有之黃鐘之宫乃中央土之律西郊迎氣安得用此至于西皓之歌乃屬秋令續書屬之立秋誤也膢武帝令天下膢五日蔡雍曰貙獸嘗以立秋日還食母猛蟲搏摯王者亦以此日出獵還以祭宗廟案此應是續書注范志有貙劉之禮即此也亦作貙膢冬至冬至前後君子安身靜體百官絶事不聽政擇吉辰而後省事正朝正朝受朝賀二千石以上稱萬歲案玉燭寶典曰正月一日為元日亦云上日亦云正朝亦云三元亦云三朔朱索連葷仲夏之月陰氣萌作恐物不楙其禮以朱索連葷菜彌牟僕蠱鍾以桃印書文以施門户代以所尚為飾案范志夏后氏金行作葦茭言氣交也殷人水德以螺首慎其閉塞使如螺也周人木德以桃為更言氣相更也漢兼用之孛張為周地星孛于張東南行即翼軫之分翼軫楚地是楚地將有兵亂後一年正月光武起兵舂陵攻南陽斬阜賜等殺其士衆數萬人光武都洛陽居周地除穢布新之象案范書地皇三年十一月有星孛于張即此甄阜梁丘賜皆王莽大將掫新豐有鴻門亭掫城案范書更始使李松軍掫以拒赤眉即此城小長安濟陽縣有小長安故城在今鄧州南陽縣南射犬聚野王縣有射犬聚故城蓩鄉𢎞農有蓩鄉案范書更始遣李松等與赤眉戰蓩鄉即此水溢元年水溢壞城寺室屋殺人時梁太后攝政兄冀枉殺李固杜喬大鳥濟陰有五色大鳥見于已氏時以為鳳凰政既衰缺梁冀専權皆羽孽也案樂叶圖徵曰似鳳有四並為妖一曰鷫鸘二曰發明三曰焦明四曰幽昌東漢所見鳳大概如此直如弦桓帝之末京都童謡曰直如弦死道邊曲如鈎反封侯曲如鈎謂梁冀胡廣等直如弦謂李固等案桓帝應作順帝此誤時封侯者又有趙戒袁湯皆附冀者也行禘禮十八年上幸長安詔太常行禘禮于高廟序昭穆父為昭南向子為穆北向案禘者追始祖自出之祖祭于始祖之廟而以始祖配之不兼羣廟之主也陳祥道禮書言禘祭遷主其坐位與祫祭同此說非是又祝允明野記洪武七年御史答祿與權請舉禘祭下禮部太常集議奏以古者世系易尋故有禘自漢唐宋皆不明言始祖所自出已不可行今國家既追尊四廟所自出者未有所考恐難遽奉事乃寢然則世祖此舉但可云合祭髙廟而已其于禘禮未有當也張純所議五年夏禘禮合毁廟存廟之主而殷祭但免聚訟之譏而已豈真知禘禮乎天子葬天子葬太僕駕四輪輈為賔車大練為屋幕中黃門虎賁各二十人執紼司空擇土造穿太史卜日將作作黃腸題凑便房如禮大駕太僕御方相氏黃金四目䝉熊皮𤣥衣朱裳執戈揚楯立乘四馬先驅旗長三仭十有二旒曵地畫日月升龍書旐曰天子之柩謁者二人立乘馬為次太常跪曰哭日十五舉音止哭晝漏上請發司徒河南尹先引車轉太常曰請拜送車著白絲三糾紼長二十丈圍七寸六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳挽校尉一百人皆赤幘不冠持幡幢皆銜枚羽林孤兒巴俞嬥歌者六十人為六列司馬八人執鐸至陵南羡門司徒跪請就于房都導東園武士奉入房執事下明器太祝進醴獻司空將校復上案此所載儀制甚備間有與范志不同者俟考竹柏葉傷延熹元年洛陽城傍竹柏葉有傷者火光九年三月京師有火轉行人相驚譟案范書襄楷傳楷上疏言柏傷竹枯不出三年漢帝當之火光之占亦同符拔符拔形似麟而無角案符亦作扶章和中月氏曾進獻茅田一頃桓帝末京師童謡曰茅田一頃中有井四方纎纎不可整嚼復嚼今年尚可後年磽案易曰拔茅連茹茅喻羣賢也井者法也時中常侍管霸等憎疾海內英賢並見廢錮茅田一頃言羣賢衆多也中有井者言雖厄窮不廢法度也四方纎纎言奸慝不可理也嚼飲酒相强之辭也言不恤王政徒耽宴而已今年尚可者言但禁錮也後年磽者陳蕃竇武等誅天下大壞也案范志同苐釋語㳫拖不如續書簡淨蔡雍對災異光和元年詔問曰連年蝗蟲其咎焉在雍對曰易傳云大作不時天降災厥咎蝗蟲來河圖祕微篇曰帝貪則政暴吏酷則誅慘生蝗蟲貪苛之所致也又南宫侍中寺雌雞欲化為雄一身毛皆似雄但頭冠尚未變詔以問雍對曰貌之不恭則有雞禍宣帝黃龍元年未央宫雌雞化為雄不鳴無距是歲元帝初即位將立王皇后至初元元年丞相史家雌雞化為雄距而鳴將是后父禁為平陽侯女立為后至哀帝晏駕后攝政王莾以后兄子為大司馬由是亂臣竊推之頭為元首人君之象今雞一身已變未至於頭而止是將有其事而不遂成之象也若應之不精政無所及頭冠或成為患滋大也案時以災異詔召邑與楊賜馬日磾張華單揚詣金商門引入崇德殿使中常侍就問災異及消改變故所宜施行雍悉心以對范書雍傳云事在五行天文志今闕婦人封君婦人封君儀比公主白犍軿車帶綬以采組為緄帶各如其綬色黃金辟邪加其首為帶雨肉三年亷縣雨肉似羊肺或大如手五行傳云棄法律逐功臣時則有羊禍時則有赤眚赤祥是時梁太后攝政兄冀專權枉誅李固杜喬天下寃之案肺范志作肋此建和三年事不衛宫司徒韓演司空孫朗以不衛宮下獄止長夀亭減死一等以爵贖之案時方誅梁冀故有此罰雨雹四年京師雨雹誅殺過差寵小人也案此延熹四年也長沙賊五年長沙賊起攻沒蒼梧取銅虎符太守甘定刺史侯輔各奔出城艾縣賊艾縣賊乘刺史車屯據臨湘居太守舍賊萬人以上屯益陽殺長吏案此亦延熹時事艾縣屬豫章減俸以京師水旱疫病帑藏空虛虎賁羽林不任事者住寺減半俸案減俸但及不任事者深得養廉之意渤海賊渤海妖賊蓋登等稱太上皇帝有玉印五皆如白石文曰皇帝信寫皇帝行璽其三無文字璧二十二圭五鐵劵十一開王廟帶玉綬衣絳衣相署置也案賊事何必細載范刪為是沱水龍時人欲就沱浴見沱水濁因相戲恐此中有黃龍語遂行人間郡欲以為美故上言之案沱水在巴郡人言生龍乃龍孽也桓帝昏濁之世多言祥應坐此類耳春幡立春之日竪春幡施土牛耕人於門外案今芒神春牛即此制也上巳三月上巳日官人並褉飲于東流水案褉范志作潔注云潔謂之褉也三日曲水摯虞小生固謬引世忌而束晢援成王秦帝事亦屬附㑹蔡雍以為夲之論語浴沂韓詩云鄭國之俗三月上巳之水上祓除不祥其于褉飲之義為近改水火夏至浚井改水冬至鑽燧改火可去溫病案夏至一陰始生井底極寒不可下不識古何以有此令宋蘇軾詩云寒食清明都過了石泉槐火一時新雖詞人之語然俗以清明淘井固不謬也尚書省光武帝分增三公曹為二公其一曹主歲盡諸州郡事常侍曹主選舉祠祀民曹主繕功作監池苑囿客曹主護駕羌人朝賀二千石曹主詞訟中都官主水火盜賊與三公為六曹并一令一僕二人謂之八座騑卿以下有騑者緹扇汗青翅尾符訾王莾末南方饑饉人掘符訾而食案符訾范作鳬茈為是大將軍順帝以皇后父梁商為大將軍如三公府置長史司馬中郎掾二十九人案順帝隆禮外戚大失馬鄧遺教故再傳而梁氏乃底滅亡虎文服虎賁服虎文章服襄邑歲獻織成虎文角端鮮卑禽獸異于中國者有野馬羱羊角端牛以角為弓俗謂之角端弓案端亦作􅗧元世祖駐師西印度見大獸作人語曰此非帝世界宜速還耶律楚材曰此名角端旄星之精能日馳萬八千里靈異如鬼神不可犯也則安得以角為弓乎一云出邪休多國角善為弓李陵常以此弓十張遺蘇武尤為無據車小使車者蘭輿皆朱赤轂白蓋赤帷從騶騎四十人皆追捕考案有所敇取者之所乘也乘輿金薄繆龍為輿倚較文虎伏軾皇太子諸侯王倚虎較伏鹿軾三公列侯安車朱斑輪倚鹿較伏熊軾案徐廣曰繆交錯之形也大行載車其飾如金根加施組連璧交結四角金龍首銜璧垂五采析羽流蘇輕車古之戰車也不巾不蓋漢承秦制為乘輿左右吉陽筒鸞雀立衡􅏹文畫輈案秦閲三代之禮或曰殷瑞山車金根之色於是始皇作金根之車殷曰乘根秦改曰金根上古聖人見轉蓬始知為輪奚仲為車正具物以時六材皆良案奚仲夏人世本云奚仲始作車童謡桓帝末京都有童謡曰白蓋小車何延延案五行志下有河間來合諧二句此應靈帝初立事百官奉大將軍三公奉月三百五十斛秩中二千石奉月百八十斛二千石月百二十斛比二千石月百斛千石月八十斛六百石月七十斛比六百石月五十五斛四百石月五十斛比四百石月四十五斛三百石月四十斛比三百石月三十七斛二百石月三十斛比二百石月二十七斛百石月十六斛斗食月十二斛佐史月八斛凡諸受奉錢穀各半案此建武三十六年增吏奉後之額其千石以上減于西京舊制六百石以下比舊秩為增世祖之為臣下養廉討法至良也故東漢每多亷吏云後漢書補逸卷二十一

body:
  text: 後漢書補逸卷三監察御史姚之駰撰東觀漢記第三馮異王郎起兵上自薊東南馳夜至蕪蔞亭時天寒烈衆皆飢疲馮異上豆粥明旦上謂諸將曰昨日得公孫豆粥飢寒俱解案異字公孫潁川父城人謚節侯亦稱大樹將軍此所載與范書月蕪范作無孟子所謂天降大任必先窮餓者此其時與異薦邑子銚期叔壽殷建左隆等光武皆以為掾史案范書殷作段此光武經父城異開門奉迎時事時更始遣舞隂王李軼廪丘王田立大司馬朱鮪白虎公陳矯將兵號三十萬共守洛陽案范書矯作僑是時光武拜異為孟津將軍與㓂恂共拒之上報異曰軼多詐不信人不能得其要領令移其書案時李軼報異書願内附異見其信效具以奏聞而光武故宣露其書令朱鮪知之鮪果使人刺軼兵故不厭詐也王郎追上自薊東南馳至南宫馮異進麥飯兎肩因渡呼沲河至信都案范書同南宫縣屬信都國今既云至南宫又云渡呼沲至信都似舛帝紀云度呼沲河至下博城西見白衣老父曰信都去此八十里耳攷其地當是自北而南傳語誤也呼沲范作虖沱光武遣馮異討赤眉車駕送至河南賜以乘輿七尺玉具劒勅異曰念自修整無為郡縣所笑異頓首受命案時鄧禹不能定因遣異討之范載勅云今之征伐非必畧地屠城要在平定安集之耳大哉王言也據此則笑字范作苦字為是又玉具劒范作七尺具劍光武引見馮異誦于公卿曰是我起兵時主簿為我披荆棘定關中者也案此建武六年異朝京師時事范語小異異西行布威信黽池霍郎陜王長湖濁惠華隂陽沈等稱將軍者皆降案范逸將軍名異與赤眉遇于華隂相距六十餘日降其將劉始王重等案范書重作宣人有上章言異威權至重專制關中百姓歸心使者宋嵩西上因以章示異案范書無宋嵩名世祖欲全節侯故以章示之比髙祖樊縶蕭曹何如也上賜異璽書曰聞吏士精銳水火不避購賞之賜必不令將軍負丹青失斷金案異為天水太守攻公孫述將趙匡等故特賜之文甚古鬰馮彰永平五年徙封彰為平鄉侯食鬱林潭中彰子晉坐鬬殺游徼㑹赦國除案彰乃異長子後至安帝時復紹封冦恂更始大司馬朱鮪在雒上欲南走河内難其守問鄧禹禹曰冦恂文武備足有牧民禦衆之才案范書恂字子翼上谷昌平人謚威侯走范作定為是上拜冦恂為河内太守恂移書屬縣講兵肄射伐淇園之竹治矢百餘萬案范書有飬馬二千匹收租四百萬二語威侯河内轉餉不愧蕭文終之鎮關中也恂在潁川郡中政理盗賊不入案賈剛侯部將尚戮之何况餘盗後從駕平賊百姓之借冦也宜哉周澤周澤少修髙節建武十六年辟大司馬府署儀曹祭酒案澤北海安丘人范列儒林傳周澤字穉都耿介特立好學問治嚴氏春秋門徒數百人隱居上野不汲汲于時俗拜太常果敢直言數有據爭朝廷嘉其清亷周澤為澠池令奉公克己妻子自親釜竈案范書無妻子自親釜竈語後澤以妻干犯齋禁收送詔獄生世不諧作太常妻時人之語非虗也甄宇甄宇字長文拜太子少傅清淨少欲常稱老氏知足之分也案字與澤同縣人范亦載儒林傳甄宇北海人建武中為青州從事徴拜博士每臘詔賜博士羊人一頭羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鈎宇復恥之宇因先自取其最瘦者由是不復有爭訟後召㑹詔問瘦羊甄博士京師因以稱之案范並不載此事幾令亷士佳話冺滅千古宇治嚴氏春秋持學精㣲以白衣教授常數百人劉桓光武以劉桓為驍騎將軍攻中山案范書闕牟融牟融字子優遷大司農居職修治又善論議朝廷皆服其能帝數嗟歎以為才堪宰相案融字一作子晏安丘人永平中代鮭陽鴻為大司農范同融為大司農性明達朝廷稱為名卿馮駿長沙中尉馮駿將兵詣岑彭璽書拜駿為威虜將軍案岑彭諭降江南其中但有長沙相意駿之詣或爭先故不載也後彭到江州留馮駿守之見岑傳朱鮪上令朱鮪等遂㑹城南涓水上沙中設壇立聖公為天子案鮪更始大將淮陽人後為少府見岑彭傳鮪破上大喜諸將賀之懇上尊號申屠剛申屠剛為尚書令謇謇多直言無所屈撓案剛字巨卿扶風茂陵人光武常欲出逰剛諌不聽以頭軔乗輿輪帝遂為止其直言可見矣朱暉朱暉字文季再遷臨淮太守吏民畏愛為之歌曰強直自遂南陽朱季吏畏其威民懐其徳建武十六年四方牛大疫暉守臨淮獨不疫鄰郡人多牽牛入界案范闕蝗飛虎渡外又成賢二千石佳話朱暉年十三與舅母家屬入宛城道遇賊欲奪婦女衣暉㧞刀向賊曰錢物可得諸母衣不可得今朱暉死日也賊義之笑曰童子納刀遂放遣案范書奪婦女衣下有昆弟賔客皆遑廹伏地莫敢動二句襯法好暉為郡督郵太守阮况當嫁女欲買暉婢暉不與及况卒暉送金三斤人問其故暉曰前不與婢者恐以財汚府君今重送欲明巳心也案范書同人必自敗其名節因視他人之名節為不足惜朱季不與守婢正從自己心中推去所謂恕也驃騎將軍東平王蒼辟朱暉為掾正月旦將軍當奉璧賀故事少府給璧時隂就為少府吏甚驕慢求不可得暉遙見就主簿持璧謂曰我素聞璧未嘗見借觀之主簿授暉暉授令史主簿遽白就就曰朱掾義士勿求之蒼罷朝謂暉曰掾自視孰與藺相如案相如完璧朱季奪璧千載兩人至今凛凛有生氣暉之先宋微子之後也以國氏姓周衰諸侯滅宋犇碭易姓為朱後徙于宛案范書不載暉外祖父孔休以徳行稱于代暉為守數年坐考長史囚死獄中州奏免官案暉剛于為吏故所在多被劾若此暉為臨淮太守斥逺佞惡民懐其惠岑彭彭亡歸宛與貳師嚴尤共城守案范書甄阜死彭被劍亡歸宛與前隊貳嚴說共城守此云貳師嚴尤計嚴尤為大司馬又非貳師不知何據彭字君然南陽棘陽人謚壯侯彭以將伐蜀漢而津鄉當荆揚之咽喉乃自引兵還屯津鄉因喻告諸蠻夷諸蠻夷相率遣使貢獻于是江南之珍竒食物始流通焉案范書交阯牧鄧讓等因彭諭皆相率貢獻悉封為列侯光武使吳漢收謝躬令岑彭助漢為方畧上以常所自持節授彭案前拜彭為刺姦將軍業授以常所持節矣此似又一事范闕彭圍隗囂于西城以縑囊盛土為堤灌西城谷水從地中數丈涌上故城不拔囂尾擊諸營彭師殿東入𢎞農界百姓持酒肉迎軍曰䝉將軍為後拒全子弟得生還也案時葢延耿弇兵俱相隨而退惟彭殿為後拒范畧彭發桂陽零陵長沙委輸櫂卒凡六萬人騎五千匹皆㑹荆門案櫂卒范書作棹卒謂持棹行船者詔彭守益州牧所下郡輒行太守事彭若出界即以太守號付後將軍選官屬守州中長史案此彭敗公孫述將田戎時事今軍制所得城邑例得外委亦此遺法秦豐豐邔縣人少學長安受律令歸為縣吏更始元年起兵攻得邔宜城若編臨沮中沮虞襄陽鄧新野穰湖陽蔡陽兵合萬人案范書邔屬南郡豐自稱楚黎王畧十有二縣附見岑彭傳田戎田戎西平人與同郡人陳義客夷陵為群盗更始元年義戎將兵陷夷陵陳義自稱黎丘大將軍戎自稱埽地大將軍戎至期日灼龜卜降兆中坼遂止不降案戎弄兵潢池游魂未息龜兆之坼以為戮耳朱浮朱浮與彭寵書責之曰伯通自伐以為功髙天下徃時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懐慙而還若以子之功論于朝廷則為遼東豕也案浮字叔元沛國蕭人彭寵狠强其叛也浮實偪之而此書文特儁妙朱浮為司空賣國恩以為威福案光武二十二年浮坐賣弄國恩免賀文和賀文和遷九江太守行縣持乾糧但就温而已臨去日百姓扶車叩馬啼泣隨之案范書闕侯霸侯霸為尚書令深見任用案霸河南密人侯霸字君房有威重為太子舍人案霸于成帝時以任子為舍人此追叙也霸從鍾寜君受律案霸又師九江太守房𤣥治穀梁春秋霸為淮平大尹政理有能名更始元年遣謁者侯盛荆州刺史費遂齎璽書徵霸案霸見徴時百姓號哭遮使者車至戒乳婦勿舉子曰侯君去必不能全其得人心如此淮平即臨淮莽所改也賈復賈復為縣掾迎鹽河東㑹盗賊起等輩欺没其鹽復獨完致縣中案復字君文南陽冠軍人謚剛侯亦稱賈君范作放散其鹽不若欺没為確時上置兩府官屬復與段孝共坐孝謂復曰卿將軍督我大司馬督不得共坐復曰俱劉公吏有何尊卑官屬以復不遜上調官屬補長吏共白欲以復為鄗尉上署報不許案賈督以後來而好陵折等輩上以其有折衝千里之威故特寵焉范不詳吳漢擊蜀未破上書請復自助上不遣案帝以復敢深入故希令逺征愛之也復闔門飬威重授易經起大義案復知帝欲偃武修文乃與鄧禹並剽甲兵敦儒學善夫其能以功名終也賈宗賈宗字武孺為長水校尉宗性方正奉職愛士及在朝廷數言便宜深見親異賞賜殊厚案宗賈復㓜子上美宗有武節又兼經術每宴㑹與當世文儒司徒丁鴻論難經傳案君文飬威重敦儒學故遺澤所留文武為憲武孺為朔方太守匃奴常犯塞得生口問太守為誰曰賈武孺曰寧賈將軍子耶曰是皆放遣還後更不入塞案范稱武孺多智畧其守朔方匃奴畏之不敢入塞微東觀記不知剛侯之餘威震于殊俗若此也朱敷朱敷上畧曰隗囂叛亂殺戮官吏惟狄道為國固守然民飢啖弩煑履宜救倒懸之急案范書闕承宫承宫少孤年八歲為人牧猪鄉里徐子明以春秋授諸生數百人宫過其廬下見諸生講好之因忘其猪而聽經猪主怪其不還行求索見生欲笞之門下生共禁乃止案宫字少子琅邪姑幕人范不詳子明范作子盛宫由是請留門下為諸生拾薪勤學不倦乃歸家教授承宫遭王莽簒位天下擾攘盗賊並起遂避世漢中建武四年將妻子之華隂山谷耕種禾黍臨熟人就認之宫悉推與而去由是顯名案華隂范作蒙隂宫既避地漢中則華隂為近范誤牟長牟長字君髙建武中拜少府詔曰少府大儒不失法度其見優如此案長樂安臨濟人范無拜少府事長著尚書章句皆本之歐陽氏俗號為牟氏章句列儒林傳吳漢吳漢字子顔更始立使使者韓鴻徇河北或謂鴻曰吳子顔竒士也可與計事鴻召見漢甚竒之案漢南陽宛人亦稱吳公時鴻即拜漢為安樂令而漢獨决意歸劉智士哉公孫述大司馬田戎將兵下江開至南郡據浮橋于江上吳漢鋸絶横橋大破之案范書有燒成都市橋事不載此岑彭傳云彭竒船直衝浮橋而攅柱鈎不得去因飛炬焚之亦不言鋸絶也竒偏將軍魯竒吳漢當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終案范同嚴即裝避明帝諱也漢使副將武威將軍劉禹將萬餘人屯于江南案時漢擊公孫述與禹分營遂為賊所破後乃併攻克之竟斬述禹范作尚吳漢伐蜀戰敗墮水縁馬尾得出案此漢至成都時公孫述遣竒兵襲擊破漢遂有此事范見公孫傳漢平成都乃乗桴沿江下巴郡楊偉徐容等惶恐解散案時蜀郡守將史歆反故遣漢討之楊徐其黨也吳漢疾篤車駕親臨問所欲言對曰臣愚無所識知惟願慎無赦而已案子顔此語與武侯治蜀同意吳漢爵位奉賜最尊重然但治宅不起巷第夫人先死薄葬小墳不作祠堂㳟儉如此及薨有司奏議以武為謚詔特賜謚曰忠侯案史稱漢質厚少文然觀其恭儉如此則大文不是過矣范省特賜謚事曹褒曹褒為城門校尉愍哀病徒親自省治醫藥糜粥案褒魯國薛人從射聲校尉遷是職後為河内守有殊政曹褒字叔通篤學常慕叔孫通為漢禮儀晝夜沉思寢則懐鉛筆行則誦文書當其念至忽忘所之案褒承父兄家學思制禮儀孝章勅褒撰定國憲成百五十篇後和帝即位太尉張酺等劾褒漢禮遂不行夫褒紹綿蕞之儀以成禮制且决以臆見雜以䜟記其不足救崩壊明矣朱祐光武微時常與朱祐共買蜜合藥後追念之乃賜祐白蜜一石問何如長安時共買蜜乎案祐本書作福避安帝諱也范書但言以有舊恩數䝉賞賚不詳光武在長安時常與朱祐共車而出朱祐字仲先初上學長安時過朱祐祐常留上講竟乃談語及車駕幸祐家上謂祐曰主人得無去我講乎案范作祐不時相勞苦而先升講舍較明白後祐為䕶軍謂世祖曰長安政亂公有日角之相此天命也則祐豈不知世祖者哉宜其親厚特殊爾祐斬張成延岑敗走收所得盗茂陵武帝廟衣印綬案范書但載收印綬九十七祐自陳功薄而國大願受南陽五百戸足矣上不許案祐封髙侯食邑七千三百戸故辭祭遵祭遵奉公賞賜與士卒家無私財身衣布衣卧布被夫人裳不加綵案遵字弟孫潁川潁陽人諡成侯亦稱祭征虜公孫述遣兵救隗囂吳漢耿弇等悉奔還遵獨留屯汧詔書曰將軍連年拒難衆兵即却復獨按部功勞爛然兵退無宿戒糧食不豫具今乃調度恐力不堪國家知將軍不易亦不遺力今送縑千匹以賜吏士案征虜時方有疾獨留不却其真憂國奉公者耶世祖之褒賜當矣祭遵為軍市令舍中兒犯法殺之上怒命收遵主簿陳副諌曰遵奉法不避是教令所行也上乃貰之以為刺奸將軍案范同祭遵薨博士范升上疏曰遵為將軍取士皆用儒術對酒娛樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘爼豆案范書全載升疏稱其好禮悦樂守死善道宜論敘衆功詳案謚法以禮成之遵喪至河南縣上還幸城門閲過喪車瞻望涕泣案世祖愍遵殁尤甚夫鳥盡弓藏韓彭爼醢髙祖不能保于生前而光武能恤于死後嗚呼仁矣但征虜以無子國除何不為繼絶綿祚也帝遣校尉發騎士四百人被𤣥甲兠鍪兵車軍陳送遵葬案范作朱輪客車小異上數嗟嘆衛尉銚期見上感慟對曰陛下至仁哀念祭遵不已羣臣各懷慚懼也葢延葢延字巨卿身長八尺彎弓三百斤案延漁陽要陽人范同延定沛楚因齋戒祠髙祖廟案延以氣聞而初定數邑即能齋戒祠髙廟有當萃渙之義是又深于學者延上疏辭曰臣幸得受干戈誅逆虜奉職未稱乆留天誅常恐汚辱名號不及等倫天下平定以後曾無尺寸可數不得預竹帛之編明詔深閔儆戒備具每事奉循詔命必不敢為國之憂也案世祖以延輕敵深入數以書誡之故延上書如此延圍劉永于睢陽夜梯其城入永驚懼走出魚門延追擊大破之斬其魯郡太守梁丘壽沛郡太守陳修案范書魚門作東門則東門名魚也二守范皆不載其名龎萌攻延延與戰破之詔書勞延曰龎萌一夜反畔相去不逺營壁不堅殆令人齒欲相擊而將軍有不可動之節吾甚美之案范書萌襲敗延延走北渡泗水破舟檝壞津梁僅而得免與此大異續書則同本書當不誤耳永初七年詔封延曾孫為盧亭侯案范書作蘆亭鮑昱昱為泚陽長邑人趙堅殺人繫獄其父母詣獄自言年七十餘惟有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令將妻入獄止宿遂任身有子案昱字文泉永之子有智謀能傳父學范但稱政化仁愛而已不載此事時司徒例訟久者至數十年比例輕重非其事類錯雜難知昱奏定詞訟七卷决事都目八卷以齊同法令息遏人訟也案律例以定刑國之要政而錯雜難知輕重不一汚吏奸胥得以上下其手千古所同慨也昱奏定齊法其事甚鉅范闕之何與光武二十三年太尉鮑昱兼衛尉案昱以中元元年拜司𨽻校尉至肅宗建初四年始代牟融為太尉且大司馬改為太尉事在光武二十七年其二十三年并無此官不知何書傳誤若此嚴光嚴光字子陵耕于富春山後人名其釣處為嚴陵瀬案光一名遵㑹稽餘姚人嚴先生高節清風足以激頑起懦范仲淹謂非光武不能遂子陵之高非子陵不能成光武之大得之矣郇恁郇恁字君大案此見北堂書鈔署辟郇恁三字不知辟自何人范劉平傳有薦名士承宫郇恁語豈平所辟耶又范髙士傳序載荀恁字君大閔仲叔同郡人惟郇作荀耳蓬萌王莽居攝子宇諌莽而莽殺之蓬萌謂其友人曰三綱絶矣不去禍將及人即解冠掛東門而去案萌字子慶北海都昌人東門范作東都城門前書音義曰長安東都城北頭第一門也蓬萌被徵上道迷不知東西云朝所徵我者為聰明􅌖智有益于政方向不知安能濟政即駕而歸案范書大同文較簡潔子慶隱于新宜也及光武側席幽人正宜行義逹道而甘與草木同腐亦士各有志乎鄧讓讓夫人光烈皇后姊也案范書讓為交阯牧岑彭遣使者陳國威徳于是讓同六守一相皆遣人貢獻封為列侯葢順天者存非關椒房之戚也陳俊俊初調補曲陽長上曰欲與君為左右小縣何足貪乎俊即拜解印綬上以為安集掾案俊字子昭南陽西鄂人其得進身由宗室劉嘉薦也范不詳建武二年俊攻匡城賊下四縣案范書作攻匡賊即匡城賊也非姓陳浮二十三年詔書以祝阿益濟南國故徙浮封蘄春侯案浮俊子也耿弇弇凡平城陽琅邪髙密膠東東萊北海齊千乘濟南平原泰山臨淄等案弇字伯昭茂陵人謚烈侯亦稱大耿弇攻張步盡平齊地功亦偉矣張步直攻弇營與劉歆等㑹戰弇升正宫環臺望之案范書環臺作壞臺耿弇少好學習父業嘗見郡尉試騎士建旗鼓肄馳射由是好將帥之事凡所平郡三十六屠城三百未嘗挫折案弇父况嘗為朔調連率平郡三十六范作四十六耿弇曰吾攻西安臨淄不能救也所謂擊一而得二也案時張步弟藍守西安與臨淄相去四十里諸將以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備臨淄出不意而至必驚擾吾攻之一日必㧞㧞臨淄即西安孤張藍與歩隔絶必復亡去所謂擊一而得二也後果然此誤耿弇與張歩戰矢中弇眼以佩刀摧之左右無知者案眼范作股為近弇追張歩歩奔平夀乃肉袒附斧鑕于軍門而弇勒兵入據其城樹十二郡旗鼓令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里案范同左傳有三軍耳目在于旗鼓之語盖以旗分則將有所綂兵有所附截然不紊本朝兵制旗以色分誠將兵之善制萬世不㧞之規模也大耿樹旗十二以分郡人先得之矣十三郡即前列城陽琅邪等耿國耿國字叔憲案范書憲作慮誤國亦况子官至大司馬耿恭耿恭在疏勒救兵不至車師復叛與匃奴共攻恭數月食盡窮困乃煮鎧弩食其筋革恭與士衆推誠同死生故皆無二心也案恭乃國弟廣之子鮑昱以為恭節過蘓武宜䝉爵賞而見忤車騎終填牢戸蔚宗所為喟然流涕也匃奴攻金蒲城耿恭以毒藥傅矢傳語匃奴曰漢家神箭其中創者必有異因發强弩射之鹵中矢者視創皆沸並大驚案時恭為戊巳校尉屯金蒲城神道設教兵家尚之耿恭字伯宗時始置西域都䕶戊巳校尉恭至即移檄烏孫示漢威徳昆彌以下皆歡喜遣使獻名馬願遣子入侍案范同昆彌所獻又有宣帝時所賜公主博具耿恭為校尉居疏勒匃奴來攻城中穿井十五丈無水恭曰聞貳師將軍㧞佩刀刺山而飛泉出今漢徳神靈豈有窮乎乃正衣冠向井拜為吏請禱有頃井泉濆出案恭以疏勒城傍有澗水可固故據之而匃奴于城下擁絶澗水非恭失䇿也忠誠泣鬼地靈為格禱井之神烜赫千古恭既得水親自挽籠于是令士且勿飲先和泥塗城并揚示之案本書序一時得水狂喜如畫范但稱揚水示鹵而已恭擊車師大破之車師太子比特訾降案范書不載其名耿氏自中興以後迄建安之末大將軍二人九卿十三人尚公主三人列侯十九人中郎將䕶羌校尉及刺史二千石數百人案范云三世為將道家所忌而耿氏功名遂與漢興衰抑何盛也葢以殺止殺所謂義戰者耶詩不云乎勝殷遏劉劉茂劉茂為郡門下掾赤眉攻太原茂負守孫福踰墻出藏地西門下空穴中擔穀給福及妻子百餘日福表為議郎案茂字子衛太原晉陽人茂之事主可謂忠矣孫福守也乃寄身空穴受穀活妻子而聽民蹂躙可乎范載獨行傳孫咸䜟曰孫咸征狄今以平狄將軍孫咸行大司馬事咸以武名官以應圖䜟案命司馬而以䜟决之則人主無權冢宰可不設矣鄧奉鄧奉拒光武𤓰里案范書宛有𤓰里津即此伏湛杜詩表云竊見大司徒伏惠公篤信好學秉節持重有不可奪案湛字惠公琅邪東武人建武三年代鄧禹為大司徒後以事免故詩薦之但君前臣名無稱惠公理此本不知何據范全載詩表稱名不譌也耿純耿純率宗族歸光武時郡國多降邯鄲純兄歸燒宗家廬舍上以問純純曰恐宗人賔客卒有不同故焚燒廬舍絶其反顧之望上大笑案純鉅鹿宋子人純可謂赤心事漢矣燒宗家廬舍胆與識俱臻絶頂王郎舉尊號欲收純純持節與從吏夜遁出城拄節道中詔取行者車馬得數十持歸宋子與從兄訢宿植俱詣上所在廬奴言王郎所反之狀案世祖北至中山留純邯鄲㑹王郎反兵勢甚盛而純獨仗義歸漢其卓然之見真不可及廬奴地名耿純字伯山率宗族賔客二千餘人皆衣縑襜褕絳巾奉迎世祖世祖拜純為前將軍封耿鄉侯案范同臧宫臧宫以城門校尉轉左郎將征武陵蠻案宫潁川郟人此建武十九年事後宫與馬武欲攻匃奴帝詔謝之使雄心尚武者不敢復言兵范以為世祖意防𢎞深良然杜林杜林代張純為大司空務于無為案林茂陵人杜子夏之子博洽多聞時稱通儒杜林遷大司徒司直百寮知林以明徳用甚敬憚之案范羣僚知林繫之林為侍御史時與此小異杜林字伯山為侍御史先與鄭興同寓隴右乃薦之上徵興為大中大夫光禄勲杜林與馬援鄉里親厚援南方還時林馬適死援遣子持一匹馬遺林曰朋友有車馬之饋可且以備乏林受之居數月林遣子奉書曰將軍内施九族外有賔客望恩者多林父子食禄禄出常有盈今奉錢五萬援受之謂兒曰當以此為法杜伯山所以勝我也案伯山亷而不激介而能和范不載杜林拘于隗囂終不屈節建武六年弟成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢于隴坻遮殺之賢見林身推鹿車載致弟喪乃嘆曰當今之世誰能行義我雖小人何忍殺義士因亡去案隗囂始敬侍林以為且從師友之位今又欲殺之宜其敗則為賊也楊賢何人乃能假義士命與觸槐人爭烈矣范以為人之所助者順不亦信乎林寄隗囂地終不降志辱身至簮蒿席草不食其粟案范不載林為東海王傅王以師故數加饋遺林不敢受常辭以道上稟假有餘苦以車重無所置之案辭饋而以車重為名即奉錢酬馬意也伯山之學邃矣時議郊祀制以為漢當祀堯林上疏曰臣聞營河雒以為民刻肌膚以為刑封疆畫界以建諸侯井田什一以供國用三代之所同及至漢興因時宜趨世務省煩苛取實事不茍㑹髙亢之論是以去土中之京師就關内之逺都除肉刑之重律用髠鉗之輕法郡縣不置世禄之家農人三十而取一政卑易行禮簡易從無有愚智思仰漢徳樂承漢祀基業特起不因緣堯堯逺于漢民不曉信言提其耳終不悅諭后稷近于周民戸知之世據以興基由其祚本與漢異郊祀髙帝誠從民望得萬國之歡心天下福應莫大于此民奉種祀且猶世主不失先俗羣臣僉薦鯀考績不成九載乃殛宗廟至重衆心難違不可卒改詩云不愆不忘率由舊章明當尊用祖宗之故文章也宜如舊制以解天下之惑合于易之所謂先天而天不違後天而奉天時義方軍師在外祭可且如元年郊祭故事案范志建武七年五月世祖詔三公曰漢當郊堯其制與卿大夫博士議林時為侍御史上疏以為宜仍舊以髙帝配上從之隂睦建武二年追尊貴人父睦為宣恩侯案光烈后七歲失父故追尊之范闕張况况遷涿郡太守時年八十不任兵馬上疏乞身詔許之後詔問起居何如子歆對曰如故詔曰家人居不足贍且以一縣自飬以况為長山關長㑹赤眉攻關城况出戰死上甚哀之案况趙國襄國人張禹之祖也族姊為皇祖考夫人故光武呼為大舅見范張禹傳後漢書補逸卷三

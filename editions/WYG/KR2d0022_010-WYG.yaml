body:
  text: 後漢書補逸卷十監察御史姚之駰撰謝承後漢書第二陳寵陳寵曾祖咸字子成為廷尉監議人常從輕比論報多所全活皆稱恩也案寵見東觀記咸係前漢哀平間人謝書序寵先世獨詳范亦畧同但咸以律令為尚書未為廷尉監也案咸生欽欽生躬躬乃寵父曽為廷尉左監此其躬事耶寵雖傳法律而務在寛厚葢過庭之餘習深矣王莽篡位咸還家杜門不出莽改易漢法令及臘日咸常言我先祖何知王氏臘乎案此亦序寵先世事也張意張意為驃騎將軍討東甌賊意修水戰之具浮海就攻所向無敵制案水戰亦足兵一要務也今艦設有鋸犁趕繒等號江海重鎮設有水師營其海然承平日久雖大脩小脩届期不廢而揚帆巡哨或難入海皇上安不忘危其廢弛之弊務使戰艦皆堅固如式可命督撫大臣察以浮海而于水師營弁必選熟習海道者為之葢人人張意矣范闕馬融馬融字季長年十三明經為太子舍人校書東觀案融見東觀記季長以永初二年辭鄧隲召四年復出拜校書則年已非十三也此定有誤融為校書郎又拜郎中案范稱融為校書郎中與此不同巴祗巴祗字敬祖為揚州刺史禄俸不使有餘幘毁壊不復改易以水澡膠墨傅之夜與士對坐處暝暗之中不然官燭案祗貞介之操不無谿刻自處然以儉化俗未為過也澡幘坐暝二事甚韻謝每寫亷吏獨詳使豪華者對之無色范闕祗為别駕體素清白以儉厲俗在任不迎妻子鄧道鄧道出為馮翊守下車治豪强四海號為豪强所病案范書闕陳龜安帝時尚書陳龜上表曰仁恩廣被化流殊方使老者以夀終孤幼得保年猶運河轉石易于反掌案龜字叔珍上黨泫氏人永建中舉孝亷後拜京兆尹㑹羌宼邊桓帝以龜世諳邊俗拜為度遼將軍臨行上疏數百言獨不見此表且據范傳則安帝時龜未為尚書豈范有遺誤或姓名偶同者與孟嘗孟嘗遷合浦太守郡不産榖食而海出珠寶與交阯比境常通商販貨糴糧食先時宰守並多貪穢詭人採取不知紀極珠遂漸徙于交阯境界于是行旅不至貧者餓死于道嘗到官革易前弊曾未踰歳去珠復還百姓皆反其業商賈流通稱為神明案嘗字伯周㑹稽上虞人老蚌何靈珠豈能不脛而走蜑戸以貪守誅求故詭言蚌徙耳亷吏至則羣返其業矣然如史所傳乃成千古佳話范同嘗為合浦被徴當還吏民攀車請之不得進乃附商人船遁去尹昆尹昆為侍御闕時拜尚書僕射詔曰惟君公曹時以太守之術克奬王室其省録臺事勿令謬誤案范書闕公曹二字疑有脱誤閔貢閔貢字仲叔太原人案仲叔見東觀記此載劉義慶世説注中仲叔以字行微此則其名冺矣石苞石苞字延博為諸生篤行清苦學五經徴拜議郎案范書闕五經之學近乃極盛然其流弊恐亦在兼經科中士人墨守訓詁不知箋疏為何物甚且專求闈擬而習之稍有忌諱概不省覽無論經解矣延博之學五經恐不若此今聖天子作人意切出吉祥擬題以覘實學將來試官拈諭鄉㑹試士不必題自必就生避熟經學之興駸駸日上矣張稷張稷字衞君除尚書侍郎左丞朝賀陛見進對威儀辭令辨達明帝深奇異之拜膠東相案范書闕吳祐吳祐遷膠東相有男子母俱行道遇姦辱其母長遂殺之追捕行長祐問長有子乎曰有妻未有子召長妻至獄解桎梏使同宿遂孕至冬行殺長囓指斷含血誓若生男名吳生以報吳君也案祐見東觀記安丘男子名母丘長此所載不明定引用者脱誤鄧通鄧通字子淵遷越騎校尉為營吏士所敬畏天下嘆服案范書闕宋度宋度字叔平除謁者以詔書賜降俟朝闕門門開度頓首讓胡掾賜畢奏罷大鴻臚京師稱曰宋叔平一史奏罷九卿案度奏罷鴻臚不知何事但因謁者而斥逐九卿失敬大臣之道矣范闕宋叔平豫章宋叔平為定陵令素杯食麥飯案東漢人名兩字者尠此豈以字行即奏罷九卿者耶范不載髙吕髙吕為廣漢太守朝省官事晝誦經典案范書闕仕優則學昔賢所訓豈必一腰墨綬便甘為俗吏乎况引經斷獄尤為有益吕得之矣徐防安帝即位太尉徐防以災異寇賊策免案防見東觀記范同時防自陳過咎不敢居大位亦異于持禄固寵者特朝廷不宜策免之耳王充王充字仲任家貧無書至京師往寺中省所賣書一見便憶于宅内門墻屋柱皆施筆硯簡牘見事而作著論衡八十五篇案充㑹稽上虞人充所著論衡時多拘滯未見雄偉而或以為秘玩何也范同謝􅆥吾薦充曰充之天才非學所加雖前世孟軻孫卿近漢揚雄劉向司馬遷不能過也案􅆥吾此表未免奬充過甚陳堪陳堪仕郡為五官掾府君被徴廷尉堪以五毒加身體斷舌無聲案范書闕堪之事主可謂忠矣天下孰不願以為臣華崧華崧為河南尹優賢養民興崇教化至其翦治强宗威烈不虧遂見譖殺案范書闕華松華松為司隸校尉是時貴戚專勢松下車閉閤不通私書不與豪右相見姦匿犯者輒奏豪羣斂手由是深見非恨案此文義與前傳絶相類疑即一人前尹河南後任司𨽻其名或傳寫之譌也范闕戴封戴封字平仲遷西華令其年大旱禱請無獲乃積薪坐其上以自焚火起而大雨逺邇嘆服遷中山相案封濟北剛人積薪自焚近于愚僧所為不然直與暴巫尫等耳抑封善于占雨知其當以時降故為此以衒名耶平仲范作仲平許荆許荆字子張少喪父養母孝順家貧為吏無有船車休假常單步荷擔上下清節稱于鄉里案荆㑹稽陽羨人范載循吏傳荆兄子常報讎殺人怨家㑹衆操兵至荆家欲殺之㑹荆始從府休歸與相遇因出門解劍長跪曰前無狀相犯咎皆在荆不能相教兄既早殁一子為嗣如全死者傷其滅絶今願殺身代之塞咎雖死已往猶謂更生怨家扶起荆曰許掾郡中稱為賢吾何敢相侵因遂委去案荆之愛兄固足感動怨家然亦其平日賢聲先為之奪也人或名滿海内而鄉里薄之奚取焉荆為桂陽太守耒陽有蔣均者兄弟爭財互相言訟荆嘆曰教化不行罪在太守乃使吏上書陳狀乞詣廷尉均兄弟感悔各求受罪郴人謝𢎞等不養父母兄弟分析因此皆還供養者千有餘人案荆貧而養母死以報兄惟躬行孝弟故治民亦以孝弟為先也語云以身教者從信然許季長許季長為湖令州郡皆被蝗災過湖縣飛去不入案范書闕司馬苞司馬苞字仲成東緡人也為太尉常食麄飯著布衣妻子不厯官舍㑹司徒楊震為樊豐等所譖連及苞苞乞骸骨未見聽以疾薨案范書苞無傳安帝紀載元初中大司農山陽司馬苞為太尉二年六月太尉司馬苞薨范之簡畧如此張冀豫章張冀字仲宗為廣陵守舉孝子吳奉為孝亷奉齎金為禮冀閉門不受而奉以囊盛金夜投冀園中而逝冀追不及齎金至廣陵還奉案范書闕一本作張載卻投園之金其難更甚于四知也千里齎還冀豈以博名髙哉趙煜趙煜少嘗為縣吏奉檄送督郵煜心恥于厮役遂棄車馬去到􅛳為資中詣杜撫受韓詩究竟其術案煜字長君㑹稽山隂人游學積二十年不歸其家至為發喪制服所著有吳越春秋詩細厯神淵可謂好學深思之士矣范書又載南陽馮良事與長君事前後雷同不知何以一時有此二士杜撫杜撫字叔和犍為武陽人少有髙才受業于薛漢定韓詩章句案撫作詩題約義通學者傳之曰杜君注范載儒林傳許敬許敬字鴻卿其吏有誣君者㑹于縣令坐敬拔刀斷其席曰敬不忍與惡人同席案袁紀敬汝南平輿人仕至司徒敬值竇鄧閻氏之盛直道而進三家之敗多所染汙敬謗不及己當世以此奇之范闕廣漢儒廣漢儒字叔林為東郡太守烏巢于㕔事屋梁兎産于牀下案范書闕玉况玉况字文伯京兆杜陵人也代為三輔名族該總五經志節髙亮為陳留太守性聰敏善行德教永平十五年蝗蟲起泰山彌衍兖豫過陳留界飛逝不集五榖獨豐章和元年詔以况為司徒案范書况無傳惟見虞延班彪傳中二人皆况所辟也東閣招賢况不愧矣又光武紀建武二十三年九月陳留太守玉况為大司徒二十七年四月司徒玉况薨與謝書不合必有一誤玉姓音宿班固固年十三王充見之拊其背謂彪曰此兒必記漢事案固之文詞美矣特其出入竇氏以不教學諸子卒至身陷大戮視乃父傾側危亂之間而仕不急進貞不違人者將無愧乎范書附彪傳後陳嚚㑹稽陳嚚少時于郭外水邊捕魚人有盜者嚚見避于草中追以魚遺之盜慚不受自後無復取焉案以魚遺盜是以道止盜莊子曰盜亦有道乎則止盜豈無道乎嚚葢得老氏之學者范闕陳翔陳翔遷定襄太守寛猛俱濟案翔字子麟汝南邵陵人范載黨錮傳馮魴馮魴為侍中稍遷衞尉能取悦當時為安帝所寵帝幸其府留飲十日賜駭犀玉具綬珮刀紫艾綬玉玦案魴見東觀記此為侍中者魴孫石也東觀記及范書皆作石事謝書當亦從同後世類事之書不探全傳本末故混淆若此唐羌唐羌字伯游辟公府補臨武長縣接交州舊獻龍眼荔枝乃生鮮獻之驛馬晝夜傳送之至有遭虎狼毒害頓仆死亡不絶道經臨武羌乃上書諫曰臣聞上不以滋味為德下不以貢膳為功故天子食太牢為尊不以果實為珍伏見交趾七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絶于路至于觸犯死亡之害死者不可復生來者猶可以救也此二物升殿未必延年益壽帝從之章報羌即棄官還家不應徴召著唐子三十餘篇案范書闕惟見和帝紀云舊南海獻龍眼荔枝十里一置五里一候奔騰阻險死者繼路時臨武長汝南唐羌上書陳狀帝從之勅大官勿復受獻葢一騎紅塵不獨始于天寶也張青青字公然東都聊城人案范書青事載張酺傳中青以被矢貫咽音聲流喝前郡守不能舉酺上書言青三世死節宜䝉顯異薦賢受上賞酺不愧矣王黨王黨遷汝南太守拔才禮士不敢自專故能化清于上事緝于下案范書闕髙慎陳王鈞多不法行天子大射禮陳國户曹史高慎諫國相曰諸侯射豕天子射熊八彛六樽禮數不同昔季氏設朱干玉戚以舞大夏左傳曰惟名與器不可以假人奢僭之漸不可聽也于是諫諍不合為王所非坐司寇罪案明帝子陳敬王羨薨子思王鈞嗣鈞立多不法國相二千石不與相得者輒隂中之髙慎此疏典核古勁最是精彩范闕周燮燮居家清處非法不言兄弟父子室家相待如賔鄉曲不善者皆從其教案燮字彦祖汝南安城人燮非身所耕漁則不食鄉黨宗族希得見者舉孝亷賢良方正特徴皆以疾辭亦髙士也岑熈岑熈遷魏郡太守人歌之曰我有荆棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生􅈊含哺鼓腹焉知凶災我喜我生獨丁斯時美哉岑君於戲在茲案熈岑彭𤣥孫尚安帝妹湼陽公主少為中郎將朝廷多稱其能故遷守魏郡在位二年無為而化洵良二千石也范書以附祖後故不載之循吏傳陳楚陳楚嘗賜食于上楚稱眼無所見以肉投羮案賜食之禮至煩且嚴如此則不敬孰甚葢必有不得已而然者引史者不溯其源何啻説夢范闕李燾李燾為青州刺史發璽書于本縣傳舍乗法駕騑驂朱軒就路奏免四郡相百城怖懼悉豫棄官案范書闕一家哭固猶愈于一路然封疆重臣視屬吏功名如土芥輒行劾免亦非有容之量且其中保無喜怒任情毁譽過聽者耶燾之督案非中庸之道也石闕石闕為雁門太守廣宣恩惠懐保殊俗逺方皆服其德案此見北堂書鈔遺其名范不載陳禪陳禪字紀山為州治中從事時刺史為人苛刻受納臧賄禪當傳拷乃至笞掠無算五毒畢加神意自若辭對無變事遂釋案禪巴郡安漢人禪拜諫議大夫永寧元年西南􅆥撣國王獻樂及幻人能吐火自支解易牛馬頭明年元㑹作之于庭安帝嘗與羣臣共觀大奇之禪獨離席舉手諫曰昔齊魯為夾谷之㑹齊作侏儒之樂仲尼誅之帝王之庭不宜設􅆥狄之技尚書陳忠劾奏禪曰昔合歡之樂舞于堂四􅆥之樂陳于門今撣國越流沙踰縣渡萬里貢獻非鄭衞之聲佞人之比而禪廷訕朝政請劾禪下獄有詔勿收左轉為𤣥莵候城障尉案禪奉詔貶秩即行就道㑹有遼警追拜為遼東太守禪不用兵而服之則知諌設􅆥樂非徒迂濶也陳忠沛國洨人字伯始陳咸之裔劾禪以阿帝所謂教咸諂者忠真得其傳耶范書自有傳也聞人綂聞人綂字文公昔為督郵家貧無馬行則負擔卧則無被連麕皮以覆不受人一餐之饋案范書闕梁竦和帝追封諡皇太后父梁竦為褒親愍侯改殯賜東園畫棺玉匣衣衾案竦字叔敬安定烏氏人綂次子少習孟氏易以經籍自娛非富貴而驕者後為竇氏誣陷死漢陽獄至和帝以太后父故迎喪改殯也諸本竦皆誤作松松竦之兄也太后則竦所出耳梁不疑梁不疑子為潁隂侯𦙍子為城父侯冀一門三皇后六貴人二大將軍夫人女侯邑稱君七人尚公主三人其餘卿將尹校五十七人案范書不疑子名馬𦙍子名桃皆乳臭哇耳而遽佩侯印冀門驕貴若此敗家亡宗豈徒然哉不疑好經書善待士冀隂嫉之及梁氏誅滅不疑己先卒孰云天道逺耶李壽李壽薦異行案范書闕孔喬喬字子松宛人也學古文尚書春秋左氏傳常幽居脩志鋭意典籍至乃厯年身不出門鄉里莫得瞻見公車徴不行卒于家案范書闕李昺昺字子然鄭人也篤行好學不羨榮禄習魯詩京氏易室家相待如賔州郡前後禮請不應舉茂才除召陵令不到官公車徴不行卒案范書闕郎宗宗字仲綏安丘人也善京氏易風角星算推步吉凶常負笈荷擔賣卜給食瘠服閒行人莫得知安帝詔公車徴策文曰郎宗李昺孔喬等前比徴命未肯降意恐主者玩弄禮意不備使難進易退之人龍潛不屈其身各致意禮遣詣公車將以補察國政輔朕之不逮青州被詔書遣宗詣公車對策陳災異而為諸儒之表拜議郎除吳令到官一月時卒暴風宗占以為京師有大火定火發時果如宗言諸公聞之表上博士徴宗恥以占事就徴文書未到夜懸印綬置㕔上遁去終于家子頡自有傳案安帝詔語允恭克讓如諸賢名不副實何恥以占事就徴宗之識髙矣范闕王輔輔字公助平陸人也學公羊傳援神契常隠居野廬以道自娛辟公府舉有道對策拜郎中陳災異甄吉凶有驗拜議郎以病遜安帝公車徴不行卒于家案范書孔喬等四人名見樊英傳建光元年詔公車賜策書徴南陽樊英陳留楊倫及喬等六人惟郎宗楊倫到洛陽餘皆不就徴也夫樊英最知名而張楷譏其進退無據李固朱穆等以為處士純盜虚聲則英等之名乃以徴聘而毁四子之終于隠逸豈非蠱上之吉乎施延延字君子蘄縣人少為諸生明于五經星官風角靡有不綜家貧母老周流傭賃常避地于廬江臨湖縣種𤓰後到吳郡海鹽取卒月直賃作半路亭又以養其母是時吳㑹未分山隂馮敷為督郵到縣延持帚往敷知其賢者下車輪使入亭請與飲食脱衣與之餉錢不受順帝徴拜太尉年七十六薨案范書延之見用以安帝求直言陳忠慮言事者必多激切乃上疏豫通帝意且云有道之士對問髙者宜特遷一等以廣直言之路書奏詔拜有道髙第士沛國施延為侍中後位至太尉則延之用忠實成之任防任防字文始為司隸校尉下車嘗食乾飯十日一炊閉閤不通豪右施設禁令案法貴戚斂手致相約勅不敢干越案范書闕謝書中語句相仿者多故當以此遜耳王賜王賜拜南陽太守羊皮鹿身車毁不改馬羸不易案范書闕疑即王暢之訛也黄昌黄昌㑹稽人為蜀郡太守初昌為州書佐其婦歸寧于家遇賊被擄遂流轉入蜀為人妻其子犯事詣昌自訟昌疑母不類蜀人因問所由對曰妾本㑹稽餘姚戴次公女州書佐黄昌妻也妾嘗歸家為賊所掠遂至于此昌驚呼前謂曰何以誌黄昌耶對曰昌左足心有黒子自言當為二千石昌乃出足示之因相持悲泣還為夫婦竟以禮重焉案昌字聖貞㑹稽餘姚人范書所載與此畧同昌為宛陵令嚴毅好發姦伏有盜車葢者昌不言密令人至賊家掩取之悉收一家一時殺之百姓戰懼咸稱明也案車葢小盜即曰杜漸何至殱其一家昌其蒼鷹乳虎之流與當是東漢第一酷吏昌為蜀郡太守未至郡時蜀有童謡曰兩日出天兵戢闕紹㑹稽闕紹字文肅為范令不入内舍常卧㕔事上案為令不入内舍此作縣譜也欲寡則心清而政平夫何憂煩劇朱子論孔明人物以為得寡欲養心之助意正如此范闕侯瑾侯瑾字子瑜傭作為資暮㸐柴讀書獨處一室如對嚴賔案范書闕傭身讀書東漢大儒多有之後人便以傭為恥矣樊英順帝備禮徴拜英為五官中郎將案時天子為英設壇席令公車令導尚書奉引賜几杖待以師傅之禮延問得失英不敢辭因拜是職然竟以髙名召謗雖善言災異何補治道民不失望葢其難哉英字季齊南陽魯陽人祝皓祝皓字子春志節抗烈篤于仁義為吏歸休先周旋鄉里弔死問疾畢乃還家案范書闕末世士大夫休官歸來多驕其宗黨凌其父老胡不于子春是法劉據劉據為大司農以職事被譴召將加捶撲左雄諫曰九卿位亞三公班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者案據事范載左雄傳被譴下有召詣尚書傳呼促步又加以捶撲數語文較通暢夫古者刑不上大夫况加笞撲􅆥于徒𨽻賈長沙所以痛哭也有明廷杖之制起于宣宗後遂以為故事至有血裹朝衣預吞蚺朝膽者使緹綺小卒凌辱重臣莫此為甚我以禮於戲一除其弊超越前代萬萬孔子云君使臣聖矣虞承虞承字叔明拜諫議大夫雅性忠謇在朝堂犯顔諫諍終不曲撓散俸禄賑給諸生言德無比案范書闕左雄左雄字伯豪為冀州刺史不舉煙火長食乾飯十日一炊案雄南郡湟陽人范稱其刺冀州不與豪傑交通奏案貪猾無所回忌非清毅自處豈能若是而范不載其介節何歟至于封事屢上深中時痼虞詡薦其有忠公節信然戴良戴良有失父零丁案良字叔鸞汝南慎陽人范獨載其事母一節則必幼而失父者也此未檢所出近髙宫詹士奇天禄識餘載之與齊諧記有失兒女零丁句並列注云零丁今之尋人招子也陳常陳常字君淵晝則躬耕夜則賃書以養母案范書闕薛惇汝南薛惇為北海長史家貧坐無完席妻曰君無俸禄給子孫復無完席耶惇以善席與妻自坐敗者妻慚不敢復言案此與王恭無長物事同世説不列之德行函中亦闕事也范不載雷義豫章雷義字仲恭嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在黙投金于承塵之上後葺治屋得金金主已死義乃以付縣曹又義舉茂才讓于陳重刺史不聽義遂佯狂披髪走不應命案義豫章鄱陽人與同郡陳重為友即所稱膠漆不若者也仲恭范作仲公法真法真隠居大澤講論術藝厯年不問一作窺園圃案真字髙卿一作喬卿扶風郿人太守雄之子識胡廣于諸吏中事見廣傳真為闗西大儒前後四徴終不降屈范書載其答太守云以明府見待有禮故敢自同賔末若欲吏之真將在北山之北南山之南矣友人郭正稱之曰名可得而聞身難得而見逃名而名我隨避名而名我追數語皆妙天下遂開晉人風味徐相吳郡徐相為長沙郡守常食乾飯不發煙爨後亡遺言不受贈有一匹私馬賣以買棺案范書闕殁則已焉猶砥節于身後聖之清者也崔瑗崔瑗為濟北相光禄大夫杜喬為八使徇行郡國以臧罪奏瑗徴詣廷尉瑗上書自訟得理出㑹病卒臨終顧命子寔曰夫人稟天地之氣以生及其終也歸精于天還骨于地何地不可藏形骸而歸鄉里其賵贈之物羊豕之奠一不得受寔奉遺令遂留葬洛陽案瑗字子玉涿郡安平人駰之子也專心學業顛沛不廢令汲縣七年百姓歌之豈遷濟北而易其介者何杜喬以臧罪奏也喬清剛而不免于苛細瑗之被劾或以此又華嶠書稱瑗自并日而食而愛士好客盛修肴膳或反譏其太奢臧之所由寃乎自訟得理何損于名沈輔沈輔字伯禽㑹稽山隂人也輔少儉約約身以禮喪父服闋推讓祖考財産田宅與親貧不足者案范書闕束身以禮則必儉能儉則田宅寶賄俱為無用之物故伯禽之讓要從知禮來范丹范丹字史雲陳留人也所居卑陋有時絶糧閭里歌之曰甑中生塵范史雲案范書丹作冉注云或作丹閭里之歌尚有釡中生魚范萊蕪一句此畧也丹違時離俗過為詭激其梁伯鸞閔仲叔之流與丹為郡功曹每休假上下常單步策杖同類以車牛與之不取丹與王奐親善奐後為漢陽太守丹于道候别之奐曰行路倉卒非陳濶之所可共到前亭宿息以敘分隔丹曰今子逺適千里㑹面無期如其相追將有慕貴之譏矣便起告違拂衣而去奐瞻望弗反丹長逝不顧案丹逺迹慕貴拂衣别友髙行尠儔矣後世送人作郡非忮即諂耳安得史雲一砭之仇覽覽為縣陽遂亭長好行教化人陳元凶惡不孝其母詣覽言元覽呼元誚責元以子道與一卷孝經使誦讀之元深改悔倒母牀下謝罪曰元少孤為母所驕諺曰孤犢觸乳驕子罵母乞今自改母子更相向泣于是元遂修孝道後成佳士案范書覽字季智一名香陳留考城人為蒲亭長與此不同載化導陳元事亦小異黄真黄真字夏甫案真為陳留小吏吳祐舉孝亷于祖席識之後為新蔡長世稱清節則吳祐之知人不出郭有道下也范不載其字劉祐劉祐字伯巨宗室𦙍緒代有名位少脩操行學嚴氏春秋小戴禮古文仕郡為主簿郡將小子常出錢付之令市買果實祐悉以買筆墨書具與之因白郡將言郎君年可入小學而但傲狠逺近謂明府無過庭之教請出授書郡將為使子就祐受經五日一試不滿呈限决罰遂成學業案祐字范作伯祖中山安國人仕終河南尹黨錮事起幸不及禍其有明哲之知者耶祐一本作佑祐為司隸校尉時權貴子弟罷州郡還京師者每至界首輒改易輿服隠匿財寶沈豐沈豐為零陵太守為政慎刑重殺愛民養化罪法辭訟初不厯獄嫌疑不决一斷于口鞭杖不舉而無刑戮僚友有過初不暴揚有奇謀異畧輒為談述曰太守不及也到官一年甘露降原陵佻陽五縣流被山林膏潤草木瑞芝生于堂下案豐隠惡揚善忠厚格天宜有甘露瑞芝之應范闕豐為零陵守有三黄龍望府中豐為太守吏有隂過長假還家案豐洵良二千石也不識范書何以見遺羊續羊續字興祖太山人為南陽太守以清率下半月一炊惟卧一幅布綯敗糊紙補之案續太山平陽人其先七世二千石續不特清風絶人至守廬江南陽二郡削平叛賊厥功甚偉所謂淡泊明志寧靜致逺者耶續為南陽守鹽豉共一壺續好啖生魚府丞焦儉以三月望餉鯉魚一頭續不為意受而懸之于庭少有皮骨明年三月儉復致一魚續出昔枯魚以示儉遂終身不復食案人雖介節不能無好投其所好取且不覺續之懸魚是真能自制者范載甚畧不如本書之腴續妻與婢俱到官閉門不納病困謂子祕曰吾有馬一匹賣以買棺牛車一乗載喪歸勿受郡送也案范書稱續妻與子祕到官續閉門不納即遣與母歸後卒時府丞焦儉遵續先意不受賻錢與本書不同靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶其所之往輒迎致禮敬厚加賜賂續乃坐使人于單席舉緼袍而示之曰所資惟斯而已故不登三公位而徴為太常卿案興祖不登公位所謂不以三公易介者較崔公冀州名士其芳臭何如范同趙嘉趙嘉年四十餘重疾乃為遺令勅兄子曰可立一圓石于我墓前刻之曰漢有逸民趙姓名嘉有志無時命也奈何投筆而卒案范書嘉乃趙岐初名字臺卿後因避難改名岐字邠卿范稱其遺令後疾愈仕至太常年九十餘卒此誤陳謙陳謙字伯謙為御史中丞同郡宣豐時為衞尉司徒位缺尚書欲案以補之咨問于謙謙正坐不答豐亦因士大夫謂謙謙曰位不可妄假人三司位重上和隂陽下訓五品豈可得處宣豐何人而欲居稷卨之官傳語者愧而退案伯謙不阿同郡洵乎邦之司直德與位稱矣范闕後漢書補逸卷十

body:
  text: 後漢書補逸巻十三監察御史姚之駰撰薛瑩後漢書第一光武論王莽之際天下雲亂英雄並發其跨州據郡僭制者多矣人皆有冀於非望然考其聰眀仁勇自無光武儔也加以寛博容納計慮如神是以任光竇融望風景附馬援一見覩顔識竒故能以十數年間掃除羣凶清復海内豈非天人之所輔贊哉古者師不内御而光武命將皆授以方畧使奉圖而進其有違失無不折傷意豈文史之過乎不然雖聖人其猶病諸案此篇簡括精悍自是傑作末叚如神龍掉尾使人不可捉摸更佳范論但敘光武符瑞不及其開剏大畧失史體矣明帝論眀帝自在儲宫而聰允之徳著矣及臨萬機以身率禮恭奉遺業一以貫之雖夏啓周成繼體持統無以加焉是以海内乂安四夷賔服斷獄希少有治平之風號曰顯宗不亦宜乎案永平之政繼美建武雖察慧有餘無傷仁政薛書揄揚竭致未為過也章帝北巡章帝北巡下長平御池陽宫東至髙陵造舟至於涇而還案此建初八年事前書音義曰長平坂在池陽南去長安五十餘里則北巡范作西巡為是靈帝獵靈帝光和元年校獵廣成苑案范書載帝以光和五年校獵上林苑厯函谷闗遂巡狩于廣成苑夫廣成非巡狩之地從校獵是王霸白氷光武至薊上王郎使兵至上發薊晨夜馳騖至下曲陽滹沱河導吏還言河流澌無船不可渡遣王霸徃視實然霸念恐驚衆即還白氷牢可渡比至氷可乘帝遂得渡滹沱河案此見東觀記文之工拙東觀不如范書此又遜本書矣李膺抗志李膺字元禮潁川襄城人抗志清妙有文武儁才遷司𨽻校尉為黨事自殺案膺見謝書抗志清妙四字甚雋馬防論作樂上以太常樂丞鮑鄴等上樂事下車騎將軍馬防防奏言建初二年七月鄴上言王者飲食必道須四時五味故有食舉之樂所以順天地養神明求福應也移風易俗莫善於樂樂者天地之和不可久廢今官樂但有太簇皆不應月律可作十二月均各應其月氣乃能感天地和氣宜應明帝始令靈臺六律候而未設其門樂經曰十二月行之所以宣氣豐物也月開斗建之門而奏歌其律誠宜施行願與待詔嚴崇及能作樂器者共作治考工給所當詔下太常太常上言作樂器直錢百四十六萬請太僕作成上奏寢今明詔下臣防臣輒問鄴及待詔知音律者皆言聖人作樂所以宣氣致和順隂陽也臣愚以為可順上天之明待因嵗首令正發太簇之律奏雅頌之音以立太平以迎和氣其條貫甚備詔書以防言下三公案防見東觀記夫十二月律以宣氣導和其係至鉅然分寸長短毫釐千里所最難定自京房作准代律後世竟無解人東京已然何論後代牛鐸玉尺縱黍横黍之紛紛也然候氣之法似有驗于聽聲縵室葭灰密其法以試之庻乎有証防亦以律學難明只發太簇一律而十二月之樂遂無傳焉所謂宣氣導和者安在范志不載虹見靈帝光和元年虹晝見御所居崇徳後殿前庭中色青赤案此詳見後張紀中八俊李膺王暢荀緄朱寓魏朗劉祐杜楷趙典為八俊案此見范黨錮傳序中緄作星楷作密時杜密故太僕荀昱為沛相皆為有司奏捕考楷别無所見緄則畏憚宦官方為子娶常侍女雖為一龍豈得以俊目之從范是白波賊黄巾郭秦等起于西河白波谷時謂之白波賊案是時董卓遣中郎將牛輔撃之不能却也范畧後漢書補逸巻十三

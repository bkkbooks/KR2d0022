body:
  text: 後漢書補逸卷九監察御史姚之駰撰謝承後漢書第一祭遵祭遵為將取士皆用儒術對酒設樂必雅歌投壺案遵見東觀記此所引出范升議諡疏遵于雲臺中真不愧儒將也陳臨陳臨為蒼梧太守推誠而治導人以孝悌臨徵去後本郡以五月五日祠臨東城門上令小童潔服舞之案范書闕魏收五日詩云因想蒼梧郡茲日祀陳君指此第五倫第五倫母老不能之官每至臘日常悲戀垂淚案倫見東觀記倫至性若此而或以探母口餅誣之不已甚乎李淑李淑諫更始曰夫三公上應垣宿九卿下括河海案淑豫章人范具載更始傳中陸閎吳郡陸閎為潁川太守致鳳凰甘露之瑞案閎字子春㑹稽吳人謝作吳郡以吳郡于順帝時始分㑹稽置也附見閎孫續傳中閎建武中為尚書令美姿貌喜著越布單衣上見而好之自是常敕㑹稽郡獻越布案東漢書此類已為南史胚胎范同王防王防字文始為尚書令典任樞機竭忠于國數陳便益議判時政以輔闕失言㫖切直多見納省案謝書多可少否其可者往往美其大凡不復摭實生平才行盡于數語豈即傳末之論贊耶抑引用者節録也范闕劉裕劉裕字伯祖補尚書郎裕有才辨自在臺閣陳國家事故每有奏决于口筆為羣僚所伏案范書有劉祐字伯祖疑即此人見後祐傳陳正叔魯國陳正叔為大官令時黄門郎宿與正叔有隙因進食以髪貫炙中光武見髪敕斬正叔正叔曰臣有當死罪三熾以爐炭増冶吐炎燋爐爛肉而髪不銷臣罪一也㧞出佩刀砥礪五石虧肥截骨不能斷髪臣罪二也臣與丞及庖人六目而視不如黄門兩目臣罪三也詔赦之收黄門案范書闕光武之智豈不如孫權之辨䑕矢特瑣瑣者不覺耳至以髪故而戮人恐暴君亦不爾謝書過矣又韓非子載晉文公譙宰人事與此傳大小同異豈事偶相類因脱胎舊文耶嚴豐豫章嚴豐字孟侯為郡王簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豐諫以為不祥之徴萌不從果見殺案范書闕此豐在新莽時事建武以後必有事迹而書亡矣蜂有君臣之義賈萌誅莽以殫臣職故蜂附之其身雖戮其名不朽豐諫何為包咸包咸字子良為赤眉賊所得遂見拘執十餘日咸日夜誦經自若賊聞異而遣之案咸㑹稽曲阿人范載儒林傳陷賊誦經置死生于度外非妄效終曲解圍僥倖免死也咸少為諸生受業長安王莽末嘗負笈追師咸明魯詩論語注東海立精舍講授案咸以建武中入授皇太子論語後仕至大鴻臚顯宗每經傳有疑輒遣小黄門就舍即問其禮師傅渥矣咸為吳郡主簿太守黄讜甚奇之鄭興鄭興數言政事依經守義文詞溫雅案興字少贛河南開封人先臣更始繼依隗囂後乃託言歸葬終為漢室輔其真知幾者乎喪亂之餘獨能好古子衆遂世其經學豈不休哉謝此語以興不習䜟以阿上故云范同賈逵賈逵弱冠能誦左氏傳及五經本文以大夏侯尚書教授雖為古學兼通五經榖梁之説自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭案逵見東觀記逵經術紛綸著撰甚富而范不列之儒林豈以其附㑹䜟文耶餘同逵字梁道好春秋及為牧守常自課之月讀一遍案逵字景伯位至侍中今云字梁道又為牧守或名氏相同者也桓譚桓譚字君山年七十憙非毁俗儒出為六安郡丞感而作賦因思大道遂發病卒案譚見東觀記范稱譚憙非毁俗儒由是多見排抵此在哀平間譚正少年時事至東京以宋𢎞薦為議郎屢上疏言䜟記之非後㑹議靈臺復廷毁圖䜟譚之貶葢以此謝書當無脱誤而引用者刪録無法遂至大舛許慶許慶家貧為郡督郵乗牛車鄉里號曰軺車督郵案范書闕一本作許處字子伯當是慶字之譌末世仕宦者口不離貧字然輿馬炫人大非貧兒之態皆軺車督郵之罪人也周穆周穆為功曹衣不覆軀案范書闕鄧煜煜南陽南鄉人勁悍亷直為名案范書更始使執金吾鄧煜將兵圍隗囂豈其曾事聖公耶鄧𢎞鄧𢎞與赤眉大戰移日赤眉佯敗棄輜重走車皆載土以豆覆其上兵士飢爭取之赤眉引兵還擊𢎞𢎞軍潰亂馮異與禹合兵救之赤眉小却異以士卒饑倦可休𢎞不聽復戰大為所敗案范書鄧禹與車騎將軍鄧𢎞擊赤眉遂為所敗馮異傳載𢎞事亦同又禹孫亦名𢎞附見鄧隲傳非此𢎞也王阜王阜幼好經學年十一辭父母欲出就學父母以阜少不允竊書負篋乗跛馬車從安定受韓詩年十七經業大就聲聞鄉里案范書闕阜為令多瑞應見東觀記桓任桓任母生時不食猪羊肉故終身不以猪羊肉入口案任可謂純孝矣與曾子不忍父嗜異迹同心范闕劉崇安衆侯劉崇長沙定王五代孫南陽宗室也與宗人討莽有功隨光武河北破王郎朝廷髙其忠壯策文嗟歎以厲宗室安衆諸劉皆其後案范城陽恭王傳載崇與父敞俱朝京師崇見莽將危漢室後遂起兵又李通傳云永平中顯宗幸宛詔諸李隨安衆宗室㑹見並受賞賜則崇之澤長矣范闕臯𢎞臯𢎞字奉卿吳郡人家代為冠族少有英才與桓榮相善子徽仕至司徒長史案范書𢎞無傳惟見桓榮傳云歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎楊州從事臯𢎞因拜榮為博士引閎𢎞為議郎夫東漢人才猶互相引薦不由資格拜讓之風庶幾唐虞後世可多得耶何湯何湯字仲弓豫章南昌人也桓榮門人常四百餘人湯為髙第以才明知名榮年四十無子湯乃去榮妻為更娶生二子榮甚重之後拜郎中守開陽門候上微行夜還湯閉門不納更從中東門入明旦召詣大官賜食諸候門皆奪俸建武十八年夏旱公卿皆暴露請雨洛陽令著車葢出門湯將衞士鉤令車收案有詔免令官拜湯虎賁中郎將上嘗歎曰糾糾武夫公侯干城何湯之謂也湯以明經當授太子推薦榮榮拜五更封闗内侯榮常言曰此皆何仲弓之力也案范書湯無傳亦見桓榮傳中時太子初立選求明經乃擢湯為中郎將以尚書授太子世祖從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令説尚書甚善之夫陳平之薦復賞魏無知况湯以弟薦師尤為佳事今人但知桓榮而不知何湯矣又案湯乃去榮妻句去上當有一字應是傳寫所脱張佺張佺為山陽令御政清潔疾惡若仇案范書闕羊茂羊茂字叔寶為郡太守冬坐白羊皮夏坐丹板榻常食乾飯出界買鹽豉妻子不厯官舍案謝書于亷吏多細寫足以激千載之頑夫叔寶其一也范闕劉平劉平舉孝亷拜濟隂郡丞太守劉育甚重之任以郡職上書薦平案平見東觀記平遭亂棄子全姪既而為母求食賊將烹之丐以母食畢就烹竟還詣賊賊感而釋之其仁義兼至者乎劉琨劉琨字桓公遷𢎞農太守先是崤黽驛道多虎災行路不通琨為政三年化大行虎皆負子渡河而去帝聞而異之案琨見東觀記琨作昆范同尹敏尹敏字功季治尚書拜郎中帝以敏博通經記令校圖䜟案敏見東觀記范作字幼季疑刋誤也敏與功義相附耳宋均宋均為監軍與馬援征武陵蠻臨沅水而兵士多病均懼衆軍多疫勒兵圍賊矯詔降之遣還本郡均未至先自劾矯詔之罪帝甚善之案均見東觀記降蠻還郡使伏波餘威不至隕墜功亦偉矣矯詔降賊而軍士免于死亡權也范同均後為九江太守虎自渡江蝗不入境其中孚之及耶江革江革字次伯轉諫議大夫賜告歸因謝病稱篤元和中天子思革至行制誥齊相曰諫議大夫江革前以病歸今起居何如使縣以見榖千斛賜巨孝常以八月長史存問致羊酒以終厥身如有不幸祠以中牢由是巨孝之稱行于天下案革見東觀記肅宗孝治天下故褒寵巨孝若此風化本原爾教民效矣後世孝弟力田科胡不一舉行之革字次伯范作次翁王博王博字季習拜尚書明敏習漢家舊事在臺厯載夙夜敬戒内外不漏案范書闕黄向豫章黄向晨步路中得珠琪一囊可直三百餘萬求主還之主以半物謝向向委去不顧案范書闕陶碩河南陶碩鄉曲餉之無所受但食棗飲水而已案碩葢得辟榖之術者應入方術傳中范闕杜詩杜詩遷南陽性節儉而政治清平以誅暴立威善于計畧省愛民役造作木排鑄為農器用力少見功多百姓便之又修治陂池廣拓土田郡内比室殷足時人方于邵信臣故南陽為之語曰前有邵父後有杜母案范書詩字公君河内汲人所載事畧與謝同公君愛民不諱立威不惜興役其賢母之善于愛子者乎非徒煦煦為慈者也韓崇韓崇遷汝南太守詔引見賜車馬劍革帶上勅崇曰汝南朕之腹心任次京師也見案范書闕今守令初銓者例由冢宰引有不稱者罷之葢聖主留心牧民之官故不憚親為甄别至于大郡多由特簡非徒事一郡如漢帝之勅崇而已也隠䢰隠䢰字公向為徐州刺史以小釡十日一炊案范書闕戴憑戴憑字次仲汝南郡舉明經徴博士詔公卿大㑹羣臣皆就席憑獨立世祖問其意對曰博士説經皆不如臣而坐居臣上是以不得就席帝令與諸儒難説甚善之後拜侍中正旦朝賀百寮畢㑹帝令羣臣能説經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中案憑見東觀記憑葢得其環中以應無窮者然不知于經義何若如以口給重席何榮范同鄧儒鄧儒字伯祖補尚書令正身機密不撓强臣案范書闕鍾離意鍾離意字子阿明帝徴為尚書交阯太守坐臧伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜帝怪問其故對曰臣聞孔子忍渴于盜泉之水曾參迴車于勝母之鄉惡其名也臧穢之寶不敢拜帝笑曰清乎尚書賜錢三十萬案意見東觀記湛重湛重字文叠補大司農在位厯載家至貧妻子裾榖給之食也案范書闕此疑有脱誤張堪張堪字君游年十六受業長安志美行勵諸儒號曰聖童世祖微時見堪志操常嘉焉及即位中郎將來歙薦堪召拜郎中案堪見東觀記范同堪為漁陽太守勸民耕種百姓歌之曰桑無附枝麥穗兩岐張君為政樂不可支案今漁陽無桑木不識古歌何以有此沈景沈景為河間太守拜為二千石妻子不厯官舍五日一炊案范書闕一炊五日視十日者侈矣然貧家久慣無煙火不獨明朝為子推亦詞人謔談耳書將盡信吾寧取五日者李鴻李鴻字奉遜體性仁孝友于兄弟弟育為人所侵辱育後隂結客報怨為執法吏所得當伏罪時未有立嗣鴻為太尉掾在京師傷育以義刷恥門戸斷絶自分代育遂劾印還歸欲過家恐妻子虧移其意到縣北亭預作記乞代育通記便飲鴆而死縣令省記怛然驚悼案李奉遜之棄身較鄧伯道之棄子其難且百倍豈得以輕生譏之范于獨行傳中不載其人遂使友于泯滅悲夫周敞吳郡周敞師事京房房為石顯所譖繫獄謂敞曰吾死後四十日客星必入天市即吾無辜之驗也房死果如其言案范書闕君明以元帝建昭二年死距光武之興尚有六十二年豈敞暮年亦及事世祖耶抑或謝書志天文引此為証也陳茂陳茂常為交阯别駕舊刺史行部不渡漲海刺史周厰涉海遇風船欲覆没茂抜劍訶罵水神風即止息案范書闕茂似有異術者不然則忠信涉波濤耳神亦有靈豈畏訶罵乎周厰何人或即京房之弟子否陳宣陳宣字子興沛國蕭人也剛猛性毅博學明魯詩遭王莽篡位隠處不仕光武即位徴拜諫議大夫建武十年雒水出造津城門校尉欲奏塞之宣曰昔周公卜雒以安宗廟為萬世基水不當入城門如為災異人主過而不可辭塞之無益昔東郡金堤大决水欲没郡令吏民散走太守王尊亡身勅以住立不動水應時自消尊人臣尚修正弭災豈况朝廷中興聖主天所挺授水必不入言未絶水去上善其言後乗輿出宣列引在前遲乗輿欲驅鉤宣車葢使疾行御者隨車下宣前諫曰王者承天綂地動有法度車則和鸞步則佩玉動靜應天昔孝文時邊方有獻千里馬者還而不受陛下宜上稽唐虞下以文帝為法上納其言遂徐行按轡遷為河隄謁者以病免卒于家案范書闕古今注稱建武七年六月雒水盛溢至津城門帝自行水謝作十年未知孰是范五行志及帝紀均不載此豈以其未入門耶戴禮戴禮雅有威重拜侍御史以能治劇出為丹陽東都尉案范書闕張業吳郡張業字仲叔為郡門下掾送太守歸鄉里至河内遇賊業抜劍與賊交戰而死子武時幼不識父喪不還每至節日持業遺劍至河内到業死處酹祭悲哀感動路人案業吳郡由拳人䕶持太守以身死之真義士也故能篤生孝子范書僅列張武傳而業附見何與武持遺劍悲哀千載覽之猶為墮淚路仲翁路仲翁好學家居受學者自逺方而至徴為博士案仲翁似以字行者范闕李敬李敬遷趙國相其奴僕嘗于舍内鼠空穴中得繫臂珠及璫懸珥相連敬即出問主簿白言前相後夫人諸侯女也昔亡珠璣不知處所疑子婦竊之去婦殺婢即遣吏送珠付前相乃還去婦案范書闕鼠穴倖得不復置問則去婦之寃何以白乎故拾遺而訪其主非惟存亷亦以廣仁也公孫煜公孫煜字春光到太學受尚書寫書自給案范書闕煜為司隸校尉時京兆門晩開早閉陸續南陽陸續仕郡戸曹吏時饑荒太守尹興使續于都亭賦民饘粥續悉簡閲其人訊以名氏六百餘人無有差謬興異之案續字智初閎之孫也續之彊記與應奉相捋持此讀書則四庫無堅壁持此作吏則萬民無遁情范同虞延陳留虞延為户牖亭長時王莽貴人魏氏以椒房之寵威傾郡縣賓客放從延率吏卒突入其家捕之案延見東觀記范云以此見怨故位不升延從女弟在孩乳其母棄之溝中延哀而收之養育成人以妻同縣人王氏案今育嬰之堂凡州邑多有在長吏與鄉里善士實心行之耳延遷南陽太守廣宣德化勤修政教寛刑宥罰囹圄空虛盜賊弭息案范書不載延為郡督郵光武巡狩至外黄問延園林栢樹株數延悉曉之由是見知案此詳東觀記外黄作小黄范同考漢官儀注髙帝母起兵時死小黄陳留風俗傳亦稱沛公喪皇妣于黄郷天下平乃使使者梓宫招魂因作園陵衞守小黄則作小黄為是袁紀亦作外黄均之譌也永平初有新野功曹鄧衍以外戚小侯每預朝㑹容姿趨步有出于衆顯宗賜輿馬衣服劍佩刀錢二萬南陽計吏歸具以啟延延知衍華不副實行不配容積三年不用于是上乃自勅衍稱南陽功曹詣闕既到拜郎中衍在職不服父喪帝聞之由是以延為明案范書無延知衍華不副實三語不見延之不可奪也三年久矣乃自降勅顯宗豈自用者乎延以楚王英事詔書切讓遂自殺身殁之後家貧空子孫同衣而出并日而食封告封告字君達為司徒虞延所辟時隴西太守鄧融以職被罪君達解其桎梏案范書闕融以職獲罪定非贓吏解其桎梏仁哉掾乎䖍國䖍國遷日南太守每行縣有雁恒飛翔隨車止國府常在㕔事中庭國病卒雁棲于墓前樹上二年乃去時人嘉之案此與鄭巨君白鹿夾車事相類皆太守佳話也范闕謝夷吾謝夷吾少為郡吏太守第五倫擢為督郵甚崇其道德轉署主簿使子從受春秋夷吾待之如師弟子之禮時或游戲不肯讀書便白倫行罰遂成其業案范書夷吾字堯卿㑹稽山隂人持身清約聽斷明允東漢循吏也第五倫為司徒命班固作文薦夷吾自代知人哉范書以其明風角豫知死期乃列之方術傳中不已謬乎授經事范闕夷吾為壽張令縣人女子張雨早喪父母年五十不肯嫁留養孤弟二人教其學問各得通經雨皆為聘娶皆成善士夷吾薦于州府使各選舉表復雨門戸永平十五年蝗發太山流徙郡國薦食五榖過壽張界飛逝不集案雨以貞女撫弟使二親雖殁猶存千古奇媛也范刪之何居夷吾雅性明逺能决斷罪疑遷荆州刺史行部始到南陽縣遇孝章皇帝巡狩駕幸魯陽有詔勅荆州刺史入傳録見囚徒戒長吏勿廢舊儀朕將覽焉上臨西廂南向夷吾處東廂分帷隔中央夷吾所决正一縣三百餘事悉與上合而朝廷嘆息曰諸州刺史盡如此者朕不憂天下常以勵羣臣是時恩化大行百姓樂政案史稱章帝長者而其明于吏事若此微堯卿則三百餘事幾嘆叢脞矣分帷讞獄何其與百姓相親也夷吾遷鉅鹿太守臨發陛見上賜車馬劍革帶勅曰鉅鹿劇郡難治以君有撥煩之才故特授任當如刺史勿毁前政案范不載不見肅宗重刺史之盛心夷吾守郡稱善省奢從約事從清儉方儲丹陽方儲字聖明幼喪父事母母終自負土成墳種奇樹千株鸞鳥棲止其上白兎遊其下案范書闕儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備任所施用上嘉其才以繁亂絲付儲使理儲拔佩刀三斷之對曰反經任勢臨事宜然案儲此事與前漢尹翁歸同至于拔刀斷絲乃其驗矣儲聰明善天文為洛陽令章帝欲出南郊儲上言當有疾風暴雨乗輿不可以出上疑其妄儲飲酖而死果有大風暴雨洛陽晝暝案儲才行兼至惜以術數死則聰明之誤也然其言卒驗何竟不能須臾忍耶范式范式字巨卿一名汜山陽金鄉人式少尚節義遊學京師同業有長沙陳平子與式未相見被病將亡謂其妻曰范巨卿烈士可託死吾殁後以尸埋巨卿戸前裂素為書以遺巨卿時式出行適還省書愴然向墳揖哭以為死友營䕶平子妻兒身自送喪于臨湘未至四五里委素書于柩上哭别而去其兄弟尋求不復見案平子託巨卿為死友乃以屍埋其戸前夫戸外豈北邙哉屋下陳屍尚以為諱乃結死友而以此動之不已甚乎巨卿竟不負其所託其意量深矣式與張元伯為友式仕郡為功曹後夢元伯𤣥冠垂纓屣履而呼曰我卒當以時葬永歸黄泉子不我忘豈能奔喪式便馳往赴之式未到而喪已發引柩不進母曰豈有望耶巨卿既至叩喪執紼而引柩乃進案張元伯名劭汝南人范書畧同筆較古勁亦以潤色前人易為工耳張修張修字子慎拜尚書令有故官下卿刺史二千石為讒謗所廢者以次徴用奏罷中官貴臣子弟在官者國教肅清朝無秕政案范書闕子慎舉用讒廢之臣可為萬世法葢未掌銓衡時其賢否洞然較明于當局也但後世行之恐讒謗旋及身矣孫華孫華字春光為司隸校尉下車減損隨車坐席不遷豪傑貴戚賓客絶其書疏案法捕治無所迴避京師宴然强族斂手案范書闕孔嵩孔嵩字巨山與范式俱在太學案嵩南陽人巨山范書作仲山嵩家貧親老變姓名為傭卒式行部到縣因把臂勞苦勅縣代嵩而嵩不肯去其狷者與後仕至南海太守附見式傳傅賢傅賢字仲舒遷廷尉監清亷平直自掌法官無私間常垂念刑法務從輕比每冬至斷獄遲迴流涕案范書闕廷尉寛刑要本清亷正直來不然或以賄縱或以私執適足為惡人恃耳賢遷廷尉素亷直公卿讌飲不往以家貧無以報其施也案賢以家貧不預讌飲此孔明所謂淡泊明志者也後世作宦者彼此款洽殆無虛日何以能亷賢拜御史中丞執憲公平百僚敬服黄香黄香字文彊除郎以父老求歸供養徴拜郎中帝召香在殿下問父年幾何何故不入公府案香見東觀記香以父老求歸而帝殷勤垂問至哉孝治乎詩曰是用作歌將母來諗黄童可不歌矣抑香為巨孝而范佚求歸供養一事其亦未知香之心也夫香代為冠族葉令况之子香為魏郡太守到官不遣吏歸鄉摘發姦邪立决詞訟案遣吏上不字似衍官多一吏則百姓多一害故省事又不如省役嚴翊嚴翊遷潁川太守掾吏有過輒閉閤自責案范書闕漢時掾吏多儒流為之故翊閉閤自責將以德感也後世猾胥狡吏非刑何以治之鄭𢎞𢎞曾祖父本齊國臨淄人官至蜀郡屬國都尉武帝時選强宗大姓不得族居將三子移居山隂因遂家焉長子吉雲中都尉西域都䕶中子兖州刺史少子舉孝亷理劇東郡侯也𢎞少為靈文鄉嗇夫愛人如子拜為騶令勤行德化部人王逢得路遺寶物懸于道衢求主還之魯國當春大旱五榖不登騶獨致雨徧熟永平十五年蝗起太山流被郡國過騶界不集郡因以狀聞詔書以為不然遣使案行果如言遷臨淮太守消息繇賦政不煩苛行春大旱隨車致雨白鹿方道夾轂而行𢎞怪問主簿黄國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相後果為太尉案𢎞字巨君㑹稽山隂人白鹿夾車千古美談而范遺之不表謝書能無闕如之憾臨淮范作淮隂𢎞為太尉固讓不就西曹掾曰天子已白陵廟宜當拜𢎞為太尉時舉第五倫為司空班次在下每正朔朝見𢎞曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此為故事案范書同陳囂陳囂字子公拜大中大夫年七十每朝賀帝待以師傅之禮賜几杖入朝不趨贊事不名以病乞骸骨以大夫位終案范書闕張霸張霸為㑹稽太守甚有名稱其餘有素行者皆見擢用郡中爭勵志節誦習者以千數道路但聞誦書聲案霸見東觀記霸先為㑹稽太守表用處士顧奉公孫松等奉後守潁川松為司𨽻校尉其餘有業行者皆見擢用今刪上奉松事而但存下語可乎引書任筆刪録古人不免小失耳張楷河南張楷字公超性好道術居華隂能作五里霧時闗西人裴優亦能作三里霧自以不如楷往從學之楷避不肯見案范書楷霸之子也通嚴氏春秋古文尚書門徒常百人特性好道術竟以行霧為裴優所累術之不可好也如是王譚王譚除尚書郎服事臺閣專習國典據法為三臺之表案范書闕劉陵劉陵字孟髙為侍中車駕南郊陵參乗上起早升輿伏陵曰陛下萬乗主宜立正配天雖尊神欲寢不當上為天地靈祗下為羣臣萬姓觀者乎上有愧色曰敬受侍中斯言以為後戒案跛倚臨祭有司不可况萬乗南郊茍能夙夜惟寅何至惰容而伏孟髙之諫難于倉猝悟主范書闕陵為長沙安成長先時多虎百姓患之皆徙他縣陵之官修德政逾月虎悉出界去民皆還之案陵中孚之德致虎徙他界乃令君家桓公獨擅其名何哉刁曜刁曜拜御史自在朝廷堂堂蹇諤有邊臣之節案范書闕邊臣字疑誤曜遷魯相修德化法教以厲風俗威恩並行周暢周暢性仁慈為河南尹夏旱久禱無應因收葬洛陽城旁客死骸骨萬餘應時澍雨案暢字伯持汝南安成人仕至光禄􅈴周嘉從弟范附見嘉傳客骸暴露隂氣為沴隂陽不和旱魃斯虐故澤及枯骨則上天亦降大澤矣百里嵩百里嵩字景山山陽人為徐州刺史境遭旱嵩出巡處甘雨輒澍東海祝其合鄉等二縣父老訴曰人等是公百姓獨不遷降雨隨車而下案范書闕甘雨隨車賢守美談范不傳之循吏抑矣嵩為徐州刺史甘露再降㕔事前樹嵩為濟南相甘露降于郡安帝嘉之徴拜大鴻臚案嵩為守必有殊政惜不傳耳不然何以呼吸通天也郭丹郭丹字少卿大守杜詩薦為功曹丹薦鄉人長者自代而去詩嘆曰昔明王興化卿士讓位今功曹推賢可謂至德勅以丹事徧署黄堂以為後法案丹南陽人仕至司徒而家無遺産子孫困匱其清白吏耶薦為范作請為是王嬰王嬰字仲豪與同郡范巨卿為友其與友交推誠據信不負言誓案范書闕董宣宣格殺湖陽公主蒼頭帝使叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勅令詣大官賜食宣受詔出飯盡覆桮食机上大官以狀聞上問宣宣對曰臣食不敢遺餘如奉職不敢遺力案宣字少平陳留圉人即所謂彊項令者世祖優容小臣乃至于此千古帝王莫及宣卒于官詔遣使者臨視惟有白馬一匹蘭輿一乗案宣身没之後一寒至此其無欲可知故能作彊項令也無欲則剛禮震震字仲威光武嘉其仁義拜震郎中後以公事左遷淮陽王廐長案震平原人年十七上書求代歐陽歙死惜書奏而歙已亡范附見歙傳董春董春字紀陽㑹稽餘姚人少好學師事侍中祭酒王君仲受古文尚書後詣京房授易究極聖指條列科義後還歸立精舍逺方門徒從者常數百人諸生每升講堂鳴鼓三通横經捧手請問者百人追隨上堂難問者百餘人案范書闕春為廬江太守當官明亮德教多奇民吏稱之案窮經將以致用茍授政不達雖日坐臯比口授諸生亦與揮塵清言者等耳末世講學之儒多為小人所詆正坐此病如程朱大賢俱有臨民實政非空空講道學立院聚徒以為此聖賢事也董紀陽得之矣後漢書補逸卷九

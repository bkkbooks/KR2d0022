body:
  text: 後漢書補逸卷七監察御史姚之駰撰東觀漢記第七馬光馬光字叔山監越騎視事以為五校尉主禁兵武備案光伏波第三子封許陽侯時五校尉令在北軍營中光以為五校尉所以宿衛兩宫不宜在一處表請二校尉附北宫詔許越騎射聲治寺北宫光為校尉帥厲吏士教習有方光遭母喪哀痛感傷形骸骨立竇憲誅憲奴玉當誣光與憲逆初竇氏有事玉當亡私從光乞不與恨去懐挾欲中光官捕得玉當因告言光與憲有惡謀光以被誣不能自明乃自殺光死後憲他奴郭扈自出證明光憲無惡言光子朗上書迎光喪葬舊塋詔許之案光為人小心周密乃受誣于憲奴小人陷害君子何所不至耶范畧亷范亷范字叔度為蜀郡太守成都邑宇偪側舊制禁民夜作以防火而更相隠蔽燒者日日相屬范乃毁削前令但嚴使儲水百姓為便乃歌之曰亷叔度來何暮不禁火民安堵昔無襦今五袴案范京兆杜陵人中興良吏與杜詩張堪第五倫儕美也亷范奔赴敬陵時廬江郡掾嚴麟俱㑹于路麟乘小車塗深馬死不能自進范愍之命從騎下車與之不告而去麟事畢即牽馬造謝而歸之亷范為雲中太守始到烽火日通故事鹵出度五千人乃移書旁郡求助吏白今鹵兵度出五千請移警檄范不聽遂選精兵自將出至近縣令老弱城守而追之案范書時鹵軍甚衆范令軍士各交縛兩炬三頭爇火營中星列鹵以為救兵至遂引去此與虞朝歌増竈同意梁福司部災蝗臺召三府驅之司空掾梁福曰普天之下莫非王土不審使臣驅蝗何之災蝗當以德消不聞驅逐時號福為真掾案范書闕後世有驅蝗移牒者覆牒云若是敝邑遣去還從貴縣發來惜無真掾止之耳近制責州邑捕蝗甚嚴稍有不力即白簡從事易驅為捕亦秉畀炎火之意且于蝻子未化時官即勤為搜鋤一待軟翅已生則州邑即有怠玩之譴法綦詳矣班超班超字仲升定西域五十餘國乃封超為定逺侯案超扶風平陵人班超孝謹家貧嘗為官傭書以供養乆勞苦嘗輟業投筆嘆曰大丈夫無他志畧猶當效傅介子張騫立功異域以取封侯安能乆事筆硯間乎案定逺與伏波皆多大志勛業亦畧相仿但伏波執老當益壯之意遂至䜟成馬革定逺望生入玉門闗可謂知止不殆者超行詣相者曰布衣諸生爾當封侯萬里之外超問其狀相者曰生燕頷虎頭飛而食肉此萬里侯相也後以漢中郡南鄭之西鄉戸千封為定逺侯案范同建初八年稱超為將兵長史假鼓吹黄麾班超為都䕶以任尚代超尚謂超曰君在外國三十餘年而小人猥承君後宜有以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補邉而蠻夷懐鳥獸之心雖禁易敗今君性嚴急水清無大魚察政不得下和宜陽為簡而寛小過總大綱而已案超誨任尚言與子産寛難之説正相反亦以地異耳後尚竟以嚴敗超言信矣宜陽為簡不成句范作宜蕩佚簡易是超持公羊春秋多所窺覽案范書稱超渉獵書傳是不屑屑筆研人氣概安息遣使獻大爵師子超遣子勇隨入塞案超乞歸書所稱遣子勇隨獻物入塞是也梁諷梁諷征匃奴屯軍于邉以大漢威靈招之匃奴畏感奔馳來降諷輙為信旛遣還營前後萬餘人相屬于道案諷北地弋居人為竇憲軍司馬出征有功後坐失憲意被害范見諷子慬傳信旛意如今之令箭范畧王景建初八年王景為廬江太守乃教民種麻桑而養蠶案景字仲通樂浪􅠗邯人其守廬江修芍陂教犂耕境内豐給不獨教蠶也景尤長于理水為千古治河之祖鄭衆時北匃奴遣使求和親上遣鄭衆使匃奴衆至北庭鹵欲令拜衆不為屈單于大怒圍守閉之不與水火衆㧞刀自誓單于恐而止案衆字仲師鄭興子衆經術湛深故忠義凜然出使不辱廬江獻鼎詔召鄭衆問齊桓公之鼎在栢寢臺見何書春秋左氏有鼎事幾衆對狀除郎中案衆可謂博雅矣後世以物疏事昉此永平中遣鄭衆使北匃奴衆因上書言臣前奉使不為匃奴拜單于恚恨放兵圍臣今臣銜命必陵折臣臣恐不忍將大漢節對氊裘拜如令匃奴遂能服臣將有損大漢之强上不聽衆不得已既行後果為匃奴所殺案范書衆辭使事同但范稱衆在路連上書固爭詔切責追還繫廷尉㑹赦歸後復為軍司馬仕至大司農此言為匃奴所殺意引書家妄筆本書定不誤也鄧彪彪為太尉在位清白以亷讓率下為百僚式視事四年以疾乞骸骨賜䇿罷贈錢三十萬所在以二千石俸終其身案彪太傅禹之族人彪與同郡宗武伯翟敬伯陳綏伯張弟伯同志好齊名南陽號曰五伯案彪字智伯五伯事范闕李恂李恂餉遺無所受處新安闗下拾橡實為食案恂字叔英安定臨涇人恂為武威太守免歸非素枯寂者其清風可知矣李恂遭父母喪六年躬自負土樹栢常在冡下案范于恂傳不載此事一本恂作詢抑别有李詢也馬融馬融教養諸生常有千數善鼓瑟好吹笛居宇器服多存侈餙常坐髙堂施絳紗帳前授生徒後列女樂案融字季長扶風茂陵人融集載其居成懽里也融奢樂恣欲黨附招譏品不足道特才髙學博為世通儒耳范同范叔范叔遷博士每有大議輒見訪問案范書闕丁鴻永元六年司徒丁鴻兼衛尉案鴻字孝公丁綝子時因日食上封事指斥竇憲遂以鴻兼衛尉屯南北宫收憲大將軍印綬此見鴻之經明行修非徒講誦問難以為能也肅宗詔鴻與太常樓望少府成封屯騎校尉桓郁衛士令賈逵等集議五經同異于白虎觀案范書又有廣平王羡一人羡明帝子也上嗟歎鴻才號之曰殿中無雙丁孝公賜錢二十萬案范書虎觀談經承制問難帝親臨决鴻以才髙論難最明帝數嗟美焉無雙二語范作時人嘆羡其以君上不當稱字耶元和二年車駕東巡狩鴻以少府從上奏曰臣聞古之帝王綂治天下五載廵狩至于岱宗祡祭于天望秩山川恊時月正日同斗斛權衡使人不爭陛下尊履蒸蒸奉承𢎞業祀五帝于明堂配以光武二祖四宗咸有告祀瞻望太山嘉澤降樹祡祭之日白氣上升與燎烟合黄鵠羣翔所謂神人以和答饗之休符也上善焉案丁鴻翼翼乃為此䛕詞甚矣人之好諂也范不載元和三年以廬江郡為大安國徙封鴻為馬亭侯案馬亭鄉名鴻薨子湛嗣卒子浮嗣浮卒子䕫嗣案范書䕫作夏張奐張奐字然明使匃奴休屠及朔方烏桓並同反叛遂燒度遼將軍門列屯赤地烟火相望兵衆大恐各欲亡去奐安坐帷中與弟子誦書自若軍士稍安案奐敦煌酒泉人帷中誦書特以靜鎮耳非若孔北海為袁譚所攻談笑自若者也安石賭墅庶幾近之張奐為安定屬國都尉羌離湳上奐馬二十匹奐召主簿張祁入于羌前以酒酹地曰使馬如羊不以入廐使金如粟不得入懐盡還不受案馬二十匹下闕先零酋長又遺金鐻八枚二語范詳班固班固字孟堅九歲能作賦頌固數入讀書禁中毎行廵狩輙獻賦頌案固班彪子也望蹕獻文東漢名儒如馬融上東巡頌崔駰上四廵頌比比皆然至唐杜甫亦獻三大禮聖賦進身今至鴻儒儁彦競上賦頌每駐主巡幸所輦清問下内閣及掌院學士甄别之多有從此登清華者駰以革莽鄙儒亦兩獻詩賦冊子一獻荒著書集皆荷天恩垂問姓名收存漢南書房以備揚乙覽萬一耳皇帝功德隆盛逺佚唐愧鯫生頌未及時人有上言班固私改作史記詔下京兆收繫固弟超詣闕上書具陳固不敢妄作但續父所記述漢事案固從此知名于顯宗命撰世祖本紀諸篇後乃復使終成前所著書也華嶠稱固之序事贍而不穢詳而有體惜其輕仁義賤死節盖長于文而短于識者耶樊煜樊煜為天水人有犯其禁者率不生出獄吏人及羌人畏之道不拾遺行旅至夜聚衣裝道旁曰以付樊公凉州為之歌曰寧見乳虎穴不入冀府寺大笑期必死忿怒或見置嗟我樊府君安可再遭值案煜字仲華南陽新野人范載酷吏傳桓鸞鸞父良龍舒侯相案鸞桓榮曽孫范附榮傳鸞貞亮之性著乎幼冲學覽六經莫不綜貫推財孤寡分賄友朋泰于待賢狹于養己常着大布褞袍糲食麤餐案范畧鸞世其經術而能操行如此可洒族人為利一言之羞矣鸞除陳留已吾長旬月間遷河内汲令案范書鸞為令甚有名迹梁竦竦作悼騷賦其文曰彼仲尼之佐魯兮先嚴斷而後𢎞衍雖離䜛以嗚邑兮卒暴誅于兩觀殷伊周之協德兮暨太甲而俱寧豈齊量其幾微兮徒信已以榮名雖吞刀以奉命兮抉目眦于門閭呉荒萌其已殖兮可信顔于王廬圖往鏡來兮闗闕在篇君名其既冺没兮後辟亦然屈平濯德兮絜穎芬香句踐罪種兮越嗣不長重耳忽摧兮六卿卒强趙殞鳴犢兮秦人入疆樂毅奔趙兮燕亦是喪武安賜命兮昭以不王䝉宗不幸兮長平顛荒范父乞身兮楚項不昌何爾生不先後兮惟洪勛以遐邁服荔裳如朱紋兮騁鸞路于犇瀨歴蒼梧之崇丘兮宗虞氏之俊乂臨衆瀆之神林兮東勅職于蓬碣祖聖道而垂典兮褒忠孝以為珍既匡救而不得兮必殞命而後仁惟賈傅其違指兮何揚生之欺員彼皇麟之髙舉兮熈大清之悠悠臨岷川以愴恨兮指丹海以為期案竦字叔敬綂之仲子坐兄松事徙九真濟沅湘感悼子胥屈原以非辜沈身乃作悼騷賦繫𤣥石而沈之方之莽大夫之反騷其㫖趣何如也永和元年制詔三公大鴻臚曰夫孝莫大于尊尊親親其義一也追命外祖以篤親親其追封謚皇太后父竦為褒親愍侯好爵顯服以慰母心尹勤尹勤治韓詩事薛漢身牧豕事親至孝無有交遊門生荆棘案勤字叔梁南陽人和帝時代陳寵為司空見寵傳賀𤣥賀𤣥為九江太守行縣齎持乾糒案范書闕魯恭魯恭字仲康為中牟令蝗蟲不入縣界河南尹遣郡掾肥親驗之坐樹下雉過止親側旁有小兒親曰何不捕之兒言雉方雛可憐親嘆曰童子有仁心三異也案恭扶風平陵人為令純任德化不用刑罰故有此徴三異一為蟲不犯境一為化及鳥獸一為童子有仁心樊凖樊凖字㓜陵為别駕從事監職公正不發私書世稱氷清案凖一作准南陽湖陽人凖為郡功曹公正案是時和帝幸南陽凖為功曹召見帝器之因拜郎中也凖為御史中丞執憲御下舉正非法官寮震慄梁商商少持韓詩兼讀衆書傳記天資聰敏昭達萬情舉措動作直推雅性務在誠實不為華餙孝友著于閭閾明信結于朋友其在朝廷儼恪矜嚴威而不猛退食私館接賔待客寛和肅敬憂人之憂樂人之樂皆若在己輕財貨不為之畜積故衣裘裁足卒歲奴婢車馬供用而已朝廷由是敬憚委任焉案商字伯夏梁雍之子范稱其能虛已進賢李固周舉皆其所辟可謂大臣矣本書竭力揄揚其賢可知特性過慎弱以小黄門曹節等用事遣子冀不疑與交後冀遂喪厥家聲惜哉商薨帝作誄曰孰云忠侯不聞其音背去國家都兹𤣥隂幽居冥冥靡爾且窮梁商薨賜東園轜車朱夀器銀鏤黄玉匣案商病篤勅子冀等曰吾以不德享受多福生無以輔益朝廷死必耗費帑藏衣衾飯唅玉匣珠裙之屬何益朽骨百僚勞攘紛華道路祗増塵垢雖云禮制亦有權時方今邉境不寧盜賊未息豈宜重為國損氣絶之後載至家舍即時殯斂斂以時服皆以故衣無更裁制殯已開冢冡開即葬祭食如前無用三牲孝子善述父志不宜違我言也案商居亢滿之地能以愿謹自終故順帝之朝聿稱賢輔豈其教子無術乎何冀之不肖也范同張霸張霸字伯饒少以樊鯈刪嚴氏公羊春秋猶多繁詞乃減為二十萬言更名張氏之學案霸蜀郡成都人數歲知孝讓人號為張曽子七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒並佳話也袁安和帝始加元服太后詔袁安為賔賜束帛乘馬案安字邵公汝南汝陽人時代桓虞為司徒也臥雪韻事范書不載惟見汝南先賢傳中袁安為司徒每朝㑹憂念王室未嘗不流涕案時天子㓜弱外戚擅權朝廷頼安為重安之乃心王室至矣不然吕霍之變豈其免焉祭參鮮卑千餘騎攻肥如城殺畧吏人祭參坐沮敗下獄案參征虜從子彤之子也從竇憲擊車師有功遷遼東太守鄧遵鄧遵破匃奴得匕首三千枚案范書闕帝賜遵金剛鮮卑緄帶一具金錯五十辟把刀墨再屈環横刀金錯屈尺八佩刀各一案遵豈好劍乎既得匕首又賜名刄此可入刀劍録樊興帝欲封樊興置印綬于前興固讓曰臣未有先登陷陣之功而一家數人並䝉爵土令天下觖望上嘉興之讓不奪其志案范書樊宏傳云樊氏侯者五國興豈其一耶梁冀梁冀拜歩兵校尉上書列校之職上應天工下厭羣望實非愚臣所宜案冀字伯車商之子也冀僣侈作平上軿車案冀變易輿服之制又有卑幘狹冠折上巾擁身扇狐尾單衣盖儼然改玉改歩矣劉寛劉寛簡畧嗜酒嘗坐客使蒼頭市酒大醉而還客對罵曰畜生寛遣人視奴疑必自殺案寛字文饒𢎞農華隂人范市酒下有迂乆二字畜生作畜産劉寛遷南陽太守温仁多恕吏民有過但用蒲鞭罰之示辱而已案寛典歴三郡人皆感化彼武健嚴酷者能及此蒲鞭耶又異苑云崔景貞守昌平有恵政常懸一蒲鞭制而不用則又加寛一等今捶楚之具皆有尺寸定式長吏酷刑與貪黷並懲凡其佐貳雜職等不得擅用嚴刑盖解網泣罪之仁深矣劉寛性簡畧夫人試寛意而當朝㑹裝嚴已訖使婢奉肉羮翻汚朝衣婢收之寛神色不異乃徐語曰羮爛汝手案范作夫人欲試寛令恚伺當朝㑹云云文較明暢餘同趙咨趙咨至孝躬率子孫耕農為養盜嘗夜往刼之咨恐母驚懼乃先至門迎盗因請為設食謝曰老母八十疾病須養居貧乞置衣糧妻子餘物無所惜諸盗皆慚嘆跪曰所犯無狀干暴賢者言畢奔走案咨字文楚東郡燕人仕終東海相范同姜詩姜詩性至孝母常飲江水兒取水溺死恐母知詐曰行學俄而涌泉出舍側日生鯉一雙案詩廣漢人妻龎亦篤孝詐兒行學范作龎事其刑于之化耶賊經姜詩里不敢驚孝子致米肉詩埋之後吏譴詩詩掘示之案詩于永平中舉孝亷觀埋米肉一節真不愧此二字杜恢安定太守杜恢與司馬鈞等并威擊羌恢乘勝深入至北地靈州丁奚城為鹵所害鈞擁兵不救收下獄案此見范安帝記朱遂中山相朱遂到官不出奉祠北嶽詔曰灾暴縁類符驗不虚政失厥中狼灾為應至乃殘食孩幼朝廷愍悼思維咎徴博訪其故山嶽尊靈國所望秩而遂比不奉祠怠慢廢典不務懇惻淫刑放濫害加孕婦毒流未生感和致灾其詳思改救追復所失不有尊憲舉正以聞案狼災事詳見後謝書時李固引京房易傳以為君將無道害將及人去之深山全身厥灾狼食人即此也何敞何修生成為漢膠東相成生果為太中大夫果生比干為丹陽都尉比干生壽蜀郡太守夀生顯京輔都尉顯生鄢光禄大夫鄢生寵濟南都尉寵生敞案敞字文髙扶風平陵人范載敞䟽言臣累祖䝉恩至臣八世盖自修至敞凡八葉云敞為汝南太守百姓化其恩禮髙譚等百八十五人推財相讓案范書敞疾文俗吏以苛刻求名譽故在職以寛和為政而百姓化之如此桓􅺰􅺰到呉郡揚州刺史劉繇賑給榖食衣服所乏者悉不受後東過㑹稽往止山隂縣故魯相鍾離意舍太守王朗餉給糧食布帛牛羊一無所留臨去之際屋中尺寸之物悉䟽付主人纎微不漏移居揚州從事屈豫室中中庭橘樹一株遇實熟乃以竹籓樹四面風吹落兩實以繩繫着樹枝每當危亡之急其志彌固賔客從者皆肅其行也案􅺰范書作曄字文林一名嚴謝承書作儼榮五世孫也貞忮之操凜若嚴霜一餐之細不受于人後以貧瘁浮海客交阯竟死于合浦獄惜哉到呉郡諸事范書俱闕樊宏宏為人謙慎常戒其子曰富貴盈溢未有能終者天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉案宏字靡卿樊重子也馮石馮魴孫石襲母公主封獲嘉侯為侍中遷衛尉能取悦當世為安帝所寵帝嘗幸其府留飲十許日賜駮犀具劒佩刀紫艾綬玉玦各一案范書同孔奮孔奮字君魚為姑臧長時天下亂河西獨安姑臧長居數月輙致資産奮在姑臧四年財物不増惟老母妻子但菜食或謂奮曰置脂膏中亦不能自潤案奮扶風茂陵人一本作奮惟老母極膳妻子但食葱菜是范亦相同孔奮篤骨肉弟竒在雒陽為諸生分俸禄以供給其糧用四時送衣下至脂燭每有所食甘美輙分減以遺竒案奮友弟若此則老母之極膳可知矣范畧徐防防上䟽曰試論語本文章句但通度勿以射䇿冀令學者務本有所一心専精師門思核經意事得其實道得其真于此𢎞廣經術尊重聖業有益于化雖從來久六經衰微學問寖淺誠宜反本改矯其失案防字謁卿沛國銍人夫論語為學聖之門徒以䇿試互相是非大非務本之學防此奏深得孔子先行後言之意其為儒宗當在賈鄭之上范不載此䟽何也安帝元年郡國被水災比州湮沒死者以千數災異數降西羌反叛殺畧人吏京師淫雨蟊賊傷稼穡防比上書自陳過咎遂䇿免案范書三公以災異䇿免始自徐防夫變理隂陽固屬公孤之責而東漢事歸臺閣不任以政則責有所在矣加以䇿讓不亦寃乎宜乎仲長綂之昌言之也張敏敏以行大射禮陪位頓仆䇿曰今君所苦未瘳有司奏君年體衰羸郊廟禮儀仍有曠廢鼎足之任不可以缺重以職事留君其上司空印綬案敏字伯達河間鄚人漢制優待老臣若此䇿文范不載楊震楊震性公亷不受私謁子孫常蔬食歩行故舊長者或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎案震字伯起𢎞農華隂人亦稱闗西孔子華書云楊氏與袁氏累世宰相為漢名族然袁氏奢僣不及楊氏盖真清白吏子孫也嗚呼伯起之所遺厚矣震為太尉性忠誠每陳諫諍中常侍樊豐等譖之收印綬歸本郡震到洛陽都亭謂門生曰吾蒙恩居上司奸臣狡猾而不能誅寵嬖傾亂而不能禁何面目以見日月遂飲酖而死案綱目譏震事庸主不能見幾而作宜其有殺身之禍也洛陽都亭范作城西夕陽亭桓典桓典為御史是時宦者執政典無所廻避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史案典字公雅桓焉之孫後與何進謀誅宦官功雖不遂忠義著矣楊秉楊秉諫桓帝曰王者至尊出入則警蹕而行案秉字叔節震中子也時帝私幸梁𦙍舍故秉䟽諫焉陳蕃陳蕃為光禄勲上䟽切諫云鄙諺曰盗不過五女門以女能貧家也今後宫之女數千食肉衣綺豈不貧乎案蕃字仲舉汝南平輿人蕃諸䟽俱載范傳此因封賞踰制内寵猥盛故䟽及之張南軒以為讀蕃䟽之詞未嘗不三復嘆息其詞達其義正足以見其忠義之氣乃卒為宦者所害悲哉陽球陽球字方正為司𨽻校尉詣闕謝㤙表言常侍王甫罪過奔車收送詔獄自臨考之父子皆死于杖下乃磔甫尸署曰賊臣王甫于是權門惶怖莫不雀目鼠歩京師肅然曹節見甫尸乃收淚入言球罪帝徙為衛尉球叩頭曰願假臣一月必令豺狼鴟梟悉伏其辜案球漁陽泉州人球雖酷吏然其誅鋤宦官使刑餘巷職縮志屛氣真為人所不能為者此條當係節畧本書觀范書足見此叚裁剪之妙籍建中常侍籍建追封為汝隂東鄉侯案宦者而追封不知何功伐至此宜其有囬天獨坐之燄也毛義廬江毛義少時家貧以孝行稱南陽張奉慕其義往候之坐定而府檄適至以義守令義奉檄而入喜動顔色案義廬江人事見范孝子傳序喜以為親賢者固不可測而奉之觀人于㣲何其明也孫程中黄門孫程謀誅江京詐謂馬國曰天子與我棗脯使早成之乃與國等共立順帝案程字稚卿涿郡人廢置出常侍之手千古第一變事程北新城人衛康叔之胄孫林父之後案閹䜿何物乃作史者叙其世系曲為援餙范書刪之是也章懐云東觀自孫程以下十九人與程同功者皆詳其所承本系是當時史官畏程等威權故若此吁可慨也夫苖光孫程賦棗脯分與光曰以為信今暮其當著矣漏盡光為尚席直事通燈解劒置外持燈入章臺門程等適入光走出門欲取劒王康呼還光不應光得劒欲還入門已閉光便守宜秋門㑹李閏來出光因與俱迎濟隂王幸南宫雲臺詔書録功臣令康䟽名康詐䟽光入章臺門光謂康曰緩急有問者當相證也詔書封光東阿侯食邑四千戸未受符䇿光心不自安詣黄門令自告有司奏康光欺詐主上詔書勿問遂封東阿侯邑千戸案光乃十九侯之末孫程等既貪天為功而光又竊功之甚者本書故詳載之范刪後漢書補逸卷七

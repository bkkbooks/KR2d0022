body:
  text: 後漢書補逸巻十四監察御史姚之駰撰張璠漢記第一明徳馬后明帝馬皇后不喜出遊未嘗臨御窓牖案此與東觀記同坤道主静明徳之母儀深矣張酺張酺事太常桓榮講論不怠每朝㑹輒講于御前以論難當意音動左右案酺事詳見東觀記盧芳芳安定人屬國闕數千畔在參蠻芳從之詐姓劉氏自稱西平王會匃奴向林王將兵來降參蠻闕芳因隨入匈奴留數年單于以中國未定欲輔立之追母樓且王求入五原與假號將軍李興等結謀興北至單于庭迎芳芳外倚匈奴内因興等故能廣畧邊郡案建武初彭寵反漁陽單于與共連兵因復權立盧芳使入居五原後芳復叛入匈奴單于貪得漢財帛乃遣芳降而芳以自歸為功漢賞竟不行單于大恨入冦尤深芳真小人之尤也杜詩杜詩為南陽太守治作水排教化大行號曰杜母案詩事詳見謝書梁冀梁冀聚土作山十里九坂以象二崤窮極工巧積金玉明珠充牣其中案冀見東觀記梁冀起兔苑于河南移檄所在調發生兔刻其毛以為識人有犯者罪至死案冀窮貪極悖遂取滅亡諸𤨏事皆細載范傳盖當時之爰書也左雄左雄為尚書令限年四十先試經然後舉孝亷案雄見謝書限年試才事亦詳見謝書徐淑論中范丹范丹中平二年卒三府各遣令史奔弔累行論諡僉曰宜為貞節先生會葬二千餘人案丹見謝書丹狷急違時窮居單陋至于遺令以薄為道平生苦節無與儔比乃殁身而弔葬之盛若此彼生榮而死不哀者竟何益哉累行之舉出自大將軍何進非私諡也宋穆之宋穆之年二十為郡督郵迎新太守到界上太守見穆之問曰君年少為督郵將因族世自有令徳穆之曰郡中瞻仰明公以為孔子非顔淵不敢使迎太守大竒其才問曰貞婦孝子隱闇未彰言于府穆之曰方今聖化大行文武未墜于地家有貞婦户有孝子比屋連棟不可勝記太守嘆曰吾非仲尼督郵所謂顔囘者也案此即朱穆事已見謝書但稍畧耳東漢以二字名者少雖范書穆傳不載此事然其為公叔無疑朱穆朱穆好學每精思至行墜坑坎亡失冠履不知馬之幾足也案穆見謝書穆行誼文章俱踔厲英發疑其天分逈絶不知其由于躭學也范同梁冀第池中船無故自覆問掾朱穆曰舟所以濟渡萬物不施游戯也而今覆者天戒將軍當濟渡萬民不可長念樂遊而已案穆屢奏記諫冀詞皆切直不獨覆舟之對也朱穆卒蔡邕與門人述其體行諡為文忠先生夫諡者上之所贈非下之所造故顔閔至徳不聞有謚朱蔡各以衰世臧否不立故私議之案前穆父卒時穆與諸儒謚為貞宣先生及穆卒蔡邕仿而行焉張記議以微詞是也同時荀爽亦聞而非之見袁書李固桓帝竇皇后崩中常侍曹節王甫欲以貴人禮葬太尉李固自扶輿起𢷬椒自隨謂妻子曰若太后不得配桓帝吾不生還矣案固見謝書固以桓帝初年即為梁冀所􅊣其竇后之立在延熹八年之冬至靈帝熹平中感疾而崩則此斷非固事范書屬之李咸是也吳祐吳祐父恢為南海太守欲殺青簡以寫經書祐年十二諫曰海濵舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間誠先賢所慎也恢乃止撫其手曰吳氏世不乏季子矣案祐見東觀記祐後家居牧豕行吟則殺青之諫非特逺嫌亦以持介于童子時見之矣手范作首郭純郭純為潁川太守光武詔曰賢能太守去帝城不逺河潤九里冀京師并䝉其福案諸書無郭純名此條與華書郭伋事同疑伋譌純也張温張温以司空拜加車騎將軍征韓遂丙辰引温于崇徳殿下温以軍禮長揖不拜案温後以車騎將軍拜太尉范無傳見靈帝紀中韓遂北宫伯玉之黨挾羌同叛者馬防馬防兄弟貴盛大起第觀連閣彌亘案防見東觀記楊秉秉為太尉嘗曰我有三不惑酒色財也天下稱為名公案秉見東觀記末世競尚髙名即口不言錢而醇酒婦人且以為名士風流豈知古人所稱為名公者乃即在聖賢理學中也憨名者其思之宋登宋登字叔陽出為潁川太守市無二價路不拾遺病免卒于家汝隂人配社祀之案登宋由子京兆長安人尸而祝之社而稷之登之遺愛深矣范列儒林傳陳球陳球為零陵太守州兵朱盖等反球守城弦大木為弓羽矛為矢機發之逺射千餘人斬朱盖等案球見東觀記時零陵以下濕編木為城不可守而球獨嬰城破賊盖忠且勇矣范同周景周景父榮章和世為尚書令初景厯位牧守好善愛士每嵗舉孝亷延請入上後堂與家人宴會如此者數四及贈送既備又選用其子弟常稱曰移臣作子於義何傷先是司徒韓縯為河内太守在公無私所舉一辭而已後亦不及其門戸曰我舉若可矣不令恩偏積一家也當時論者或兩譏焉案景見謝書薦賢為國市恩何為過猶不及吾寧取韓矣范同种暠永昌太守鑄黄金為蛇獻梁冀益州刺史种暠發其事案暠字景伯河南洛陽人時暠逮捕馳傳上言冀由是銜怒乃陷暠荀顗荀顗上書順帝曰自入正月久隂不雨雲者雨之具也案范書闕雨具字甚新穎孔融孔融拜太中大夫雖居家失勢賔客日滿其門愛才樂士常若不足每嘆曰坐上賔常滿罇中酒不空吾無憂矣案融字文舉魯國人亦稱孔北海愛才樂士常若不足八字儁妙范不及融在郡八年僅以身免帝初都許融以為宜畧依舊制定王畿正司隸為千里之封乃引公卿上書言其義是時天下草創曹袁之權未分融所建明不識時務又天性氣爽頗推平生之意狎侮太祖太祖制酒禁而融書啁之曰天有酒旗之星地列酒泉之郡人有㫖酒之徳故堯不飲千鍾無以成其聖且桀紂以色亡國今令不禁婚姻也太祖外雖寛容而内不能平御史大夫郗慮知㫖以法免融官案文舉自當以文學顯北海賊衝之地而董卓故以處融所云才疏意廣迄無成功不能為相諱也曹瞞呼吸生殺而文舉狎侮之卒使移鼎之舉待之身後未必非北海相之功耳虎賁士有貌似蔡邕者融每酒酣輒引與同坐曰雖無老成人尚有典刑其好士如此案北海好士時露狂態遂為千古嘉話范同王龔龔字伯宗有髙名于天下順帝時為太尉初山陽太守薛勤喪妻不哭將殯臨之日幸不為夭復何恨哉及龔妻卒龔與諸子並杖行服時人或兩譏焉案龔山陽髙平人妻者齊也故制服以朞而杖與不杖以經三年之喪與否而分我朝律法與宋文公家禮皆然東漢禮制未定故多參差勤之所為畧祖䝉莊若龔禮以義起中行之道兩譏何為范不載王暢王暢字叔茂名在八俊靈帝時為司空以水災免而李膺亦免歸故郡二人以直道不容當時天下以暢膺為髙士諸危言危行之徒皆推宗之願涉其流惟恐不及會連有災異而言事者皆言三公非其人宜因其變以暢膺代之則禎祥必至由是宦豎深怨之及膺誅死而暢遂終廢于家案暢見謝書即龔子也此條文筆疏古范書所無鄭泰泰字公業少有才畧多謀計知天下將亂隂交結豪傑家富於財有田四百頃而食常不足名聞山東舉孝亷三府辟公車徴皆不就何進輔政徴用名士以泰為尚書侍郎加奉車都尉進將誅黄門欲召董卓為助泰謂進曰董卓彊忍寡義志欲無饜若借之朝政授之大事將肆其心以危朝廷以明公之威徳據阿衡之重任秉意獨斷誅除有罪誠不待卓以為資援也且事留變生其鑒不逺又為陳時之要務進不能用乃棄官去謂潁川人荀攸曰何公未易輔也進尋見􅊣卓果専權廢帝闗東義兵起卓會議大發兵羣僚咸憚卓莫敢忤㫖泰恐其彊益將難制乃曰夫治在徳不在兵也卓不悦曰如此兵無益耶衆人莫不變容為泰震慄泰乃詭辭而對曰非以無益以山東不足加兵也今山東議欲起兵州郡相連人衆相動非不能也然中國自光武以來無雞鳴狗吠之警百姓忘戰日久仲尼有言不教民戰是謂棄之雖衆不能為􅊣一也明公出自西州少為國將閑習軍事數踐戰塲名稱當世以此威民民懐懾服二也袁本初公卿子弟生長京師體羸婦人張孟卓東平長者坐不窺堂孔公緒能清談髙論嘘枯吹生無軍帥之才負霜露之勤臨鋒履刃決敵雌雄皆非明公敵三也察山東之士力能跨馬控弦勇等孟賁捷齊慶忌信有聊城之守策有良平之謀可任以偏師責以成功未聞有其人者四也就有其人王爵不相加婦姑位不定各恃衆怙力將人人棊跱以觀成敗不肯同心共膽率徒旅進五也闗西諸郡北接上黨太原馮翊扶風安定自頃以來數與羌戰婦女載㦸挾矛弦弓負矢況其悍夫以此當山東忘戰之民譬驅羣羊向虎狼其勢可必六也且天下之權勇今見在者不過并涼匈奴屠各湟中義從八種西羌皆百姓素所畏服而明公權以為爪牙壯夫震悚況小醜乎七也又明公之將帥皆中表腹心周旋日久自三原狹口以來恩信醇著忠誠可逺任智謀可特使以此當山東解合之虚誕實不相若八也夫戰有三亡以亂攻治者亡以邪攻正者亡以逆攻順者亡今明公秉國政平討夷凶宦忠義克立以三徳待於三亡奉辭伐罪誰人敢禦九也東州有鄭康成學該今古儒生之所以集北海邴根矩清髙直亮羣士之楷式彼諸將若詢其計畫案典校之彊弱燕趙齊梁非不盛終見滅於秦吳楚七國非不衆而不敢踰滎陽況今徳政之赫赫股肱之邦良欲造亂以徼不義者必不相然讃成其凶謀十也若十事少有可采無事徴兵以驚天下使患役之民相聚為非棄徳恃衆以輕威重卓乃悦以泰為將軍統諸軍擊闗東或謂卓曰鄭泰智畧過人而結謀山東今資之士馬使就其黨竊為明公懼之卓収其兵馬留拜議郎後又與王允謀共誅卓泰脫身自武闗走東歸後將軍袁術以為揚州刺史未至官道卒時年四十一案泰河南開封人司農衆之曽孫裴松之注魏志引此傳獨詳范書皆大同時有剪裁潤色處則後來者居上要之亦先難後易耳泰范作太傳中皆稱其字盖蔚宗避其祖諱也蔡邕蔡邕字伯喈陳留圉人六世祖勲與鮑宣卓茂不仕新室父稜亦有清白行謚貞定案邕見東觀記范同邕上靈帝書云伏見幽州突騎冀州强弩為天下精兵國家贍核案時因三互禁忌選用艱難幽冀二州久缺不補故邕上疏言此范作幽冀舊壤鎧馬所出與此異靈帝時虹晝見庭中引議郎蔡邕詣金商門問對曰虹霓小人女子之祥也案范楊賜傳云虹墮嘉徳殿前初蔡邕以言事見從名聞天下義動志士及還内寵惡之邕恐乃亡命海濵徃來依太山羊氏積十年卓為太尉辟為掾以髙第為侍御史治書三日中遂至尚書後遷巴東太守卓上留拜侍中至長安為左中郎將卓重其才厚遇之每有朝廷事常令邕具草及允將殺邕時名士多為之言允悔欲止而邕已死案温侯殺中郎事謝書文過煩此則過簡乃至一無色澤惟范書詳畧得中語亦輕雋所云刪潤者易為功耶王允布兵敗駐馬青瑣門外謂允曰公可以去允曰安國家吾之上願也若不獲則奉身以死朝廷幼主恃我而已臨難茍免吾不為也努力謝闗東諸公以國家為念傕汜入長安城屯南宫掖門殺太僕魯馗大鴻臚周奐城門校尉崔烈越騎校尉王頎吏民死者不可勝數司徒王允挾天子上宣平城門避兵傕等於城門下拜伏地叩頭帝謂傕等曰卿無作威福而乃放兵縱横欲何為乎傕等曰董卓忠於陛下而無故為吕布所殺臣等為卓報仇勿敢為逆也請事竟詣廷尉受罪允窮逼出見傕傕誅允及妻子宗族十餘人長安城中男女大小莫不流涕允字子師太原祁人也少有大節郭泰見而竒之曰王生一日千里王佐之才也泰雖先達遂與定交三公並辟厯豫州刺史辟荀爽孔融為從事遷河南尹尚書令及為司徒其所以扶持王室甚得大臣之節自天子以下皆倚賴焉卓亦推信之委以朝廷案此與范書同子師被害一節散見董卓傳張記漢事不用列傳體故序其爵里獨後云荀淑淑有八子儉緄靖燾汪爽肅敷淑居西豪里縣令苑康曰昔髙陽氏有才子八人遂署其里為髙陽里時人號曰八龍案淑字季和潁川潁隂人亦稱神君髙陽八龍千載艷羨當由朗陵世徳耳敷范作尃淑博學有髙行與李固李膺同志友善㧞李昭于小吏友黄叔度于㓜童以賢良方正徴對策譏切梁氏出補朗陵侯相卒官案時李固李膺皆師宗于淑後淑卒李膺時為尚書自表師喪非但同志友善而已荀爽爽字慈明㓜好學年十二通春秋論語躭思經典不應徴命積十數年董卓秉政復徴爽爽欲遁去吏持之急詔下郡即拜平原相行至宛陵又追拜光祿勲視事三日策拜司空爽起自布衣九十五日而至三公案爽一名諝即所稱荀氏八龍慈明無雙者也范同荀爽為三公食不過一肉脱粟飯坐皮褥案范不載爽晩節應董卓之徴未十旬而取卿相或疑出處有乖然觀其自奉若此則亦有不得已焉朱紫陽云荀淑正言于梁氏用事之日而其子爽已濡跡于董卓専命之朝及其孫彧則遂為唐衡之壻曹操之臣而不知其非盖剛大直方之氣折于凶虐之餘而漸圖所以全身之計則黨錮之禍有以敺之也荀悦悦清虚沈靜善于著述建安初為秘書監侍中被詔刪漢書作漢紀三十篇因事以明臧否致有典要其書大行於世案悦字仲豫朗陵長儉之少子漢紀一書當世盖己大行張璠書此有欣慕焉故續作漢紀以效之乃卒為袁宏所揜書之行世固有幸不幸也何顒顒字伯求少與郭泰賈彪等遊學洛陽泰等與同風好顒顯名太學于是中朝名臣太傅陳蕃司隸李膺等皆深接之及黨事起顒亦名在其中乃變名姓亡匿汝南間所至皆交結其豪傑顒既竒太祖而知荀彧袁紹慕之與為奔走之友是時天下士大夫多遇黨難顒常嵗再三私入洛陽從紹計議為諸窮窘之士解釋患禍而袁術亦豪俠與紹爭名顒未嘗造術術深恨之案顒南陽襄郷人顒輕袁術術後于衆坐數顒三罪且言當殺之賴宗承解免而止見漢末名士傳術之怨毒何深也顒後以謀誅董卓事覺自殺亦人傑哉顒援救黨人而范書以殿黨錮傳固宜董卓卓更鑄小錢悉取洛陽及長安銅人鐘簴飛亷銅馬之屬以充鑄又太史靈臺及永安候銅門楯亦取之案卓臨洮人卓凶暴滔天寰宇崩沸更鑄一事其小者耳范無靈臺一叚橋𤣥橋𤣥字公祖厯位中外以剛斷稱謙儉下士不以王爵私親光和中為太尉以久病策罷拜太中大夫卒家貧乏産業柩無所殯當世以此稱為名臣案公祖梁國睢陽人赤稱橋公魏祖微時公為知己後為文祭墓有車過腹痛之言適為橋公累耳皇甫嵩卓抵其手謂皇甫嵩曰義真怖未乎嵩對曰明公以徳輔朝廷大慶方至何怖之有若淫刑以逞將天下皆懼豈獨嵩乎卓黙然遂與嵩和解案嵩見謝書對卓數語詞義凛冽元兇亦為沮喪山陽公載記稱卓為太師嵩為御史中丞拜于車下且有鴻鵠變鳳之諛卓遂以卿早服今日可不拜凌嵩嗚呼義真人傑豈若是哉怖未范作犕未賈琮賈琮為荆州刺史將入界髙褰車䄡曰刺史當逺視廣聽何為而垂帷乎案琮見謝書餘同王立初天子敗于曹陽欲浮河東下侍中太史令王立曰自去春太白犯鎮星於牛斗過天津熒惑又逆行守北河不可犯也由是天子遂不北渡河將自軹闗東出立又謂宗正劉艾曰前太白守天闗與熒惑會金火交會革命之象也漢祚終矣晉魏必有興者立後數言於帝曰天命有去就五行不常盛代火者土也承漢者魏也能安天下者曹姓也唯委任曹姓而已公聞之使人語立曰知公忠於朝廷然天道深逺幸勿多言案此獻帝當李郭相攻時事袁紀稱四年日食時未晡八刻太史令王立奏曰晷過度無變也朝臣皆賀帝令候焉未晡一刻而食賈詡奏立司候不明請付理官帝詔宥之則立之術數恐亦未精此殆為老瞞作説客也少帝出奔帝以八月庚午為諸黄門所刼步出榖門走至河上諸黄門既投河死時帝年十四陳留王年九嵗兄弟獨夜步行欲還宫闇暝逐螢火而行數里得民家以露車載送辛未公卿以下與卓共迎帝于北芒阪下案少帝以嫡長當立乃為董卓所廢雖即位僅六月然已兩改元矣范雖附見靈帝紀中宜更立少帝紀方合流離播遷宫衛把棘閹寺之禍乃至于斯獻帝命名靈帝以帝似已故名曰協案范書闕帝王紀曰協字伯和獻帝入長安帝入長安幸未央宫將入宫日大雨晝晦翟雉飛入長安宫案時董卓逼帝遷都因焚洛陽宫廟故災異如此范闕劉璋論劉璋愚弱而守善言斯亦宋襄公徐偃王之徒未為無道之主也張松法正雖君臣之義不正然固以委名附質進不顯陳事勢若韓嵩劉光之説劉表退不告絶奔亡若陳平韓信之去項羽而兩端攜貳為謀不忠罪之次也案璋劉焉子蜀志云字季王夫張松以私忿勸璋絶曹而結劉及璋遣法正將兵迎備松且勸備于會襲璋後謀敗而被戮宜矣于闐莎車王殺于闐王于闐大都末出城見野豕欲搏之乃人語曰無殺我我為汝殺莎車將軍都末異之即與兄弟共殺莎車王案此見范莎車國傳都末所殺乃莎車將君得非王也北郊北郊在雒陽城北六里案范書在城北四里月令章句云北郊六里因水數也范誤時人語時人為之語曰不畏彊禦陳仲舉天下模楷李元禮案此見范黨錮傳序夫太學生三萬餘人郭林宗賈偉節為之冠而學中褒語不及之則二子之韜光潛徳可知後黨事起林宗竟自皭然偉節且西行以解黨禍明哲保身盖有素矣薰以香自燒膏以明自銷彼餘子者亦何為哉後漢書補逸巻十四

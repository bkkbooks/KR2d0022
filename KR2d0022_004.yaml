body:
  text: 後漢書補逸卷四監察御史姚之駰撰東觀漢記第四銚期銚期字次况上至薊薊中應王郎上驚去吏民遮道不得行期瞋目道左大呼曰蹕大衆披避後上即位上笑曰卿欲遂蹕耶案期潁川郯人諡忠侯卿欲遂蹕語乃王郎初滅時期説光武正位故光武以此戲之如即位後似不合從范為是期疾病使者存問加賜醫藥甚厚其母問期當封何子期言受國家恩深嘗慙負不知當何以報國何宜封子也上甚憐之案期以建武十年卒范闕王霸王霸祖父為詔獄丞案霸字元伯潁陽人封淮陵侯范稱霸世好文法霸亦少為獄吏劉文及蘇茂臣永上遣王霸討之霸至遂閉門堅守勞賜吏士作倡樂賊衆歡呼雨射營中中霸前酒樽案范書光武使霸與馬武討周建蘇茂救建故有此戰無劉文及永名矢中酒樽霸自安坐息衆後竟降其城真所謂不戰而屈人之兵者上從邯鄲避王郎兵至滹沱河導吏言河澌無船不可渡上令王霸前瞻水霸欲如實還報恐驚官屬雖不可渡且臨水止尚可為阻即白曰氷堅可渡遂前至比氷合可履馬欲僵各以囊盛沙布氷上乃渡渡未畢數車而氷陷案霸欲如實還報數語范作霸恐驚衆欲且前阻水深得減字法囊沙布氷事范闕王霸為上谷太守修飛狐道至平城堆石布土三百餘里伏盛伏盛字伯明案伏盛即伏隆本書避殤帝諱也范書作字伯文盛琅邪人伏湛子少以節操立名張步遣其掾孫昱隨盛詣闕上書獻鰒魚案盛持節使青徐招降羣賊故步遣使隨之其後步受劉永封竟殺盛范無掾名堅鐔堅鐔字子皮案范書作子伋潁川襄城人堅鐔獨孤絶南拒鄧奉北當董欣一年間道路隔塞糧饋不至食蔬菜與士卒共勞苦案鄧奉反新野董欣反宛城鐔與右將軍萬修徇南陽諸縣修旋病卒故云獨孤絶也范同窪丹窪丹字子玉世傳孟氏易作通論七篇世重之號窪君通論案丹南陽育陽人窪音圭范同韓稜韓稜字伯師除為下邳令視事未周一作期吏人愛慕時鄰縣皆雹傷稼稜縣界獨無雹案稜潁川舞陽人范但載稜為郡功曹後特徴五遷至尚書未言其為令也韓稜遷南陽太守下車表行義拔幽滯權豪懾伏案稜以不阿竇憲顯名故特遷南陽守劉隆永平二十五年左中郎將劉隆為驃騎將軍即日行大將軍事案隆字元伯安衆侯宗室也封長平侯代吳漢為大司馬李珣李珣為兖州刺史所種小麥胡蒜悉付從事無所留清約率下席羊皮服布被案珣字叔英安定臨涇人晚節徙居新安關饋贈一無所受拾橡實以自資其清介如此邳彤王莽末分巨鹿為和成郡居下曲陽以彤為卒正案彤字偉君信都人後世祖徇河北至下曲陽彤即舉城降彤功不甚烜赫然當帝欲西還長安時彤乃決䇿攻戰王業之成實肇于兹孫湛孫湛為光祿勳以清亷見稱與周澤相類案白帖湛字伯雅馬援援逺祖以吏二千石自邯鄲徙茂陵成歡里曾祖父通生賔宣帝時以郎持節號使君生仲仲官至玄武司馬仲生援案援字文淵追封忠成侯亦稱伏波將軍援三兄况字君平余字聖卿負字季主援受齊詩師事潁川蒲昌案范書言援不能守章句援固非書生也援長七尺三寸色理髮膚眉目容貌如畫案伏波狀貌當與留侯相似乃不得與雲臺之畫何也援以况出為河南太守次兩兄為吏京師見家用不足乃辭况欲就邊郡畜牧案援才具奇偉惜志過大耳遨逰二帝以後鋤先零守隴西出塞漠早交址功亦赫矣臨沅之行竟踐馬革裹尸之志何其不知止也于辭况時已見之矣援外類倜儻簡易而內重禮事寡嫂雖在閫內必幘然後見援與公孫述有舊援從冀入蜀述見之甚喜與俱入宗廟冠之交讓之冠立舊交之位公孫述為援制答布單衣交讓冠案范書答作都史記有答布千匹作答為是援初到敕令中黃門引入時上在宣德南廡下但幘坐援曰陛下何知非姦人刺客而簡易若是案范書不詳子陽作俑人形援深譏之世祖幘坐見援所謂豁逹大度同符髙祖者也援豈真諌其簡易哉特借以入詞耳時隗囂使援奉書洛陽故云初到馬援勸光武伐隗囂聚米為山川地勢上曰鹵在吾目中矣援説囂曰前到朝廷上凡十四見案援從西來初歸世祖乃一月之中十四見帝之勤于接士其不忘西川至矣馬援在隴西上書曰富民之本在于食貨宜如舊鑄五銖錢三府以為未可凡十三難援一一解之條奏其狀案范書時鑄錢事巴寢及援還朝從公府求得前奏乃隨牒解釋更具表言帝從之天下賴其便蓋外臣建白其格子朝議者往往如此武威將軍劉尚擊武陵五溪蠻夷深入軍沒馬援因復請行時年六十二帝愍其老未許之援自請曰臣尚能披甲上馬帝令試之援據鞍顧盼以示可用帝笑曰矍鑠哉是翁也遂遣援案伏波少時有老當益壯之言至此驗矣胡致堂譏其昧時行時止之義有以也馬援為武陵太守郡連有蝗蟲穀價貴援奏罷鹽官振貧羸薄賦稅蝗蟲飛入海化為魚蝦馬援謂官屬曰吾在浪泊西里烏間鹵未滅之時下潦上霧毒氣薰蒸仰視烏鳶跕跕墮水中馬援擊交趾謂官屬曰從弟少遊嘗哀吾多大志曰士生一世但取衣食足乘下澤車御欵假馬為郡吏守墳墓鄉里稱善人斯可矣求益盈餘但自苦耳案范書援有卧念少遊平生語何可得之言然實自喜成功故為此反言耳少遊哀援固如燕雀之于鴻鵠而豈知矰繳將加于千仞哉壺頭穿岸竟招薏苡之讒可不謂哀乎援嘗嘆曰凡殖貨財産貴其能施賑也否則守錢鹵耳乃盡散以班昆弟故舊身衣羊裘皮袴案守錢鹵三字千古同慨知此則錢神論可不作矣援于交址鑄銅馬奏曰臣聞行天者莫如龍行地者莫如馬臣援師事楊子阿孝武帝時善相馬者東京門鑄作銅馬法獻之立馬於魯班門外更名曰金馬門臣既備數家骨法以所得駱越銅鑄以為馬髙三尺五寸圍四尺五寸謹獻詔置馬德陽殿下案援好騎善别名馬故有此奏德陽殿范作宣德殿援上書臣所假伏波將軍印書伏字犬外嚮成臯令印臯字為白下羊丞印為四下羊尉印白下人人下牛一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同薦曉古文字者事下大司空正郡國印章奏可案范不載夫摹印雖曰繆篆但可屈曲從心至於點畫宜依史書胡可任意末世但貴行狎草書至於篆籕視為不急所謂諧聲轉注茫乎不解俗工刓印從筆增減古制泯矣安得伏波釐正之景丹景丹率衆至廣阿光武出城外勒馬坐鞍置氊毾㲪上設酒肉案丹字孫卿馮翊櫟陽人時丹為上谷長史與耿况寇恂等將兵南陽歸世祖也上謂丹曰今關東故王國雖數縣不過櫟陽萬戶邑夫富貴不歸故鄉如衣繡夜行故以封卿耳案帝封丹櫟陽侯故有此語景丹拜𢎞農太守丹時病帝以其舊將欲令強起領郡事乃夜召入謂曰𢎞農逼近京師知將軍病但得將軍威重卧以鎮之足矣案時陜賊攻破𢎞農生獲郡守故世祖強召丹丹力疾拜命十餘日薨王莽時舉有德行能言語通政事明文學之士丹以言語為固德侯相上在廣阿聞外有大兵自來登城勒兵在西門樓上問何等兵丹等對言上谷漁陽兵上曰為誰來乎對曰為劉公即請丹入人人勞勉恩意甚備案范書不載丹從上至懷病瘧上在前瘧發寒栗上笑曰聞壯士不病瘧今大將軍反病瘧耶使小黃門扶起賜醫藥還歸洛陽病遂加案范書但言丹時病不見光武待功臣惓惓如家人父子之意傅俊俊從上迎擊王尋等于陽闋漢兵反走還汝水上上以手飲水澡盥鬚眉塵垢謂俊曰今日罷倦甚諸卿寧憊耶案俊宇子衛潁川襄城人本書細寫想見櫛風沐雨之勞范不載樊準樊準為御史中丞舉正非法百僚震栗案準字幼陵宏之族曽孫準或作凖樊準為尚書令明習漢家舊事周密畏慎案準以河內太守徵三轉至尚書令范同李躬三老常山李躬年耆學明以二千石祿養終身案范書闕古初長沙義士古初父喪未葬鄰人火起及初舍下棺不可移初冒火伏棺上俄而火滅案時郅惲為長沙令甄異之以為首舉范附惲傳宋𢎞上嘗問宋𢎞通儒之士𢎞薦桓談談善鼓琴熹鄭聲上數聽悅之間坐府𢎞遣吏召談責問談叩頭良久乃遣後上令談鼓琴談為之失次上問之𢎞言其故其後不復令談給事中案𢎞字仲子長安人琴以養性君子不撤但不宜繁聲耳𢎞之薦談以其才學洽聞幾及揚雄劉向父子故責之范文更通暢宋𢎞為司空嘗受俸得鹽令諸生糶諸生以賤不糶𢎞怒悉賤糶不與民爭利宋𢎞嘗燕見御坐新施屏風圖畫列女世祖數顧視𢎞曰未見好德如色者帝撤之案宋公戒淫色於圖畫其真防微杜漸之意乎范同上姊湖陽公主新寡上與共論朝臣微觀其意主曰宋公威容德器羣臣莫及上曰方且圖之後𢎞見上令主坐屏風後因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之交不可忘糟粳之妻不下堂上顧謂主曰事不諧矣案𢎞故劍之恩固摯而帝擇禁臠絶不強人以不欲豈非盛德事范同卓茂卓茂為丞相史常出道中有人認茂馬者茂問失馬幾日對曰月餘矣茂曰然此馬畜已數年遂解馬與之曰即非所失幸至丞相府還我乃步挽車去後馬主自得馬慙愧詣茂案茂字子康南陽宛人中數語范作茂有馬數年心知其謬默解與之挽車去顧曰若非公馬幸至丞相府歸我文之位置較妥帖茂為人恬蕩樂道推實不為華貌行已在於清濁之間自束髮至白首與人未嘗有爭競案行已在清濁之間茂之實録也不則為長樂老人一流矣范書闕此數語不如本書之細寫茂為密令河南郡為置守令與茂並居久之吏人不歸往守令案范書茂有廢置吏人笑之郡置守令茂不為嫌理政自若蓋茂純任德教故如此然外雖渾厚內自精明不然何以道不拾遺蝗不入境乎光武即位先訪求茂茂時年七十餘矣詔封茂宣德侯案范書宣作褒封茂非理民之職光武禮之比于表閭從褒是溫公以為即位之初即取忠厚之臣旌循良之吏可謂知所先務也馬武建武六年馬武與衆將上隴擊隗囂身被兜鍪鎧甲持戟奔擊武中矢傷案武字子張南陽湖陽人時與耿弇同出師漢軍不利賴武為後拒以退囂兵范略第五倫倫每見光武詔書嘗嘆息曰此聖主也案倫字伯魚京兆長陵人是時倫方為主簿未嘗見世祖而讀詔嘆息如此他日明良會合夫豈偶哉倫為司空奉公不撓言事無所依違第五倫自度仕宦牢落變易姓名自稱王伯齊嘗與奴販鹽北至太原販賣每所至客舍去輒為糞除道上號曰道士開門請求不復責舍宿直倫性節儉作會稽郡雖為二千石卧布被自養馬妻炊爨受俸祿常求赤米與小吏受等財多一月俸餘皆賤糶與民飢羸者案范譏倫尊臨千里而與牧圉等庸儉乃逼下然末世居官者動以豪侈相尚安得如第五倫者起而風之光武問第五倫曰聞卿為市掾有人遺卿母一笥餅知從外來奪之母遂探口餅出之有諸倫對曰實無此衆人以臣愚蔽故為此言也案范載帝問倫語但有篣婦公不過從兄飯二事此闕倫雖峭核乃甚平易自非於陵子于母何忍探口中餅世祖特戲言試之耳王莽末盜賊起時米石萬錢人相食倫獨收養孤兄子外孫分糧共食死生相守鄉里以此賢之案睦姻任恤自好者多能之至于窮餓且死而能分糧共食自非大賢輒靡矣范不載京兆尹閻興召倫為主簿時長安市未有秩又鑄錢官姦軌所集無能整齊理之者興署倫督鑄錢掾領長安市其後小人爭訟皆云第五掾所平市無姦枉案倫為三公亦如為掾時也第五倫為會稽守為事徴百姓攀轅扣馬呼曰捨我何之倫密委去百姓聞之乘船追之交錯水中其得民心如此馮勤魏郡太守范橫上疏薦勤除為郎中案勤字偉伯魏郡繁陽人勤初依銚期期薦於光武未見被用故橫又薦之范略馮勤曽祖揚宣帝時為𢎞農太守生八男皆典郡趙魏間號為馮萬石案馮萬石之名不著為前書石氏所掩耳范同馮勤使典諸侯封事勤差量功次輕重國土逺近地勢豐薄不相踰越莫不厭服焉自是封爵之制非勤不定案范同勤遷司徒是時三公多見罪退上賢勤欲令以善自珍乃因宴見從容誡之曰朱浮上不忠於君下凌鑠同列竟以中傷人臣放逐遭誅雖追加賞賜不足以償不訾之身忠臣孝子之覽照前世以為鏡誡能盡忠於國事君無二則爵賞光乎當世功名列於不朽可不勉哉中元元年車駕西幸長安祀園陵還勤燕見前殿盡日歸府因病喘逆上使太醫療視賞賜錢帛遂薨案范不載趙熹趙熹字伯陽為平原太守于是擢舉義行誅鋤姦惡後青州大蝗入平原界輒死歲屢有年百姓歌之案熹宛人熹從懷令遷平原守捕盜賊宥餘黨境內大治范同趙熹少有節操從兄為人所殺無子熹常思欲報之遂往復讐而讎家皆疾病熹以因疾報殺非仁者心且釋之而去顧謂讎曰爾曹若健逺相避後病愈悉自縛詣熹熹不與相見後竟殺之案熹此舉似仁義兼至然於執兵隨後之義謂何詔曰行太尉事趙熹三葉在位為國元老其以熹為太傅案此肅宗初即位時詔也范不載趙熹為衛尉性周密盡心事上內典宿衛夙夜匪懈恩寵甚厚母殁乞身行服顯宗不許遣使為釋服賞賜恩寵甚渥案熹時代虞延行太尉事居府如真帝以熹守簡陽侯相敕從騎都尉儲融受兵二百人通利道路熹白上不願受融兵單車馳往度其形况上許之案熹單車至簡陽竟降其帥范略朱勃章帝下詔曰告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳狀不顧罪戾懷旌善之志有烈士之風詩云無言不讎無德不報其以縣見穀二千石賜勃子若孫勿令遠詣闕謝案勃字叔陽援同里人范附援傳不載詔詞陳遵陳遵破丐奴詔賜駮犀劒案遵字孟公杜陵人見前漢書更始時薦為大司馬護軍與歸德侯劉颯俱使胸奴單于欲脅詘遵遵陳利害為言曲直因遣還則破字當作使字後王丹傳同范闕宗堪宗堪為司空十四年自乞上印綬賜千石俸案范書闕郭况郭况為鴻臚上數幸其宅飲酒賞金帛甚盛京師號况家為金穴言富實也案况真定藁人郭后之弟外戚藉寵富溢者多矣獨况於廢棄之後恩賜彌豐固由况之小心飾謹而帝之存厚亦足以蓋愆乎范同樊重樊重世善農稼好貨殖治家産業起廬舍髙樓連閣陂池灌注竹木成林閉門成市案重字君雲南陽湖陽人范稱重三世共財子孫朝夕禮敬常若公家非徒長于圭然之䇿也見子宏傳樊重年八十餘終其所假貸人間數百萬遺令焚削書劵聞者皆慙爭往償之諸子竟不肯受案重之折契與馮暖之市義大相徑庭莊辛有言君子之富假人不德不責重之謂也纍葉貴顯不亦宜乎范同世祖即位追封重為壽張敬侯馬廖廖少習易經清約沉靜援擊武溪無功卒于師廖不得嗣爵案廖字敬平後為衛尉建初中封順陽侯范但載少以父任為郎而已宣彪宣彪官至玄莵太守案彪宣秉子馮翊雲陽人范書秉傳有除子彪為郎語王丹陳遵更始時為大司馬出使丐奴過辭于丹丹曰俱遭反覆惟我二人為天所遺今子當之絶域無以相贈贈子以不拜遂揖而别遵甚悅之案丹字仲回京兆下邽人孟公關西大俠欲結交于丹丹不許其髙卓如此范不載丹每嵗農時載酒肴便于田頭大樹下飲食勸勉之因留其餘酒肴而去案丹隱居養志好施周急蓋處鄉里之最善者詳范書隂識隂識為守執金吾對賔客語不及國其慎重如此案識字次伯南陽新野人託屬掖庭又備金吾散秩故不敢干與國政若夫躋元僚託股肱則賔客接對時咨諏訪問方且不暇此周公所以吐握也豈可與溫室之樹同為慎默哉祭彤信都反為王郎所置信都王捕擊祭彤父弟及妻子使為手書呼彤曰降者封爵不降者滅族彤泣報曰事君者不得顧家彤親所以至今得安于信都者劉公之恩公事方爭國不得復念私也案彤祭遵從弟范稱彤早孤以至孝稱遇天下亂野無煙火而獨在冢側與此大異本書獨言父弟或早失母故然然巨孝之人肯以救父為輕報劉為重乎此不可解也祭彤素清約為遼東太守三十年衣無副儲世祖嘉其功賜錢百萬及衣冠刀劒下至杯案食物大小重疊案大小重疊句范作大小無不悉備其工拙何如祭彤字次孫膂力過人嘗貫三百斤弓入為太僕從至魯帝指子路室曰此太僕室也太僕吾之禦侮鄧豹鄧豹字伯庠遷大匠工無虛張之繕徒無飢寒之色案范書闕郭丹郭丹字少卿從師長安買符入函谷關乃慨然而嘆曰丹不乘使者車不出此關既至京師常為都講更始二年三公舉丹賢能徴為諌議大夫持節使歸南陽自去家十三年果乘髙車出關如其志焉案丹南陽穰人終童棄繻馬卿題橋有志者事竟成少卿為三矣范同一本作從宛人陳洮買入關符既入關封符乞人郭丹為更始諌議大夫持節使南陽安集受降更始敗丹無所歸節傳以敝布纒裹節解節夜行求謁更始妻子奉還節傳因歸鄉里案丹此節與蘇子卿相將彼王丞相取故節愧汗多矣郭丹為司徒在朝名清亷公正王良王良為大司徒在位恭儉妻子不之官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻徒跣曵柴從田中歸恢曰我司徒吏故來受書欲見夫人妻曰妾是也恢乃下拜嘆息而還案良字仲子東海蘭陵人良布被非詐然豈可使婦無禪乎荆布出汲隱士妻且如是矣徒跣曳柴傳者過也范作布裙為近大司徒下亦失司直二字王良以疾歸一歲復徵至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往來屑屑不憚煩也遂拒之良慙自後連徵輒稱疾案范同良在官清約如此而友人重譏之甚矣求志逹道之難也任延任延字長孫為會稽西都尉時年十九迎吏見其少皆驚及到淡泊無為惟先遣饋禮祠延陵季子時天下新定道路未通避亂江南者皆未還中土會稽頗稱多士延到乃聘請髙行如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分俸祿以賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯之案延宛人延先有聖童之目故年十九即為都尉後仕至九真太守有殊政范同歐陽歙歐陽歙遷汝南太守推用賢俊吏民從化案歙字王思樂安千乘人傳歐陽尚書授徒常數百後以守汝時臧罪千萬發覺下獄諸生千餘人力救之至有願殺身以代者卒死獄中馬成馬成善治障塞自西河至渭橋河上至安邑太原至井陘中山至鄴皆築堡壁起烽燧十里一候案成字君遷南陽棘陽人此成屯常山中山時代驃騎杜茂所治也善范作繕樊梵樊梵字文髙每當直事駐車待漏冠劍不解於身為郎二十嵗未嘗被奏三署服其慎也案范書闕蔣疊蔣疊字伯重為太僕久在臺閣文雅通達明故事在九卿位數言便宜奏議可觀案范書闕桓談光武議靈臺所處上謂桓談曰吾欲讖決之何如談默然良久曰臣不讀讖復極言讖之非經帝大怒出為六安郡丞意忽忽不樂道病卒案談沛國相人范于帝怒下有桓談非聖無法之責甚哉光武之惑也以聖尊讖將置堯舜禹湯之書于何等乎談上書曰富商大賈多收田貨中家子為之保役受計上疏趨走俯伏譬若臣僕坐而分利又賈人多通侈靡之物羅紈綺繡雜綵玩好以淫人耳目而竭盡其財是為下樹奢媒而置貧本也求人之儉約富足何可得乎夫俗難卒變而人不可暴化宜抑其路使之稍自衰焉案談上疏陳時政所宜其第二條在舉本業而抑末利故所論如此范刪節過當不若本書之明暢談著書言當世行事號曰新論光武讀之敕言卷大令皆别為上下凡二十九篇惟琴道未畢但有發首一章案光武之善新論優於髙祖之喜新語也琴道篇肅宗使班固續成之見范傳中桓談字君山沛人章帝元和中行巡狩至沛令使者祠談冡鄉里甚榮之虞延光武東巡路過小黃髙帝毋昭靈后園陵在焉時虞延為部督郵詔呼引見問園陵之事延進止從容瞻拜可觀其園陵樹蘖皆諳其數爼豆犧牲頗曉其禮帝善之敕延從駕到魯還經封丘城門下小不容羽蓋上怒使撻侍御史延因下見引咎以為罪在督郵上詔曰以陳留督郵虞延故貸御史罪案延字子大陳留東昏人漢官儀注髙帝毋起兵時死小黃北後為作陵廟于小黃范同樊宏樊宏封長羅侯建武十三年從都尉封謝侯十五年徙封夀張侯案宏字靡卿樊重子范書載十三年封宏弟丹為射陽侯水經注所引亦同無從都尉事此定有誤張純張純字伯仁為大中大夫在朝纍世明習故事建武初舊典多闕每有疑義輒以訪純自郊廟婚冠喪紀禮儀多所正定一日或數四引見案純杜陵人富平侯安世之後至純改封武始侯傳國八世漢代侯王莫與為並純數上書議廟祀議禘祫議立辟雍明堂議宜封禪帝皆從之真一代禮宗也范同建武二十六年詔純曰禘祫之祭不行已久矣宜據經典詳為其制純奏曰禮三年一祫五年一禘春秋傳曰夫祫者何合祭也毁廟及未毁廟之主皆登合食入太祖廟五年而再殷漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟會始為禘祭又前十八年親幸長安亦行此禮禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月冬者五穀成熟物備禮成故合聚飲食也斯典之廢于兹八年請可如禮施行以時定議帝從之自是禘祫遂定案伯仁論祫禘可謂典且核矣議禮之家名為聚訟帝特詔純純故不辱詔也張純臨終謂家丞歙曰吾無功于時猥蒙爵土身死之後勿議傳國爵子奮上詔奮嗣爵奮稱純遺旨固不肯受帝以奮違詔收下獄奮惶怖乃襲封案國爵上承祖宗下庇子孫何謙何愧而必固辭此皆賢智之過東京習氣之當禁者鄭璩鄭璩字平卿黎陽人為侍御史轉司𨽻校尉案范張酺傳酺遷魏郡太守郡人鄭璩時為司𨽻校尉奏免執金吾竇景景屬酺害其子酺正其寃則璩之剛正可知矣璩范作據鄭璩為漢陽太守以嚴刻見稱璩拜內史上疏曰臣斗筲之小吏擢在察視之官職任過分當刺斜矯枉詔書示官府曰璩盡節剛正亦何陵遲之有賜璩素六十匹由是顯名案范書闕杜篤杜篤與美陽令交遊數從請託不諧頗相恨令怒收篤送京師會大司馬吳漢薨世祖詔諸儒誄之篤于獄中為誄辭最髙帝美之賜帛免刑案篤字季雅杜陵人以文免刑乃得帝王知已大為文士吐氣范同張玄張玄字君夏欲專意經書方其講問乃不食終日忽然如不飢渴案玄河內河陽人少習春秋顔氏兼説嚴氏宣氏也范同張玄字居真為博士其學兼通數家案玄不應有二字居類君真類夏傳寫誤耳郭賀郭賀為荆州刺史治有殊政顯宗巡狩賜以三公之服黻冕之旒案賀字喬卿雒陽人范下有敕行部去襜帷使百姓見其容服以彰有德數語附蔡茂傳丁恭上封功臣皆為列侯大國四縣餘各有差博士丁恭等議曰古帝王封諸侯不過百里故利以建侯取法于雷強幹弱枝所以為治也今封諸侯四縣不合法制上曰古之亡國皆以無道未嘗聞功臣地多而滅亡者乃遣謁者即授印綬案恭字子然山陽東緡人建武二十年拜侍中見范儒林傳隂傅隂傅封濦強侯七年以濦強屬西徙封于丹陽為期思侯案傳范作傳隂興仲子范略蘇竟蘇竟與劉歆子恭書曰前世以磨研編簡之才與國右史公從事出入者惟硯也案竟字伯况扶風平陵人此見藝文類聚隸硯事內似非無據今范書載竟書云君執事無恙走昔以摩研編削之才與國師公從事出入校定祕書云云覽其文義似為得之不知率更何所本而謬誤若此國師公指歆為王莽國師也國右史公殊難解又范作竟與劉歆兄子龔書今本書作歆子恭又異但范又稱向曽孫名龔未知孰是後漢書補逸卷四

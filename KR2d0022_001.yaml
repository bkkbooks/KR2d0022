body:
  text: 後漢書補逸卷一監察御史姚之駰撰東觀漢記第一光武皇帝光武隆凖日角大口美鬚眉身長七尺三寸案世祖龍章鳳質同符髙祖有非常之略必有非常之貌也相又先觀其面貌再度其短長乃有次第范紀語語倒置遜本書逺矣袁宏記與此同帝髙祖九世孫出自長沙定王王生舂陵節侯舂陵本在零陵郡節侯孫孝侯以土地下濕元帝時求封南陽蔡陽白水鄉因故國名曰舂陵帝生濟陽時先是有鳳凰集濟陽故宫中皆畫鳳凰聖瑞始於此案是時南頓君為濟陽令光武生于縣舍也光武在舂陵時望氣者言舂陵城中有喜氣曰美哉王氣鬱鬱蔥蔥案范書望氣者蘇伯阿初光武適新野聞隂后美心悅之後至長安見執金吾車騎甚盛因嘆曰仕宦當作執金吾娶妻當得隂麗華案此見范隂后紀光武初起無馬騎牛殺新野尉乃得馬案世祖雖出自髙帝實與崛起者等卒乃芟除羣豪光復舊物較之一成一旅而中興者其難易何如也帝為季父故舂陵侯詣大司馬嚴尤府訟地皇元年十二月壬寅前租二萬六千斛芻藳錢若干萬時宛人朱福亦為舅訟租于尤尤止車獨與上語不視福上歸戲福曰嚴公寧視卿耶案嚴尤塵埃物色特具隻眼後乃與王邑輩共攻昆陽不為從龍之彥何也朱福即朱祐更始害齊武王光武飲食語笑如平常獨居輒不御酒肉枕席有涕泣處案范紀有不敢為伯升服喪語史體也不如此文以隱躍生妙雜見馮異傳上聞王郎兵至後驚去至南宫天大雨上引車入道旁空舍竈中有火馮異抱薪鄧禹吹火上對竈炙衣案此亦見異傳想見道旁舍中真主名世相向燎火千載如畫故趙繆王子臨説光武決水灌赤眉案范書臨作林臨説既不行即詐立卜者王郎為天子愚矣上圍邯鄲未下彭寵遺米糒魚鹽以給軍糧由是破邯鄲光武至饒陽官屬皆乏食光武乃自稱邯鄲使者入傳舍傳吏方進人良從者飢爭奪之傳吏疑其偽乃椎鼓數十通紿言邯鄲將軍至官屬皆失色光武升車欲馳而懼不免還坐曰請邯鄲將軍入久乃駕去案時王郎購光武十萬戶於是趣駕南轅危急甚矣欲馳還坐以暇豫得全既而傳中人語門者閉之門者不可豈非呵護有神光武受尚書于中大夫廬江許子威資用乏與同舍生韓子合錢買驢令從者僦以給諸公費案范書帝之長安受尚書通大義已具治天下之略矣光武帝夜生時有赤光室中盡明如晝皇考異之使卜者王長卜之長曰此善事不可言是嵗有嘉禾生一莖九穗長大于凡禾縣界大豐熟因名上曰秀案此見范紀論中文較簡淨時南陽旱飢而上田獨收案范書地皇三年光武避吏新野因賣穀于宛即此時也更始立上為蕭王擊銅馬大破之乃受降王莽遣大司徒王尋大司空王邑將兵來征莽欲盛威武闕則虎豹犀象竒偉猛獸以長人巨無霸為中壘校尉秦漢以來師出未嘗有也時漢兵八九千人二公兵以五六十萬到遂環昆陽城作營且圍之數百重有流星墜尋營營中正晝有雲氣如壞山直下營中不及地尺而散吏士皆厭伏上選精兵三千人與戰大破之殺司徒王尋赴水溺死者以萬數滍水為之不流案范志晝有雲氣墮軍上名營頭星主覆軍後王尋旋敗死王邑還長安莽敗亦誅死即其應也水經曰滍水出南陽魯陽縣經昆陽城初伯升之起也諸家子弟皆亡逃自匿曰伯升殺我及世祖至綘衣大冠將軍服乃驚以為非獨伯升如此謹厚者亦為之案范書無將軍服三字帝時無印得定武侯家丞印佩之入朝案范書此時立劉聖公為天子光武為太常偏將軍光武初起義兵與諸季市弓弩皆著絳衣赤幘光武破聖公與朱然書曰交鋒之日神星晝見太白清明案范書不載更始以上為大司馬遣之河北安集百姓破邯鄲誅王郎入官收文書尋得吏民謗毁上言可擊者數千章上會諸將燒之曰令反側子自安也案蕭王推心置人腹中故燒謗毁千章然亦有駕馭之術焉新破城邑不如是人心不定否則必殺己降矣安反側子即所以安天下也上至邯鄲趙王庶兄胡子進馬醢上歸舊廬望見廬南有火光以為人持火呼之光遂赫然屬天有頃不見上異之諸將請上尊號初王莽時上與伯叔及姊聓鄧晨穰人蔡少公坐語少公道讖言劉秀當為天子或曰是國師劉子駿也上戲曰何由知非僕也坐者皆大笑時傳聞赤伏符不見文章軍中所上未信到鄗上所與長安同舍諸生強華自長安奉赤伏符詣鄗與上會羣臣復伏固請乃命有司設壇于鄗之千秋亭六月即皇帝位案光武乘時正號以慰攀鱗附翼之儔本屬至正乃以赤伏符即位強華腐儒適為盛德纍耳帝使劉終偽稱江夏吏誘殺湖陽尉案范書光武起兵初屠唐子鄉又誘殺湖陽尉雜以詐力故不能比隆三代帝仁智明達多權略樂施愛人在家重慎畏事勤于稼穡兄伯升好俠笑上事田作比之髙祖兄仲髙才好學然亦喜遊俠鬭雞走馬具知閭里姦邪吏治得失時會朝請舍長安尚冠里光武起義兵攻南陽暮聞冡上有哭聲後有人著大冠絳單衣王尋王邑圍昆陽光武將步騎千餘前去大軍四五里而陳尋邑亦遣兵數千合戰光武奔之斬首數十級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也案此乃中興第一捷自此威名立矣劉將軍豈匹夫勇哉見小則怯所以全身見大則勇所以安天下諸將勸光武立乃召馮異上曰我夢乘龍上天覺寤心中動悸異因下席再拜賀曰此天命發于精神心中動悸大王重慎之性也異遂與諸將定議上尊號案范書見馮異傳時乘以御光復中興飛龍在天遂發明王之夢豈偶然哉詔曰馮異軍雁門闕卒萬餘人降之世祖時有獻名馬寶劔值百金馬以駕鼓車劔以賜騎士案此見范循吏傳序一本作屠耆國獻大會真定王自擊築建武二年天下野穀旅生麻菽尤盛案范書同注云旅寄也不因播種而生今字書作穭想古字通耳建武三年幸舂陵祠園廟大置酒與父老故人相樂十九年幸汝南頓丘令舍大置酒賜吏民復南頓田租一年案世祖行幸故鄉不續唱大風歌是其識髙處郟縣有鳳髙八尺五采羣鳥並從行列蓋地數頃停一十七日案此建武十七年事郟屬潁川郡范云有五鳳五年初起太學諸生吏子弟及民以義助作上自齊歸幸太學賜博士弟子案時齊地初平上自齊歸即汲汲于幸學深得止戈之義綱目書初起太學帝還視之易幸為視從古也陸機洛陽記曰太學在洛陽城故開陽門光武封新野主子鄧泛為吳房侯伯父姊子周均為富波侯追封外祖樊重為夀張侯重子丹為射陽侯孫茂為平望侯囗彛鄉侯從子沖更父侯后父隂隆宣陽侯子識原鹿侯就為信陽侯皇考女弟子來歙征羌侯弟由宜西侯以寧平公主子李雄為新市侯后父郭昌為陽安侯子㳘綿曼侯兄子竟新郪侯匡發干侯以姨子馮邯為鍾離侯上以天下既定思念欲完功臣爵土不令以吏職為過故皆以列侯就第案張南軒以為寇鄧馮賈之徒識明而行修正宜與共圖政光武之不任功臣殊非大公之義然其保全勳舊之意亦篤矣但不宜以吏事責三公耳光武閔傷前代權臣大盛外戚與政上濁明主下危臣子故后族隂郭之家不過九卿親屬榮位不能及許史王氏之半案世祖之于外戚貽謀最善而子孫紊制猶有召禍如梁竇者詔曰刺史太守多為詐巧不務實核苟以度田為名聚人田中并度廬屋里落聚人遮道啼呼案范書十六年河南尹張伋及諸郡守十餘人坐度田不實下獄死詔蓋為此也光武數召諸將置酒賞賜坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘間講經藝案光武投戈講藝與髙祖溺冠嫚罵者其優劣不辨自明建武二十五年烏桓獻貂豹皮詣闕朝賀中元元年上幸長安祠長陵還洛陽宫是時醴泉出于京師郡國飲醴泉者痼疾皆愈獨眇蹇者不瘥案尚書中候日俊乂在官則醴泉出是時中興名佐師師備朝宜有此瑞有赤草生于水涯郡國上甘露降羣臣上言地祇靈應而朱草萌宜命太史撰具郡國所上上不聽是以史官鮮紀案光武情存損挹郡國上瑞輒抑而不當蓋懼為諂子嗤耳謙沖之德千載美焉賢于史官之紀逺矣上以日食避正殿讀讖多御坐廡下涉露中風發疾苦眩甚左右有白大司馬吏病苦如此不能動搖自強從公出乘以車行數里病差四月二日車駕宿偃師病差數日入南陽界到葉以車騎省留數日行黎陽兵馬千餘匹遂到章陵起居平愈案世祖每日食即下詔求直言至是復避正殿冒風露可謂敬天矣中元元年初起明堂靈臺辟雍及北郊兆試宣布圖讖于天下案光武起三雍之儀復先代之典皇乎中興盛事也乃雜以圖讖豈非明德之疵明帝建武四年皇子陽生豐下鋭上顔赤色有似堯上以赤色名之曰陽年十三通春秋上循其頸曰吳季子案明帝諱陽一名莊袁書載之范書直作莊時東海王強己立為太子吳季子之稱胡為來哉廢立之事萌于循頸矣范作十嵗通春秋餘闕明帝以東海王立為皇太子治尚書備師法兼通四經略舉大義博觀羣書以助術學案顯宗是時師桓榮通尚書也孝明帝世祖中子也母光烈皇后初讓尊位為貴人故帝年十二以皇子立為東海公三嵗進爵為王幼而聰明睿智容貌壯麗世祖異焉數問以政議應對敏逹謀慮甚深溫恭好學敬愛師傅所以承事兄弟親密九族內外周洽世祖愈珍上德後立為皇太子案顯宗育質青宮實以德見重非潛謀奪嫡者故本書詳載之建武時天下墾田不實詔下州郡檢其事帝見陳留吏牘上有書曰潁川𢎞農可問河南南陽不可問帝詰吏吏抵言于長夀街得之帝怒時明帝年十二在幄後曰吏受郡敕當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖帝令詰問乃首服如顯宗言案國法之行必始于貴近勳戚近臣田宅踰制至不可詰問制何以立法何以行東海公知之矣明帝光武第四子隂后所生即阼長思慕至踰年正月當謁原陵夢先帝太后如平生歡朝率百官上陵上伏御牀視太后鏡奩中物感動悲涕令易脂澤粧具左右皆泣莫敢仰視明帝夜夢見先帝太后覺悲不能寐明旦上陵樹葉有甘露上令百官採之案孔子稱舜五十而慕可知慕為孝之至明帝即阼以後思慕日深至夜卜諸夢寐其慕也其孝也文亦寫得精彩極腴極古明帝幸南陽舊宅召校官子弟作雅樂奏鹿鳴上自御塤篪和之以娛嘉賔案此永平十年南巡事范同元年營造明堂辟雍靈臺案諸儒及舊説皆以明堂辟雍靈臺三事不同明堂宗祀之所辟雍教導之所靈臺候望之所三輔黃圖以為明堂辟雍同管子以為明堂靈臺同蔡雍直以明堂清廟辟雍太學為一地其説小異今此營造分列其名即明三事不同也自光武末書起三雍至是益甚古典之復非二主後先表章之功乎永平十三年二月耕藉田畢賜觀者食有一諸生前言善哉文王之遇太公也上書版曰生非太公豫亦非文王案腐儒妄自夸大書版二言偉哉人君之度也范不載帝至長安有三老上章云見陛下甚喜帝令上殿欲觀上衣因舉虎頭衣以畏三老帝幸南陽所在見吏勞賜步行觀部署不用輦永平六年廬江出寶鼎太守王雄獻之納于太廟詔曰易鼎足象三公豈非公卿奉職得其理乎案范書作王雒山出寶鼎廬江太守獻之注云雒或作雄不知何以與本書舛誤若此顯宗西巡三老懷章大言上曰屬者所言削章不如飽飯案帝書恢而謝諸生削章以戲三老步曽却輦畏只觀衣想見宸逰偕樂視民如子景象明帝封太后弟隂興為鮦陽侯子傳隱強侯隂盛為無錫侯楚王舅子許昌龍舒侯帝作夀陵制令流水而已陵東北作廡長三丈五步外為小厨財足祠祀案明帝允恭克儉省薄墳陵漢文之後一人而已帝于皇子之封皆減舊制嘗案輿地圖皇后在傍言巨鹿樂成廣平各數縣租穀百萬帝食滿二千萬止諸小王皆當略與楚淮陽相比什減三四我子不當與先帝子等者也案范明德后紀云帝將封王子悉半諸國后以為言帝曰我子豈宜與先帝子等乎文較明淨夫諸王非后出而請益封帝不敢與先帝子同而儉其制孝慈之德並卓千古永平二年正月辛未宗祀光武于明堂祀畢升靈臺望雲物大赦天下永平二年十一月詔京兆右扶風以中牢祀蕭何霍光出郡錢穀給蕭何子孫在三里內者悉令侍祠案范書有帝幸園陵過式其墓二語漢與功臣不薄此言惟東京當之章帝章帝明帝子也以至孝稱孜孜膝下案范論稱帝奉承明德太后盡心孝道蓋雖帝天性亦顯宗之錫類深也元和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而又不及亡命未發覺者郭躬上封事曰伏惟大恩莫不蕩宥罪死以下並蒙更生而亡命捕得獨不霑澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益于邊上善之即下詔赦焉案時因改元故下赦書也范但記亡命者贖各有差不詳元和二年二月帝東巡狩泰山至于岱宗祡望秩山川羣神大赦天下祀五帝于汶上明堂耕於定陶案范書同章帝賜尚書劍各一手署姓名韓稜楚龍泉郅燾蜀漢文陳寵煆成一室兩刃其餘皆平劍其時論者以為稜淵深有謀故得龍泉燾明逹有文章故得文劒寵敦朴有善于內不見于外故得煆成劒皆因名而表意案孝章以明帝苛切事從寬厚故明良交泰有三代風賜劒而手署姓名各當其才則隨材器使之之道在是矣史稱帝素知人信哉范載韓稜傳中煆成作椎成章帝元和二年鳳凰三十九麒麟五十一白虎二十九黃龍四青龍黃鵠鸞鳥神馬神雀九尾狐三足烏赤烏白兔白鹿白燕白鵲甘露嘉瓜秬秠明珠芝英華蘋朱草連理實日月不絶載于史官不可勝紀案人主侈言符瑞則禎祥入告者踵接矣章帝十三年中符應幾數百千得母為諂子笑乎帝至岱宗祡望畢白鶴三十從西南來經祀壇上案范紀作黃鵠三十和帝孝和皇帝章帝中子也上自岐嶷至于總角孝順聰明寬和仁孝帝由是深珍之以為宜承天位年四嵗立為太子初治尚書遂兼覽書傳好古樂道無所不照上以五經義異書傳意殊親幸東觀覽書林閲篇籍朝無寵族惠澤沾濡外憂庶績內勤經藝自左右近臣皆誦詩書德教在寬仁恕並洽是以黎元寧康萬國協和符瑞八十餘品帝讓而不宣故靡得而紀案此係本書論贊范但録符瑞三言而已九年冬十月改殯梁皇后于承光宫儀比敬園初后葬有闕竇后崩後乃議改葬案范書改葬恭懷梁皇后于西陵十年五月京師大雨南山水流出至東郊壞人廬舍案前三月已下修利隄防之詔而水災仍至壞廬舍則有司奉法之不行也九真言嘉禾生禾百五十六本七百六十八穗元興元年五月右扶風雍地裂和帝召諸儒魯平與侍中賈達尚書令黃香等相難平善對事罷朝特頒賜履襪案和帝雅好書史故命諸儒論難帝親裁焉東京文治于斯為盛孝和元年詔有司京師離宫園池悉以假貧人和帝二年二月壬午日食時史官不覺涿郡言之六月雨雹大如雁子單于乞降賜玉具劒羽蓋車一駟中郎將持節衛護焉案時丐奴右谷蠧王於除鞬自立為單于因款塞也秭歸山髙四百餘文崩填溪水壓殺百餘人案秭歸縣屬南郡古之夔國安帝安帝延光三年黃龍見歷城又見諸縣永初七年郡國蝗飛過案范紀是時京師大風蝗蟲飛過雒陽安帝即位以來災異仍興殆無虛月蓋桓靈之變先兆之矣永初元年徼外羌龍矯等六種慕義來降二年徼外羌薄申等八種舉衆降案此皆蜀郡徼外也新城山泉水大出突壞人田水深三丈二年六月雨雹大如芋魁雞子風拔樹發屋案范書時京師及郡國四十大水又大風雨雹三年雁門烏桓及鮮卑叛五原郡兵敗于髙梁谷案髙梁范作高渠梁渠字傍必有一訛六年正月甲寅皇太后率大臣命婦謁宗廟案范書作七年春正月庚戍章懷注云續漢袁山松謝沈書古今注並同東觀則范之誤可知新野君薨贈以玄玉赤綬賻錢三千萬布三萬匹案新野君隂氏和帝廢后鄧太后愍之生則湯沐供邑殁則賻贈有加厚德載福符于坤寧者也漢陽人杜琦反自稱安漢將軍漢陽故吏杜習手刺殺之日南地坼長八百十里廣五十六里安定太守杜恢與司馬鈞等并威擊羌恢乘勝深入為虜所害鈞擁兵不救收下獄案時右扶風仲光虎牙都尉耿溥同杜恢擊先零大敗並殁鈞未嘗與戰故下獄自殺虔人種羌大豪恬狼等詣度遼將軍降案此元初四年事護羌校尉任尚之功也順帝元年太傅馮石太尉劉熹以阿黨權貴李郃以人多疾疫免案范書皆不載䇿免之由本書甚詳陽嘉二年汝南童子謝亷河南童子趙建年十二各通一經以太學初繕應召而至皆除郎中案順帝改元太學新成除郡國耆儒補郎舍人二年復除京師耆儒年六十以上者豈童子亦隨其後耶范不載四年太尉劉光司空張皓以隂陽不和久託病䇿免司徒許敬為陵轢使官䇿罷以千石祿終身案䇿罷而以千石祿終身漢之待大臣思渥如此永建四年漢陽太守文襲獻大珠順帝詔曰海內頗有災異而襲不推忠竭誠而喻明珠之瑞以求媚令封珠却還案帝可謂不貴異物矣宜葉調疏勒貢獻遠將也望都蒲隂狼殺女子九十七人為不祠北嶽所致詔曰政失厥中狼災為應至乃戕食孤幼博訪其故山嶽尊靈國所望秩而比不奉祠淫刑放濫害加孕婦也案望都縣名章帝改曲逆為蒲隂俱屬中山國時朱遂為中山相故詔責之范書不載失祠北嶽事六年葉調國王遣使師會詣闕貢獻以師會為漢歸義葉調邑君賜其君紫綬及撣國王雍由亦賜金印紫綬案葉調日南徼外國也疏勒國王盤遣使文時詣闕獻師子封牛師子似虎正黃有􅐖耐尾端茸毛大如斗封牛其頷上肉隆起若封然因以名之即今之峯牛案峯牛字甚新四年太尉施延以選舉貪汚䇿罷案延字君子靳縣人詔曰朕以不德謫見于天零陵言日食京師不覺案永和元年詔稱日變方逺指此漢安元年以遠近獻馬衆多園廄充滿始置承華廄令秩六百石九江賊馬勉敗死傳勉頭及所帶玉印鹿皮冠黃衣詣洛陽詔懸夏城門外章示百姓有司奏言孝順皇帝𢎞秉聖哲龍興統業稽乾則古欽奉鴻烈寬裕晏晏宣恩以極躬自菲薄以崇玄默遺詔貽約顧念萬國衣無製新玩好不飾塋陵損狹不起寢廟遵履前制敬敕慎終有始有卒孝經曰愛敬盡于事親而德教加于百姓詩云敬慎威儀惟民之則臣請上尊號曰敬宗廟天子世世獻奉藏主祫祭進武德之舞如祖宗故事露布奏可案此奏語似頌似贊饒有古韻范不載夫安帝涼德故陟方無上宗之奏後以故事因其陵號亦稱恭宗則稱宗不足據矣敬宗之宗亦猶是也後蔡雍等始奏毁不應為宗者詳袁書桓帝桓帝延禧元年置鴻德苑案范書作置鴻德苑令蓋苑成而置令也帝即位太后猶臨朝御卻非殿案孝桓時年十五梁太后立之猶臨朝也去和熹稱制遠矣桓帝好音樂善琴笙案元夔夔稱徽宗多能惟一事不能漢桓似之延夀七年十月上幸雲夢至新野公主夀張敬侯主廟詔曰存善繼絶實藉德貞武騎都尉樊演髙祖父重以光武皇帝元舅扶助中興追封夀張侯諡曰敬祖父茂封冠軍平望鄉侯五國並建其二絶者祠之靈帝會稽許昭聚衆自稱大將軍立父生為越王攻破郡縣案此熹平元年事范略使中郎將堂溪典請雨因上言復崇髙山為嵩髙山案前書武帝祠中嶽改嵩髙為崇髙也有白衣人入德陽殿門言梁陌夏教我上殿與中黃門桓賢語因忽不見案此亦見范紀甚略有黑氣墮所御溫明殿庭中如平蓋隆起奮迅五色有頭體長十餘丈形貌似龍案此光和元年事溫明范作溫德亦不詳載靈帝弄狗駕驢荒于獸矣宜貌龍之見也靈帝鑄黃鐘二千斛懸于嘉德端門內案范書帝修玉堂殿鑄銅人四黃鐘四即此後漢書補逸卷一

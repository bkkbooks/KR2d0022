  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0022_WYG_017-1a, image: WYG0402/WYG0402-0539a.png}
body:
  text: 後漢書補逸卷十七監察御史姚之駰撰袁嵩後漢書第一光武皇帝光武封泰山雲氣成宫闕案世祖封禪事詳見東觀記雲氣語甚藻麗與嵩呼萬嵗同而詞人罕用之當由未見袁書耳前漢自成哀以下天地縱橫巨猾竊命劉氏舊澤猶存而瞻烏之望殆絶世祖以渺渺之𦙍起白水之濵身屈無妄之力位舉羣賢竝列於時懷璽者十餘建旗者數百髙才者居南面疾足者為王公茫茫九州瓜分臠切湣湣蒼生塵消鼎沸我扇之以仁風驅之以大威雪霜被而茨棘枯橫網振而逆鱗掃羣材畢凑人鬼與能數年之間廓清四海雖曰中興與夫始創業者庸有異乎誠哉馬生之言固已寥廓大度同符髙祖又等太宗之仁兼孝宣之明一人之體其殆於周故能享有神器據乎萬乘之上矣案斯論詞乃勝意竟入六朝體矣唐太宗作司馬書論贊乃全用駢句益不足觀明帝明帝諱陽一名莊字子麗案范書直作諱莊亦不載帝字靈帝光和四年帝於西園弄狗以配人案靈帝曽以帶綬冠狗矣今復以配人何寵狗乃爾也蔚宗以為在位者皆如狗噫狗茍固如是耶賈復賈復從擊鄧奉追至夕陽聚案復己見范志宛有夕陽聚即此耿弇弇少學詩禮明鋭有權謀案弇己見范稱弇父況以明經起家弇少習父業可稱肖子帝使光祿大夫樊宏詔況曰惟況功大不宜監察從事邊郡寒苦不足久居其詣行在所案況據上谷本與彭寵同功恐上疑之子弇因求徴還故上遂遣使持節迎況亦防之也張步至臨淄大城東將攻弇弇上書曰臣據臨淄深塹髙壘張步從劇縣來攻疲勞饑渴欲進誘而攻之欲去隨而擊之臣依營而戰精鋭百倍以逸待勞以實擊虛旬日之間步首可獲上是其計案弇後果大破步兵光武稱其有志者事竟成宜哉此疏精悍簡老直是名作當與其用兵同范不載宋𢎞宋𢎞為司空秉政恭約輕財重義有公儀之風不與民爭利案𢎞己見伏湛伏湛建武二年拜尚書典定舊制案湛己見光武知湛名儒舊臣欲令幹任內職故然隗相隗相養母至孝母好飲江流相常隆冬取水後一朝橫石浮江無有難涉由是顯名案范書闕此當入孝弟諸賢傳中侯霸侯霸拜大司徒矜嚴有威容奉公無私案霸己見韓卓韓卓字子助陳留人臘日奴竊食祭其先人卓義其心即日免之案范書闕觀過知仁子助有焉陶靖節云奴婢亦人子也同為人子自同有祭先之義陶應從此看出羅威羅威母年七十天寒常以身溫席而後授其處案范書闕禮記云八十非人不暖注云人謂子孫也此語詮解最妙威固得之楊終時蜀郡有雷震決曹楊終上白記以為斷獄煩苛所致太守乃令終賦雷電之意而竒之案終字子山蜀郡成都人范稱其年十三為郡小吏太守竒其才不詳載則白記時終年才舞勺耳侍中賈逵薦終博達忠直徴拜郎中及卒賜錢二十萬案終前拜校書郎與諸儒于白虎觀論五經同異屢遭擯斥永元中復以逵薦拜郎中也徐璆璆少履清髙立朝正色稱揚後進惟恐不及案璆字伯玉廣陵海西人徐淑子王充王充字仲任會稽上虞人充幼聰明詣太學觀天子臨辟雍作大儒論案充己見充所作論衡中土未有傳者蔡雍入吳始得之恆祕玩以為談助其後王朗為會稽太守又得其書及還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益由是遂見傳焉案論衡好為辨駮時多沾滯不知當時何以推重若此抱朴子云人搜求蔡雍帳中隱處得論衡數卷抱持去雍丁寧日惟我與爾共之勿廣也噫何其雄視仲任而于中郎蔑如也朱穆穆著論甚美蔡雍嘗至其家自寫之穆感時澆薄慕尚敦篤乃作崇厚論案穆己見蔡中郎既祕王充論衡又寶公叔之論其好學如此非獨天分超絶也穆卒蔡雍與門人議曰魯季文子君子以為忠而諡曰文子又傳曰忠文之實也忠以為實文以彰之遂共諡曰文忠先生荀爽聞而非之案文忠議詳見張記吳祐吳祐舉孝亷將行郡中為祖道祐越壇共小吏雍丘黃真歡語移時與結友而别後真亦舉孝亷案祐己見楊震楊震好學講書有鸛雀銜三鱣魚飛集講堂前都講進曰蛇鱣者大夫之象也數三者法三台也先生自此升矣案震己見鸛范作冠注云即鸛雀也又章懷注云續漢及謝承書鱣字皆作鱓然則鱣鱓古字通耳韓子云鱣似蛇郭璞云鱓魚長二三丈此明云蛇鱣而鸛雀又無勝巨魚之力其為鱣明矣大夫之象范作即大夫服之象蓋以鱣黃地黑文故云此有脫字岑晊岑晊有髙才郭林宗朱公叔等皆為友李膺王暢稱其有幹國器雖在閭里慨然有董正天下之志太守𢎞農成瑨下車欲振威嚴聞晊名請為功曹案晊字公考南陽棘陽人時謡云南陽太守岑公孝𢎞農成瑨但坐嘯因此流言轉入太學黨禍實始於此任隗任隗為司空以𤣥默守真不求名譽義行內修人以此服之案范書闕劉虞太尉劉虞讓位於羊續續不能輸禮錢遂不代虞案虞己見范稱虞儉素為操冠敝不改乃就補其穿其清風亞於羊興祖也羊續靈帝欲以羊續為太尉時拜三公者輸東園禮錢千萬令中使督之續乃坐使者于單席舉緼袍以示之曰臣之所資惟此而已故不登公位案續己見此所記與謝書同賈彪賈彪字偉節遊京師與郭林宗李元禮等為談論之首一言一行天下以為準的黨事起彪謂同志曰吾不西行大難不解即入關設方略天子為之大赦案彪己見偉節之功大矣李膺有言吾得免此賈生之謀也何況餘子耶一人逃死禍及萬家同歸于盡究之何益明熹宗時東林黨禍略同漢季使其時有如偉節者為之救援則諸賢之被難不至如是之酷也竇憲憲日益橫盡樹其私人於名都大郡河南尹王調漢陽太守朱厰南陽太守滿殷髙丹等皆其賔客案憲己見楊匡匡一名章字叔康案匡陳留人杜喬故掾喬被禍匡往守衛尸喪詳見謝書范作楊匡謝作楊章俱不載其字應奉奉又刪史記漢書及漢紀三百六十餘年自漢興至其時凡十七卷名曰漢事案奉己見范稱奉著漢書後序多所述載豈即此書耶後世大事記及記事本末諸書皆祖述世叔者也劉洪劉洪字元卓泰山蒙隂人魯王之宗室也延熹中以校尉應太史徴拜郎中遷常山長史以父憂去官後為上計掾拜郎中檢東觀著作律厯記遷謁者榖城門候會稽東部都尉徴還未至領山陽太守卒官洪善算當世無偶作七曜術及在東觀與蔡雍共述律厯記考驗天官及造乾象術十餘年考驗日月與象相應皆傳於世案范律厯志熹平中常山長史劉洪上作七曜術甲辰詔屬太史光和二年尚書召榖城門候劉洪敕曰前郎中馮光司徒掾陳晃各訟厯故議郎蔡雍共補續其志今洪其詣修與漢相參云云即此也後世自元郭守敬輩以善算驗天文其儀器極為巧密至西人利瑪竇入中國而推算之巧益過前人今上聖明天縱凡三角句股之法推算精密逺出尋常萬萬雖有天文生日習算法無能仰窺竒祕者治厯明時超前代逺矣范冉冉去官嘗使兒捃拾麥得五斛鄰人尹臺遺之一斛囑兒莫道冉後知即令并送六斛言麥已雜矣遂擔不肻受案冉謝書作丹時遭黨禁故推鹿車載妻子捃拾自資而清介仍若此非恆人也范不載沮俊俊為李傕所殺時年二十五其督戰訾寶負其尸而瘞之案俊時為射聲校尉衛乘輿東還傕汜兵來追因罵賊而死後贈𢎞農太守以旌之見袁宏紀范亦略見董卓傳中盧植尚書盧植將終敕其子彄以禈葬以土穴其子從之案植字子幹涿郡涿人馬融髙弟子范稱植葬不用棺椁附體單帛而已此云彄以禈考說文彄弓弩專弦所居也又西京雜記戚姬以百錬金為彄環無關附身之義豈植但以禈纒束假此為解耶植子育甚知名劉陶劉陶字子竒拜諫議大夫是時天下日危冦賊方熾陶憂致崩亂疏陳八事大較言天下大亂皆由宦官詔收陶繫黃門北寺獄陶對使者曰恨不與伊吕同儔而以三仁為輩遂閉氣而死案陶一名偉潁川潁隂人善著述有中文尚書七曜論匡老子反韓非復孟軻諸書行世范同王允王允字子師世仕州郡為冠蓋同郡郭林宗見而竒之曰王生一目千里王佐才也遂與之友善允仕至司徒案允己見目或作日李傕等兵入城王允奉天子保宣平樓允謂傕等曰臣無作威作福將軍乃放縱欲何為乎傕等不應自拜署傕為揚武將軍汜為揚烈將軍樊稠等皆為中郎將案此見范董卓傳李郭之變實允不善撫輯所致然元凶之誅天下快心功大罪小君子諒之蔡雍雍等以和帝以下功德無殊而有過差不應為宗及餘非宗者追尊三后皆宜毁之因奏議曰漢承亡秦滅學之後宗廟之制不用周禮每帝即位世輒立一廟不止於七不列昭穆不定迭毁元皇帝時丞相匡衡御史大夫貢禹始建大議請依典禮孝文孝武孝宣皆以功德茂盛為宗不毁孝宣尊崇孝武厯稱世宗中正大臣夏侯勝等猶執異議不應為宗至孝成皇帝議猶不定太僕王舜中壘校尉劉歆據不可毁上從其議古人據正重順不敢私其君若此其至也後遭王莽之亂光武皇帝受命中興廟稱世祖孝明皇帝聖德聰明政參文宣廟稱顯宗孝章皇帝至孝蒸蒸仁恩博大廟稱肅宗皆方前世得禮之宜自此以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而已臣下懦弱莫能執夏侯之直今聖朝尊古復禮以求厥中誠合禮議元帝世在第八光武世在第九故以元帝為考廟尊而奉之考明遵述亦不敢毁孝和以下穆宗威宗之號皆省去五年而再殷合食於太祖以遵先典議遂施行案雍己見范祭祀志載獻帝初平中相國董卓左中郎將蔡雍等奏毁廟議不載此疏蓋是時卓枋國政其實雍主此議也夫禮祖有功而宗有德自殷世三宗創始遂相沿習至於東漢蔑不稱宗唐宋無論已明武熹二主亦皆稱宗其無足憑據蓋與諡號等耳子議父臣議君祖龍之言千載乃不敢易青史具在仁暴昭然文武聖神遂為故事毁廟何為袁紹袁紹字本初汝南汝陽人司空逢之孽子出後伯父成案范書紹父成五官中郎將紹豪俠得衆専霸諸州天下英雄蓋亦使君與操之亞晚年以內寵竝嫡旋至滅亡惜矣置郡建安二十年置漢寧郡案范書曹操破張魯定漢中時魯以五斗米教作亂朝廷不能討遂就拜魯鎮夷中郎將領漢寧太守當即以此時置也分郡興平元年分安定之鶉觚右扶風之漆置新平郡虎見光和三年正月虎見平樂觀又見憲陵上囓衛士火災延熹八年連月火災諸宫寺或一日再一發又夜有訛言擊鼓相驚陳蕃劉智茂上疏諫曰古之火皆君弱臣强極隂之變也前始春而獄刑慘故火不炎上前入春節連寒木冰暴風折樹又八九月州郡竝言隕霜殺菽春秋晉執季孫行父木為之冰夫氣𢎞則景星見化錯則五星開日月蝕為己然災異為方來恐卒有變必於三朝惟善政可以已之願察臣前言不棄愚忠則元元幸甚書奏不省案五行傳曰棄法律逐功臣殺太子以妾為妻則火不炎上謂火失其性而為災也時變蓋應此范不載陳劉疏河清建寧四年二月河水清禱於寵漯案黃河清聖人生靈帝以後其解安在此偶然耳無所禱也七大水中平五年山陽梁沛彭城下邳東海琅邪大水案范書郡國六水大出袁載七郡疑范誤如斗雹初平四年六月右扶風雹如斗殺人前後雨雹此最為大時天下潰亂案春秋考異郵曰隂氣之専精凝合生雹以妾為妻房袵之內施而不博隂精凝而見成此如斗之雹皆桓靈亂政所致至是見咎徴而漢隨亡矣六月寒初平四年六月寒風如冬時時帝流遷失政養奮對策曰當溫而寒刑罰慘也大水延平中六州河濟渭洛洧水盛長泛溢傷秋稼虹光和元年七月虹晝見御坐玉堂後殿前庭中色青赤案此己見薛書張記蔡雍以為此所謂天投霓引潛潭巴云虹出后妃隂脅王者又云五色迭至照于宫殿有兵革之事范以為其應在何皇后良然水暴出五月河東水暴出漂壞五百餘家案范但言山水不詳日重初平三年十月丁卯日有重兩倍案吳志載韓馥與袁術書云日重之徴凶出於代郡月重暈興平二年十二月月在太微端門中重暈二珥兩白氣廣八九寸貫月東西南北案范志載永夀延熹中皆有月蝕非其月文疑即同此火光延熹九年京都夜有火光民相驚譟是時宦豎専朝鈎黨事起上尋無嗣陳蕃竇武為曹節等所􅊣天下無復紀綱案范不載鈎黨之應不見咎徴所由大寒光和六年冬大寒北海琅邪井中冰厚尺餘是時羣賊起天下始亂䜟曰寒者小人暴虐専權居位無道有位適罰無法又殺無罪其寒必暴殺案五行傳曰聽之不聰是謂不謀厥咎急厥罰恆寒鄭康成曰聽曰水水主冬冬氣藏藏氣失故常寒木連理建和二年河東木連理營頭怪星晝行名曰營頭行振大誅案五行志營頭所墮其下覆軍王尋王邑兵圍昆陽晝有雲氣如壞山墮軍上即此也龍死延熹七年六月河內野王山有龍死長可百餘尺案范襄楷傳楷上疏言龍死事指此水溢曹操専政十七年七月大水有水溢二十四年漢水溢流害民人明年禪位于魏案范書以為此庶徴之恆寒也後漢書補逸卷十七

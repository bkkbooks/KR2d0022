body:
  text: 後漢書補逸卷十九監察御史姚之駰撰司馬彪續後漢書第二鍾離意鍾離意為棠邑令治有政化百姓懷附案意見東觀記鍾離意仕郡為督郵縣亭長有受雞酒者府下記案考之意以春秋先內後外詩云刑于寡妻以御于家邦明政化之本由近及逺今宜先清府內且濶逺縣細微之愆太守甚賢之遂任以縣事案俗吏苛察務刺聽細事以為能而于真貪大黷反置不問安得鍾離尚書一正之馬嚴馬嚴字威卿拜御史中丞賜冠幘衣服車馬嚴舉劾案章申明舊典奉法察舉無所回避百僚憚之案嚴見東觀記桓榮榮字子春少學長安習歐陽尚書上召榮令説尚書甚善之拜為議郎賜錢十萬使入授太子甚見尊重每朝會上輒令榮于公卿前説經因問長安時舊事上曰得卿幾晚案榮見東觀記范同榮為博士之官車駕親幸儒者髙之榮本齊人遷于龍亢至榮六葉案龍亢屬沛郡王良王良字仲子拜大司徒司直在位恭儉妻子不入官舍布被瓦器無兼膳節儉過度案良見東觀記王良遷沛郡太守稱疾不之府官屬皆隨就之良遂上疾篤乞骸骨案良以疾留而屬吏乃隨就之是率一郡而路也非乞骸一奏能無養髙之譏鄭興鄭興為太中大夫數上便宜多見用朝廷每有大議輒訪焉其論説依經守正衆莫能屈案興見東觀記耿國耿國字叔慮為大司農曉邊事能論議數上便宜事天子器之案國見東觀記世祖立南單于而烏桓鮮卑保塞自守顯宗置度遼將軍左右校尉而逃亡絶皆國之策也慮東觀作憲耿國為黃門郎疏敏有識于時見問常多合意上以為能案此乃國初入侍時事祭彤祭彤為太僕卿朝廷聞彤素清有道而衣無兼副有功效拜之日賜錢百萬馬三匹衣被刀劍下之杯案食物無不悉備上常歎之以為可屬大任案彤見東觀記彤守遼東幾三十年乃徵為太僕而清約若此非矯儉也祭彤除偃師長視事五年縣無盜賊州課第一遷襄賁令時盜賊抄掠彤到官誅姦猾縣界清淨詔書增秩一等賜縑百匹策書勉勵案范同魯恭魯恭為中牟令有亭長借牛不還主訟之恭敕令還牛亭長仍不還恭歎曰化不行也欲解印綬去掾吏共留亭長慙還牛不敢欺也案恭見東觀記此條文筆沓挹不如范書徑悍有嘉禾生恭便坐庭中恭謙不矜功封以言府府即奏上尹以檄勞曰君以名德久屈中牟物産之化流行天降休瑞應行而生尹甚嘉之案庭中何以産嘉禾其事甚異范同魯恭遷光祿勳選舉清平京師貴戚莫能枉其正魯恭疏曰夏至之日施命令止四方行者所以助微陰也行者尚止之况于逮召考掠奪其時耶案漢法冬至前斷獄自和帝末下令麥秋得案驗薄刑而州郡或遂盛夏斷獄故恭上疏諫之今制決罪以冬至前而情罪重大依律立斬者則決不待時至于薄刑亦有熱審減等之例蓋仁義兼至也魯恭為中牟令導民以孝推誠而治建中初郡國螟傷稼犬牙緣界不入中牟河南尹袁安疑其不實遣仁恕掾肥親往察驗之恭隨行阡陌俱坐桑下有雉止其旁有童兒親曰何不擊之兒曰雉方將雛親瞿然而起與恭訣曰所以來者欲察治之善惡耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者可還府以狀白安美其治以勵屬縣案察驗似公移字范作廉字佳察治之善惡亦不若范作察君之政迹為無痕也又官司文移察字竟作查字不知起于何時于字義毫無涉邇年來因題定皆改用察字查行曰察行查收曰察收恭坐族弟𢎞農都尉炳事免官案時恭方代吕蓋為司徒也張湛張湛字子孝拜光祿勳光武臨朝或有惰容湛輒陳諫其失常乘白馬帝每見湛輒言曰白馬生且復諫矣案湛見東觀記此條句斟字酌乃逺過之樊倏樊倏為長水校尉與公卿雜定郊祀禮儀以讖記正五經異説案倏字伯魚樊宏子范同張純張純字伯仁遷五官中郎將純在朝厯世明習故事建武舊章多闕每有疑議輒以訪純自郊廟昏冠喪紀禮儀多所正定帝甚重之案純見東觀記張純兼虎賁中郎將一日至數見持重慎密時上封事輒削去草清廉自守案善則歸君過則歸已人臣之義周書誥君陳以告內順外為良顯彼翹君過以沽直名者非忠也避人焚諫草純固純臣哉耿秉耿秉字伯初拜謁者僕射每公卿會議常引秉上殿訪以邊事多簡帝心案秉見東觀記秉好兵法常言以戰去戰盛王之道其副二竇北征功伐為多至會孫紀以誅曹而族雖云世忠將無天道之好還乎永平中召秉詣省闥問前後所上便宜方略牟融牟融字子優拜司𨽻校尉典司京師執直持平多所舉正百僚莫不敬憚案融見東觀記牟融舉茂才為豐令視事三年政化流行縣無獄訟吏畏而愛之治有異績為州郡最案融後位至司空舉動方正甚得大臣節蓋宰天下亦如為令時也封觀封觀當舉孝廉以兄名不顯恥受之稱疾不赴後數年兄得舉觀乃就録上郡案觀見謝書觀後隨太守以身殉難固悌弟而忠臣者與王元王元仕郡為主簿在朝正色舉善不避仇怨退惡不避親戚案此似又一王元非先仕隗囂後為漢將者范闕魯充魯充為博士受詔議立七部三雍大射養老案范書闕七部不知何解范張純傳有七經讖注云七經詩書禮樂易春秋及論語也疑即指此陳謙陳謙字伯讓拜御史中丞執憲奉法多所糾正為百寮所敬案謙見謝書伯讓作伯謙劉昆劉昆少學施氏易明帝為太子以易入授案昆見東觀記劉昆除江陵令時縣連火災昆輒向火叩頭多能降雨止風案桓公以誠動天故能反風滅火非如欒巴噀酒以術禁也趙喜光武徵趙喜引見賜鞍馬待詔公車案喜宜作熹引見事載范傳此誤楊仁楊仁字文義明帝時待詔補北宫衛士及帝崩時諸馬貴盛各爭欲入宫仁被甲持戟嚴勒門衛莫敢輕進案范書闕仁不過一衛士耳而身戢貴戚是臨大節而不可奪者梁松梁松為太僕永平二年為松請託郡縣事覺免案松字伯孫梁統子徐昉徐昉為尚書郎性惟周密畏慎在臺閣典職十年奏事三世未嘗有過案范書闕淳于恭恭字益孫遷侍中數侍清晏禮待甚優其所薦名賢無不徵用進對陳政皆本道德上未嘗不稱善案恭見東觀記其所本道德皆五千言緒餘耳然擾攘初定正當以清淨救之虞詡虞詡從弟遜客長沙詡迎與俱江水漲墮船詡投水中救之一浮一沒遇沙得皆不死案詡字升卿陳國武平人詡少孝養祖母縣舉順孫故能友愛若此虞詡以左雄有忠節上疏薦之曰伏見議郎左雄數上封事實有王臣蹇蹇之節宜擢在喉舌之官必有匡弼之益由是拜雄尚書案此見范左雄傳虞詡為武都太守始到郡穀石千鹽石八千見户萬三千視事三載米石八十鹽石四百流人還歸户數萬人足家給一郡無事案詡在武都既弭羌患又通水運故郡賴其利如此乃竟以坐法免何也下辨東三十餘里許有狹中當水泉生大石障塞水流每至春夏輒溢沒秋稼壞敗營郭詡乃使人燒石以水灌之石皆坼裂因鐫去石遂無泛溺之患案此詡守武都時事范略梁統梁統字仲寧拜太中大夫在朝廷數陳便宜以為法令既輕下姦不勝宜重刑罰以遵舊典案統見東觀記統性剛毅而好法律重刑一疏已為裔孫冀滅亡之基矣趙典趙典篤學博聞宜備國師案典見謝書初學記注曰國師即太師也趙典字仲經為大司農閉門却掃非德不交魯平魯平字叔陵遷中散大夫賈逵薦平道藝深明時見用復與黃散大夫數事上善平罷朝時賜冠幘衣履案平見東觀記平即魯恭弟丕丕事見後此列名又合東觀豈丕亦名平耶趙熹趙熹為太尉受遺詔典喪禮時承王莾之亂國無舊典皇太子與諸王等離止同席熹乃正色橫劒殿階扶下諸王以明尊卑案熹見東觀記離止范作雜止似誤張禹張禹字伯達拜太傅録尚書事劉蒼以殤帝初育欲令重臣居禁內乃詔禹舍宫中給帷帳牀褥大官朝夕進食五日一歸府每朝見特贊與三公絶席案禹見東觀記禹居禁內係鄧太后之詔此作劉蒼乃以三字誤成二字永興博雅而書鈔訛筆未能校正致千載鋟版皆訛校書之難若此張禹拜揚州刺史當濟江行部土人皆以江有子胥之神難于濟涉禹厲聲云子胥若其有靈知吾志在理察枉訟豈危我哉令鼓楫而進歷行郡邑吏民希見者人懷喜悅案范書同周舉周舉字宣光梁商表為從事中郎商疾甚帝問遺言對曰臣從事中郎周舉清慎高亮可諫議大夫案舉汝南汝陽人清慎高亮范作清高忠正語乃小遜周舉字貞先為并州刺史太原舊俗以介子推焚骸有龍忌之禁輒一月寒食莫敢炊爨老小不堪歲歲多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損人命非賢者之意以宣示愚民使還溫食案周禮司烜氏修火禁于國中注云為李春將出火也蓋龍星木位春見東方心為大火懼火之盛故為之禁俗傳云子推以此曰被焚而禁火考左傳及史記並無介子被焚之事不知何據遂以成俗周舉移書亦神道設教耳後魏武帝復明罰令不得寒食亦可知俗之難革也舉字范書亦作宣光且與五經縱橫叶此作貞先以字相類故傳訛耳虞延虞延除細陽令每至歲時伏臘休遣徒繫各使還家並感其恩應期而歸有一囚于家被病自載詣獄既至城而死案延見東觀記張奮奮為司空時歲災旱祈雨不應乃上表即時引見復口陳時政之宜帝召太尉司徒幸洛陽獄録囚徒天雨三日案奮字雅通張純子奮蓋知有寃獄當雪因口陳之故録囚而澍雨立至也張奮拜太常上疏言漢當改作禮樂圖書著明王者治定制禮功成作樂謹條禮樂異議三事願下有司以時考定案禮樂異議三事必有可觀惜不傳矣王丹王丹為太子少傅謇謇正直名德重于當時案丹見東觀記郭伋郭伋字細侯拜并州刺史行部至西河美稷百小兒各騎竹馬迎伋拜伋問曰兒何自逺來對曰聞使君到喜故來迎伋曰苦諸兒復送到郭外問使君何日當還伋謂從事計日告之行部還入美稷先期一日伋念負諸兒即止野須期乃往案伋見東觀記此條參看范書殊得減字法伋拜并州刺史前在并素結恩德及後入界所到縣邑老小相擕邀迎道路所過問民疾苦聘求州中耆德雄俊設几杖之禮朝夕與參政事分祿以養之案范無分祿以養之句不見刺史盛心無此則聘賢問疾徒虛文耳傅宣傅宣字巨公拜御史中丞與司𨽻校尉尚書會同並專席而坐案范書關此即所稱三獨坐也度尚度尚為上虞長政治嚴峻明于疑理縣中謂之神明案尚見謝書尚少喪父事母至孝通京氏易古文尚書為吏清潔有文武才案范書尚素家貧不修學行不為鄉里所推舉與此不同續書于尚極為奬飾不無阿好于謝書辨之矣李恂李恂遷侍御史持節使幽州宣布恩澤慰撫北狄所過皆寫圖山川屯田聚落百餘卷悉封奏上肅宗嘉之案恂見東觀記范同袁安安奏司𨽻鄭據河南尹蔡嵩阿附貴戚無盡節之義請免官案罪不報案安見東觀記此安為司徒時事貴戚指竇憲也范逸鄭蔡二人名袁安為河南尹十餘年吏民人人自勵小大從化案袁公尹河南政號嚴明然未嘗鞫人以臧罪蓋寬猛相濟故吏民感化若此安字卲公質性清嚴不交異類為功曹奉檄謁從事從事因安致書于令安曰公事自有郵驛私請則非功曹所持拒而不受安于桓帝時遷太師四葉五公案范稱安纍世貴盛以為書生指葬地之故不知安之仁心善政足庇後嗣于華論見之范亦不能易也劉陶劉陶為溳陽長政化大行道不拾遺以病去官童謡歌曰悒然不樂思我劉君何時復來安此下民案陶見袁書陶明經學推三家尚書及古文是正文字七百餘事名曰中文尚書蓋于今文古文之外别立此名惜其書不傳耳溳陽范作順陽餘同又案謝書以此作劉騊駼事惟溳陽作樅陽其中定有一誤梁商大將軍梁商三月上巳日會洛水倡樂畢極終于薤露之歌坐中流淚案商見東觀記哀樂失時殃將及焉周宣光知之矣何紹何紹為河內懷令三日一視事十日一請倉俸米于閣外作乾飯食之不設釜竈得一強盜問其黨與得數百人皆誅之政教清平為三河表案范書闕唐韋應物詩云身當疾病思田里邑有流亡愧俸錢此真為民父母之語如紹之食俸自應無愧陳翔陳翔字子麟遷侍御史元日朝賀梁冀威儀不整請收理罪時人竒之案翔見謝書种皓种皓字景伯順帝時為侍御史監護太子承光宫中常侍高梵受敕迎太子不賫詔書以衣車載太子欲出太子太傅高襄不知所以力不能止開門臨去皓至橫劒當車曰御史受詔監護太子太子國之儲副天命所係常侍來無一尺詔書安知非挾姦耶今日之事有死而已梵馳奏之詔報太子乃得去杜喬退而歎息愧皓臨事不惑帝亦嘉其持重稱善良久案皓見張記此比范傳特詳頗饒色澤時太傅乃杜喬作高襄者誤也种皓為益州刺史在職三年恩宣逺夷開曉殊俗岷山雜落皆懷服漢德其白狼槃木諸國並貢前刺史卒後遂絶皓至乃復向化永昌太守鑄黃金為文蛇以獻梁冀皓糾發追捕馳傳上言冀由是銜怒于皓案皓後為度遼將軍龜兹及莎車諸國皆來貢獻蓋皓以誠心懷撫不假兵力故逺人來服若此非如衛青竇憲之開邊也近日梁益諸州皆為樂土若蜀之打箭爐楚之生紅苖都登版籍此皆洪荒以來所未臣順者又况西羌諸部落如烏朱穆秦科爾沁等萬里咸奉正朔南荒則臺灣列郡定海列縣蓋我朝幅􅊷之廣振古為盛矣皓為梁州刺史甚得百姓歡心被徵當還吏人詣闕請留之太后歎曰未聞刺史得人民心如此乃許之皓復留一年後遷漢陽太守吏民五夷男女號哭案范書同鄧彪彪其先楚人鄧况始居新野以農桑為業案彪見東觀記魯丕丕數薦達幽隱名士王龔等皆備帷幄近臣案丕魯恭之弟見東觀記誤作平也黃香黃香字文強拜尚書左丞功滿當遷和帝詔留增秩後拜尚書遷僕射案香見東觀記張霸張霸為會稽郡越賊歸附童謡曰棄子戟捐我矛盜賊盡吏皆休案霸見東觀記霸以經術顯故守會稽時道路但聞誦書聲而又能不戰而降賊真文武為憲者汝郁汝郁字叔異年五歲母患病不能飯食郁常抱持啼不肻飲食母憐之強為餐飯欺言已愈郁察母顔色不平輒復不食宗親共異之因字曰叔異案郁見東觀記鄭𢎞鄭𢎞為縣令政化大行民王逢得路遺寶物懸于衢道求主還之案𢎞見謝書此令騶時事也申屠剛申屠剛拜侍御史遷尚書令在尚書數犯顔正色百􅒼憚之常慕史鰌汲黯之為人案剛見東觀記光武常欲出遊尚書令申屠剛諫以頭軔乘輿車輪帝遂為止案時剛以隴蜀未平不宜逸豫故有此諌劉平劉平為全椒長先是縣多虎為害平到政術治民虎皆南渡江去案平見東觀記虎徙事范不載班固班固除蘭臺令史與陳宗尹敏共作世祖本紀案固見東觀記此後漢書之權輿也然則光武本紀亦可稱班書固年九歲能屬文誦詩賦及長遂博覽載籍九流百家之言無不窮究所學無常師不為章句舉大義而已案蔚宗論固傷馬遷博物洽聞不能以智免極刑然亦身陷大戮此智及之而不能守之也然蔚宗亦良史才乃又以逆誅文人無終豈于作史者特甚耶固字孟堅右扶風人幼有俊才學無常師善屬文經傳無不究覽案此即前段文引用者刪筆小異耳張衡張衡作地動儀精銅以鑄其器圓徑八尺形似酒樽樽中有都柱旁行八道施關發機外有八龍首銜銅丸蟾蜍承之地或動則隨其方面龍吐丸其機關巧制皆在樽中案衡字平子南陽西鄂人衡所作渾天儀及靈憲算罔論無不精密范不載其作地動儀此制今不傳矣夫地震之災史册載之今儀器所驗乃有一定此亦如日月薄蝕司厯皆能預推而朝廷不廢救護者明君賢輔正欲借此以修省也劉寵劉寵字祖榮自會稽太守徵將作大匠山陰民去治數十里有若耶水在山谷間五六老翁年七八十聞寵遷相率共送寵人齎百錢寵謝之為選受一大錢故寵在會稽號為取一錢其清如是案寵見謝書中數語范作山陰縣有五六老叟龎眉皓髮自若耶山谷間出人齎百錢以送寵雖覺緊鍊頗減色澤劉寵除東平陵令是時民俗奢泰寵到官恭儉訓民以禮上下有序都鄙有章視事數年以母病棄官歸百姓士女攀車距輪充塞道路車不得前乃輕服遁歸案范書同注云東平陵縣名屬濟南郡夫邑以三字名故所希有然考范郡國志濟南亦無東平陵楊琳楊琳為茂陵令蝗不入茂陵界案范書闕宣秉宣秉字巨公拜大司徒司直清白篤義得祿收養內外宗族案秉馮翊雲陽人分祿贍宗即孔子教原思之旨宋范文正義田意亦如此宣康字巨公遷司𨽻校尉奉法遵典督察姦邪務舉宏綱正大體濶略細微其政嚴而不苛百官肅然京師清靜案康字形類秉故傳訛也范略馮魴馮魴為魏郡太守以高第入代趙熹為太僕案魴見東觀記王苑王苑字孫仲安貧茅屋蓬户藜藿不饜案范書闕梁冀扶風人王孫奮居富而性吝梁冀自以馬乘具遺之從貸錢五千萬奮以五百萬與之冀大怒乃告郡縣劾奮母為其守藏婢云盜白珠十斛紫金千斤以叛遂收考奮兄弟死于獄中悉沒資財億七千餘萬案冀見東觀記王孫范作士孫是三輔決録注曰士孫奮字景卿少為五官掾起家得錢資至一億七千萬冀改輿服制卑幘狹冠又作擁身扇案卑范作埤注云埤下也音頻爾反尹敏尹敏為長陵令以縣倉漏三所自免案敏見東觀記范書載敏以不捕友人周慮故免官與此不同李固陽嘉二年詔公卿舉敦朴之士衛尉賈建舉固案固見謝書時以災異洊至故有此舉范不載順帝時所除官多不次李固奏免百餘人既怨共作飛章誣固曰大行在殯路人掩涕固獨傅粉飾貌搔頭弄姿盤旋偃仰曾無慘怛之意案時群小希梁冀旨共作飛章誣奏范書全載其文及讀吳祐傳則此章乃馬融筆也祐責融曰李公即誅卿何靣目見天下之人乎然則融真小人儒也李固為大司農時牧守多關宗親有詔特拜不由選試固乃上表具陳盜賊所由興良由牧守多非其人焉案范書此條所闕當是宦者二字固遷將作大匠常推賢進士杜喬喬纍祖吏二千石喬少好學治韓詩京氏易歐陽尚書以孝稱雖二千石子常步擔求師案喬字叔榮河內林慮人范書絶不載其好學何也喬諸生耿伯嘗與鮪同止冀諷吏執鮪為喬門生案范書冀諷有司劾喬及李固與劉鮪等交通請逮案罪遂被害亷范亷范為雲中太守會胸奴大入塞范自率士卒拒之鹵衆盛而范兵不敵會日暮令軍士各交縳兩炬三頭爇火營中星列鹵遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之斬首數百級鹵自相轔藉死者千餘人由此不敢復入雲中案范見東觀記薑肱薑肱字伯淮彭城廣威人家世名族與弟仲海季江皆以孝行著與弟同被卧甚相親友及長相愛不能相離案今人但知薑被為友于而不知其為純孝于謝書見之矣耿恭耿恭字伯宗遷長水校尉其秋金城隴西羌反恭上疏陳方略詔召入問狀乃遣恭將五校士三千人案恭見東觀記恭前在疏勒被圍鑿山為井煮弩為糧萬死一生節過蘇武今兹甫入洛陽亦可小休而討羌一舉老當益壯卒至大忤貴戚終填牢户殊可惜也胸奴破離後王安得攻金蒲城耿恭以毒藥傅矢傳語胸奴漢家箭神中其瘡者必有異因發弩射之鹵中矢者視創皆沸並大驚相謂曰漢兵神真可畏也遂解去案神道設教尤兵家所尚范同祝良祝良字邵卿長沙臨湘人案良見謝書邵卿謝作邵平班超超至疏勒求得故王兄子榆勒立之更名曰忠案超見東觀記超前攻破疏勒立龜茲人兜題為王旋以疏勒不用兜題命故立其兄子左雄左雄奏徵海內名儒為博士使公卿子弟為諸生有志操者加其俸祿及汝南謝廉河南趙建章年始十二各能通經雄並奏拜童子郎于是負書來學雲集京師案雄見謝書雄曾定制郡國孝廉年不滿四十不得察舉今又以童子拜郎蓋彼即強仕此方窮經地位逈殊固不可以年齒例也劉寬劉寬性仁恕不妄喜怒嘗朝服將朝婢翻羮汚其衣寬曰得無爛汝手乎更衣而入曾不變色案寬見東觀記陳弇弇以尚書教授躬自耕種常有黃雀飛來隨弇翺翔案范書弇陳留人字叔明受書于司徒丁鴻後漢書補逸卷十九

body:
  text: 後漢書補逸卷十二監察御史姚之駰撰謝承後漢書第四張磐張磐字子石為廬江太守潯陽令嘗餉一奩甘其子年七歲就取一枚磐奪付外卒因私以兩枚與兒磐鞭卒曰何故行賂于吾子案磐之鞭卒真得謹小慎微之意范闕磐以操行清亷見稱守廬江時京師諺曰聞清白張子石晉文經文經名曜逺近聲價已定徴辟不就療病京師不通賔客公卿將相大夫遣門生旦暮問疾郎吏公府掾屬雜出其門不得見也案文經漢中人范附見符融傳文經與梁國黄子艾純盜虚聲使公卿問疾王臣坐門融察其非真以語李膺而二子名譽頓減適足為處士累耳成瑨成瑨字幼平𢎞農人少修仁義篤學以清名見舉孝亷拜郎中遷南陽太守南陽舊多豪强中官黄門盤互境界瑨下車威嚴以檢攝之案范書瑨無傳見岑晊傳中時桓帝美人外親張子禁怙恃榮貴不畏法網瑨與功曹岑晊捕子禁付宛獄笞殺之桓帝徴瑨詣廷尉下獄死案張子禁范作張汜意其名也瑨之誅汜晊實成之但一時戮其宗族賔客二百餘人未免已甚耳彼𢎞農坐嘯之謡黨禍實興于此公孝其真賢知之過耶劉瓆劉瓆字文理平原人也遷太原太守郡有豪强中官親戚為百姓所患瓆深疾之到官收其魁帥殺之所藏主人悉坐伏誅桓帝徴詣廷尉以瓆宗室不忍致之于刑使自殺案瓆平原髙唐人范載襄楷疏云太原太守劉瓆南陽太守成瑨去除姦邪其所誅翦皆合人望而陛下受閹䜿之譖乃逺加考逮則瓆洵忠義之士也直道不容惜矣范滂滂汝南細陽人父顯故龍舒侯相案滂字孟博范云汝南征羌人與此異滂與母訣稱從龍舒君歸黄泉以父常相龍舒也范闕太守宗資署滂功曹滂外甥西平李頌為鄉曲所棄中常侍唐衡書屬宗資資勅功曹占署文學滂不聽曰頌則滂之姊子豈不樂其仕進但頌洿穢小人不宜玷汚清朝不敢以私人滂不聽宗資署李頌文學資遷怒捶功曹佐朱零零仰曰范滂清裁猶以利刀齒腐朽今日寧受笞死而滂不可違案孟博不肯以親故使小人濫進其貞亮不必言朱零何人具如此氣節何功曹中多賢者也劉淑劉淑字仲承舉賢良方正對策十二科為天下諸儒之表擢為議郎案淑河間樂成人淑為侍中朝夕建議竭忠于朝補政二百餘事悉有章篇朝廷有勞案桓帝以淑宗室之賢特加敬異每有疑事常密諮問而卒為宦官譖死何前聰而後蔽也延篤延篤遷京兆尹正身率下憂官如家䘏民如子案篤字叔堅南陽犨人藝文類聚載先賢行狀云延篤少從唐溪季度受左氏傳篤欲寫無紙乃借本誦之及辭歸季度曰卿欲寫傳何故辭歸篤曰已誦之矣季度嘆曰嗟乎延生雖復端木聞一知二未足為喻也則篤之天姿頴異又絶尋常文學吏治胥兼之矣篤徙京尹其政用寛仁憂恤民黎擢用長者與㕘政事郡中懽愛三輔咨嗟焉篤勸民農桑遂增户口榖食豐饒鄰郡老少歸之案篤治京尹有聲時人語曰前有趙張三王後有邊延二君其得民望如此邊名鳳陳留人篤為侍中自在機密常見進納上殿問政事得失以經義古典諫帷幄之言不宣外也案范書作詭辭密對不明黄憲黄憲同郡陳蕃為三公臨朝而嘆曰叔度若在不敢先佩印綬矣案憲字叔度汝南慎陽人憲德同顔子簞瓢可樂桓靈之世使其若在亦不肯先陳君佩印綬也徐穉徐穉字孺子豫章南昌人清妙髙跱超世絶俗穉少為諸生學嚴氏春秋京氏易歐陽尚書兼綜風角星官算厯河圖七緯推步變易異行矯時俗閭里服其德化有失物者懸以相還道無拾遺四察孝亷五辟宰府三舉茂才案南州髙士窮棲潔清詭時成道隠逸之第一流也然皆從經術來遯世無悶夫豈偶爾范書不載亦淺之乎窺孺子矣穉前後為諸公所徴雖不就有死喪負笈赴弔嘗于家預炙雞一隻以一兩綿絮漬酒中暴乾以裹雞徑到所赴冢隊外以水漬綿使有酒氣斗米飯白茅為藉以雞置前酹酒畢留謁即去不見喪主案孺子隻雞絮酒名士風流通賢佳話范書但載赴黄瓊葬一節而獨遺此何耶張奐張奐字然明為使匈奴中郎將率步騎二萬廣宣方畧大破鮮卑匈奴惶懼詣奐乞降聲勢猛烈其秋戰慄不敢犯邊時休屠等反衆大懼奐安坐幃中與弟子講論自若徐乃設奇破之奐遷安定屬國都尉匈奴羌豪率感奐恩德上馬遺金悉以還之羌性貪而吏清前有八都尉好財貨為所患苦及奐正身潔已威化大行案奐見東觀記事皆畧同奐為皇甫規所薦文武畧不讓度遼而晩節為中官所詐親耡芝蘭雖有百善不足贖矣陳朔陳朔遷揚州刺史貶黜姦慝不畏强禦案范書闕周景周景為豫州刺史辟陳蕃為别駕不就景題别駕輿曰陳仲舉座也不復更辟蕃惶懼起視職案景字仲饗廬江舒人范不載辟陳蕃事惟蕃傳云景辟為别駕從事以諌諍不合投傳而去兩賢相契若此豈相厄哉景事附載其父榮傳後李燮燮逺遁身于北海劇託命滕咨家以得免案燮字德公范云燮父固禍作燮姊文姬豫托父門生王成以存孤成乃將燮乗江東下入徐州界令變姓名為酒家傭而成賣卜于市隂相往來後冀誅詔求固嗣遂出旋拜安平相侃侃有父風據此則載燮避難事與謝大異謝列滕咨姓名定非誤也楊璇楊璇字璣平平零陵賊為荆州刺史趙凱横奏檻車徴之仍奪其筆硯乃嚙臂出血以簿中白毛筆染血以書帛上具陳破賊形勢及言為凱所誣以付子弟詣闕自訟詔原之案璇㑹稽烏傷人璇之攻賊特製馬車以排囊盛灰順風鼓之又繫布槖于馬尾以火燒布馬驚奔突賊陣葢祖田單之法也然非先以順風鼓灰使賊人不得張目則戎馬蹂躪我轍先亂矣功大不賞加以横誣血書自明嗚呼慬矣魏朗魏朗字仲英出為河南太守以清嚴為治為三河之表案朗㑹稽上虞人仲英范作少英事載黨錮傳朗入為尚書再昇紫微謇諤禁省不屈豪右為百寮所服以黨事免朗性矜嚴閉門整法長吏希見動有禮序室家相待如賔子孫如事嚴君焉李膺李膺出補蜀郡太守修庠序設條教明法令威恩竝行蜀之珍玩不入于門益州紀其政化朝廷舉能理劇轉烏桓校尉時鮮卑數犯塞膺常率步騎臨陣交戰身被瘡痍拭血進戰遂敗寇斬首二千級案膺字元禮潁川襄城人膺名節矯然如寒霜秋日是黨錮中第一流也然御李登龍髙名成黨釀禍既烈流風未已至司馬氏而王謝以旌品自别迨六朝蕭齊間江斆謝瀹命移牀逺客至有從天子求為士大夫而不得者此皆學元禮而甚者也唐季世士習益尚清流遂成白馬之禍風氣之開有所自矣膺子珪位至東平相案珪范作瓚王威王威為汝南五官掾太守郭公有罪當徴怖欲自殺威抱書自投火中而死太守得解其罪案范書闕茅容茅容字季偉陳留人年四十餘耕于野時與等輩避雨樹下衆皆箕踞相對容獨危坐愈恭郭林宗見而奇之因請宿寓旦日容殺雞為饌林宗謂為己設既而以供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德案范書容事見郭泰傳中觀人于其所忽避雨而危坐是不忽所忽也故林宗最號知人抗徐抗徐字伯徐丹陽人少為郡佐史有膽智策畧三府表徐有將率之任特遷長沙太守案范桓帝紀云桂陽胡蘭朱葢等復反遣中郎將度尚長沙太守抗徐等擊破斬之又度尚傳載徐初試守宣城長境内無盜賊後遷太山都尉屢平寇盜徐亦人傑矣哉抗姓希見風俗通云衞大夫三抗之後申屠蟠陳留申屠蟠恥郡無處士遂閉門養志居蓬萊之室依桑樹以為棟案蟠字子龍陳留外黄人九歲喪父哀毁過禮海内先賢傳曰蟠在冢致甘露白雉以孝稱其于逸民殆魯之少連乎豫測黨錮之禍則膺滂遜其識屢却公車之徴則爽𤣥讓其髙知幾其神乎非徒遐棲山林韜伏明姿者也蟠前後徴辟文書悉掛于樹初不顧盼詔書令郡以禮發遣蟠到河南萬歳亭折轅而旋案掛樹折轅二事甚韻范俱不載皇甫嵩皇甫嵩字義真拜車騎將軍討平凉羌人臨鹵廷掃殄羌人靡有子遺率整二州獻捷振旅案嵩安定朝那人度遼將軍規之兄子嵩討羌人選將士梟騎萬隊戎車三千公卿百僚祖送于平樂觀大㑹案范載嵩討黄巾賊功葢天下繼又平隴右梁州二賊獨遺討羌事嵩請冀州一年田租以贍飢民百姓歌曰天下亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居案嵩此舉非庸人所能後董卓之亂門下閻忠梁衍及從子酈各獻計執卓嵩堅不從而使卓肆虐亦才有餘而識不足者耶巴肅巴肅為河南尹正身奉職案肅字恭祖渤海髙城人范載黨錮傳肅仕至潁川太守以鈎黨死于獄史弼史弼年二十為郡功曹承前太守宋訢穢濁之後悉條諸生聚斂姦吏百餘人皆白太守掃迹還縣髙名由此而興案弼字公謙陳留考城人弼活鈎黨千餘人卒以忤侯覽幾死豈天道無知耶弼遷山陽太守其妻鉅野薛氏女以三互自上轉拜平原相案范書不載其蔡邕傳云朝議以州郡相黨人情比周乃制婚姻之家及兩州人士不得對相監臨至是復有三互法選用艱難幽冀二州久缺不補邕上疏諌之章懐注云三互謂婚姻之家及兩州人不得交互為官也東京末年制度可笑如此第五永第五永為督軍御史使督幽州蔡邕等天下名才士人皆㑹祖餞于平樂館髙彪送永在坐因援筆書牘案永京兆人百官餞永邕等皆賦詩彪獨作箴邕等甚美之范并載其箴則永乃以彪傳矣平樂館范作長樂館案皇甫嵩傳稱公卿大㑹于平樂觀又張𤣥説張温亦有祖道平樂觀之語則此觀乃東京祖餞之地作平樂為是觀作館亦傳寫之音似也楊震震為太常薦明經名士楊仲桓等五人各從家拜博士案震見東觀記仲桓名倫陳留人時選舉多不實震之所薦諸儒稱之震臨殁謂諸子曰以牛車薄簀載柩還歸案震飲酖夕陽亭太守移良承樊豐等㫖遣吏于陜縣停留其喪露棺道側是并不得還鄉也悲夫震卒未葬有大鳥五色髙丈餘兩翼長二丈三尺人莫知其名從天飛下到震棺前舉頭悲鳴涙出霑地至葬日冲升天上案震生有冠雀之瑞死有大鳥之哀豈皆黄衣與環之報耶范畧楊秉秉奏侯參故受罪臧累億牂牁男子張攸居為富室參横加非罪云造訛言殺攸家八人没入廬宅又與同郡諸生李元之官共飲酒醉飽之後戲故相犯誣言有滛慝之罪應時捶殺以人臣之殺行桀紂之態傷和逆理痛感天地宜當糺持以謝一州又京兆尹袁逢于長安客舍中得參重車三百餘乗金銀珍玩不可稱紀案秉見東觀記參常侍侯覽之弟時為益州刺史秉劾之後又劾覽壯矣秉為豫荆徐兖四州刺史遷任城相自為刺史二千石計日受俸餘禄不入私門案范書同秉拜侍御史多所彈糾名由此顯京城咸稱有宰相之才秉免歸雅素清儉家至貧寠并日而食任城故孝亷景慮齎錢百餘萬就以餉秉閉門拒絶不受案秉家貧并食峻拒餽遺真不愧清白吏子孫非三不惑者孰能之楊賜楊賜字伯欽拜光禄勲位特進又嘉德殿前有青赤氣詔特進遣中使問賜祥異禍福吉凶所在以賜博學碩儒故密諮問宜極陳其意賜上疏陳請案春秋䜟天投蜺海内亂今妾嬖閹尹共專國朝之所致也案賜見東觀記伯欽范作伯獻餘同宗琳宗琳字伯真橋𤣥表琳明法律徴拜廷尉正案范書載𤣥薦陳球為廷尉不載琳事陳球陳球字伯真為將作大匠桓帝崩營寢陵躬親作事為士卒先百工畢力案球見東觀記球少涉儒學令繁陽則拒郡守之求賄守零陵則嬰木城而斬賊後廷爭竇太后事豎義甚健不獨監作陵園省費巨萬已也球祖父屯有令名案范不載陳瑀瑀舉孝亷辟公府洛陽市長後辟太尉府未到永漢元年就拜議郎遷吳郡太守不之官案瑀乃球子范不詳載陳珪球兄子珪字漢瑜舉孝亷劇令去官舉茂才齊北相珪子登字元龍學通今古處身循禮非法不行性兼文武有雄姿異畧一領廣陵太守案范書珪乃球弟子為沛相此云兄子為齊北相未知正誤登事詳見魏志宗資宗資字叔都南陽安衆人也家代為漢將相名臣祖父均自有傳資少在京師學孟氏易歐陽尚書舉孝亷拜議郎補御史中丞汝南太守署范滂為功曹委任政事推功于滂任善之名聞于海内也案資事范載黨錮傳即所稱汝南太守范孟博南陽宗資主畫諾者也推功任善不免謡謗以至賈禍名之不可好也如是檀􅀈􅀈與子孫同衣而行并日而食案􅀈字文有山陽瑕丘人補蒙令棄官去而貧若此其清不可及也賈淑淑為舅宋瑗報讎于縣中為吏所捕繫獄當死郭泰與語懇惻流涕泰詣縣令應操陳其報怨蹈義之士被赦縣不宥之郡上言乃得原案淑字子厚林宗鄉人先以凶德許其自新卒為善士桓儼沛國桓儼字文林罷􅀈縣居揚州從事屈豫室中庭有橘樹一株遇其實熟乃以竹籓樹四面風吹動兩實墮地以繩縛繫樹案儼見東觀記儼作􅺰范作嚴未知孰是范稱儼仕為郡功曹後徴辟皆不應未嘗為􅀈縣也東觀記亦不序其罷縣事謝書應别有據夫桓榮以明經致大位乃不意學之為利一言出于肺腑其累世見宗豈皆醇儒哉至儼父鸞之緼袍糟食不求贏餘儼之餉給餽遺一無所受足以洒為利一言之羞矣承父嬰承父嬰為尚書侍郎服事丹墀彌綸舊章策文通訓條在宫禁秘于省閣惟承臺郎升複道取得為開覽其餘他官莫敢闚𨵦也案范書有承宫續漢書載宫子名疊無承父嬰世本云承姓衞大夫承叔乗之後抑或承父複姓嬰其名與楊奇楊奇字公綽通經才性敏暢入補侍中天子所問引經據義靡不條對案奇為伯起曾孫范附見傳後其對靈帝云陛下之于桓帝亦猶虞舜比德唐堯其善諍不愧乃祖張馴張馴字子儁與蔡邕共奏定六經文字擢拜侍中典領秘書馴儒雅敏達有智慧案馴濟隂定陶人後為大司農蔡邕傳載正定經文者凡七人五官中郎將堂谿典光禄大夫楊賜諌議大夫馬日磾議郎張馴韓説蔡邕太史令單颺趙咨東郡趙咨為東海相人遺其雙枯魚噉之二歲不盡以儉化俗案咨見東觀記范傳咨不載枯魚事遂令羊續獨擅千古咨在京師病困故吏蕭建經營之咨豫自買小素棺使人取乾黄土細擣篩之聚二十石臨卒謂建曰亡後自著所有故巾單衣先置土于棺内尸其中以擁其上案咨遺書勅子薄葬范全載之其文在前漢楊王孫之上賈琮賈琮字孟堅為交阯刺史時州人屯兵反即移書告示使其安資業百姓歌之曰賈父來晚使我先反今見清平吏不敢飯乃以琮為冀州刺史舊典傳車驂駕垂赤帷裳迎于州界及琮之部升車言曰刺史當遠視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然悚震案琮東郡聊城人先為京兆尹以交阯叛故特舉刺交歲間蕩定徴拜議郎餘與謝同琮在任三年為十三州最公孫瓚公孫瓚為郡主簿太守劉君坐事檻車徴官法不聽吏下親近瓚乃改容服詐稱侍卒身執徒養御車到洛陽太守當徙日南瓚具豚酒于北芒上泣辭母墓酹觴祝曰昔為人子今為人臣太守遭事當送日南拜而去既行于道得赦瓚還郡案瓚字伯珪遼西令支人還郡後舉孝亷除遼東屬國長史以功封都亭侯羌人畏之即所稱白馬義從者也天下兵起謂可垂掌而得迨後僅保易京而卒見殺于袁紹由其才大而識淺耳朱儁朱儁為郡主簿太守尹端被坐討賊許昭失利為州所奏罪應棄市儁乃羸服間行輕齎數百金到京師賂主章吏遂得刋定州奏故端得輸作左校端喜放降免而不知其由儁亦終無所言案儁字公偉會稽上虞人後以功封錢塘侯葢在皇甫嵩伯仲之間者蔡邕蔡邕字伯喈以侍書御史遷尚書三月之間周厯三臺遷侍中案邕見東觀記邕之就卓辟乃迫于元凶能族之燄旋見敬禮遂懐恩私亦所遭之不幸爾靈帝建寧五年正月車駕上原陵蔡邕為司徒掾從公行到陵見其儀愾然謂同座者曰聞古不墓祭朝廷有上陵之禮始謂可損今見其儀察其本意乃知孝明至孝惻隠不可易舊或曰本意云何昔在長安時其禮不可盡得聞也光武即位始葬于此明帝嗣位踰年羣臣朝士感先帝不復聞見此乃率公卿百僚就園陵而剏焉尚書階西祭設神座天子事亡事存之意也以帝聖孝之心親服三年又在園陵初興此儀仰察几筵下顧羣臣悲切之心必不可堪邕見太傳胡廣曰國家禮有煩而不省者昔不知先帝用心周密之至于此也廣曰然子當載之以示學者邕退而記焉案今禮有備于古者墓祭是也如生如存雖聖人復起不能廢此明帝之孝逺接舜文范不載此亦闕畧矣邕在王允坐聞董卓死有歎惜之音允責邕曰卓國之大賊殺主殘臣天地所不祐人神所同疾君為王臣世受漢恩國主危難曾不倒戈卓受天誅而更嗟痛乎便使收付廷尉邕謝允曰雖以不忠猶識大義古今安危耳所厭聞口所常玩豈當背國而向卓也狂瞽之詞謬出患入願黥首為刑以繼漢史公卿惜邕才咸共諫允允曰昔武帝不殺司馬遷使作謗書流于後世方今國祚中衰戎馬在郊不可令佞臣執筆在幼主左右後令吾徒竝受謗議遂殺邕案王子師之誅邕為懼其訕毁何其隘也邕所作漢紀及十志因亂散亡惜哉范稱邕在允坐殊不意言之而歎有動于色可謂善于形容較謝倍覺語妙且載馬日磾救邕語甚詳裴松之以此條為謝承之妄記殆未覽羣史耳袁閎閎少修志節矯俗髙厲案閎字夏甫袁安𤣥孫瘁身修行累徴不應黨事將作乃築土室潛身十八年其苦節而可貞者與閎父賀為彭城相往省謁變名姓徒行至府門連日吏不為通乳母從内出見在門側面貌省瘦為其垂泣閎厚丁寧此間不知吾慎勿宣露也案范書簡畧不如謝書之腴袁𢎞𢎞嘗入京師太學其從父逢為太尉呼𢎞與相見遇逢宴㑹作樂𢎞伏稱頭痛不聽音聲而退遂不復往紹術兄弟亦不與通案𢎞字邵甫恥其門族貴勢乃變姓名徒步師門不就徴聘其清風亮節千載尚足砭人范畧袁祕祕字永寧黄巾起太守趙謙擊之軍敗封觀與主簿陳端門下督范仲禮賊曹劉偉德主記史丁子嗣記室史張仲然議生袁祕等七人擢刀突陣與戰竝死案祕乃袁忠之子忠亦閎仲弟也與觀等死于陣而太守獲免詔旌祕等門閭號曰七賢葢成仁取義不愧曩訓矣范不載七賢名封觀封觀字孝起南頓人案觀雅有志節當舉孝亷以兄名位未顯恥先受之佯為瘖疾其友于如此宜其見難不避與袁祕等以死衞主也范附見袁閎傳謝弼謝弼字輔鸞東郡濮陽人案范書弼字輔宣東郡武陽人與此不同建寧中青蛇見前殿詔公卿以下陳得失弼上封事曰蛇者隂氣所生龍之類也龍有鱗甲兵之符也洪範傳曰厥極弱時則有龍蛇之孽案弼奏對切直遂忤奄䜿舍生立節時事可知矣葢勲勲父字思齊官至安定屬國都尉案勲字元固敦煌廣至人家世二千石詳見續書勲剛直方格面折董卓長揖爭禮雖王允蔡邕猶有愧焉勲遷潁川太守民吏歎咏不容于口案范稱勲為漢陽太守或後遂遷潁也臧旻旻有幹才達于從政為漢良吏初從徐州從事辟司徒府除廬奴令冀州舉尤異遷揚州刺史丹陽太守是時邊方有警羌人出寇三府舉能遷旻匈奴中郎將討賊有功徴拜議郎還京師見太尉袁逢逢問其西域諸國土地風俗人物種數旻具答言西域本三十六國後分為五十五稍散至百餘國其國大小道里近逺人數多少風俗燥濕山川草木鳥獸異物名種不與中國同者悉陳其狀手畫地形逢奇其才歎息言雖班固作西域傳何以加此案旻廣陵射陽人范載子洪傳中僅稱其有榦事才而已不具載旻轉拜長水校尉終太原太守案旻為從事時上書訟第五訪寃訪竟赦出其以公正發憤不復知常侍之燄也子洪以烈士見殺可云世忠胡母班班王匡之妹夫董卓使班奉詔到河内解釋義兵匡受紹㫖收班繫獄欲殺之以徇軍班與匡書云自古以來未有下土諸侯舉兵向京師者劉向傳曰投鼠忌器器猶忌之况卓今處宫闕之内以天子為藩屏幼主在宫如何可討僕與太傳馬公太僕趙岐少府隂修俱受詔命闗東諸郡雖實嫉卓猶以銜奉王命不敢玷辱而足下獨拘僕于獄欲以釁鼓此何悖暴無道之甚者也僕與董卓何親戚義豈同惡足下張虎狼之口吐長蛇之毒恚卓遷怒何其酷哉死者人之所難然恥為狂夫所害若亡者有靈當訴足下于皇天夫婚姻者禍福之機今日著矣曩為一體今為血讎亡人二女則君之甥身殁之後慎勿令臨僕尸骸匡得是書抱班二子哭班遂死于獄案班時為執金吾董卓遣與韓融等譬解袁紹諸軍紹使王匡殺之范不載此書章懐注及裴松之魏志注皆録之章懐畧而裴詳其中異者數字髙榦榦字元才才志𢎞邈文武秀出父躬蜀郡太守祖賜司隸校尉案魏志髙柔傳稱榦為柔從兄據謝書則賜乃榦祖而為柔之從叔祖是從父非從兄也陳留耆舊傳亦同魏志誤矣榦為袁紹甥始附袁氏後降魏陳留圉人隂修南陽隂修為潁川太守以旌賢擢俊為務舉五官掾張仲方正察功曹鍾繇主簿荀彧主記掾張禮賊曹掾杜佑孝亷荀攸計吏郭圖為吏以光國朝案修之所舉皆屬名儒洵乎國朝之光也范闕劉表表受學于同郡王暢暢為南陽太守行過乎儉表時年十七進諫曰奢不僭上儉不逼下葢中庸之道是故蘧伯玉恥獨為君子府尹若不師孔聖之明訓而慕夷齊之末操無乃皎然自遺于世暢答曰以約失之者鮮矣且以矯俗也案表字景升山陽髙平人諌王暢事范載王龔傳後謝當同之表年十七而立論如此葢虎子已有食牛之氣矣趙昱昱年十三母嘗病經涉三月昱慘戚消瘠至目不交睫握粟出卜祈禱出血鄉黨稱其孝就處士東莞綦毋君受公羊傳兼該羣業至厯年潛志不窺園圃親疎希見其面時入定省父母須臾即還髙潔亷正抱禮而立清英儼恪莫干其志旌善以興化殫邪以矯俗州郡請召常稱病不應國相檀謨陳遵共召不起或興盛怒終不回意舉孝亷除莒長宣揚五教政為國表㑹黄巾作亂陸梁五郡郡縣發兵以為先辦徐州刺史巴祗表功第一當受遷賞昱深以為恥委官還家徐州牧陶謙初辟别駕從事辭疾遜遁謙重令揚州從事㑹稽吳範宣㫖昱守意不移欲威以刑罰然後乃起舉茂才遷廣陵太守賊笮融從臨淮見討迸入郡界昱將兵拒戰敗績見害案昱字元達琅邪人范稱昱清已疾惡太僕种拂舉為方正後笮融敗走廣陵昱待以賔禮融利廣陵資貨乗酒酣殺昱放兵大掠非拒戰敗績也范説為是范書及魏志俱附陶謙傳公沙穆穆嘗養猪猪有病使人賣之于市與之言如售當告買者言病賤取其直不可言無病欺人取貴價也賣猪者到市即售亦不言病其直過價穆怪之問其故齎半直追以還買猪人告語言猪實病欲賤賣不圖賣猪人相欺乃取貴直買者言賣買私約亦復辭錢不取穆終不受錢而去也案穆字文義北海膠東人隠居東萊學者自逺而至後為𢎞農令百姓稱曰神明范乃載之方術傳抑矣此段文詞拖沓不類謝筆穆子孚字允慈亦為善士舉孝亷尚書侍郎召陵令上谷太守案穆六子皆知名孚其著也駱俊俊字孝逺烏桓人察孝亷補尚書侍郎擢拜陳國相人有産子厚致米肉達府主意生男女者以駱為名袁術使部曲將張闓陽私行到陳之俊所俊往從飲酒因詐殺俊一郡吏人哀號如喪父母案范書俊㑹稽人則烏桓當作烏傷也時陳國王寵善射黄巾賊起陳得獨完鄰郡人多就之俊傾資賑贍竝得全活後袁術求糧于陳而俊拒之因遣客詐殺俊亦忍矣哉伍孚孚字德瑜汝南吳房人質性剛毅勇壯好義力能兼人孚少有大節為郡門下書佐其本邑長有罪太守使孚出教勅曹下督郵收之孚不肯受教伏地仰諫曰君雖不君臣不可不臣明府奈何令孚受教勅外收本邑長乎乞更受他吏太守奇而聽之後大將軍何進辟為東曹屬稍遷侍中河南尹越騎校尉董卓作亂百僚震慄孚著小鎧于朝服裏挾佩刀見卓欲伺便刺殺之語闋辭去卓送至閤中孚因出刀刺之卓多力退卻不中即收孚卓曰卿欲反耶孚大言曰汝非吾君吾非汝臣何反之有汝亂國篡主罪盈惡大今是吾死日故來誅姦賊耳恨不車裂汝于市朝以謝天下遂殺孚案裴松之魏志注云謝承記孚字及本郡則與瓊同而致死事乃與孚異不知孚為瓊之别名抑别有伍孚也葢未詳之駰案范書孚事見董卓傳與此畧同但官越騎校尉非侍中耳伍瓊則為侍中當卓欲徙都長安時瓊與周玭同諫遂受害是瓊未死時卓惡未至貫盈何遽挾刀欲殺之自殺瓊後卓遷都掘陵罪惡山積王允士孫瑞等謀誅卓而孚亦于閤中行刺則孚與瓊自是兩人特同郡耳其同字或誤也鄭𤣥𤣥所注周易尚書毛詩儀禮禮記論語尚書大傳中候乾象厯又著天文七政論魯禮禘祫義六藝論毛詩譜駮許慎五經異義答臨孝存周禮難凡百餘萬言案范書載𤣥所著與此同惟論語下有孝經一書謝脱誤耳自前漢經術聿興諸家竝起至康成而集其成遂令孔書大義有所歸宿辰巳之夢即宣尼亦以為身後一人也陸康康字季寧少惇孝悌勤脩操行太守李肅察孝亷肅後坐事伏法康斂尸送喪還潁川行服禮終舉茂才厯三郡太守所在稱治後拜廬江太守案范書闕吳志陸績傳載績父康漢末為廬江太守即此吳郡吳人禰衡禰衡與黄祖子射尤善衡與俱讀蔡邕所作碑文射愛其文恨不寫取衡謂射曰吾雖一過猶識其言其缺兩字不明因書出之射寫還比校皆無所誤惟兩字缺案衡字正平平原般人衡才思雲上而狂生故態令人側目鸚鵡一賦善自况矣趙謙趙謙字彦信太尉戒之孫蜀郡成都人案范獻帝紀初平元年二月董卓以光禄勲趙謙為太尉三年誅董卓李郭反復以前將軍趙謙為司徒乃紀中又載卓所愛奴放縱為司𨽻校尉趙謙所殺卓大怒召𨽻都官撾殺之豈别有趙謙耶徐𦙍徐𦙍少遭父母喪致哀毁瘁歐血發病服闋隠居林藪躬耕稼穡勌則誦經貧寠困乏執志彌固不受惠于人案𦙍字季登孺子之子隠居不仕漢末寇賊縱横皆約教不犯其閭南州兩世髙風動人如此非尋常隠士也董襲董襲志節慷慨武毅英烈案吳志稱襲字元代㑹稽餘姚人有傳范闕劉翊潁陽劉翊好賑貧乏陳國張季札弔國喪值冰寒車毁牛病不能進翊逢之推所乗車牛强與之案翊字子相潁川隂人翊能周施而不有其惠尤人所難後為陳留太守時值喪亂士大夫流離死亡皆為救其困乏寧俱餓死其仁人耶季札范作季禮未知就是佛佛以癸丑七月十五日托生于淨住國摩耶夫人腹中至周莊王十年甲寅四月八日生案此全録梵書本行經中語范刪為是三君三君者一時之所貴也竇武劉淑陳蕃少有髙操海内尊而稱之故得因以為目案此亦見范黨錮傳序中交阯交阯七郡貢獻皆從漲海出入案此與范同今交阯國入貢從粤西思明府陸路而來與古異矣弩髙帝在平城為敵所困一人俱角弩一張為備案此必封事中所述也范闕涉皇山餘暨有涉皇山案劉昭補志餘暨屬㑹稽郡無涉皇山名五經碑靈帝詔諸儒正定五經刋于石碑為古文篆隸三體立太學門外瓦屋覆之四面欄障開門于南河南郡設吏卒視之案時蔡邕與諸儒正定後邕乃書丹刻石范書見儒林傳序但云樹學門不細登也今陜中西安府學有九經及論語孝經爾雅碑共一百五十九巻字樣四十巻間有搨本行世案唐文宗時鄭覃以經籍刓繆建石讎刋準漢故事太和七年敕唐言度復定石經字體在國子監立石于開成二年告成今觀搨本皆正書且多倣歐虞法禮記首月令以尊明皇諱純字以尊憲宗其為開成所刻無疑相傳宋元祐中始置今學明世宗時因地震倒損有王生别刻小石補之夫唐書謂文宗朝石經遺棄師法不足觀亦以其變分𨽻為正書耳漢碑不可復得則唐石經亦足寶貴矣蝗永平十五年蝗起太山彌行兖豫案范書闕寧陽主簿寧陽主簿訴其縣令七歲不省主簿乃上書曰臣謂陛下為臣父章百上終不見省豈可北詣單于以告怨乎帝乃大怒案范書寧陽主簿事見虞詡傳中佚其名主簿衒訐取戾賴詡力救笞之而已寧陽屬東平國故城在今兖州周平王後燕字少卿其先出自周平王之後漢興紹嗣封為正公食采于汝濆也案范書燕汝南安城人宣帝時為郡决曹掾代太守罪當下蠶室乃歎曰我平王之後正公𤣥孫豈可以刀鋸之餘下見先君遂不食而死𤣥孫嘉字惠文從太守討賊以身扞之可謂繩武者矣傳嘉序其先故附見云諫議大夫傅翻字君成轉諫議大夫天性諒直數讜言武帝嘉之案范書不載前漢承秦舊為諫大夫至後漢乃增為諌議大夫此是追序則誤矣三男共娶范延壽宣帝時為廷尉時燕趙之間有三男共娶一妻生四子長各求離别爭財分子至聞于縣縣不能决斷讞之于廷尉于是延壽决之以為悖逆人倫比之禽獸生子屬其母以子竝付母尸三男于市奏免郡太守令長等無帥化之道天子遂可其言案此必封事中引叙及之范書闕風化固重乃置之棄市且罪男貰女于義何居北堂書鈔亦載謝書此條文有小異腹背毛非腹背之毛羽翼之佐者也案書鈔引此二語在宰相條内莫知誰指刪節過當遂爾闕疑後漢書補逸巻十二

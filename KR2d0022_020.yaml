body:
  text: 後漢書補逸卷二十監察御史姚之駰撰司馬彪續後漢書第三任延任延字長孫治京易為九真太守教民牛耕鑄作田器民以利之案延見東觀記任延拜㑹稽南部都尉時年十九迎吏見其少皆驚㑹稽多名士延到官皆聘請高行俊乂敬以待師友之禮及掾吏貧乏輒分俸祿以賑給之案南部都尉東觀作西都尉東觀此條特腴而澤此乃不及楊震楊震為東萊太守道經昌邑初震為荆州舉茂才王密密時為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知子知我知何謂無知密愧而出案震見東觀記四知千古名言今萊州郡堂皇上額曰四知居斯堂者皆當以關西孔子為師也楊震種植藍以供食母諸生嘗有助種藍者輒拔更種以拒其後鄉里稱孝案范書不載震教授二十餘年州請召數稱疾不就案此乃伯起客居于湖時事後年五十乃始仕州郡楊震數切諫為樊豐等所譖遣歸本郡震行至城西夕陽亭乃慷慨謂其諸子門人曰身死之日以雜木為棺布衣單被裁足蓋形而歸冢次案范書同夕陽亭下缺飲鴆而死句震後改葬時有大鳥來止亭樹下地安行到柩前正立低頭淚出衆人更共摩撫抱持終不驚駭案此詳見華書亭作停正作止樂恢樂恢除守陽令在職剛直案恢見東觀記范書無恢為令事陽球陽球為司𨽻校尉奏王甫曹節等權勢因收送洛陽獄案球見東觀記球所奏收者王甫及諸閹黨未及殱曹節後節乃為甫復仇球遂見害東觀及范書皆同此誤胡廣廣舉孝廉試為天下第一旬日拜尚書郎恪勤職事所掌辦護兼理兩曹轉左丞案廣見謝書廣六世祖剛大司農馬宫辟為掾值王莽居攝剛即解其衣冠縣府門而去案宫乃平帝時司農也范同廣為太守法雄所舉故事孝廉高第三公尚書輒優之特勞來其舉者于是公府下詔書勞來雄焉案廣時為散吏法雄之子真自牗間見廣遂白雄舉之真固知人哉陳蕃陳蕃諌桓帝云宫女數千脂粉之耗不可勝數案蕃見東觀記陳蕃出為豫章太守性方峻不接賔客徵為尚書令送者不出郭門案蕃喪妻鄉人畢至惟許子將不往曰仲子性峻峻則少通故不造也然則仲舉風裁固自嶽嶽但以之居官則得耳王渙王渙為河南溫縣令土俗豪强渙到縣舉賢誅猾道不拾遺卧不閉門皆放牛于野案渙見東觀記渙以侍御史拜洛陽令故能治理若此後世作縣者舉動掣肘方救過不暇何以為治渙為洛陽令治民履正案此似有誤字邊韶邊韶字孝先以文學知名教授數百人韶口辨會晝假卧弟子嘲之曰邊孝先腹便便懶讀書但欲眠韶潛聞之應時對曰邊為姓先為字腹便便五經笥但欲眠思經事寐與周公通夢坐與孔子同意師而可嘲出何典記案韶陳留浚儀人晝寢何誅韶特口辨耳不足取也范列文苑傳坐范作靜為是張堪張堪讓先人餘財數百萬與兄子案堪見東觀記范丹范丹桓帝時以丹為萊蕪長不到官遭黨人禁錮結草而居有時絶糧閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪案丹見謝書丹之不任萊蕪以遭母憂故也桓帝時辟丹為太尉自以狷急不能從俗弊服賣卜于市案范書時丹辟太尉府非為太尉也一字之訛何翅千里霍融霍融上言漏刻率九日增減一等不與天相應不如夏厯合晷景刻漏四十八箭晷景為刻少所違失案融時官待詔太史所言漏刻事即詔史官與融以儀校天課度逺近卒如融言施行蓋官漏率九日移一刻不隨日進退夏厯漏隨日南北為長短密近于官漏也見范律厯志延篤李文德素善延篤謂公卿曰延篤有王佐之才欲令引進之篤聞為書止文德曰吾嘗昧爽櫛梳坐于客堂朝則誦虞夏之書厯公旦之典禮覽仲尼春秋當此之時不知天之為蓋地之為輿慎勿迷其本棄其生也案篤見謝書叔堅與文德書具載范傳其文雄偉奔放自是傑作此刪録乃不足觀黃琬黃琬方毅亷貞為侍中尚書案琬見東觀記張綱綱字文紀少以三公子經明行修舉孝亷不就司徒辟以高第為侍御史漢安元年拜光祿大夫與侍中杜喬等八人同日受詔持節分出案行天下貪亷墨綬有罪便收刺史二千石以驛表聞威惠清忠名振郡國號曰八雋是時大將軍梁冀侵擾百姓喬等七人皆奉命四出唯綱獨埋車輪於洛陽都亭不去曰豺狼當路安問狐狸遂上書曰大將軍梁冀河南尹不疑䝉外戚之援荷國厚恩以芻蕘之資安居阿保不能敷揚五教翼贊日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無厭多樹諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事於左皆忠臣之所切齒也書奏御京師震悚時冀妹為皇后內寵方盛冀兄弟權重於人主順帝雖知綱言不誣然無心治冀冀深恨綱㑹廣陵賊張嬰等衆數萬人殺刺史二千石冀欲陷綱乃諷尚書以綱為廣陵太守若不為嬰所殺則欲以法中之前太守往輒多請兵及綱受拜詔問當得兵馬幾何綱對曰無用兵馬遂單車之官徑詣嬰壘門示以禍福嬰大驚懼走欲閉門綱又於門外罷遣吏兵留所親者十餘人以書語其長老素為嬰所信者請與相見問以本變因示以詔恩使還請嬰嬰見綱意誠即出見綱綱延置上坐問其疾苦禮畢乃謂之曰前後二千石多非其人杜塞國恩肆其私求卿郡逺天子不能朝夕聞也故民人相聚以避害二千石信有罪矣為之者乃非義也忠臣不欺君以自榮孝子不損父以求福天子聖人欲文德以來之故使太守來思以爵祿相榮不願以刑也今誠轉禍為福之時也若聞義不服天子赫然發怒大兵雲合豈不危乎宜深計其利害嬰聞泣曰荒裔愚人數為二千石所侵枉不堪其困故遂相聚偷生明府仁及草木乃嬰等更生之澤但恐投兵之日不免孥戮耳綱曰豈其然乎要之以天地誓之以日月方當相顯以爵位何禍之有乎嬰曰茍赦其罪得全首領以就農畝則抱戴沒齒爵祿非所望也嬰雖為大賊起於狂暴自以為必死及得綱言曠然開明乃辭還營明日遂將所部萬餘人與妻子靣縳詣綱降綱悉釋縳慰納謂嬰曰卿諸人一旦解散方垂蕩然當條名上之必受封賞嬰曰乞歸故業不願以穢名汙明時也綱以其至誠乃各從其意親為安處居宅子弟欲為吏者隨才任職欲為民者勸以農桑田業並豐南州晏然論功綱當封為冀所遏絶故不得侯天子美其功徵欲用之嬰等上書乞留在郡二歲建康元年病卒官時年三十六嬰等三百餘人皆衰杖送綱喪至洛陽葬訖為起冢立祠四時奉祭思慕如喪考妣天子追念不已下詔褒揚除一子為郎案綱見謝書此續書全傳本文大略與范同范多諫委縱宦寺一疏文但平順故續書刋去耳又范傳與此篇句語時有異處如范云嬰等衆數萬人殺刺史二千石冦亂揚徐間積十餘年朝廷不能討冀乃諷尚書以綱為廣陵太守因欲以事中之云云先極鋪賊人凶熖方見太守平寇之難下三句尤以隱躍生妙績書冀欲陷綱及若不為嬰所殺諸語皆冀胸臆間事徑露反覺減味耳請兵一假范云前遣郡守率多求兵馬綱獨請單車之職則簡潔勝矣後假范作綱約之以天地誓之以日月嬰深感悟乃辭還營數語更約而該續書作綱言仿左氏至嬰答乃㳫拖不休自可刪却總之司馬撰書多以文勝范集衆美而刪潤之自能詳略得宜其行文亦往往入勝地也吳佑佑年四十餘乃為郡吏案佑見東觀記佑諸本皆作祐李英以二千石子而身自牧豕及為郡掾年已四十其貞不可及也郭泰郭泰字林宗太原介休人泰少孤年二十行學至曲阜屈伯彥精廬乏食衣不蓋形而處約味道不改其樂李元禮一見稱之曰吾見士多矣無如林宗者也及卒蔡伯喈為作碑曰吾為人作銘未嘗不有慙容惟為郭有道碑頌無愧耳初以有道君子徵泰曰吾觀乾象人事天之所廢不可支也遂辭以疾案泰見謝書碑銘一事中郎尚不免有愧何况後人朱子因人求墓銘曰吁嗟身後名于我如浮烟人既死了又要這物事做甚又信州一士人為其先人求墓銘朱子不許請之不已又却之臨别舉指云贈公務實二字世之操文章之柄而貪諛墓金者得不愧乎楊賜楊賜以病罷居無何拜為太常詔賜御府衣一襲案賜見東觀記承宫承宫琅邪人也嘗在䝉陰山中耕種禾黍人就認之宫便推與而去由是發名位至左中郎將侍中案宫見東觀記宫少孤為人牧豕鄉里徐子盛者以春秋經授諸生宫過好之因棄其豬而留聽經豬主怪其不還求索得宫欲笞之門下生禁止因留之案范書甚略不如續書之細寫宫嘗出行得虎所殺鹿持歸肉分門下取皮上師師不受宫因棄之人問其故宫曰既已與人義不可復取案宮時方為諸生執苦而其取與若此真不負聽經者范不載單于遣使求得見宫宫曰夷狄聞臣虛稱故欲見臣臣醜陋形寢不如選長大有威容者示之也案范無形寢及長大字則似宫竟一無威儀人矣則刪節之不當也宫子壘官至濟陰太守案范不載應志志字仲節汝南南頓人也曾祖父順案范書有九江賊蔡伯流等率衆詣徐州刺史應志降即此推其世次固應奉之雁行也桓典桓典字公雅為侍御史是時宦官亂政典執法無所回避常乘驄馬京都畏之為語曰行行且止避驄馬御史案典見東觀記陳實陳實舉灼然為司徒屬遷太丘長案實見華書范稱實以司空黃瓊辟選理劇補聞喜長繼以期喪去官復再遷太丘長與此不同灼然應是當時選舉名目孔奮孔奮守姑臧長治有異道時天下擾亂河西獨安而姑臧市日四合為河西富縣每前長居官數日輒致資産奮在姑臧四歲財産不增奮素孝自來為長時供養至謹在姑臧惟母極膳妻子飲食但葱韭案奮見東觀記餘同奮守姑臧太守梁統深相敬待不以官屬禮之常迎于大門敬以師友案白帖作太守梁竦未知孰是官屬之禮自有一定前代外吏凡屬員謁見上官過為諂屈匍匐曲跽比于奴隸一人作俑百不敢違不知爵有崇卑均為朝廷臣子何苦自辱乃爾而大吏竟受之不疑其于臣大無有作威作福之義何居也今注遵奉而行毫不紊清㑹典一書具載文武相見儀越曠古以來制之最善者矣奮以仁義為治抑强扶弱徐孺子陳蕃胡廣上疏薦徐孺子等曰伏見處士豫章徐孺子彭城姜肱德行純備著于人聽若使擢登三事協亮天工必能翼宣盛美增輝日月矣案孺子名稚見謝書君前臣名薦疏不應稱字蓋當時作史者以南州高名不敢斥之今相沿已久故竟標以徐孺子范滂范滂字孟博舉孝亷光祿四行時冀州饑荒盜賊羣起乃以滂為清詔使按察之登車攬轡慨然有澄清天下之志案滂見謝書漢官儀曰光祿舉敦厚質朴遜謙節儉為四行范同滂少勵清節為州里所知為清詔使至州境守令自知臧汚望風解印綬去其所舉奏莫不壓塞衆議案此即後世巡按御史之職今此官裁汰已久權盡歸督撫矣茍督撫皆能如范孟博何必多代巡一官也滂坐繫黃門北寺獄吏謂曰凡坐繫皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪將理之帝如其有罪祭之何益衆人由此止也案范書同宋則宋則子年十歲與蒼頭共弩射蒼頭弦斷矢激誤中之即死奴叩頭就誅則察而恕之穎川荀爽深以為美時人亦服焉案范不載楊璇靈帝時楊璇為零陵太守是時蒼梧桂陽猾賊相聚璇乃特製馬車數千乘以排囊盛石灰于車繫布索于馬尾又為兵車專彀良弩尅期㑹戰乃令馬車居前順風鼓灰賊不得視因以火燒布布然馬驚奔突賊陳因使後車弓弩亂發鉦鼓鳴震群盜波駭破散追逐傷斬無數案璇見謝書范同皇甫規皇甫規以西羌之叛為中郎將討納叛羌案規見謝書威明畸人蓋搶㦸與毛錐並用者非但善將兵而已張奐張奐拜太常卿設職官科限素有清節當可否之間强禦不可奪也案奐見東觀記奐才品與皇甫規相埒而為中官所賣助誅蕃武雖辭封塞咎不能贖也張奐字雅通以大司農轉太常病不任行免職案奐雖曽以司農轉太常然未嘗以病免且奐字然明亦與此異豈又一張奐耶張奐遷安定屬國都尉羌豪感奐恩德上馬二十匹先零酋長上金鐻八枚奐受之而召主簿于諸羌前以酒酹地曰使馬如羊不以入廄使金如粟不以入懷悉以還之案此與東觀記同竇武桓帝時京師童謠曰游平賣印自有評不避賢豪及大姓案武字游平與陳蕃合策戮力惟德是建咸得其人豪右大姓皆絶望矣案武見謝書此載范五行志朱穆穆舉髙第拜侍御史桓帝臨辟雍行禮畢公卿出虎賁置弓階上公卿下階皆避之穆過呵虎賁曰執天子器何故投于地虎賁怖即攝弓穆劾奏虎賁抵罪公卿皆慙曰朱御史可謂臨事不惑者也案穆見謝書此假較謝更寫得曲至如畫龎參龎參字仲逺河南緱氏人官至太尉案參前守漢陽時解郡人任棠之言果能抑强助弱以惠政得民亦賢者也李燮李燮拜京兆詔發西園錢燮上封事遂止不發吏民愛敬乃謡曰我府君道教舉恩如春威如虎剛不吐柔不茹愛如母訓如父案燮見謝書德公剛直可云世忠民謡絶不類東京人筆范不載傅燮燮軍斬賊三帥卜已張伯梁中寧等功高為封首案范書燮字南容北地靈州人燮所破張角之黨功多當封以疏劾中官趙忠等因訴譖之僅不加罪而已後為漢陽郡守節而死蓋勳勳曾祖父進漢陽太守祖父彪大司農案勳見謝書中平元年黃巾賊起故武威太守酒泉黃雋被徵失期梁鵠欲奏誅雋勳為言得免雋以黃金二十斤謝勳勳謂雋曰吾以子罪在八議故為子言吾豈賣恩哉終辭不受案范書稱勳不以私怨殺蘇正和及正和詣謝而勳又怨之如初蓋勳之公正類如此此條范不載隴右刺史左昌坐斷盜徵以扶風宋泉代之勳屢諫泉泉不從案泉范作梟古人命名即不論何至以梟惡稱從泉為是斷盜謂割截也至數千萬故徵是時漢陽叛人王國衆十餘萬攻陳倉三輔震動勳領郡兵五千人自請滿萬人因表用處士扶風孫瑞為鷹鷂都尉桂陽魏傑為破敵都尉京兆杜楷為威鹵都尉𢎞農楊儒為鳥擊都尉長陵第五雋為清冦都尉凡五都尉皆素有名悉領屬勳每有密事靈帝以手詔問之案此條范不載勳後遭董卓之暴公卿莫不卑屈惟勳長揖爭禮其傑士與荀淑淑對策刺梁氏故出補朗陵侯相案淑見張記范書但言譏刺貴幸為梁冀所忌正以隱躍生妙淑有高才王暢李膺皆以為師為朗陵侯相號稱神君案范書稱師事朗陵者又有李固無王暢名韓卓卓字子助臘日奴竊食祭其先卓義其心即日免之案卓見袁書餘同應劭劭字仲援案劭見東觀記劭字范作仲逺章懷云應氏譜同惟漢官儀又作仲瑗未知孰是劭又著中漢輯敘漢官儀及禮儀故事凡十一種百三十六卷朝廷制度百官儀式所以不亡者由劭記之官至泰山太守劭弟珣字季瑜司空掾即瑒之父案劭自是東京第一著作手漢人文集行世以碑銘賦頌為先劭之所輯皆所以嘉惠來學者不徒以詞章重也趙岐趙岐字臺卿獻帝以為太僕持節安慰天下案岐見謝書即趙嘉也岐時副馬日磾撫慰天下袁紹劉表等皆拱聽岐言王室小安鄭𤣥鄭𤣥公車徵為大司農給安車一乘所過長吏迎送案鄭公見謝書鄭𤣥少為鄉嗇夫得休不歸嘗詣學宫不樂為吏父數怒之不能禁嘗造太學受業師事京兆第五元先通京氏易公羊春秋三統厯九章算術案康成千載大儒而其學業淵源皆有所自世固無生而知之者也大將軍何進辟鄭𤣥𤣥以進權戚不敢辭意不得已而詣之進為設几杖待之甚優𤣥不受朝服而以幅巾見一宿逃去案康成此時已知何將軍之必敗故不受辟也范書作州郡以進權戚遂迫脅𤣥不得已而詣之較妥𤣥夢孔子造之曰起起今年歲在辰明年歲在已既寤以䜟言合之知命當終有頃寢疾而卒案歲至龍蛇賢才嗟此䜟語也見北齊劉晝髙才不遇傳蔣詡字元卿父喪弔者盈門後母疾之不得止舊廬自作小菴于側往如舊案范書闕蔡雍雍通逹有俊才博學善屬文伎藝術數無不精綜仕至左中郎將為王允所誅案雍見謝書葉向高云王允之誅雍五不韙廢紀一也滅典二也行已私三也失人望四也乖刑罰之中五也允其險乎允乎惡乎免史弼弼父敞為京兆尹化有能名尤善條教見稱于三輔案弼見謝書范稱敞以佞辨至尚書夫公謙公直當由庭誨佞辨何指乃削其賢尹之聲范過矣孔融融孔子二十世孫也高祖父尚巨鹿太守父宙太山都尉融幼有異才時河南尹李膺有重名敕門下簡通賔客非當世英賢及通家子孫弗見也融年十餘歲欲觀其為人遂造膺門語門者曰我李君通家子孫也膺見融問曰高明父祖嘗與僕周旋乎融曰然先君孔子與君先人李老君同德比義而相師友則融與君纍世通家也衆坐竒之僉曰異童子也大中大夫陳煒後至同坐以告煒煒曰人小時了了者大亦未必竒也融答曰即如所言君之幼時豈實慧乎膺大笑顧謂曰高明長大必為偉器山陽張儉以中正為中常侍侯覽所忿疾覽為刋章下州郡捕儉儉與融兄褒有舊亡投褒遇褒出時融年十六儉以其少不告也融知儉長者有窘迫色謂曰吾獨不能為君主耶因留舍藏之後事泄國相以下密就掩捕儉得脫走登時收融及褒送獄融曰保納藏舍者融也融當坐之褒曰彼來求我罪我之由非弟之過我當坐之兄弟爭死郡縣疑不能决乃上讞詔令褒坐焉融由是名震逺近與平原陶丘洪陳留邊讓並以俊秀為後進冠蓋融持論經理不及讓等而逸才宏博過之司徒大將軍辟舉高第纍遷北軍中候虎賁中即將北海相時年三十八承黃巾殘破之後修復城邑崇學校設庠序舉賢才顯儒士以彭璆為方正邴原為有道王修為孝亷告髙密縣為鄭𤣥特立一鄉名為鄭公鄉又國人無後及四方賢士有死亡者皆為棺木而殯葬之郡人甄子然孝行知名早卒融恨不及見乃令配食縣社其禮賢如此在郡六年劉備表融知青州刺史建安元年徵還為將作大匠遷少府每朝㑹訪對輒為議主諸卿大夫寄名而已案融見張記融志大名髙為操所憚操故害之綱目特書操殺而不去其官有以也子瞻有言文舉以英偉冠世之姿師表海內意所豫奪天下從之此人中龍也與曹操鬼蜮之雄勢不兩立如天未欲亡漢公誅操如殺狐兔耳良然此條乃續書本文與范書大同但少省耳筆力工拙亦近惟答陳煒云觀君所言將不早慧乎語較簡峭太尉楊彪與袁術婚姻術僭號大祖與彪有隙因是執彪將殺焉融聞之不及朝服往見太祖曰楊公纍世清德四葉重光周書父子兄弟罪不相及况以袁氏之罪乎易稱積善餘慶但欺人耳太祖曰國家之意也融曰假使成王欲殺召公則周公可得言不知耶今天下纓緌縉紳之士所以瞻仰明公者以明公聰明仁智輔相漢朝舉直措枉致之雍熙耳今橫殺無辜則海內觀聽誰不解體孔融魯國男子明日便當褰衣而去不復朝矣太祖意解遂理出彪案此見范楊彪傳後北海被害時乃無一人援救者彼小兒楊德祖亦岌岌矣老瞞之罪可勝誅乎橋𤣥𤣥字公祖嚴明有才略長于人物案公祖見張記橋𤣥為司空轉司徒素與南陽太守陳球有隙及在公位而薦球為廷尉案陳廷尉素剛正即竇太后配祔一事操議甚健乃知橋公之薦非徒博舉不避仇之名也司馬朗朗祖父俊字元異博學好古倜儻有大度長八尺三寸腰帶十圍儀狀魁岸與衆有異鄉黨宗族咸景附焉位至潁川太守父防字建公性質直公方雖閒居宴處威儀不忒雅好漢書名臣列傳所諷誦者數十萬言少仕州郡厯官洛陽令京兆尹以年老轉拜騎都尉養志閭巷闔門自守諸子雖冠成人不命曰進不敢進不命曰坐不敢坐不指有所問不敢言父子之間肅如也年七十一建安二十四年終有子八人朗最長次即晉宣皇帝也案此乃續書序傳故其文特詳朗字伯達河內溫人魏志有傳鄭渾渾高祖父衆字子師大司農衆父興字少贛諫議大夫案渾字文公河南開封人魏志有傳皇甫嵩皇甫蒿領冀州牧請一年租賑饑民民歌之曰天下亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居案嵩見謝書嵩舉孝廉為郎中遷霸陵臨汾令以父喪遂去官案范書不載皇甫嵩為左中郎將持節與右中郎將朱俊共發五校三河騎士及募精勇四萬餘人嵩俊各統一半共討潁川黃巾賊有大功案嵩討黃巾使張角傳首京師餘黨悉殄厥功甚偉范詳董卓既誅嵩拜太尉以日有重珥免案董卓之亂雖非嵩釀之然在陳倉卓可收而不收校尉之徵嵩可以不赴而竟赴卒使東京板蕩中原陸況雖曰天運亦人謀之不臧耳日珥范作流星申屠蟠申屠蟠九歲喪父孝毁過禮服除不進肉十餘年每忌日輒三日不食案蟠見謝書范同蟠同縣大女緱玉為從父報仇殺夫之從母兄李士姑執玉以告吏令欲論殺玉蟠時年十五極諫之得減死論案玉之報讐范作為父是父一而已不共戴天則理在必報若為從父而報則論殺未為不當蟠何諌焉今命案例分故殺誤傷守令監司議其獄撫軍核之撫軍擬以入告大司冦又核之其有彼此格鬬迫于旨救父母而誤殺人者多奉奏乃得以減死論蓋慎重著九卿詹事科道㑹擬具若此則生者不枉死者亦不至含寃也董卓廢立徵荀爽為司空韓融為尚書陳紀為侍中惟蟠不到案爽等後為賊卓所迫或僅以身免蟠之明哲已早知之矣陳羣陳羣父子並著高名世號三君每宰府辟召常同時旌命羔雁成羣當時靡不榮之案羣字長文為魏司空父紀祖父實世所稱公慙卿卿慙長者也此三君又非顧㕑俊及之三君袁逢袁逢為三老賜玉杖案逢見華書盧植植字子幹少事馬融與鄭𤣥同門相友植剛毅有大節嘗喟然有濟世之志不茍合取容不應州郡命召建寧中徵為博士出補九江太守以病去官作尚書章句禮記解詁稍遷侍中尚書張角起以植為北中郎將征角失利抵罪頃之復以為尚書張讓劫少帝奔小平津植手劍責數讓等讓等皆放兵垂泣謝罪遂自殺董卓議欲廢帝衆莫敢對植獨正言語在卓傳植以老病去位隱居上谷軍都山初平三年卒太祖北征栁城過涿郡令告太守曰故北中郎將盧植名著海內學為儒宗士之楷模乃國之楨幹也昔武王入殷封商容之閭鄭喪子産而仲尼隕涕孤到此州嘉其餘風春秋之義賢者之後有異于人敬遣丞掾修墳墓并致薄醊以彰厥德植有四子育最小案植見袁書植攻黃巾以小黃門之譖故檻車就徵後皇甫嵩平賊盛稱植行師方略因復拜尚書此所載簡略不明太祖北征字于史體不合范作曹操北討為是盧植能飲一石不醉郗慮慮字鴻豫山陽高平人也少受學于鄭𤣥建安初為侍中案獻帝時以光祿勳郗慮為御史大夫後同華歆勒兵弒伏后不知其所學何在適足玷鄭公之門耳孔融稱其僅可與立立固如是哉唐珍珍中常侍唐衡弟張皓皓中常侍張奉弟案珍皓二人皆以貨取位故續書及之亦見魏志楊彪彪見漢祚將終自以纍世為三公恥為魏臣遂稱足攣不復行積十餘年帝即王位欲以為太尉令近臣宣旨彪辭曰嘗以漢朝為三公值世衰亂不能立尺寸之益若復為魏臣于國之選亦不為榮也帝不奪其意黃初四年詔拜光祿大夫秩中二千石朝見位次三公如孔光故事彪上章固讓帝不聽又為門施行馬吏卒以優崇之年八十四以六年薨案彪見華書楊公四世清德魏武誣以大逆後又殺其子修怨毒甚矣今乃欲以腐鼠嚇鵷何其悖也又續書乃漢統不當稱魏為帝蓋當時以司馬承魏比義唐虞彪固懿親遵而不改惟習鑿齒作陽秋獨以司馬氏應繼漢且作論云魏自君之道不正則三祖臣魏之義未盡又云以晉承漢功實顯然此真卓然有史識者司馬涑水作資治通鑑猶以魏為正統至朱子綱目出而其義乃大明矣帝即王位句宜作魏文受禪觀范書可知彪代董卓為司空又代黃琬為司徒時袁術僭亂操託彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆案此詳見孔融傳魏文帝詔曰先王制几杖之賜所以賓禮黃耉太尉彪乃祖以來世著名績其賜公延年杖延請之日便以杖入也案范書但言賜几杖而已不詳載楊彪博議多文著作東觀孟郁郁中常侍孟賁之弟案郁洛陽人蜀志有孟光為漢太尉孟郁之族郁事别無他見孫程程徙封宜城侯既到國怨恨恚懟刻瓦為印封還印綬案程見東觀記後漢書補逸卷二十

body:
  text: 後漢書補逸卷二監察御史姚之駰撰東觀漢記第二光烈隂后有隂子公者生子方方生幼公公生君孟名睦即后之父也案子方即臘日以黃羊祠竈神者至睦子識三世而果繁昌范不載明德馬后永平三年有司奏立長秋宫以率八妾上未有所言皇太后曰馬貴人德冠後宫遂登至尊先之數日夢有小飛蟲萬數隨著身入皮膚中復飛去案德冠後宫后真不愧此語女中堯舜明德先之矣范同后長七尺二寸青白色方口美髮為四起大髻但以髮成尚有餘繞髻三匝眉不施黛獨左眉角小缺補之如粟嘗稱疾而終身得意案繞髻補眉事范俱不載嘗稱疾而終身得意句真善狀幽間貞靜之性范亦剛之陋甚馬后袍極粗疏諸王望見乃以為綺案范紀諸王就視乃笑后日此增時宜染色故用之嗚呼躬省約而不居其名夫是乃非矯儉后不喜出入遊觀希常臨御忩望后置蠶室織室于濯龍中數往來觀視案明德此舉深得古后妃躬桑之意范作置織室蠶于濯龍中似誤太后詔曰吾萬乘之生身衣大練縑裙食不求所甘左右傍人皆無薰香之飾案此乃后辭封外戚詔語明帝封子不欲與先帝子等后復不敢以馬氏比隂氏刑于之化千古無兩太后時廣平巨鹿樂成三王入朝問起居上望車騎鞍勒皆純黑無金銀彩飾以白太后各賜錢五百萬案孝明封諸子租嵗不過二千萬故諸王皆儉約若此章帝請賜可謂以孝成慈后嘗有不安時在敬法殿東廂上令太夫人及兄弟得入見明德后曰吾前過濯龍門見外家問起居車如流水馬如龍亦不譴怒但絶其歲用冀以默止歡耳案以默止歡四字深于黃老之學者焉如龍范作如遊龍反覺減色上欲封諸舅馬太后輒斷絶曰吾計之熟矣勿有疑也至孝之行安親為上今遭變異穀價數倍憂惶晝夜不安坐卧而欲封爵違逆慈母之拳拳吾素剛急有胸中氣不可不慎穰嵗之後惟子之志吾但當含飴弄孫不能復知政事案范紀大同但覺句弱不如本書遒徑和熹鄧后和熹皇后六嵗諸兄持后髮后曰身體髮膚受之父母不敢毁傷孝之始也奈何弄人髮乎案后為太傅禹之孫范書載后年五嵗太傅夫人自為剪髮年髙目冥誤傷后額忍痛不言恐傷老人意較此戒弄髮意更深范故刋此録彼耶鄧后遜位手書謝表深陳德薄不足以奉宗廟充小君之位案時隂后以巫蠱事廢后稱篤疾深自閉絶帝以后德冠後庭遂立之則知三讓非矯矣鄧后臨朝萬國貢獻悉令禁絶嵗時但貢紙墨而已案范書作后即位時恐后方內助不能専絶貢獻本書作臨朝其在稱制後耶和熹皇后嘗夢捫天體蕩蕩正青滑有若鍾乳后仰吸之以訊占夢言堯舜攀天而上湯夢及天舐之此皆聖王之夢吉不可言案舐范作咶鄧后稱制京師旱至五月朔太后幸洛陽寺省庶獄舉寃囚杜冷不殺人自誣被掠羸困使輿見畏吏不敢自理吏將去微疾舉頸若欲有言太后察視覺之即呼還問狀遂信即時收令下獄抵罪尹左遷行未還宫澍雨大降案鄧太后稱制殁身道慚復子然而在位歷年善政不可枚舉范稱其持權引謗深于知鄧后者呂武不足論亦非後世埀簾母后所得藉口也范同鄧太后嘗不安左右憂惶至令禱祠願以身代牲鄧太后聞之甚怒即敕令禁止以為何故乃有此不祥之言左右咸流涕嘆息曰太后臨大病不自顧而念兆民後病遂瘳豈非天地之應與案范作禱請祝詞願得代命于不祥義為近鄧太后臨朝上林鷹犬悉斥放之案斥放范作斥賣非和熹聖德豈與小民爭利乎太后雅性不好淫祀案殤帝延平中詔罷祠官不在祀典者太后之令也鄧太后賜馮貴人步搖一具案釋名曰皇后首副其上有埀珠步則搖也太后樛木之慈至于被服不欲以殊禮自尊雖太姒奚愧焉順烈梁后永建三年春三月丙申選入掖庭相工茅通見之矍然驚駭却再拜賀曰此謂日角偃月相之極貴臣所未嘗見也案后梁商之女矍然驚駭却再拜賀八字甚腴范不及竇貴人竇章女年十二能屬文以才貌選掖庭有寵與梁皇后並為貴人早卒帝追思之詔史官樹碑頌德帝自為之詞案順烈梁后曽為貴人竇貴人之寵必在此時非與桓帝梁后並者也齊武王縯縯字伯升有二子建武二年立長子章為太原王興為魯王十一年徙章為齊王十五年追諡伯升為齊武王章少孤光武感伯升功業不就撫育恩愛甚篤以其少貴欲令親吏事故試守平隂令案伯升初起自稱柱天都部名甚竒後為更始所害范同伯升進圍宛莽素震其名大懼使畫伯升像于旦起射之案説文射臬也廣雅的也續書亦同此范書稱莾使長安官署及天下鄉亭皆畫伯升于孰旦起射之注曰孰門側堂也愚莽射像何至遍畫署亭從為近平陵後部攻新野不下宰潘臨登城言曰得司徒劉公一言願先下及伯升軍至即開門降案世祖創開功業隆起然伯升餘威亦有助焉世祖之友于足相報也范書失載宰名北海靖王興興遷𢎞農太守縣吏張申有伏罪興收申案論郡中震栗時年旱分遣文學循行屬縣理寃獄宥小過應時甘雨澍降案興初封魯王嗣光武兄仲後以魯國益東海故徙興為北海王興每朝廷有異政京師雨澤秋稼好醜輒驛馬下問興其見親重如此案秋稼好醜四字甚古范略趙孝王良光武初起兵良搏手大呼曰我欲詣納言嚴將軍叱上起去出閣令人視之還白方坐啖脯良復歡呼上言不可歡露明旦欲去前白良曰欲竟何時詣嚴將軍所良意下曰我為詐汝耳當復何若乎案良字次伯光武之叔此關光武初起兵事范闕載本書瑣筆如畫良裔孫乾嗣位私出國到魏郡鄴易陽止宿亭令奴金盜取亭席金與亭佐孟常爭言以刃傷常部吏追逐乾藏逃金絞殺之懸其尸道邊樹相國舉奏詔書削中丘縣案乾後以賢傅能改悔前失遂復所削縣城陽恭王祉城陽恭王初名終後改名祉案祉字巨伯光武族兄祉祖考侯仁于時見戶四百七十六上書願減户徙南陽留子男昌守墳墓元帝許之案仁以舂陵地下濕故求減邑內徙祉父敞為廬江都尉嵗餘遭旱行縣人持枯稻自言稻皆枯吏強責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事耶敞怒叱太守曰鼠何敢爾刺史舉奏莽徵到長安免就國案枯稻責租太守固食苗之碩鼠也宜迎貓食之耳敞叱甚當讀石壕吏舂陵行等篇千古同慨矣范闕敞為嫡子終即祉也娶翟宣子女習為妻宣使嫡子姬送女入門二十餘日宣弟義起兵攻莽案宣乃丞相方進之子祉坐是繫獄僅免刑誅遂見沉廢不知積善有餘天將興之也祉以建武二年二月見光武于懷宫案范書光武起兵惟祉先至見之甚歡東海恭王強王兼食二郡二十九縣租入倍諸王賞賜恩寵絶于倫比置虎賁髦頭宫殿設鐘簴之懸王數上書讓東海又因皇太子固辭上不許以章宣示公卿案世祖以強廢不以過去就有禮故優以大封二郡東海及魯郡也髦范作旄是王恭謙好禮以德自終與明帝之友于交相美矣范同王孫頃王肅性謙儉永初中以西羌未平上錢二千萬元初中上縑萬匹以助國費案頃王可謂繩其祖武也沛獻王輔沛獻王輔善京氏易永平五年少雨上御雲臺自為卦以周易林卜之其繇曰蟻封穴户大雨將至以問輔輔對曰蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居知雨將至故以蟻為興居案孔子言易者象也象者像也朱子謂程傳言理已備象數却欠乃本義言卦象亦謂象失其傳不可理會故言易必首言象方為善易蓋象之取義或以卦情或以卦形或以卦體或以中爻或以爻變或以占中或以錯卦綜卦夫圓圖之對待者即錯象亦寓焉如乾錯坤乾為馬坤即利牝馬之貞卦序之流行者即綜象亦寓焉如噬嗑綜賁噬嗑利用獄而賁即無敢折獄至二四三五之合六爻之變又復錯中有錯綜中有綜無非象也沛獻之占易得之矣王性好經書論集經傳圖讖作五經通論奉蕃以至沒身遵履法度未嘗犯禁稱為賢王案范稱王作五經論時號之曰沛王通論非自詡以為通也東平憲王蒼王少有孝友之質寬仁𢎞雅帝即位詔以為驃騎將軍位在三公上四年蒼上疏願朝上以王觸寒涉道使中謁者賜乘輿豹裘蒼到洛陽使鴻臚持節郊迎引入不在贊拜之位升殿乃拜上親答拜諸王歸國上特留蒼八月飲酎畢大鴻臚奏遣蒼發上親臨送流涕賞賜以億萬數案東平千古賢王而顯宗優禮亦可謂交相得矣東京諸王多賢朝廷亦甚得大體前漢與唐宋皆不及明帝詔書示諸國曰詔問東平王處家何等最樂王對曰為善最樂其言甚大副其要腹蒼體長美鬚眉要帶八尺二寸案為善最樂四字遂成千古名言言大副要亦俳亦雅范稱蒼要帶八圍明帝詔曰東平王蒼寬博有謀可以託六尺之孤臨大節而不可奪其以蒼為驃騎將軍案范書闕詔語時特置將軍掾史位在三公上也蒼為將軍是時四方無虞蒼以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度及祖廟登歌八佾舞數蒼以親輔政盡心王室每有議事上未嘗不見從名稱日重案蒼以懿親議禮上匹元公東平王蒼與諸王朝京師月餘還帝臨送歸宫悽然懷思乃遣使手詔諸國曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及採菽以增歎息案此永平十一年王來朝也手詔文詞古茂范同肅宗遣諸王歸國帝特留東平王蒼賜以祕書列圖道術祕方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉與天性誠不以逺近親疏然數見顔色情重昔時中心戀戀惻然不能言于是車駕祖送流涕而訣復賜乘輿服御珍寶鞍馬錢布以億萬計案范載詔語又云念王久勞思得還休欲署大鴻臚奏不忍下筆故授小黃門數語情摯千古引本書者抹之惜矣章帝詔東平王蒼惟王孝友之德今以光烈皇后假髻帛巾各一衣一篋遺王可時瞻視以慰凱風寒泉之思案一本作建初三年上賜東平王書曰嵗月驚邁山陵寖逺孤心慘愴今送光烈皇后假紒帛巾各一及衣一篋云云文情更爾斐亹章帝幸東平祭東平王墓云思其人到其鄉其度在其人亡案范作追感念蒼謂其諸子曰思其人云云遂幸蒼陵觀四語固非祭墓文也琅邪孝王京琅邪孝王京就國都雅好宫室窮極技巧壁帶珠玉飾以金銀案范書作殿館壁帶皆飾以金銀注云壁帶壁中橫木也如本書則帶訓裝耳彭城靖王恭永平九年恭未有國邑賜號靈夀王案靖王明帝子賜號特美名耳後乃封巨鹿王徙彭城恭子男丁前妻物故子酺侮慢丁小妻恭怒閉酺馬廨酺亡夜詣彭城縣欲上書恭遣從官蒼頭曉令歸數責之乃自殺案范書但言以事怒子酺酺自殺不詳載元初五年封恭少子丙為都鄉侯國為安鄉侯丁為魯陽鄉侯本初元年封恭孫據卞亭侯光昭陽亭侯固公梁亭侯興蒲亭侯延昌城亭侯祀梁父亭侯堅西安亭侯代林亭侯下邳惠王衍和帝賜彭城靖王詔曰皇帝問彭城王始夏無恙蓋聞堯親九族萬國協和書典之所美也下邳王被病沉滯之疾昏亂不明家用不寧姬妾嫡庶諸子分爭紛紛至令前太子卭頑凶失道陷于大辟是後諸子更相誣告訖今嫡嗣未知所定朕甚傷之惟王與下邳王恩義至親正此國嗣非王而誰禮重嫡庶之序春秋之義大居正孔子曰惟仁者能好人能惡人貴所好惡得其中也太子國之儲嗣可不慎與王其差次下邳諸子可為太子者上名將及景風拜授印綬焉案衍亦明帝子時被病荒忽諸姬爭欲立其子和帝使彭城王恭到下邳正其嫡庶故有此詔卒立子成為太子國賴以安可謂善處人骨肉之間者矣北海敬王睦時法網尚疏睦性好士夙夜滋恭通賔客千里人民土地財賄結歡由是宿德名儒造門者陸沉案睦靖王興子能屬文又善史書范略同陸沉字似有誤清河王慶永元四年王移幸北宫章德殿講白虎觀慶得入省宿止案清河乃孝章子初為太子以讒廢和帝即位特寵異焉時帝方欲誅竇氏清河入省宿止實密贊之生子祐是為安帝平原王平原王葬鄧太后悲傷命史官述其行迹為作傳誄藏于王府案平原懷王和帝子少有痼疾薨時無子鄧太后以樂安王子得為其後得又無子又以河間王子嗣之其鍾愛可知矣劉聖公更始至長安御府帑藏武庫皆安堵如故案聖公名玄紀元更始光武之族兄也初王莽敗惟未央宫被焚餘皆不改于舊更始一旦居之自謂平生願足矣豈能如沛公之入咸陽哉徐宣樊崇等入至𢎞農枯樅山下與更始將軍蘇茂戰崇北至蓩鄉轉至湖案范書是時方望立孺子嬰為天子更始遣李松蘇茂擊斬之三月遣李松會朱鮪戰于蓩鄉即此也續漢志𢎞農有蓩鄉章懷注湖即湖城縣更始至長安止前殿郎吏以次侍更始愧恧俯刮席與小常侍語案聖公結客報仇詐死逃匿亦稱傑士乃一登大位便爾羞恧固知帝王自有真也與小常侍語五字真妙絶形容范書不及更始所置官多羣小長安謂之曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯案聖公狎眤小人豫章李淑切諫以為敗材傷錦所宜至慮遂繫詔獄雖無赤眉何必不亡更始在長安諸將皆冠幘而服婦人衣諸于襜褕更始所爵多羣小三輔苦之被服威儀不以衣冠或繡䘿衣錦袴案續書以為服妖也更始韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我正用此時持事來乎起抵破書案案是時更始委政趙萌日夜與婦人飲宴羣臣言事輒醉不能見小器易盈何以克濟東觀妙筆南史中往往脫胎于此陳后主齊東昏後明𢎞光亦接踵聖公者也吳祭酒偉業詩云聞築新宫就君王擁麗華尚言虛內主廣欲選良家使者螭頭舫才人豹尾車可憐青塜月已照白門花亡國之君千古一轍雒陽人韓鴻為謁者更始使持節降河北拜除二千石案范書見吳漢傳漢初由鴻拜安樂令劉盆子赤眉遇光武軍驚震不知所為乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之上曰待汝以不死耳案盆子朱虛侯之後始從羣盜以探符得立真同兒戲時世祖自將盛兵以邀其走路故乞降也劉盆子及丞相徐宣以下二十餘萬人肉袒降奉高皇帝傳國璽綬詔以屬城門校尉賊皆輸鎧仗積兵甲宜陽城西與熊耳山齊案范書璽綬下有更始七尺寶劍及玉璧各一公賔三輔豪傑入長安攻未央宮庚戌殺莽于漸臺東海公賔就得其首傳詣宛封滑侯案范書略見劉聖公傳殺莽者商人杜吳也公賔時為校尉就斬莽首風俗通曰公賔姓魯大夫公賔庾之後彭寵彭寵為漁陽太守容貌絶衆案范書寵父宏為漁陽守偉容貌能飲食寵于更始時拜偏將軍但行漁陽太守事此所引當屬彭宏非寵也寵妻夢裸袒冠幘踰城髠徒推之又寵堂上聞蝦蟇聲在火爐下鑿地求之不得案范書但言惡夢怪變不詳伯通以怨望謀反自取誅滅妖由人興不足惜也蒼頭子密縛寵以寵命呼其妻妻入驚曰奴反奴乃捽其妻頭擊其頰詔討彭寵者封侯寵奴子密等三人乘寵晝卧密等遂縛寵著牀召其妻入縫縑囊夜斷寵及妻頭盛囊中投世祖世祖以奴殺主不義復不可不封乃封子密為不義侯案寵授首奴僕本書細載其始末以警不能齊家者至光武知其不義又從而侯之權德輿以為漢爵乃不足勸良然唐末周曇咏史詩云當時若縳還彭氏率土何憂不自歸得之矣隗囂彭寵與吳漢圍隗囂于西城敕彭書曰西城若下便可將兵南擊蜀鹵人苦不知足既平隴復望蜀每一發兵頭鬢為白案囂字季孟天水成紀人隗囂故宰府掾吏善為文書每上書移檄士大夫莫不諷誦案此似指囂為國師劉歆事時則文書自出囂手范云囂賔客掾史多文學生與此不同隗囂既立使聘平陵方望為軍師望至説囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信于衆宜急立高廟稱臣奉祠所謂神道設教求助民神者也囂從其言案囂從望言遂立廟于邑東祀髙祖太宗世宗稱臣奉璧薶血加書以漢後稱年可謂應天順人之舉乃其末路終持兩端遂至滅亡殊可惜也囂將王元説囂曰昔更始西都四方響應天下喁喁謂之太平一旦敗壞今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之説棄千乘之基計之不可者也今天水完富士馬最強北取西河東收三輔案秦舊迹表裏山河元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且蓄養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸囂然其計案王惠孟之説壯矣然回成喪而為議豈為智乎隗囂病且餓出城餐糗糒恚憤而死案囂死後子純立為王後亦被誅公孫述述之先武帝時以吏二千石自無鹽徙成帝末述父仁為侍御史任為太子舍人稍增秩為郎案述字子陽扶風荗陵人范云述以父任為郎注任保任也初垣副以漢中亭長聚衆降成自稱輔漢將軍述攻成大破之副殺成降案范稱南陽人宗成自稱虎牙將軍大掠成都述惡之遂詐稱漢使假述輔漢將軍擊成與此不同垣秦邑因以為姓見風俗通光武與述書曰承赤者黃也姓當塗其名髙也案范書載光武書云圖讖言公孫即宣帝也代漢者當塗髙君豈髙之身耶與此不同援神契曰五德之運黃承赤而白繼黃公孫以西太守為白德故帝書破之功曹李熊説公孫述曰蜀地沃野千里土壤膏腴果實所生無榖而飽戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荆揚所謂用天因地成功之資今名號未定志士狐疑宜即大位使逺人有所依歸述遂自立為天子案公孫竊帝蜀漢為井底蛙李功曹實成之遜常少張隆遠矣李忠李忠字仲都發兵奉世祖為右將軍封武固侯辭時無綬上自解所佩綬以賜之案忠東萊黃人封中水侯忠父為髙密中尉案范書中作都章懷注云郡國志有髙密侯百官志侯有中尉其都尉惟郡有之今髙密非郡則作都字者誤上初至不脫衣帶衣服垢薄使忠解浣長襦忠更作新袍袴解支小單衣襪而上之案世祖于忠親愛特至儼若家人父子故能得其死力王郎遣將攻信都大姓馬寵開城納之收李忠母妻子而令親屬招呼忠時寵弟從忠為校尉忠即召見責數之以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何也忠曰若縱賊不誅則二心也上聞而謂忠曰今吾兵已成矣將軍可歸救若母妻子忠曰蒙明公大恩忠得效命誠不敢內顧宗親案忠家屬在馬寵手而特殺其弟是激之使殺也妻子可棄母亦可忍乎程伊川譏趙苞之遽戰而殺其母以為當求所以生母之方如王陵母在楚而使楚質以招陵陵降可也徐庶得之矣然則忠之不敢內顧豈聖賢之道乎上會諸將問破賊所得物惟李忠獨無所掠上即以所乘大驪馬及繡被衣物賜之案破賊而問所掠豈得為仁義之師范同王常王常為橫野大將軍位次與諸將絶席案常字顔卿漢官儀稱御史大夫尚書令司𨽻校尉皆専席絶輿専義同王常其先鄠人常父博成哀間轉客潁川舞陽因家焉案常以匹夫興義兵始事聖公卒歸光武其真知命者乎更始之封名相稱矣光武于大會中指王常謂羣臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日遷常為漢中將軍案漢中范作忠為是李通齊武王嘗殺通同母弟申屠臣上恐其怨不欲與軼相見軼數請上乃強見之軼深逹通意上乃許往意不安買半臿佩刀懷之至通舍甚歡握上手得半臿乃謂上曰一何武也上曰倉卒時以備不虞耳案通字次元宛人軼乃通從弟首創巨謀以應劉氏復興李氏為輔之讖可謂智矣范不載鄧晨晨曽祖隆揚州刺史祖父默交趾刺史案農字偉卿南陽新野人初娶光武姊元趣兵以應光武後封房子侯晨與上共載出逢使者不下車使者怒頗加恥辱上稱江夏卒晨更名侯家丞使者以其詐將至亭欲罪之新野宰潘叔為請得免案范書闕來歙來歙與劉嘉俱詣洛陽世祖見歙與之大歡即解所披襜褕以衣歙案歙字君叔新野人時嘉為漢中王君叔勸之歸世祖來歙蓋延攻公孫述蜀人大懼使刺客刺歙歙未死馳告蓋延延見歙悲哀不能仰視歙叱曰欲屬以軍事而反效兒女子涕泣乎案君叔雄姿被刺不為身惜而屬虎牙以軍事范書敘述凛稟千載如生此係刪節本書遂覺減色歙與征虜將軍祭遵襲略陽因保其城上聞甚悅左右怪上數破大敵今得小城何足以喜然上以略陽囂所依阻心腹已壞則制其支體易也案范書不載上悅語不見光武料敵之神帝因歙上疏宜益選兵馬儲積資糧詔于汧積穀六萬斛驢四百頭負馱鄧禹鄧禹聞上安集河北即杖䇿北渡追及于鄴禹進曰三輔假號往往羣聚皆庸人崛起志在財帛非有忠良明智深慮逺圖尊主安民者也明公雖建蕃輔之功猶恐無所成立于今之計莫如延攬英雄務悅民心立髙祖之業救萬民之命以公而慮天下不足定也上大悅案禹字仲華新野人封髙密侯運籌帷幄光武之子房也杖䇿數語瞭若指掌非王佐不能馮愔反鄧禹征之為愔所敗至髙陵軍士飢餓皆食棗葉案范書馮愔反帝遣宗廣持節降之禹威稍損赤眉復還入長安禹與戰敗走至髙陵與此異棗葉范作棗菜是鄧禹破邯鄲誅王郎有智謀諸將鮮及上至廣阿止城開樓上披輿地圖指示鄧禹曰天下郡國如是我乃始得一處卿言天下不足定何也案禹對以古之興者在德厚薄不以大小雖伊召何以加兹上率禹等擊王郎橫野將軍劉奉大破之上過禹營外進炙魚上餐啖勞勉吏士威嚴甚厲衆皆竊言劉公真天人也案范書闕建武中鄧禹罷三公以列侯就第位特進鄧禹篤于經書教學子孫案禹子十三人各使守一藝善于教矣赤眉入長安鄧禹乘勝獨克而師行有紀皆望風相攜以迎降者日以千數衆號百萬案鄧禹行師不失弔伐遺意鄧禹攻赤眉賊不利吏士散已盡禹獨與二十四騎還詣洛陽鄧禹自中興後纍葉貴寵凡侯者二十九人東京莫比鄧訓訓謙恕下士無貴賤見之如舊朋友子往來門內視之如子有過加鞭朴之教大醫皮巡從獵上林還暮宿殿門下寒疝病發時訓直事聞巡聲起往問之巡曰冀得火以尉背訓身至大官門為求火不得乃以口噓其背復呼同廬郎共更哺至朝遂愈案訓字平叔禹第六子范書但言樂施下士而已不細載也訓故吏最貧羸者舉國念訓常所服藥北州少乏又知訓好青泥封書從黎陽步推鹿車于洛陽市藥還過趙國易陽并載青泥一襆至上谷遺訓其得人心如是案此訓將黎陽營兵屯狐奴事狐奴屬漁陽郡市藥載泥二事甚韻吏士常大病瘧轉易至數十人訓身為煮湯藥咸得平愈其無妻者為適配偶案本書序訓好施下士瑣屑詳至千載下猶欲為之執鞭也訓坐私與梁扈通書免歸燕人思慕為之作歌鄧訓為護羌校尉發湟中秦胡羌兵四千人出塞掩擊迷唐于雁谷迷唐乃去其春復欲歸故地乃發湟中六千人令長史任尚將之縫革為船置于箄上以渡河掩擊迷唐廬落大豪多所斬獲案箄木筏也雁范作寫鄧訓拜張掖太守以身率下河西改俗鄰郡則之鄧訓為護羌校尉時羌俗耻病死每病臨困輒以刀自刺訓聞有困病者輒拘持束縛不與兵刃使醫藥療之愈者非一小大莫不感悅訓病卒吏人羌人愛惜旦夕臨者日數千人或以刀自割又刺殺犬馬牛羊曰鄧使君已死我曹亦且俱死耳前烏桓吏人皆奔走道路至空城郭案訓善政不知若何乃得人心如此子輿氏所謂以德服人者也鄧陟鄧陟字昭伯案范書陟作隲訓之子也永初元年封陟等以定䇿增三千戶讓不獲遂逃避使者閉關上疏自陳案時封陟上蔡侯陟弟悝葉侯𢎞西平侯閭西華侯上書辭謝至于五六持盈若此宜其纍葉貴盛也髙密之教學深矣鄧陟以延平九年拜為車騎將軍儀同三司耿嵩耿嵩履清髙之節齔童介然特立不隨于俗鄉黨大夫莫不敬異之王莽敗賊盜起宗族在兵中穀食貴人民相食宗家數百人升合分糧時嵩年十二三宗人少長咸共推之主廩給莫不稱平案范書闕嵩之分糧與陳戶牖均肉事絶類後漢書補逸卷二

body:
  text: 後漢書補逸卷十一監察御史姚之駰撰謝承後漢書第三董种董种琅邪姑幕人為不其令赤雀乳廳前桑上民為作歌頌案范書董作童种作恢注云謝書作僮种又作董仲今所傳本乃作董种未知孰是种又有咒虎一事與乳雀並傳當由信及豚魚非關仙術种字漢宗馮緄馮緄字鴻卿少學公羊春秋為車騎將軍南征武陵蠻賊軍至長沙賊聞悉詣營乞降進擊斬首四千餘級受降十餘萬人荆州平定賜錢一億固辭不受案緄巴郡宕渠人學公羊春秋范作學春秋司馬兵法緄南征表奏應奉賜金錯刀一具案奉以緄薦為司隸及其成功又推美于奉較大樹將軍尤多讓善一節緄子鸞舉孝亷除郎中案范書稱緄弟允清白有孝行不載其子周乘周乘為交趾刺史舉奏二郡穢濁太守屬縣解印綬棄官者四十餘城案范書闕宗慶宗慶遷長沙太守人多以乏衣食産乳不舉慶切讓三老禁民殺子比年之間民養子者三千餘人男女皆以宗為名案此與賈父所生事絶相類而獨泯沒不章有幸不幸也范闕彭修彭修字子陽海賊丁義欲向郡郡內驚惶不能捍禦太守聞修義勇請守吳令身與義相見宣國威德賊遂解去民歌之曰時歲倉卒盜賊從橫大戟強弩不可當賴遇賢令彭子陽案修會稽毗陵人時仕郡為功曹海賊所向即修之本郡也范書稱賊張子林作亂郡請修守吳修與太守俱出討賊飛矢雨集修障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉皆降言曰自為彭君故降不為太守服也與此不同劉騊駼劉騊駼除樅陽長以病免吏民思而歌之曰悒然不樂思我劉君何時復來安此下民案騊駼于永初中為校書郎與謁者劉珍等著作東觀撰集漢記因定漢家禮儀是以循吏而兼文苑未易才也張綱漢安元年選遣八使巡行張綱獨埋輪都亭奏大將軍梁冀無君之心十五事皆臣子所切齒者案綱字文紀犍為武陽人留侯裔孫時八使中惟綱年少官微而埋輪獨奏京師震竦冀雖固寵亦為寒心真千古一舉也後巡使多所糾彈而冀及諸宦官互為救請多被寢遏賴种皓復劾其罪惡國法乃伸蓋狐狸者豺狼之爪牙自古無有權姦在位而能澄清吏治者矣劉虞虞父舒丹陽太守案虞字伯安東海郯人范載虞祖嘉為光祿勳而佚其父名虞通五經東海王恭之後案范稱虞守道慕名為季漢之名宗子信然蔣崇蔣崇為北海相督郵闕更選功曹吏徐蒙曰無可為者惟功曹耳崇遂署蒙遣行縣謂曰相以督郵為耳目也案范書闕蒙自薦之公過于內舉不避親者相即從而任之可謂知人祝良良字邵平長沙人聰明博學有才幹以亷平見稱良為洛陽令常侍樊豐妻殺侍婢置井中良收其妻殺之案良令洛陽時太尉龎參夫人殺前妻子良率吏卒入府案實其事有司以良擅折辱宰相繫獄吏民守闕請代其罪者日數千萬詔乃原刑具見參傳則良真不畏強禦者然亦見東京守令能行已志如此又陳龜疏云前涼州刺史祝良初到州太守令長貶黜將半政未踰時功效卓然則良原刑後又拜刺史漢世用人若此所以多賢長吏也王奐王奐字子昌河內武德人明五經負笈追業常賃灌園恥交勢利為考城令遷漢陽太守徴拜議郎卒案奐亦獨行之士也故與范丹友善别見丹傳高𢎞高𢎞字伯武河內山陽人也為琅邪相自負笈單步入界聽探風俗厚薄案范書闕𢎞到官悉出舍中供設付外冬坐羊皮夏坐板榻以桑杯盛漿水妻子不厯官舍案謝書載亷吏多而且詳范俱遺之未免輕介節而重祿位矣張陵張陵字處仲為尚書初為梁冀弟胤所舉孝亷正月歲初百官朝賀冀恃勢不恤王憲帶劍入省陵比冀入敕羽林虎賁奪冀劍即治劾奏罪胤謂陵曰舉君適以自罰也案陵此舉令漢季臣子猶知有君姦臣膽落于張尚書矣范書作梁不疑為河南尹舉陵孝亷而謝書謂胤舉之胤亦尹河南但冀子非弟也且不疑好經書善待士故陵為所舉彼狐狗之門處仲肯受其薦耶此則謝之訛也陵為楷子范附祖霸傳盛吉盛吉為廷尉每至冬節罪囚當斷妻夜執燭吉持丹筆夫妻相對垂泣決罪案吉仁心若此天下豈有寃民范書闕會稽典録云吉字君達吉自掌憲平法常懇惻垂念之皇甫規皇甫規字威明以先零陸梁上疏自陳乃以規為中郎將討降之會軍士大疫規親入菴廬巡視將士三軍感悅案規安定朝那人征羌屢著奇勳卒以忤宦官獲罪居家教授所著述皆傳世洵文為儒宗武為將表者耶後黨事起乃恥以西州豪傑不預自訟于朝其真子輿氏所稱豪傑之士與非霍去病趙充國之儔也王暢王暢拜南陽太守下車振厲威風案暢字叔茂王龔之子范附龔傳為守時豪黨有釁穢者使吏發屋伐樹堙井夷竈亦近酷矣暢計日受俸不噉魚肉案時郡中奢豪相尚暢故布衣皮褥車馬羸敗以矯其弊南陽帝鄉治之不易必也狂狷乎劉景升諫之淺矣暢子謙謙子粲即仲宣也朱寵朱寵字仲藏為太尉家貧食脫粟飯卧布被朝廷賜錦被粱肉皆不敢當之案范書寵事附見鄧隲傳中寵初辟隲府稍遷潁川守治理有聲又桓郁傳載郁門人楊震朱寵皆至三公則寵之經明行修有自來矣寵字范作仲威京兆人許永許永字永先為司隸校尉是時奄侍在內貴幸用勢永舉法無所回避京師號曰許遊光案范書闕于時中官子弟為令長官者並棄官去威烈風行于是深見怨于宰臣遂見誣譖當下廷尉永謂友人曰永年七十庶幾以忠義致身未得殱姦人之首而先賊受害何能復入奏對刀筆吏乎遂仰藥而死案永秉法無避權幸寒心一死亦足報國不得以明哲譏之也賈彪賈彪舉孝亷補新息長小民困貧多不養子彪嚴為其制與殺人同罪養子者千數僉曰賈父所生男名賈子女名賈女以此豐丁口也案彪字偉節潁川定陵人即所稱賈氏三虎偉節最怒者也蘇章蘇章字士成北海人負笈追師不逺萬里案范書闕宗度豫章宗度拜零陵令縣民杜伯夷清高不仕度就與髙談伯夷感德詣縣縣署功曹案范書闕杜伯夷附見子根傳中名安少有志節號奇童位至巴郡太守甚得聲譽郭諒郭諒字恆直朗隂人師事杜喬李固之誅詣闕上書乞收斂不聽因往守視其喪扇護蠅蟲案范書作李固弟子汝南郭亮諒同亮古字通耳諒上書時年始成童義之所在死不為懼彼胡廣趙戒輩備位三公乃畏愞不爭反受冀賞此五尺童子所羞稱者楚國先賢傳又載南陽董班聞固死奔赴守喪天子為之感動豈其時忠義之氣在野不在朝乎抑冀威焰之銷鑠已甚也楊章楊章為杜喬所辟為平原令棄官還聞固喬曝尸星行赴洛著弊衣赤幘守其尸驅護蠅蟲天子嘉其忠義聽殯斂之案范書作楊匡陳留人袁書亦同范杜喬傳稱喬故掾楊匡聞喬慘死星行到洛託為夏門亭吏守衛尸喪又帶鐵鑕上書并乞李杜二公骸骨太后許之因送喬喪還葬行服烈士哉徐栩吳郡徐栩為小黃令時陳留遭蝗過小黃飛逝不集刺史行部責栩不治栩棄官蝗應聲而至刺史謝令還寺舍蝗即皆去案范書闕蝗不入境循吏美談此更隨令來去若巧相避然甚哉德政之感召深也宣仲宣仲為臨涇長吏民扳留改為宜民案劉昭注郡國志云此見謝書李固傳而范志無此固傳亦不載則范書之疏略也李固固改易姓名杖策驅驢負笈追師三輔學五經積十餘年博覽古今明于風角星算河圖讖緯仰察俯占窮神知變每到太學密入公府定省父母不令同業諸生知是郃子案固字子堅漢中南鄭人司徒郃之子固忠烈彪炳史册彰彰而密入定省不令同業知姓名一事尤為髙畸范書獨乃遺此何也固五察孝亷益州再舉茂才不應王府連辟皆辭以疾案范書略固所授弟子潁川杜訪汝南鄭遂河南趙承等七十二人相與哀嘆以為眼不復瞻固形容耳不復聞固嘉訓乃共論集德行一篇案時梁冀凶虐人避其焰杜訪輩乃能表彰固行裒集成書可謂不負其師矣范書但有趙承名固臨終敕子孫素棺三寸幅巾殯斂于本郡墝埆之地不得還墓塋汚先公兆域案固為梁冀所害年僅五十四范但載固與胡廣趙戒書不録此敕又案固對策引進鋭退速二語為老子篇續漢書亦然章懷注云謝書作孟子趙戒戒字志伯蜀郡成都人也博學明經講授舉孝亷纍遷荆州刺史梁商弟讓為南陽太守恃椒房之寵不奉法戒到州劾奏之遷河間相以冀部難理整厲威嚴遷戒南陽太守糾豪傑恤吏人奏免中官貴戚子弟為令長貪濁者徴拜為尚書令出為河南尹轉拜太常永和六年特拜司空案范書戒附見李固傳固議立清河王引胡廣及戒寓書勸冀冀不從戒等遂懾威遷易守正不堅惜哉子典以共誅宦官下獄其蓋愆矣趙典趙典太尉戒之叔子也學孔子七經河圖洛書內外萟術靡不綜貫受業者百有餘人天子宗典道懿尊為國師位特進七為列卿寢布被食用瓦器靈帝即位典與竇武王暢陳蕃等謀共誅中常侍曹節侯覽趙忠等皆下獄自殺案興字仲經范稱典遷長樂少府衛尉公卿表典博學篤聞宜備國師會病卒使者弔祠乃與此大異袁紀載陳竇事亦無趙典名敘王暢事迹頗繁而誅常侍事亦不列暢此云下獄自殺恐有舛謬媯皓吳郡媯皓父為南郡坐事繫獄皓懷小石至公卿門輒出石叩頭流血覆面父遂得免案竇武傳稱尚書令陳蕃胡廣等皆國之貞士朝之良佐尚書郎張陵媯皓等文質彬彬明達國典則皓之賢可知矣懷石救父至誠而動也范闕尹苞陳留尹苞與同郡范史雲善二人俱貧出入共一單衣到人門外苞年長常先著衣入須臾出解與史雲案范書稱史雲所親善者李固王奐也尹苞事無傳此范之遺略者朱穆朱穆為尚書歲初百官朝賀有虎賁當階置弓于地謂羣僚曰此天子弓誰敢干越百僚皆避之穆呵之曰天子之弓當戴之于首上何敢置地大不敬即收虎賁付獄治罪衆皆肅然服之案穆字公叔南陽宛人亦稱文忠先生祖暉范書有傳穆附焉避弓事續書作桓帝臨雍與此不同夫小人假密神器侮弄大臣往往有之公叔臨事不惑可為士大夫吐氣穆為尚書讜言正直穆因進見諫曰臣聞漢家舊典置侍中中常侍各一人省尚書事黃門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事案常侍持權始于和熹後世乃承女主故事遂至肆橫故雖女中堯舜亦不宜稱制也使早從穆言豈至亡國于奄豎之手哉穆少有英才學明五經性矜嚴疾惡不交非類年二十為郡督郵迎新太守見穆曰君年少為督郵因族勢為有令德穆答曰郡中瞻望明府如仲尼非顔回不敢以迎孔子更問風俗人物太守甚奇之曰僕非仲尼督郵可謂顔回也遂厯職股肱舉孝亷案穆以顔子自擬未免過當然觀其為人立節忠清虔恭機密亦賢者也蔡雍謂其貞而孤有羔羊之節良然穆文詞更擅絶古今雍乃至其家自寫之特絶交一論不無褊狹耳范不載穆為冀州刺史有宦者趙忠喪父僭為璠璵玉匣穆下郡案驗遂發墓剖棺陳尸出之而收其家屬帝聞大怒徴詣廷尉穆臨當就道冀州從事欲為書像置廳事上穆留板書曰勿畫吾形以為重負忠義之未顯何形像之足紀也案此足見公叔之貞而孤也楊龜山譏其從梁冀之辟不得為貞孤亦責備賢者意耳畫像事范闕劉寵劉寵為司徒卧粗布被案寵字祖榮東萊牟平人即為會稽守選一大錢受之者也位至三公清操不易乃知布被非詐唐約唐約字仲謙拜尚書間習舊典質素密靜自典機樞數有直言美策每作表疏皆手自書之不宣于外處官不言貨利之事當法不阿所私京師謡曰治身無嫌唐仲謙案無嫌嫌字非徒以韻與謙押也禮所以别嫌疑嫌疑之際聖人所謹故公而嫌于私國而嫌于家人欲一毫未淨皆嫌也安得無嫌如仲謙哉范闕荀緄荀緄字伯條拜尚書性明亮敏于衆職以最羣僚秉機平直公卿大夫莫不憚之案范荀淑傳淑仲子名緄八龍之一當即此也又淑兄子昱亦字伯條何命字竟相同與又緄為濟南相畏憚宦官為子彧娶唐衡女行事若此公卿大夫安得憚之豈别有一荀緄耶曹破石曹節弟破石為越騎校尉越騎營五伯妻有美色破石從求之五伯不敢違妻執意不肯行遂自殺其縱暴無道多類此案范書見宦者曹節傳中節與王甫輩誅武蕃幽殺太后權勢炎灼殆在左回天唐獨坐之上腐身薰子之禍至此極乎破石之奪人妻其罪之小小者爾龔遂龔遂字巨卿拜尚書郎性敏達彌縫舊章深識典故每入奏事朝廷所問應時建白桓帝嘉其才臺閣有疑事一以委遂處當平決口筆俱著轉左丞案口筆俱著四字簡而潔使拙手為之數語不了也范闕胡騰胡騰辟荆州部南陽從事遇桓帝南巡又為護駕到南陽騰自表上言乘輿所幸便為京師臣請荆州刺史比于司隸臣職比于都官從事也案騰字子升桂陽人騰之此表以扈蹕勳戚徴求無厭故自請比職都官得以禁戢暴橫引史者刪其前後遂覺無關係矣騰為竇武府掾武誅獨殯斂行喪坐是禁錮義士哉騰為從事萬事既辦一州肅然百寮敬服其能應奉應奉字世叔少聰明自為兒童及長凡所經履莫不暗記讀書五行俱下終成名儒案奉汝南南頓人自曾祖父順為將作大匠後七世通顯奉文武並展卓然人傑子劭即著漢官儀風俗通者應氏故世以文章顯也范同奉為上計吏許訓為計掾俱到京師訓自發鄉里在路書頓暮宿所見長吏賔客亭長吏卒奴僕目所更見皆密疏姓名欲試奉還郡出疏示奉奉省讀之云前食潁川綸氏都亭亭長胡奴名祿以飲漿來何不在疏坐中皆驚案今人行程每作日記若得與世叔同遊便是行日記矣何必手録書頓暮宿四字亦鍊奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠于內開扇出半面視奉奉即委去後數十年于路見車匠識而呼之案二事范書俱不載奉之天資絶人如此宜其文武為憲也奉拜武陵太守坐公事免後武陵蠻復寇亂荆州車騎將軍馮緄請與俱征拜從事中郎時詔奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當悉燋爛以刷國恥朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在于今賜奉錢十萬駮犀方具劍金錯把刀劍革帶各一奉其勉之案奉之功馮緄實成之見前緄傳陳蕃陳蕃為樂安太守郡人周璆髙潔之士前後郡守招命莫肯至惟蕃能致焉字而不名特為置一榻去則懸之案蕃見東觀記此所載與范同懸榻事人不知有周璆則以孺子高名掩之耳蕃為豫章太守雅正矯俗以禮導下蕃諫桓帝曰當今之世有三空田野空朝廷空倉庫空是謂三空加之兵戎未戢四方離散是陛下焦心毁顔坐而待旦之時也豈宜揚旗耀武騁心輿馬之觀乎案時桓帝有幸廣成校獵之舉故蕃疏諫之周樹周樹達于法善能解煩釋疑八辟從事樹為從事刺史孟觀有罪俾樹作章陳事序要得無罪也案范書闕老吏刀筆能于一二字間出入人罪當奉樹為鼻祖胡廣廣有雅才學究五經古今術藝皆畢覽之年二十七舉孝亷案廣字伯始南郡華容人廣在台輔三十餘年經事六帝禮任甚優每遜位辭疾及退逸田里未嘗滿歲輒復升進凡一履司徒三登太尉及為太傅其辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝會輒稱疾避廣時人榮之案廣生榮死哀為漢興以來人臣第一但始同李杜議立清河繼憚于梁遂爾遷易阿順卒以受封析爵所稱天下中庸者得無以鄉原為中行乎靈帝思感舊德乃圖廣及太尉黃瓊于省內詔議郎蔡雍作頌文曰巖巖山嶽配天作輔降神有周生申及甫允茲漢室誕育二后曰胡曰黃方軌齊武維道之淵維德之藪股肱元首代作心膂天之蒸人有則有類我胡我黃鍾厥純懿巍巍特進仍踐其位赫赫王事七佩其紱奕奕四牡沃若六轡衮職龍章其文有蔚參曜乾台窮寵極貴功加八荒羣生以遂超哉邈乎莫與為二案雍有言吾為碑銘多矣惟郭有道無愧耳此頌雖奉制而作然胡公當之得不愧乎范闕韋著韋氏為三輔冠族著少修節操持京氏易韓詩博通術藝案著京兆人韋豹之子范附見韋彪傳中少以經行知名屢徴不就後乃為中常侍逼迫不得已拜東海相竟坐論輸左校隱者恥之北山有靈能無逋客之謝李曇曇少喪父躬事繼母酷烈曇性純孝定省恪勤妻子供奉寒苦執勞不以為怨得四時珍玩先以進母與徐孺子等海內列名五處士焉案曇字雲闕潁川人范附見徐稚傳中陳蕃胡廣薦章稱其德行純備蓋非徒以隱為髙者薑肱肱祖父為豫章太守父為任城相性篤孝事繼母恪勤母既年少又嚴厲肱感凱風之孝兄弟同被而寢不入房室以慰母心也常與季江俱乘車行適野廬為賊所劫取其衣物欲殺其兄弟肱謂盜曰弟年幼父母所憐愍又未聘娶願自殺身濟弟季江言兄年德在前家之珍寶國之英傑乞自受戮以代兄命盜戢刃曰二君所謂賢人吾等不良妄相侵犯棄物而去肱車中尚有數千錢盜不見也使從者追以與之亦復不受肱以物經厯盜手因以付亭吏而去案肱字伯淮彭城廣戚人肱有二弟仲海季江季其少也世但知薑被為雁行佳話而不知夭夭棘心又有慰母一片苦忱微謝書孰表之靈帝手筆下詔曰肱抗凌雲之志養浩然之氣以朕德薄未肯降志昔許由不屈王道為化夷齊不撓周德不虧州郡以禮優順勿失其意案如詔語非聖主不能乃靈帝手筆得之要見當時風氣下以石隱為髙上以求賢為美楊髙楊髙字聖建拜尚書淵懿博雅治術亦辦優納王事明習國家典故幹機密之職夙夜周慎退食自公儀表偉麗每朝賀百寮側目案范書闕羊陟羊陟遷河南尹計日受俸嘗食乾飯茹菜禁斷豪右書疏不與交通斷理寃徒進用善士節操者旌表異行案陟字嗣祖太山梁父人奏黜宦姻升進清亮後黨事起僅免官禁錮其有明哲之知者耶郭泰泰遭母憂歐血發病厯年乃瘳案泰字林宗太原界休人家世貧賤篤生畸士東漢人品卓然第一泰范書作太此蔚宗私諱今宜改正泰之所名人品乃定先言後驗衆皆服之故適陳留則友符偉明遊太學則師仇季智之陳國則親龎德公入汝南則交黃叔度初泰始至南州過袁奉髙不宿而去從叔度纍日不去或以問泰泰曰奉髙之器譬之泛濫雖清而易挹叔度之器汪汪若千頃之波澄之不清撓之不濁不可量也已而果然泰以是名聞天下案范書載泰所鑒士左原茅容輩十許人此皆范所遺也泰所識太原郭長信王長文長文弟子師韓文布季子政曹子元定襄周康子西河王季然雲中丘季智名靈舉子師位至司徒季然北地太守其餘多典州郡者案此皆泰同郡人也范不列其官位泰以建寧二年正月卒自𢎞農函谷關以西河內湯隂以北二千里負笈荷擔彌路柴車葦裝塞塗蓋有萬數來赴案范書但言千餘人會葬而已不詳載劉儒郭林宗歎儒有圭璋之質終必為令德之士案儒字叔林東郡陽平人林宗稱其為口訥心辨真儒者也李咸咸字元卓汝南西平人孤特自立家貧母老常躬耕稼以奉養學魯詩春秋公羊傳三禮三府並辟司徒胡廣舉茂才除髙密令政多奇異青州表其狀建寧三年自大鴻臚拜太尉自在相位約身率下常食脫粟飯醬菜而已不與州郡交通刺史二千石箋記非公事不發省以老乞骸骨見許悉還所賜物乘敝牛車使子男御晨發京師百僚追送盈塗不能得見家舊貧狹庇蔭草廬案范書咸無傳僅見胡廣傳中云廣所辟命皆天下名士與故吏陳蕃李咸並為三司夫以咸居台輔而清節若此范書遺之何也度尚尚進善愛人坐以待旦擢門下書佐朱俊恆歎述之以為有不凡之操俊後官至車騎將軍逺近奇尚有知人之鑒案尚字博平山陽湖陸人特善于用兵數平寇盜乃始由宦者進繼嫁禍張磐欲諉已過其亦小有才者耳續漢書云尚事母至孝通京氏易古文尚書為吏清潔略與范不同使尚果以孝子通經術豈肯呈身中貴誣謗同列耶劉瑜劉瑜父祥為清河太守案瑜字季節廣陵人范載其父名辨與此異瑜上書陳事切中時機詔問災咎悉心直對亦剛直之士也孔恂孔恂字巨卿新淦人為州别駕從事車前舊有屏星如刺史車曲翳儀式是時刺史行部發去日晏刺史怒欲去别駕車屏星恂諫曰明使君傳車自發晚而欲撤去屏星毁國舊儀此不可行别駕可去屏星不可省即投傳去刺史追辭謝請不肯還于是遂不去屏星案諫既行矣何必投傳漢人尚氣節如此屏星車當也見説文范闕楊喬楊喬字聖達烏悅人也前後數上書陳故事案范書喬事附見弟璇傳中喬為尚書侍郎轉左丞自在臺閣間練漢家故事前後上表陳國政便宜喬為尚書容儀偉麗數上書言政事桓帝愛其才貌詔妻以公主喬固讓不聽遂閉口不食七日而死案喬辭婚事義又出宋𢎞之上然益見世祖不強宋公之聖德矣又孟嘗傳載喬薦嘗疏云臣前後七表而身輕言微終不蒙察喬之薦賢其誠如此别本作楊髙字至達髙近喬聖近至傳寫訛耳竇武竇武上表曰今冬大寒過節毒害鳥獸爰及池魚城傍松竹皆為傷絶案武字遊平扶風平陵人范書載武封事不見此語或其所刪也又案襄楷傳楷延禧中因災異上疏有云前七年冬大寒殺鳥獸害魚鱉城傍竹柏之葉有傷枯者又續漢書延熹元年洛陽城傍竹柏葉有傷者二書正指此朱震朱震字伯厚性剛烈初為從事奏濟隂太守單匡臧罪并連匡兄中常侍車騎將軍超三府諺曰車如雞棲馬如狗疾惡如風朱伯厚案震陳留人范附見陳蕃傳中震為仲舉之友仲舉被難震棄官哭之匿其遺孤事覺誓死不言亦烈矣哉震仕為郡主簿時户曹史袁叔稚以微過太守郭琮怒閉閣罰之衆皆悚懼震排闥直入乃前諫曰袁史則故御史珍之孫何為苛罰脫有奄忽如何遂釋之案范不載震又為郡從事曰震宿有負薪之憂力疾就車職重人輕必不堪久時濟隂太守單匡在官放恣辟震詣見曰當為鷹犬案此即奏匡以前事謝必有傳故詳序之賀純純字仲真會稽山隂人少為諸生博極羣藝下辟公府三舉賢良方正五徴博士四公車徴皆不就後徴拜議郎數陳災異上便宜數百事多見省納遷江夏太守案范書李固傳云陛下即位聘南陽樊英江夏黃瓊廣漢楊厚會稽賀純則純之名與英瓊比髙也王逸南郡王逸素與樊英善因與其書多引古譬諭勸使就聘英順逸議談者失望案范書無逸傳謝此事亦應載樊英傳中英初被詔命僉以為必不降志及後應對又無奇謀深策英之名髙毁甚逸實成之符融融見林宗便與之交以紹介于膺以為海之明珠未耀其光鳥之鳳凰羽儀未翔膺與林宗相見待以師友之禮遂揚名天下融致之也案融字偉明陳留浚儀人為李元禮髙足以郭介李遂有仙舟之羡則林宗最知人而偉明又知林宗其識巨矣融遭黨事禁錮妻亡貧無殯斂潁川張元祖志行士也來存融弔其妻亡知其如此謂言足下欲尚古道非不清妙但禮設棺槨制杖衰孔子曰吾從周便推所乘羸牛車以給殯融受而不辭云案范稱融妻死鄉人欲為具棺服融不肯受曰古之亡者棄于中野惟妻子可以行志云云與元祖所勸正合此云貧無殯斂似誤馮岱馮岱字德山辟司徒劉寵府與四府掾屬並詣臺集議邊事案范書岱為陳留太守附見符融傳中岱性慷慷有文武異才既到官融往相見薦苑冉為功曹韓車為主簿孔胄為上計吏宋果宋果字仲文案范書果事見郭泰傳果性輕悍賴林宗訓之遂折節為善仲文范作仲乙扶風人徐淑淑字伯進廣陵海西人也寬裕博雅好學樂道隨父慎在京師贊孟氏易春秋公羊禮記周官善論太公六韜交接英雄常有壯志舉茂才除渤海修令遷琅邪都尉案是時左雄設限年試才之法淑年未及舉本郡充選雄以聞一知幾詰之乃譴却郡夫知一乃徹始徹終之明知十乃因此推彼之學如以數求便成笨伯左雄詰問或乖本旨然澄清選舉未為失也後淑為度遼將軍有名于邊見子璆傳中劉寬寬少學歐陽尚書京氏易尤明韓詩外傳星官風隅算厯皆究極師法稱為通儒未嘗與人爭勢利之事案寬見東觀記范書絶不載寬之能學僅以為長者而已母乃失文饒耶寬嘗行有人失牛者乃于路就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰慚負長者寬曰物有相類事容脫誤幸勞見歸何為謝也案此與卓茂認馬事絶相類由其胸中不見人非不見已是推一牛之細凡名利何處著爭競來袁忠袁忠乘船戴笠詣王朗見朗左右僮從皆著青絳綵衣非其奢麗即辭疾發而退案忠字正甫為袁閎弟官沛相以清亮稱附見閎傳王朗字景興肅之父也范略吳馮吳馮字子髙為州郡吏休假先存恤行喪孝子次瞻病畢拜覲鄉里耆老先進然後到家名昭逺近案范書闕此可為今世告假士大夫法郭賀郭賀字喬卿為荆州刺史到官有殊政百姓歌曰厥德仁明郭喬卿忠正朝廷上下平案賀雒陽人范附蔡茂傳後顯宗巡狩賜以三公之服又敕行部去襜帷帝之褒與百姓之歌何相符也又郭躬孫亦名賀范别有傳後漢書補逸卷十一

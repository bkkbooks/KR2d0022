body:
  text: 後漢書補逸卷八監察御史姚之駰撰東觀漢記第八朱酺朱酺梁國寧陵人案范莋都夷傳酺以永平中任益州刺史在州數宣示漢德威懷逺夷白狼槃木唐菆等百餘國舉種奉貢并獻夷歌酺范作輔郭伋郭伋為并州牧知盧芳夙賊難卒以力制常嚴烽堠明購賞案伋字細侯别見華書司馬書時盧芳自稱天子于九原也范同應劭應劭字仲逺汝南南頓人父奉司𨽻校尉劭少便篤學博覽多聞案劭所著有漢官禮儀風俗通等百三十六篇又有集解漢書傳于世則集解自劭昉也劭字惟范書同詳見謝書張豐涿郡太守張豐舉兵反初豐好方術有道士言豐當為天子以五綵囊盛石繫豐肘云有玉璽豐信之遂反既敗當斬猶言肘有玉璽案豐事見范祭遵傳黃琬黃琬字子琰江夏安陸人琬少失父曾祖香祖瓊並有髙名案琬早辨慧七歲對日食狀其事也夫日為月魄所掩故非朔不食其時刻分抄皆可按步推求考地志魏郡距洛陽才七百里則所食多少當不及一分范書稱京師不見而瓊守魏郡乃以琬言日食之餘如月之初對詔則虧蝕甚矣何相懸若是益當時厯法未精故踈漏者多耳范附瓊傳陳球陳球遷繁陽令清髙不動案球字伯真下邳淮浦人後與司徒劉命謀誅宦官反為所害楊賜楊賜以病罷居無何拜太常詔賜御府衣一襲自所服冠幘綬玉壺革帶金錯鈎佩案賜字伯獻楊秉子𢎞農固世篤忠貞而帝之待師傅其恩禮亦備至矣如所言不聽何周珌周珌豫州刺史慎之子也案珌漢陽人范見董卓傳珌為吏部尚書諫卓徙都長安卓殺之英雄記作周毖字仲逺武威人魏志亦作毖蔡倫黃門蔡倫字敬仲典作上方造意用樹皮及敝布魚網作紙奏上帝善其能自是莫不用天下咸稱蔡侯紙案倫桂陽人倫故宦寺之賢者蔡侯紙衣被天下可云文苑功臣後乃監典校讐不又為儒者羞乎相州記云耒陽縣北有漢黃門蔡倫宅宅西有一石臼云是倫舂紙臼蔡雍蔡雍徙朔方上書求還續成十志案雍字伯喈陳留圉人亦稱中郎雍集載所上書云漢書十志下盡王莽而止光武以來惟記紀傳無續志者臣欲制刪定者一所當接續者四前志所無臣欲著者五分别首目并書章左謹封上律厯志第一禮志第二樂志第三郊祀志第四天文志第五車服志第六則是求還時志並未成與此正合范書直云奏其所著十志誤矣宋楊宋楊永寧元年遣大鴻臚持節至墓追封當陽侯案范書闕樊楚樊楚每當直事常晨駐車待漏案此疑即樊梵字文髙者前已誤作桓文髙此再誤也諸籍抄撮訛謬至此趙溫趙溫為京兆丞嘆曰大丈夫當雄飛何能雌伏案范書溫字子柔趙典兄子與兄謙相繼為三公茨充充字子河宛人也初舉孝亷之京師同侣馬死充到前亭輒舍車持馬還相迎鄉里號之曰一馬兩車茨子河案范書充代衛颯守桂陽故附颯傳後不詳載元和中荆州刺史上言臣行部入長沙界觀者皆徒跣臣問御左曰人無履亦苦之否御左對曰十二月盛寒時並多剖裂血出燃火燎之春溫或膿潰建武中桂陽太守茨充教人種桑蠶人得其利至今江南頗知桑蠶織履皆充之化也案民不知織故教之蠶若充者可謂民之父母矣鮑宣妻鮑宣之妻桓氏女也字少君宣嘗就少君父學父竒其清苦以女妻之裝送甚盛宣不悅謂妻曰少君生富驕不敢當禮妻曰大人以先生修德守約故使賤妾侍執巾櫛既奉君子惟命是從妻乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道鄉邦稱之案宣于哀帝時為司𨽻宣子永永子昱皆有功業文章其少君之教深耶吕母海曲有吕母其子為縣吏犯小罪縣宰殺之吕母家素富豐資産乃益釀醇酒少年來沽者貰之視其乏者輒假衣裝少年欲相與償之吕母垂泣曰縣宰枉殺吾子欲報怨耳諸君寧肯哀之乎少年許諾遂相聚得數百人因與吕母入海自稱將軍遂破海曲執縣宰斬之以其首祭子冡案范書載劉盆子傳赤眉之所由起也梁冀妻大將軍夫人躬先率禮淑慎其身超號為開封君即大將軍梁冀妻也案啼粧折步之人而以為淑慎徒汚誥命耳凡誥敕率多溢美之詞要在當之者猛省也丁明册免丁明代傅喜為大司馬亦任職頗害賢寵及丞相王嘉死明甚憐之上寖重賢欲極其位而恨明如此遂册免明上印綬還第案此見前書當是本書引用耳祠蕭曹墓詔髙祖功臣蕭曹為首有傳世不絶之誼曹相國後容城侯無嗣朕甚愍焉望長陵東門見二臣之墓生既有節終不逺身誼臣受寵古今所同遣使者以中牢禱大鴻臚悉求近親宜為嗣者須景風紹封以彰厥功案此和帝三年事時祠髙廟因念及勳臣也五經通義曰景風至則封有功得莽首三輔豪傑入長安攻未央宫庚戍殺莽于漸臺東海公賔就得其首傳詣宛封滑侯案范書注時城中少年朱弟張魚等攻莽于漸臺商人杜吳殺莽校尉公賔就斬莾首將軍申屠建等傳莽首詣宛鳬茨為食王莽末南方枯旱民多飢饉掘鳬茨而食斤金斗粟時天下大旱連年榖不成建武元年耕作者少民飢饉黃金一斤易米一斗盜賊人民相食案范書王莽末天下連歲災蝗蓋禍亂之作天之所以開聖人也赤眉赤眉入安定北地至陽城士卒多凍死祭六宗孝成時匡衡奏立北郊復祠六宗至建武都雒陽制郊祀六宗廢不血食大臣上疏謂宜復舊上從公議由是遂祭六宗案安帝元初六年司空李郃侍祠南郊不見六宗祠乃奏立之即此也郃主尚書歐陽家説謂六宗者在天地四方之中為上下四方之宗遂立祠于雒陽西北戍亥之地但六宗之説千古聚訟竟無全通亦難偏執劉昭辨之詳矣好彈詔曰三輔皆好彈一大老從旁舉身曰噫唏哉案此詔語殊不可解范不載幸章陵建武十年幸章陵修園廟舊宅田里舍觀百戲帝遣單于饗賜作樂百戲上幸離宫臨觀武冠武冠俗謂之大冠案范作武冠一曰武辨大冠諸武官冠之三獨坐上特詔御史中丞與司𨽻校尉尚書令會同並専席而坐故京兆號曰三獨坐案此見范書宣秉傳建武元年拜秉御史中丞特詔寵之遂為故事兆范作師是囊封制上書以青布囊素封書案漢官儀曰凡章表皆啓封其言密事則皂囊也與此不同南北單于十二月癸丑丐奴始分為南北單于此建武二十四年十二月也南丐奴醯落尸逐鞮單于比本不當立衆大人議立之向化獨深其左賢蒲奴之立則為北單于故范書列傳以南丐奴冠之單于比單于比丐奴頭曼十八代孫案章懷云頭曼即冒頓單于父自頭曼單于至比父子相承十代以單于相傳則十八代也鳯凰見潁川建武十七年鳯凰出髙八尺九寸毛羽五采集潁川羣鳥從之蓋地數頃留十七日乃去案范志鳯見潁川之郟縣有五鳯章帝時鳯凰百三十九見案鳯靈鳥也而數見若此其附會可知矣安帝延光三年鳯凰集濟南臺丞霍穆舍樹上賜帛各有差單于朝單于來朝賜橙橘龍眼荔枝芝英光和四年郡國上芝英木連理安帝延和三年衛縣木連理又其年定陵縣木連理請封禪建武三十年太尉趙熹上言曰自古帝王每世之隆未嘗不封禪陛下聖德洋溢順天行誅撥亂中興作民父母修復宗廟救萬姓命黎庶賴福海內清平功成治定羣司禮官咸以為宜登封告成為民報德百王所同當仁不讓宜登封岱宗正三雍之禮以明靈契望秩羣臣以承天心案范志但云羣臣上言不載熹疏世祖答詔以為百姓怨氣滿腹誰欺欺天可謂聖矣後竟用梁松等奏封禪則讀讖之誤也建武三十二年羣臣奏言登封告成為民報德百王所同陛下輒拒絶不許臣下不敢頌功述德業河雒讖書赤漢九世當巡封太山凡三十六事傳奏左帷陛下遂以仲日令辰遵岱嶽之正禮奉圖雒之明文以和靈瑞以為兆民上曰至泰山乃復議國家德薄災異仍至圖讖蓋如此案時獻河圖會昌符云赤劉之九會命岱宗不慎克用何益于承誠善用之姦偽不萌上齋夜讀此乃詔梁松等復案索河雒讖文言九世封禪事上至泰山有司復奏河雒圖記表章赤漢九世尤著明者前後凡三十六事與博士充等議以為殷統未絶黎庶繼命髙宗久勞猶為中興武王因父受命之列據三代郊天因孔子甚美其功後世謂之聖王漢統中絶王莽盜位一民莫非其臣尺土靡不其有宗廟不祀十有八年陛下無十室之資奮振于匹夫除殘去賊興復祖宗集就天下海內治平夷狄慕義功德盛于髙宗宣王宜封禪為百姓祈福請親定刻石紀號文太常奏儀制詔曰在昔小白欲封夷吾難之季氏欲旅仲尼非焉蓋齊諸侯季氏大夫皆無事于太山今豫末小子巡祭封禪德薄而任重一則以喜一則以懼喜于得承鴻業帝堯善及子孫之餘賞蓋應圖籙當得是符懼于過差執德不𢎞信道不篤為議者所誘進後世知吾罪深矣案范書不載世祖雖從梁松等議封禪而其謙沖之德見于詔書非秦皇漢武比也扼虎吕母賔客徐次子等自號扼虎案扼於責反范書作猛虎見盆子傳三老兵琅邪人樊崇字細君起兵于莒同郡東莞人逄安字少子東海臨沂人徐宣字驕稚謝祿字子竒及楊音各起兵合數萬人案樊崇輩即赤眉之魁也號為三老後奉盆子降世祖數其三善賜楊爵關內侯其仁深矣范見盆子傳大雀永元二年安息王獻條支大雀此雀卵大如甕又永和九年永昌獻象牙熊子案范書永元十三年安息國遣使獻師子及條枝大爵疑即一事紀年訛耳郭義恭廣志云大爵頸及身膺蹄都似槖駝舉頭髙八九尺張翅丈餘即今之駝鳥也蕭何霍光墓蕭何墓在長陵東司馬門道百步霍光墓在茂陵東司馬門道南四里案明帝二年十一月遣使者以中牢祠蕭霍墓故及之鳯凰見肥城鳯凰見肥城句窳亭槐樹上案章帝二年九月詔鳯凰黃龍所見亭部無出二年租賦即此置郡建安二十年復置漢寧郡分漢中之安陽西城又分錫上庸為上庸郡置都尉分郡安帝即位之年分髙顯侯城遼陽屬玄菟案三縣故屬遼東也武庫火元初中武庫火燒兵物百一十五種直十萬以上案范書是時攻羌十餘年未已天下厭苦之故有此應大水和帝十年京師大雨南山水流出至東郊壞人廬舍案范紀五月京師大水即此中護軍大將軍出征置中護軍一人麟見章帝時麟五十一見又安帝三年潁川上言麟見白鹿元和二年白鹿白兔九尾狐見又安帝延光三年潁川上言白鹿見又永康元年西河言白兔見大鴻臚大鴻臚漢舊官建武元年復置屬官大行丞一人大行丞有治禮員三十七人主齋祠儐贊九賔之禮又有中都官升食以下功次相補鴻臚三十六人其陳寵左雄朱寵襲參施延並遷公案此似有脫誤驃騎將軍其將軍不常置比公者又有驃騎將軍建武二十年復置驃騎將軍位次公有長史一人案范書官志將軍比公者四第一大將軍次驃騎將軍次車騎將軍次衛將軍掌征伐背叛血汗馬聞武帝歌天馬洽赤汗今親見其然血從前髆上小孔中出案此乃明帝賜東平王書中語時以宛馬一匹遺王也前書天馬歌太一况天馬下霑赤汗沫流赭九真九真俗燒草種田案此即火耕也今人耕山多行之祠孔子章帝幸魯祠東海恭王及孔子七十二弟子禮畢命儒者論難案范書又有賜褒成侯及諸孔男女帛事無論難語增修羣祀詔章帝元和二年詔曰經稱秩元祀咸秩無文祭法功施于民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之以日月星辰民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典傳曰聖王先成民而後致力于神又曰山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之孝文十二年令曰比年五榖不登欲有以增諸神之祀王制曰山川神祗有不舉者為不敬今恐山川百神應典祀者尚未盡秩其議增修羣祀宜享祀者以祈豐年以致嘉福以蕃兆民詩不云乎懷柔百神及河喬嶽有年報功不私幸望豈嫌同辭其義一焉案范書見祭祀志只節略二語耳連引經傳綴序成章亦文之一體也當奉此為鼻祖議世祖廟舞永平三年八月丁卯公卿奏議世祖廟登歌八佾舞功名東平王蒼議以為漢制舊典宗廟各奏其樂不皆相襲以明功德秦為無道殘賊百姓髙皇帝受命誅暴元元各得其所萬國咸熙作武德之舞孝文皇帝躬行節儉除誹謗去肉刑澤施四海孝景皇帝制昭德之舞孝武皇帝功德茂盛威震海外開地置郡傳之無窮孝宣皇帝制盛德之舞光武皇帝受命中興撥亂反正武揚方外震服百蠻戎狄奉貢宇內治平登封告成修建三雍肅穆典祀功德巍巍比隆前代以兵平亂武功盛大歌所以詠德舞所以象功世祖廟樂名宜曰大武之舞元命包曰緣天地之所雜樂為之文典文王之時民樂其興師征伐而詩人稱其武功樞機鈐曰有帝漢出德洽作樂各與虞韶夏禹湯濩周武無異不宜以名舞洽圖徴曰大樂必易詩傳曰頌言成也一章成篇宜列德故登歌清廟一章漢書曰百官頌所登御者一章十四句依書文始五行武德昭真修之舞節損益前後宜之六十四節為武曲副八佾之數十月蒸祭始節用其文如五行之舞如故勿進武德舞歌詩曰於穆世廟肅雍顯清俊乂翼翼秉文之成越序上帝駿奔來寧建立三雍封禪泰山章明圖讖放唐之文休矣惟德罔射協同本支百世永保厥功詔書曰驃騎將軍議可進武德之舞如故案世祖撥亂中興舞以象功一代巨典東平此議詳核莊雅可比班固典引范略而不載何也議上顯宗號章帝初即位賜東平憲王蒼書曰朕夙夜伏思念先帝躬履九德對於八政勞讓克己終始之度比放三宗誠有其美今迫遺詔誡不起寢廟臣子悲結僉以為雖於更衣猶宜有所宗之號以克配功德宗廟至重朕幼無知寤寐憂懼先帝每有著述典義之事未嘗不延問王以定厥中願王悉明處乃敢安之公卿議駁今皆并送及有可以持危扶顛宜勿隱思有所承公無困哉太尉熹等奏禮祖有功宗有德孝明皇帝功德茂盛宜上尊號曰顯宗四時祫食于世祖廟如孝文皇帝在髙廟之禮奏武德文始五行之舞蒼上言昔者孝文廟樂曰昭德之舞孝武廟樂曰盛德之舞今皆祫食於髙廟昭德盛德之舞不進與髙廟同樂今孝明皇帝主在世祖廟當同樂盛德之樂無所施如自立廟當作舞樂者不當與世祖廟盛德之舞同名即不改作舞樂當進武德之舞臣愚戇鄙陋廟堂之論誠非所當聞所當言陛下體純德之妙奮至謙之意猥歸美於載列之臣故不敢隱蔽愚情披露腹心誠知愚鄙之言不可以向仰四門賔于之議伏惟陛下以至德當成康之隆天下乂安刑措之時也百姓盛歌元首之德股肱貞良庶事寧康臣欽仰聖化嘉羡盛德危顛之備非所宜稱上復報曰有司奏上尊號曰顯宗藏主更衣不敢違昭祫食世祖廟樂皆如王議以正月十八日始祠仰見榱桷俯視几筵眇眇小子哀懼戰栗無所奉承愛而勞之所望于王也案明帝遺詔無起寢廟藏主于世祖廟更衣孝章以更衣有小别上尊號曰顯宗廟間祠于更衣四時合祭于世祖廟故所議若此夫孝明恭儉仁智廟號顯宗允為至當章帝此舉情文兼得至其賜東平書婉而且徑乃是絶妙尺牘非同尋常詔令也爵秩差等建武元年復詔諸侯王金璽綟綬公侯金印紫綬九卿執金吾河南尹秩皆中二千石大長秋將作大匠度遼諸將軍郡太守國傅相皆秩二千石校尉中郎將諸郡都尉諸國行相中尉內史中護軍司直秩皆二千石以上皆銀印青綬中外官尚書令御史中丞治書侍御史公將軍長史中二千石丞正平諸司馬中官王家僕雒陽令秩皆千石尚書中謁者黃門冗從四僕射諸都監中外諸都官令都侯司農部丞郡國長史丞候司馬千人秩皆六百石家令侍僕秩皆六百石雒陽市長秩四百石王家長秩皆四百石以上皆銅印黑綬諸署長揖擢丞秩三百石諸秩千石者其丞尉皆秩四百石秩六百石者丞尉秩三百石四百石者其丞尉秩二百石縣國丞尉亦如之縣國三百石長丞尉亦二百石明堂靈臺丞諸陵校長秩二百石丞尉校長以上皆銅印黃綬縣國守宫令相或千石或六百石長相或四百石或三百石長相皆以銅印黃綬而有秩者寺中中常侍光祿大夫秩皆二千石大中大夫秩皆比二千石尚書諫議大夫侍御史博士皆六百石議郎中謁者秩皆比六百石小黃門黃門侍郎中黃門秩皆比四百石郎中秩皆比三百石大子舍人秩二百石案此散見范百官志其璽綬則輿服志載之詳矣逺夷樂德歌提官傀搆大漢是治魏冒踰糟與天意合罔驛劉脾吏譯平端旁莫支留不從我來徴衣隨旅聞風向化知唐桑艾所見竒異邪毗堪繡多賜繒布推潭僕逺甘美酒食拓拒蘇便倡樂肉飛局後仍離屈伸悉備僂讓龍洞蠻夷貧薄莫支度由無所報嗣楊雒僧麟願主長夀莫稚角存子孫昌熾逺夷慕德歌僂讓彼尼蠻夷所處且交陵悟日入之部繩動隨旅慕義向化路且倲維歸日出主聖德渡諾聖德深恩魏菌度洗與人富厚綜邪流籓冬多霜雪莋邪尋螺夏多和雨藐潯瀘離寒溫時適菌補雅推部人多有辟危歸險涉危歷險莫受萬柳不逺萬里術疊附德去俗歸德仍路孳摸心歸慈母逺夷懷德歌荒服之儀荒服之外犂藉撛憐土地墝埆阻蘇邪犂食肉衣皮莫碭粗沐不見鹽榖罔譯傳微吏譯傳風是漢夜拒大漢安樂蹤優路仁攜負歸仁雷折險龍觸冒險陜倫狼藏幢髙山岐峻扶路側祿緣崖磻石息落伏淫木薄發家理瀝髭雒百宿到雒捕􅉅菌毗父子同賜懷稿匹漏懷抱匹帛傳言呼敇傳告種人陵陽臣僕長願臣僕案益州刺史朱輔好立功名逺夷臣服白狼王唐菆等慕化歸義作詩三章因重譯訓詁為華言上之范于莋都夷傳中但載所譯之詞惟東觀記有夷人本語今録如前并以華言釋之議郊祀冕服永平二年正月公卿議舉南北郊東平王蒼議曰孔子曰行夏之時乘殷之輅服周之冕為漢制法髙皇帝始受命創業制長冠以入宗廟光武受命中興建明堂立辟雍陛下以聖明奉遵以禮服龍衮祭五帝禮缺樂崩久無祭天地冕服之制按尊事神祗潔齋盛服敬之至也日月星辰山龍華藻天王衮冕十有二旒以則天數旗有龍章日月以備其文今祭明堂宗廟圓以法天方以則地服以華文象其物宜以降神明肅雍備思傅其類也天地之祀冕冠裳衣宜如明堂之制案范志秦滅去禮樂郊祀之服皆以袀玄漢承秦故未能改易至顯宗初服冕旒衣裳文章赤舄絇屨以祀天地皇乎盛哉禮樂于是乎明備矣東平首引孔子之言可省千古説禮浮議范闕後漢書補逸卷八

body:
  text: 後漢書補逸卷十五監察御史姚之駰撰華嶠後漢書第一明帝館陶公主為子求郎不許賜錢千萬明帝謂羣臣曰郎官上應列宿出居百里非其人則民受其殃案此見范明帝紀史記曰太微宫後二十五星郎位也陳愍王寵陳愍王寵善弩射其祕法以天覆地載參連為竒又三微三小三微為經三小為緯經緯相將萬勝之方然要在機牙十發十中中皆同處案寵陳敬王之後以善射之故遭亂能全後為袁術所殺惜哉此數語絶似子書句峭而鍊范但云善弩射而已不詳載鄧禹鄧禹字仲華拜大司徒年二十四內文明德行純備案禹見東觀記范同禹為司徒天下既定常欲逺名勢有子十三人各使守一藝案髙密善教子孫故後嗣能延其澤李通李通字文元以讖記説光武為大司空案通見東觀記時有劉氏復興李氏為輔之讖故云臧宫宫攻延岑悉降其衆上璽書勞宫賜吏士絳縑六千匹案宫見東觀記時宫衆多食少乃為疑兵以進卒能破敵自是乘勝定蜀壯矣哉延岑公孫述將也范不載璽書事宫與祭遵擊更始將左房韓顔案范書韓作韋宫屢下郡邑帝使太中大夫張明持節拜宫為輔威將軍案范書逸張明名祭遵祭遵字弟孫建武二年為征鹵將軍南擊𢎞農賊弩中遵口洞出流血衆見遵傷稍引退遵呼出止之士卒戰皆百倍遂大破之為人亷潔奉公及卒光武嘆曰安得憂國奉公如祭征鹵者乎案遵見東觀記𢎞農賊名厭新柏華范同岑彭岑彭説降朱鮪遷征南將軍治軍整齊秋毫無犯案彭見東觀記彭嘗為鮪校尉令故帝命往説之彭以誠動非徒恃舌也陳俊俊從擊銅馬賊進至滿陽拜為強弩偏將軍賜絳衣九百領以衣中堅同心士案俊見東觀記張步畔俊追討斬之帝賜璽書曰將軍元勳大著威震青徐兩州有警得専征之案范不載璽書馮異異為征西大將軍時三輔大亂異討之與赤眉賊會大破于崤底追擊之又大破行巡上書言狀不敢自伐諸將或欲分其功詔云征西功若丘山也案異見東觀記行巡隗囂將也大樹將軍本謙退而詔書歸美若此女惟不伐天下莫與女爭功古帝豈欺我哉詔語具載范傳吳漢漢在朝廷惟公案漢見東觀記此出白帖甚不成語鄭興鄭興更始立拜為諫大夫使安集關西案興見東觀記興初事更始繼依隗囂因囂不從諌乃詭詞歸漢鳥能擇木已繞樹三匝矣知其所止蓋其難乎馮衍衍祖父立生滿年十七喪父早卒滿生衍案東觀稱衍祖即野王生痤痤生衍范書亦同此恐有誤衍説亷丹背莽丹不從而戰死衍西歸後吏以亡軍下司命乘傳逐捕故亡命河東案衍固戰國説客之餘習既亡命後乃以計説鮑永後卒歸漢室其文具載范傳朱暉暉年五十失妻昆弟欲為繼室暉嘆曰時俗希不以後妻敗家者遂不娶案暉見東觀記是時暉拜尚書遷太守矣貴易妻人情乎失且不續賢哉朱季樊宏樊宏字靡卿為光祿大夫位特進宏為人謙卑畏慎不求茍進案宏見東觀記樊氏世德宏復紹之天道好謙母怪其福祚之綿延也馬援馬援為隴西太守遇長吏如兄弟委以任之案援見東觀記桓榮桓榮字春卿為太子太傅以太子經學成畢上疏謝歸道太子以書謝案榮見東觀記榮以少傅遷太常明帝即位尊以師禮甚見親重拜之乘輿每幸太常府令榮東面坐設几杖會百官榮弟子丁鴻學最髙案榮卒時除都講生八人補二百石其餘門徒多至公卿則丁鴻翼翼此外尤多孔門厄窮于斯為盛榮長子雍卒小子郁嗣案范書不載雍卒桓郁桓郁字仲恩為議郎敦厚篤學傳父業以尚書教授門徒常數百人選侍中帝以郁先師子有禮讓甚見親厚常居中論經書問以政事不離左右帝自制五經章句令郁校定于宣明殿中案郁見東觀記五經章句應作五行章句東觀及范皆同此誤郁上書乞身天子憂之有詔公卿議議者皆以郁身為名儒學者之宗可許之于是詔郁以侍中行服案歸田行服尋常之理朝廷雖甚乏才豈必倚一棘人以治乎公卿此議甚正明張居正當國奪情從政孝既虧矣忠於何有至有身居外吏或貪戀善地或虧帑待補因之偽飾輿情使督撫入告以希在任守制者皆小太常之罪人也郁六子普延焉俊鄷良普嗣矦傳國至曽孫絶鄷良子孫皆博學有才能樂松樂松家貧為郎嘗獨直宿臺上無被食糟粳明帝每入臺輒見松問其故而喜之案松河內人其為郎時明帝曽以怒撞之矣乃復喜之且有大官之賜遂為直郎故事賢哉帝也范書見鍾離意傳松作嵩吳雄河間吳雄字季髙以明法律桓帝時以廷尉致位司徒雄少時家貧母死葬人所不封之地喪事趨辦不卜時日巫皆言其族滅而雄子欣孫恭三世為廷尉以法為名家案范書闕近世日者及青烏家多拘泥牽制致人世窀穸不能以時皆當以吳雄為法也紂以甲子日亡武以甲子日興西家之東即東家之西斯二言極超卓可以解惑伏恭伏恭為太僕帝臨辟雍于行禮中拜恭為司空儒者以為榮案恭字叔齊琅邪東武人伏氏通經世胄明帝臨雍而拜為三公乃以昭帝崇儒之德儒者何榮焉范同應慎應慎為將作大匠發衆姦皆極其刑豪猾吏纍迹視事五年省費以億萬案此疑即應順之誤見後陳寵陳寵為司空府故事督屬籍不通賔客以防交關寵去籍通客以明無所不受論者大之寵奏議溫粹有智號為明相案寵見東觀記寵字昭公以德行明敏入為尚書寵性周密常稱人臣之義苦不畏慎自在樞密謝門人不復教拒知友時賜寵劍得煆成劍以其敦朴案寵既去籍通客矣而謝門人拒知友復周密如此蓋通客所以集衆思謝友所以戒請託二者固並行不悖也矯節之士多不接賔客惟一二昵友暮夜往來徒為識者鄙耳江革革性至孝臨淄令楊音髙之設特席顯異巨孝于稠人廣衆中親奉錢以助供養案革見東觀記俗吏以錢榖簿書便謂了却官事敬敷五教全不知之楊音褒賜巨孝可稱凱以強教矣帝於革恩寵有殊京師貴戚各奉書致禮革終不報書一無所受第五倫蓋延代鮮于褒為馮翊多非法第五倫數切諫延恨之故滯不得舉案倫見東觀記上謂倫曰聞卿為市掾人有遺母一笥餅者卿從外來見之奪母笥探口中餅信乎倫對曰實無此衆人以臣愚蔽故為生是語也案東觀文大同此較妥適韋彪韋彪上疏曰欲急民所務當先除其患其原在尚書典樞機天下事一皆決之不可不察案范書闕鄭衆鄭衆字仲師為大司農在位以清正稱其後受詔作春秋刪十九篇案衆見東觀記衆世其經學少時曽作春秋難記條例矣今又受詔作此也衆為左馮翊政有名迹建初六年代鄧彪為大司農是時朝議欲改弊農田鹽鐵事衆諫以為不可詔數切責至被奏劾衆執之不移案范書作時議為鹽鐵官云云蓋欲復前漢賣鹽鐵置官以興利之舉當時必有桑孔之徒倡為此議司農爭之得春秋書丘甲田賦之意矣宋均宋均字叔庠為郎中時年十五好經書每休沐日輒受業博士通詩禮善論難至二十餘調補辰陽長案均見東觀記范同均為九江太守五日一聽事冬以日中夏以平旦蝗飛南到九江界輒東西分時多暴虎先是設檻捕之猶多傷害均下記曰夫虎豹在山黿鼉在淵物性所託故江淮之間有猛獸猶江北之雞豚也數為民害咎在貪殘令退貪殘進忠良去檻穽虎遂東渡江去案均為守必政簡易行故可五日一聽事否則案山積矣居二千石者必有蝗分虎渡之化然後可以五日為期范闕聽事三語郅惲郅惲拜長沙太守崇教化表異行案惲見東觀記馬防馬防字孝孫行車騎將軍事位列九卿班同三府與長水校尉耿恭同征盧水羌還帝親駕幸其府案防見東觀記防字范作江平東觀作公平而東觀又有一條作字孝孫者華書故同此也張英張英遷武威太守遇長吏如兄弟委以任之案范書闕張奐曽守武威英奐字仿當是誤耳任延任延拜九真太守民俗不好田作常告糴交址每致困乏延乃令鑄作田器教民以牛耕置吏巡行案延見東觀記地力轉移全資人力而佃漁火食創造必自聖賢延之教民其九真之庖犧神農乎馮豹馮豹字仲文為尚書郎勤力不懈每奏事不報常伏省閣下每從昏至明帝聞而嘉之乃加賞賜案豹馮衍子范書帝聞而嘉之下有使黃門持被覆豹敕令勿驚二語亦佳話也何敞敞為汝南太守修治鮦陽舊陂溉田萬頃墾田三萬餘咸賴其利吏民立石頌敞功德案敞見東觀記鮦陽縣屬汝南郡故城水經注云葛陂東出為鮦水亷范亷范為武原太守下車申明賞罰誅鋤姦猾表用良吏案范見東觀記范遷蜀郡太守生子皆以亷為名案范書不載以姓名子與賈彪任延宗慶而四矣何東漢循吏之多也衛羽衛羽為州從事時常侍單超兄子匡為濟隂太守負其勢大為貪放刺史第五種欲收之聞羽素抗厲乃召羽謂曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割羽出遂馳至定陶閉城門收匡賔客親吏四十餘人七日中起發其臧五六十萬種即舉奏一州震栗案此見范第五種傳州兖州也耿康耿康字伯初為征西將軍出西域康壯勇與士簡易鎮撫單于胸奴與國懷其恩信案范書闕陳元陳元字襄孫時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏爭之更相辨對凡十餘上帝卒立左氏學太常選博士四人元為第一案元字范作長孫與下條同元父欽習左氏元少傳父業鋭精覃思遂為左丘功臣范具載元疏文甚閎辨陳元字長孫以才髙著名辟司空掾宋𢎞受罪上書訟之言甚切直又敷陳當世便宜事案范不載訟宋𢎞事郭伋伋為潁川太守召見辭謁帝勞之曰郡得賢能太守去帝城不逺河潤九里兾京師并蒙其福也案伋見東觀記河潤九里四字採自南華移用于此更覺語妙衛颯衛颯遷桂陽太守下車修庠序之教設婚姻之禮期年邦俗從化案颯見東觀記徐防安帝即位太尉徐防以災異冦賊策免就國凡三公以災免始自防也案防見東觀記張奮張奮為大司馬在位名為清白案奮字雅通張純子永元中代劉方為司空未為司馬也又世祖時已改大司馬為太尉其司空司徒皆去大名此定誤耳桓焉桓焉明經篤行有名稱以尚書授安帝拜太傅録尚書復入授順帝于禁中因宴見奏宜引三公尚書入省事天子從之案焉見東觀記焉遭母憂踰年即依詔奪服所稱經明行篤者安在孔奮奮為武都太守美行愛之如骨肉無義憎之如仇讐案奮見東觀記班固固拜為郎中使終成前所著書學者莫不諷誦自為郎中遂見親近讀書禁中或繼日連夜每行巡狩輒獻上賦頌朝廷有大議使難問公卿辨論於前賞賜恩寵甚渥然二世位不過郎中案固見東觀記文章憎命達理有固然其位不顯其文則耀孟堅兩世如此覺文人九命可以不作樂恢恢薦潁川杜安安擢為宛令以病去章帝行過潁川安上書召拜御史遷至巴郡太守而恢在家安與恢書通問恢告吏口謝且讓之曰為宛令不合志病去可也干人主以窺覦非也違平生操故不報安亦節士也年十三入太學號竒童洛陽令周紆自往候安安謝不見京師貴戚慕其行或遺之書安不發悉壁藏之及後捕案貴戚賔客安開壁出書印封如故案恢見東觀記安固志士但不無宦情耳而恢絶之如此則恢又加安一等矣范不載任浦任浦拜武都太守路不拾遺案范書闕倪寬倪寬為南陽太守平心舉善每自刻責吏民愛敬不敢欺負案范書闕郭躬郭躬字仲孫為廷尉正遷廷尉家世掌法律鎮自廷尉左監為廷尉凡郭氏為廷尉者七人案躬潁川陽翟人父𢎞習小杜律斷獄平恕躬能世其學亦遂世其官也劉愷劉愷為太常論議常引正大義諸儒為之語曰難經伉伉劉太常案愷字伯豫劉般子愷議牧守宜行三年喪議除臧吏禁錮子孫皆醇正典核從經術湛深來諸儒語范闕岑熙岑熙為東郡太守招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我喜我生獨于斯時美哉岑君於戲神慈案熙見謝書於戲神慈謝作於戲在兹袁良袁良明經為太子舍人案范書闕黃瓊黃瓊遷尚書令習見故事號為補職案瓊見東觀記黃瓊字世英為僕射順帝久廢藉田瓊曰上古聖帝莫不敬恭神明躬郊廟之禮親藉田之勤書奏上從之次日還遷令也案范書全載瓊疏詞甚愷切魯恭魯恭拜司徒數有忠言陳正得失恭在位選辟髙第至列卿郡守數十人案恭見東觀記君闢門相開閣薦賢自是宰臣事唐杜悰厯事三朝未嘗薦士時號秃角犀夫犀乃禿角竟何物耶魯恭可法矣劉寬劉寬為南陽太守好為諸生講論經義不嚴而治案寬見東觀記寬遇民如子未嘗疾言遽色為南陽太守教民種柘養蠶織履生民之利案守令與民最親召父杜母豈必尊如天帝惟遇民如子則威嚴自無所用合觀二條文饒之于百姓何教養兼備也陽球陽球補尚書郎間達故事其所奏議常為臺閣所崇信案球見東觀記趙孝趙孝字長平拜長樂衛尉復徴弟禮為御史中丞禮亦恭謙行已類乎孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府大官送供具令共相對盡歡數年禮終帝令孝從官屬送喪歸葬天下榮之案孝見東觀記明帝之褒孝兄弟所以教天下之為人子為人弟者至矣覺憲老乞言猶為具文也劉平劉平為全椒長獄無繫囚案平見東觀記應順應順字華仲少給事郡縣為吏清公不發私書舉孝亷尚書郎轉右丞遷兾州刺史亷直無私遷東平相賞罰必信吏不敢犯有梓樹生于廳事室上事後母至孝衆以為孝感之應時竇憲出屯河西刺史二千石皆遣子弟奉賂遺憲憲敗後咸被繩黜順獨不在其中由是顯名為將作大匠視事五年省費億萬案順為應奉曽祖見范應奉傳中不詳載韓演梁皇后崩韓貴人大幸將立大將軍冀欲分其寵謀冒姓為貴人父演隂許諾及冀誅事發演坐抵罪案范書演稜孫也注云字伯南桓帝時為司徒坐黨梁兾遣歸後徴拜司𨽻鮑德鮑德為南陽太守時多荒災惟南陽豐穰吏人愛悅號為神父案范書闕今人但知有神君不知有神父也周燮周燮専精理易不讀非聖之書不修賀問之好有先人草廬結于岡畔下有陂田常肆勤以自給非身所耕漁不食案燮見謝書范同桓典焉長子衡早卒中子順順子典典十二喪父母事叔母如事親立亷操不取于人門生故吏問遺一無所受案典見東觀記范略典在御史十年不調後遷平津都尉鈎盾令羽林中郎案十年范作七年行行避驄宦豎切齒雖曽破賊未許調也崔琦崔琦作白鶴賦以諷梁冀冀幽殺之案琦字子瑋涿郡安平人范作兾遣琦歸後令刺客隂求殺之與此異劉寵劉寵字祖榮拜會稽太守政不煩苛徴為將作大匠山隂有五六老叟人賫百錢送寵曰鄙生未嘗識郡朝自明府以來狗不夜吠人不見吏今聞當見棄去故自扶送寵為人選一大錢受之案寵見謝書范同宋登宋登為汝隂令為政明能號稱神父出為潁川太守市無二價道不拾遺案登見張記袁逢嘉平中袁逢為三老錫玉杖案逢袁安之孫字周陽范載其常為三老無錫杖事嘉平應作中平此訛也班超班超投筆嘆曰大丈夫當立功異域以取封侯安能久事筆耕乎案超見東觀記末語范作安能久事筆研間此作筆耕較雋是六朝人藻語研田心織皆權輿于此超使西域至鄯善有胸奴使來超夜奔鹵營斬得胸奴節使屋賴帶副使比離支首及節案時超以吏士三十六人斬敵三十餘級餘衆百許人悉燒死功亦偉矣范佚胸奴使名張濟張酺子蕃蕃生磐磐生濟濟字元江靈帝初楊賜薦濟明習典訓為侍講案濟見范張酺傳位至司空趙一趙一字元叔漢陽西縣人體貌魁梧身長九尺美鬚眉望之甚偉恃才倨傲為鄉里所擯後屢抵罪幾至死友人救得免乃作刺世疾邪賦以舒其怨憤案范書同一又有解擯及窮鳥賦諸篇多骯髒不平之筆固狂生也楊震楊震為太尉中常侍樊豐驕恣震常切諫由是共譖震罷遣歸本郡遂仰鴆薨葬日有大鳥來止停樹上須臾下地行徐步到柩前止立低頭淚出更共抱持終不驚駭案震見東觀記大鳥事華書所記獨詳文甚腴澤李膺膺字元禮遷僕射與太傳陳蕃戮力悉心彌縫遺闕案膺見謝書張堪張堪為漁陽太守帝常召見諸郡計吏問其風土及前後守令能否蜀郡計吏樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦清亷無以為比上曰何以為徴顯曰昔公孫述破時珍寶山積捲掘之物足富十世而堪去職之日乘折轅車布被囊而已帝聞嘆息案堪見東觀記應劭劭弟珣字季瑜司空掾珣生瑒案劭著述百三十六篇皆傳世魏志載瑒字德璉弟璩字休璉咸以文章顯也范不載珣名袁安安字邵公好學有威重明帝時為楚郡太守治楚王獄所申理者四百餘家皆蒙全濟安遂為名臣章帝時至司徒生蜀郡太守京京弟敞為司空京子陽太尉陽四子長子平平弟成左中郎將並早卒成弟逢逢弟隗皆為公案安見東觀記安理楚獄時顯宗方震怒吏案急迫掾史叩爭以為阿附反鹵法與同罪而安毅然以身全之此尤人臣所難者陽范作湯闕平名風俗通云湯有子十二人亦與此異論曰陳平多隂謀而知其後必廢邴吉有隂德夏侯勝識其當封及子孫終陳掌不侯而邴昌紹國雖有不類未可致詰其大致闕然矣袁公竇氏之間乃心帝室引義雅正可謂王臣之烈及其理楚獄未嘗鞫人于臧罪其仁心足以覃乎後昆子孫之盛不亦宜乎案此論文甚跌宕有馬遷筆意范書論袁公並同章懷以為皆華詞也陳實陳實在鄉閭平心率物有盜夜入其家止于梁上實隂見之乃自整拂命子孫訓之曰夫人不可不自勉不善之人未必本惡習與性成耳如梁上君子者是矣盜大驚自投于地實徐譬之曰視君狀貌不似惡人然當由貧困今遺絹二匹自是縣無復盜竊案實字仲弓潁川許人諡文範先生亦稱陳太丘其送張讓父喪人以為善類賴以全活者甚衆黃勉齋譏其屈辱全身不可為法洵然此條范書皆同來豔豔好學下士開館養徒少厯顯位靈帝時位至司空案豔見范靈帝紀又蜀志來敏傳稱父豔為司空即此來歙之後義陽新野人何熙熙字孟孫少有大志不拘小節身長八尺五寸體貌魁梧善為容儀舉孝亷為謁者贊拜殿中音動左右和帝佳之厯位司𨽻校尉大司農永初二年南單于與烏丸俱反以熙行車騎將軍征之纍有功烏丸請降單于復稱臣如舊會熙暴疾卒案魏志何夔傳夔曽祖名熙在安帝時官車騎陳郡陽夏人東觀記有何熙似又一人也范滂范滂以黨事下黃門北寺滂以同囚多嬰病乃請先就格遂與同郡袁忠等爭受楚毒案滂見謝書范同蔡雍初蔡雍在陳留鄰人有以酒召雍者比往而酒已酣客有彈琴于屏雍至門潛聽之曰以樂召我而有殺心何也遂反將命者告主人以蔡雍至門而去雍素為邦鄉所宗主人遂自追問其故雍具以告莫不憮然彈琴者曰我向見螳螂方向鳴蟬蟬將去而未飛螳螂為之一前一却吾心聳然惟恐螳螂之失蟬也此豈為殺心而形於聲者乎雍笑曰此足以當之矣案雍見東觀記范全襲華書略增數字更覺生色皇甫嵩皇甫嵩拜車騎將軍領冀州牧嵩溫恤士卒甚得衆情每軍行頓止須營幔修立然後就舍帳軍士皆食爾乃嘗飯嵩既破黃巾威震天下案嵩見謝書崔駰駰擬揚雄解嘲因作達旨譏雄以為范蔡鄒衍之徒乘釁相顧誑曜諸侯者也而云彼我異時又曰竊資卓氏割炙細君斯蓋士之遺行而云不能與此數公者同以為失類而改之也案駰字亭伯涿郡安平人范但稱駰擬揚雄解嘲作達旨以答之焉竟以長岑長比之莽大夫非其倫矣華書序達旨之原深於知亭伯者也楊彪彪與馬日磾盧植蔡雍等著作東觀案彪字文先楊賜子彪于熹平中徴拜議郎應于此時預著作也范不載王甫使門生王翹辜𣙜于郡界彪發其姦案中常侍乃有門生范佚其名華原載之以遺臭爾然昏濁之世天子亦門生矣何有于羣小乎明季大僚有拜閹人為假父者是又出門生下矣王允夫士以正立以謀濟以義成若王允之推董卓而分其權伺其間而弊其罪當此之時天下之難解矣本之皆主於忠義也故推卓不為失正分權不為不義伺間不為狙詐是以謀濟義成而歸于正也案允見張記此論文筆如并州快剪爽人心目范書全襲此段但小增損之惟難解易作懸解用莊子中語殊費詮釋文人狡獪固如是耶應瑒瑒祖奉字世叔才敏善諷誦故世稱應世叔讀書五行俱下著後序十餘篇為世儒者延熹中至司𨽻校尉子劭字仲逺亦博學多識尤好事諸所撰述風俗通等凡百餘篇辭雖不典世服其博聞案瑒字德璉應劭從子自應順至瑒並有才名七世通顯奉及劭事俱别見崔瑗瑗愛士好賔客盛修肴膳或言其太奢瑗聞之怒敇妻子曰吾并日而食以供賔客而反以獲譏士大夫不足養如此後勿過菜具無為諸子所蚩也終不能改奉祿盡於賔饗也案瑗見謝書范無怒敕妻子語華歆歆少以髙行顯名避西京之亂與同志鄭泰等六七人間步出武關道遇一丈夫獨行願得俱皆哀欲許之歆獨曰不可今已在危險之中禍福患害義猶一也無故受人不知其義既以受之若有進退可中棄乎衆不忍卒與俱行此丈夫中道墮井皆欲棄之歆曰已與俱矣棄之不義相率共還出之而後别去衆乃大義之案歆字子魚平原髙唐人為魏尚書令非漢臣也華書作序傳故詳載之孫策略有揚州盛兵徇豫章一郡大恐官屬請出郊迎教曰無然策稍進復白發兵又不聽及策至一府皆造閣請出避之乃笑曰今將自來何遽避之有頃門下白曰孫將軍至請見乃前與歆共坐談議良久夜乃别去義士聞之皆長嘆息而心自服也策遂親執弟子之禮禮為上賔是時四方賢士大夫避地江南者甚衆皆出其下人人望風每策大會坐上莫敢先發言歆時起更衣則論議歡譁歆能劇飲至石餘不亂衆人微察嘗以其整衣冠為異江南號之曰華獨坐案歆子孫貴盛故魏志亦多褒詞至于華傳猶今人為祖父作行述臚列髙行連篇纍簡不足供閲者一哂而已文帝受禪朝臣三公已下並受爵位歆以形色忤時徙為司徒而不進爵魏文帝久不懌以問尚書令陳羣曰我應天受禪百辟羣后莫不人人悅喜形于聲色而相國及公獨有不怡者何也羣起離席長跪曰臣與相國曽臣漢朝心雖悅喜義形其色亦懼陛下實應且憎帝大悅遂重異之案歆副郗慮勒兵收伏后歆就牽后出千載下猶令人髮指豈于魏文受禪反爾不怡此附會之詞不足信也歆淡于財欲前後寵賜諸公莫及然終不殖産業陳羣常嘆曰若華公可謂通而不泰清而不介者矣案歆與管幼安鋤菜見金管揮鋤不異瓦石歆捉而擲之其于財欲豈能淡然者華表嶠父表字偉容歆之子也年二十餘為散騎常侍後終光祿大夫每言吾祖稱時人説皇甫嵩之不伐汝豫之戰歸功朱俊張角之捷本之於盧植收名斂策而已不有焉蓋功名者世之所甚重也誠能不爭天下之所甚重則怨禍不深矣案表乃歆子仕晉為尚書非東漢人因華書譜敘連類及之又所論列乃漢名臣故不敢妄削嶠表中子也董卓王允與吕布及士孫瑞謀誅董卓有人書吕字于布上負而于市歌曰布乎布乎有告卓不悟三年四月帝疾愈卓入朝布持矛刺卓兵士趣斬之案卓見張記卓欲遷都長安召公卿以下大議司徒楊彪曰昔盤庚五遷殷民胥怨故作三篇以曉天下之民而海內安穩無故移都恐百姓驚動麋沸蟻聚為亂卓曰關中肥饒故秦得并吞六國今徙西京設令關東豪強敢有動者以我強兵踧之可使詣滄海彪曰海內動之甚易安之甚難又長安宫室壞敗不可卒復卓曰武帝時居杜陵南山下有成瓦窑數千處引涼州材木東下以作宫室為功不難卓意不得便作色曰公欲沮我計邪邊章韓約有書來欲令朝廷必徙都若大兵來下我不能復相救公便可與袁氏西行彪曰西方自彪道徑也顧未知天下何如耳議罷卓勑司𨽻校尉宣璠以災異劾奏因策免彪案此見范楊彪傳范語更簡雋郭汜汜饗公卿議欲攻傕楊彪曰羣臣共鬭一人劫天子一人質公卿此可行乎汜怒欲手刃之中郎將楊密及左右多諫汜乃歸之案劉艾獻帝記云汜張掖人范云汜一名多董卓以為校尉後與李傕共攻長安為卓報仇中原版蕩無寧日矣梁冀妻梁冀妻孫夀色美善為妖態作愁眉啼妝墮馬髻折腰步齲齒笑以為媚惑案兾妻媚態以孽為禎妖由人興不亡何待冀愛監奴秦宫官至太倉令得入妻夀所夀見宫屏御者以言事因通焉宫威權大震二千石皆拜謁之案秦宫一生花裏活冀實活之身不行道不行於妻子非獨夀之罪也南單于南單于遣使詣闕奉蕃稱臣入居於雲中遣使上書獻駱駝二頭文馬十匹案此建武二十六年事靈帝治南宫靈帝時遂使鈎盾令宋典繕治南宫又使掖庭令畢嵐鑄銅人四列於蒼龍玄武闕外又鑄四鐘皆受二千斛懸於堂及雲臺殿殿前又鑄天祿蝦蟇吐水渴烏施於橋西灑南北郊路以省百姓灑南道之費案靈帝委體宦孽南宫災後稅天下田錢以修宫室漢終四百不待山陽公也諸事特其細者范不載世宰相東京楊氏袁氏纍世宰相為漢名族然袁氏車馬衣服極為奢僭能守家風為世所貴不及楊氏也案楊氏清白吏子孫雖雞肋遭難止及一身袁氏於董卓之時罹禍最酷故奢僭乃造物之所忌也東觀學者稱東觀為老氏藏室道家蓬萊山謹案史記老子周守藏室之史也索隱曰藏室史乃周藏書室之史也又張湯傳老子為柱下史即藏室之柱下因以為官名案東觀二語見范書竇章傳太僕鄧康重章是時學者稱東觀云云遂薦章入東觀為校書郎華書疑即同之謹案以下係注或非華書本文俟考明章二帝魏文帝稱明帝察察章帝長者案范書論章帝亦用此二語執金吾執金吾掌從領宿衛案此乃官志一條二十八將中興二十八將前世以為上應二十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦各志能之士也案范書統論雲臺諸將文多排語不甚竒崛論首數言筆意不倫注以為華詞也論鮑永馮衍夫貴者負勢而驕人才士負能而遺行其大略然也二子不其然乎指鮑永馮衍馮衍之引託妻之譬得矣夫納妻皆知取詈已者而取士則不能豈非反妒情易而恕義情難光武雖得之于鮑永猶失之于馮衍也案范論全襲此後略增二語耳此論文甚峻峭有國策從橫意後漢書補逸卷十五

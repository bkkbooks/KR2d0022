body:
  text: 後漢書補逸卷十八監察御史姚之駰撰司馬彪續後漢書第一光武光武渡呼沱河時冰滑馬僵乃各以囊盛沙布冰上渡案此見東觀記王霸傳更始使侍御史黃黨封上為蕭王案世祖時誅王郎故有此封范軼黃黨名上已乘王豐小馬先到矣營門不覺案此光武擊尤來等賊于元氏時也伯升賓客劫人上避吏于新野鄧晨家案晨光武姊壻也范不載上平河北過邯鄲故趙繆王子林進見言赤眉可破上問其故對曰河水從列人北流如决河水灌之皆可令為魚上不然之案林說即可勝亦虐甚矣故世祖之得天下也以仁林東觀記作臨范略建武二年詔曰其與中二千石諸大夫博士議郎省刑罰詔曰其赦天下惟殘疾用刑戮深刻獄多寃人朕甚愍之自今以後有犯者將正厥辜案世祖即位頻年肆赦蓋以大兵之後用培元氣也而吳漢遺奏猶以慎無赦為言夫亦寬難之意乎管子有云赦者奔馬之委轡也不赦者癰疽之砭石也諺曰一歲再赦婦兒喑啞則赦其可數乎建武三十年羣臣上言即位三十年宜封禪泰山詔書曰百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放乎案時太尉趙熹請封禪故詔答之見東觀記昔羿寒浞篡夏數十年少康生為牧人能修德復夏厥勳大矣然尚有虞思及靡有鬲內外之助至于光武承王莽之篡起自匹庶一民尺土靡有憑焉發迹于昆陽以數千屠百萬非膽智之至孰能堪之討賊平亂克復漢業號稱中興雖初興者無以加矣中國既定柔逺以德愛慎人命下及至賤武功既抗文德聿修勳績𢎞矣案彪此論文氣平實未甚排宕比之薛瑩殊有遜焉然品格應在袁山松之上以古茂蒼鬱不墮靡靡也范書論後有贊頗為贅旒故光武一論大夫史體于薛書評之矣明帝永平二年上始率羣臣躬養三老五更于辟雍行大射之禮又帥郡國縣道行鄉飲酒禮于學校案范書載帝詔有尊事三老兄事五更安車軟輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而酭其隆禮如此非後世所及章帝明帝崩司徒鮑昱典喪事葬日三公入安梓宫還至羡道半逢上欲下昱前叩頭言禮天子鴻洞以贈所以重郊廟也陛下奈何冒危險不以義割哀上即還案禮儀志鴻洞贈玉與幣也葬時帝就贈位司徒跪曰請進贈侍中奉持鴻洞玉圭𤣥纁帝進跪臨羡道下贈授鴻洞匠奉封入藏房中乃拜哭太常贊贈事畢帝促就位也蓋以義割哀其制如此和帝和帝永元四年蝗八年五月河內陳留蝗九月京師蝗九年蝗從夏至秋先是西羌數反遣將軍將北軍五校征之案范志同永元六年七月京師旱幸洛陽寺録囚徒舉寃獄未還宫而澍雨案范書時收洛陽令下獄抵罪司隸校尉河南令皆左降蓋必有竒寃得釋者惜不傳耳安帝安帝三年詔以鴻池假貧民池在雒陽東二十里案時京雒大饑故有此詔永初四年夏蝗是時西羌冦亂軍衆征拒連十餘年五年夏九州蝗六年三月去年蝗處復蝗子生七年二月郡國蝗案古今注云六年時郡國四十八蝗災已甚矣范同順帝永建五年郡國十二蝗是時鮮卑冦朔方用衆征之永和七年偃師蝗去年冬烏桓冦沙南用衆征之案京房占云國多邪佞則蟲與民爭食居位食祿如蟲矣不救致兵起范同冲帝冲帝建康元年九月京師及太原雁門二郡地震沙涌案范不載太原雁門二郡事桓帝桓帝時童謡曰小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡案范志尚有吏買馬君具車請為諸君鼓嚨胡三句此應元嘉諸羌深入戰鬬積苦也桓帝永興元年七月郡國三十二蝗是時梁冀執政無謀慮茍貪作虐二年六月京都蝗永夀三年六月京都蝗延熹元年五月又蝗案春秋考異郵曰貪擾生蝗此其應也桓帝時童謡曰城上烏尾畢逋一年生九雛公為吏兒為徒一徒死百乘車案范志無一年生九雛句百乘車下有車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂黃粱梁下有懸鼓我欲擊之丞卿怒數語諸謡中此最古雋乃是樂府之祖范志依句釋之皆應靈帝始末諸事靈帝二年尊慎園董貴人為孝仁皇后置永樂宫儀如桓帝尊匽貴人之禮案董貴人解瀆亭侯萇之妃實生靈帝靈帝時講武平樂觀建十重五彩華蓋高十丈建九重華蓋高九丈案時帝自稱無上將軍耀兵為樂越千餘年而明武宗乃祖述之靈帝數遊戲于西園中令後宫彩女為客舍主身為商賈服行至舍彩女下酒食因共飲食以為戲樂案詞人艷稱南朝風流漢靈此舉實為金蓮玉樹之先聲西崑諸公咏古何未齒及靈帝好胡服胡飯京師貴戚皆競為之又作胡箜篌案靈帝所好直為戲耳非若趙武靈王之能自强也明德馬后明德皇后馬氏者伏波將軍馬援女也后年七歲幹治家事敇制僮御出入計校一以貫之年十三以選入太子宫接待同列靣承至尊先人後已發於至誠由是見寵是時後宫未有任育者常言繼嗣當以時立薦逹左右惟恐不及身衣大帛御者秃帛不緣諸王親家朝請望見后裙極粗疏以為綺就視乃笑后曰此繒染色好故用之耳老人知者無不嘆息性不喜出入遊觀又不好音樂上時幸苑囿離宫以故希從誦易經習詩論春秋略記大義后志在克己輔上不以私家干朝廷兄為虎賁中郎將兩弟黃門郎訖永平世不遷案明德事見東觀記諸書此所載刪節甚簡雖始末具體而筆不暢意大似宋人新唐書也范紀則腴而雋矣和熹鄧后宫省宴㑹諸貴人競自修飾極靡麗之服而后獨淡然衣不擇采裝不務飾案和熹事見東觀記后性謙愼兄弟中外皆先帝所寵自攝政之後內檢左右外抑宗族案后之謙慎真能嗣徽明德者矣順烈梁后梁后立順帝崩冲帝在襁褓太后攝政初章德竇后嫉害恭懷皇后獨生聖嗣陷以非辜家屬坐徙九真章德后之從父昆弟章女為貴人與太后竝寵章至犬位大鴻臚及上晏駕后登至尊章惶怖太后內無忌刻之心遂不以舊惡介意案順烈事見東觀記此條范不載曹皇后曹皇后諱節魏受禪遣使求璽綬后怒以璽綬投軒下案曹后操之中女范同東漢母后不狥外家后之此舉猶是馬鄧遺教亦異于立武氏七廟者矣虞美人美人父詩為郎中詩父衡屯騎校尉案虞大家實生冲帝梁冀秉政疾惡他族故虞氏抑而不登熹平中帝感小黃門之言乃拜為憲陵貴人沛獻王輔王性務嚴矜有威好經書善說京氏易案輔見東觀記北海敬王睦睦性孝友篤于骨肉敦尚經術少好學博通經傳光武愛之案睦見東觀記琅邪孝王京王性恭孝好學數上詩賦頌德帝嘉美之案東觀記稱京好治宫室未聞好學也北海靜王興興遷𢎞農太守縣吏張申有伏罪興收申案論郡中震栗時年旱分遣文學循行屬縣理寃獄宥小過應時甘雨降澍案興事同東觀記趙孝王良阜賜移書于良曰老子不率宗族單褲騎牛哭且行何足賴哉案良見東觀記良本不欲從世祖起兵後從軍至小長安妻子皆被害故甄阜梁丘賜書譏之二人莽大夫也安成孝侯賜王莽時諸劉抑廢為郡縣所侵蔡陽國釡亭侯長醉詢更始父子張子張怒刺殺亭長後十餘歲亭長子報殺更始弟騫賜兄顯欲為報怨賓客轉劫人發覺州郡殺顯獄中賜與顯子信結客陳政等九人燔燒殺亭長妻子四人案賜字子琴光武族兄也迭相仇殺時事可知然適為從龍地耳范略成武孝侯順順叔父𢎞字儒孫先起義兵卒𢎞弟梁字李少更始元年起兵豫章病筋牽卒案順亦光武族兄初為更始虎牙將軍後附光武𢎞梁事范俱附順傳東平憲王蒼東平王蒼到國病詔遣大醫丞將高手醫視病案蒼見東觀記河間孝王開開忠貞謹恭聰敏畏慎上以開小弟特親友愛案開章帝子范稱開就國後遵奉法度吏人敬之固賢王也劉聖公聖公弟為人所殺結客欲報之時聖公聚客家有酒請游徼飲賔客醉歌言朝亨兩遊徼後來用調羮味游徼後怒縛捶數百案聖公見東觀記范書言客犯法聖公因避吏平林指此更始自洛陽初發馬驚奔觸北宫門三馬皆死此馬禍也時更始失道將亡之徵更始所授官爵皆羣小賈豎多著繡靣衣錦袴襜褕諸于時智者見之以為服之不衷身之災也乃奔入邊郡避之是服妖也其後為赤眉所殺案馬禍服妖雖曰凶兆然使更始鑒此修德安知不轉眚為祥然則禍與妖皆更始自為之耳隗囂囂以杜陵人王元為大將軍案囂見東觀記囂素謙恭愛士傾身接引故所用皆一時豪俊不獨王元也囂負其險厄欲專方靣游士長者知囂不可恃杜林先去餘稍稍相隨東詣京師案囂雖能下士而士多引去者天命有在人不能違矣王莽末天水童謠曰出吳門望緹羣見一蹇人言欲上天令天可上地上安得人時囂初起兵于天水後意稍廣欲為天子遂至破滅案囂不克順天終至恚死童謠兆之矣宜屢詔諭而不從也囂少病蹇吳門冀都門名有緹羣山李通李通字次元為光祿勳帝每征討四方常令通居守京師鎮撫百姓修宫室起學官案通見東觀記通父守居家與子孫尤謹閨門之內如官廷也案李守門內嚴肅乃在華子魚之先也守為王莽宗卿師好星厯䜟記曾說䜟云劉氏復興李氏為輔子通遂迎光武圖大事光武好圖䜟通實導之通遣從弟軼往迎光武先是通母弟申徒臣能為醫難使伯升殺之上恐其怨不欲與軼相見軼數請上乃彊見之軼深逹通意上乃許往意不安買半臿佩刀懷之至通舍通甚恱握上手得半臿刀謂上曰一何武也上曰倉卒時以備不虞耳案此與東觀記同王常王常字顔卿拜橫野大將軍位次九卿諸將絶席引兵擊髙峻案常見東觀記髙峻乃隗囂將也鄧晨鄧晨為常山太守會王郎反光武自薊走信都晨亦間行會于巨鹿下自請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我北道主人乃遣晨歸郡案晨見東觀記此與范同晨為汝南太守興鴻郤陂益地數千頃汝土以殷魚稻之饒流衍他郡案鴻郤陂在汝陽縣東成帝時關東水陂溢為害丞相翟方進奏罷之至是復興晨拜中山太守吏民稱之常為冀州髙第案晨世吏二千石故晨亦好樂郡職范同朱浮朱浮為執金吾六年有日蝕之異浮上疏切諫案浮見東觀記耿純耿純字伯山以威信著於衛地遣使拜太中大夫使與大兵㑹東郡東郡聞純入界盜賊九千餘人皆詣純請降大兵不戰而還案純見東觀記此建武八年事純前守東郡郡故衛地故云范同純為東郡太守在郡四年抑强扶弱令行禁止後免官會上擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君案詞人艷稱借寇乞侯而不及復耿傳固有幸不幸也守令親民之官輿論似屬可採然末俗多詐往往有罷職後賄使胥役號召游民聚衆籲呼僞為保留者甚至候鑾輿行幸時遮道叩鑒閽以圖僥幸寇重懲之間有一聖天子明及萬里曾其僞者命司二如耿君者量豫原職詐風今漸熄矣封疆大吏亦宜體此意察之六年上令諸侯就國純上書自陳前在東郡案誅涿郡太守朱英親屬今國屬涿誠不自安制書報曰侯前奉公行法朱英久吏曉知義理何至更以公事相是非然受堯舜之罰者不能愛己也已更擇國土令侯無介然之憂乃更封純為東光侯案光武待功臣真如家人父子制書惓惓何情義兼盡也范不載公孫述公孫述補清水長太守以其能使兼治五縣政事修理姦盜不發郡中謂有神明案述見東觀記此子陽最少年時事鄧禹明帝以鄧禹先帝名臣拜太子太傳進見東宫甚有優寵案禹見東觀記李忠李忠字仲都為丹陽太守越俗不好學嫁娶禮儀衰於中國乃為起學校習禮容春秋鄉飲選用明經郡中向慕之墾田增多三歲間流民占著者五萬餘口十四年三公奏最為天下第一案忠見東觀記今越俗理學文章乃甲海內雖風㑹日闢然亦不可忘李仲都之功也近日仕宦滇黔及在粵西諸郡者皆當以忠為法忠東萊黃人父為高密中尉案范書作都尉章懷注云郡國志有高密侯百官志皇子封每國傅相各一人中尉一人職如郡都尉高密非郡為都字者誤彊華彊華潁川人也案華即奉赤伏符者世祖在長安時華為同舍生吳漢漢攻薊誅王良大將趙閎等案漢見東觀記時漢尚為彭寵所遣與上谷諸軍合者范略上使漢等將突騎揚兵戲馬士騎馳環邯鄲城乃圍之案漢此時初屬光武拜偏將軍漢為大將軍持節北發十郡突騎更始幽州牧苖曾不肯應調漢斬曾威震州郡將其兵詣上案時鄧禹薦漢勇騺有謀故拜大將軍謝躬擊賊山陽光武使漢襲其城躬入城漢兵收之時岑彭已在城中將躬詣傳舍出白漢漢至躬在彭前伏漢曰何故與鬼語遂殺之案謝躬為尚書令與光武不相能光武以詐力制之遂及于難躬字子張南陽人漢擊周建被甲拔㦸令諸部將曰聞靁鼓聲皆大呼俱大進後至者斬遂鼓而進之案漢時墮馬傷滕襄創而起遂殺諸賊奴亦雄矣哉漢北擊清河長垣及平原五里賊皆平之案長垣范書作長直長直非縣名而長垣在河南與北擊不合或是賊號長直否吳漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡分以與昆弟外家案吳公行事先得諸葛武侯之意豪俊中聖賢也范同上即位漢為大司馬海內無事乃得安然其性忠厚篤于事上案漢拜大司馬後歲有征伐豈得安然吳漢為洛陽令病卒百姓哀痛老小隨車晝夜號泣案子顔時官大司馬安得為令此豈又一吳漢耶見北堂書鈔王梁梁擊五校賊降其渠帥大將軍杜猛持節光祿大夫董敦等案梁見東觀記梁字君嚴為野王令赤伏符曰王梁主衛作𤣥武上以野王本衛地徙𤣥武水神大司空水土之官也于是拜梁為大司空案世祖以赤伏符即位及拜三公皆以符䜟大為千古笑柄史記曰衛元君自濮陽徙于野王陰識陰識拜執金吾位特進入則極言正諫至與賓客語不及國事常慕仲山甫夙夜匪懈案識見東觀記冦恂光武欲定河內謂鄧禹曰朕有河內猶高祖有關中非蕭何誰能鎮之為吾舉如蕭何者禹曰冦恂文武兼備有御衆之才非此莫可使也乃拜為河內太守案恂見東觀記引髙祖蕭何范書作髙密對語不若續書之勻稱恂拜河內太守移書屬縣講兵肄射伐淇園之竹為矢百餘萬馬二千匹收租四百萬斛轉以給軍恂為潁川太守誅討賊盜政教施行郡中無事修禮樂教授時有豆生于郡界收得十餘萬斛以給諸營案范書稱恂素好學乃修學校教生徒真不愧文武兼備一語恂為潁川盜賊不敢入界恂為潁川太守代朱浮為執金吾潁川盜賊羣起上謂恂曰惟念獨卿能平之耳恂對曰臣願執鋭前驅即日車駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年上乃留拜之案恂初守潁川在建武二年後又為汝南太守進秩金吾至八年乃從征潁川有借寇事此刪録甚不明張隆張隆遣子􅀢將兵詣岑彭助征伐上以􅀢為率義侯案隆時守桂陽岑彭遣使詔諭遂從鄧讓等歸順范見岑彭傳不詳載馬武光武歷問功臣諸君不遭際㑹自度能何為乎各以次對至馬武曰臣以勇武可守尉督盜賊上笑曰且勿為盜賊自致亭長斯可矣案武見東觀記范同卓茂卓茂遷密令口不出惡言勞心憂念吏民知其有緩急以恩信待吏吏畏而愛之不忍欺也元始中天下蝗河南二十縣蝗獨不入密界督郵書言太守大怒自出案行密界中實然乃驚案茂見東觀記茂為密令在前漢平帝時茂為密令數年教化大行道不拾遺案茂理百姓真得道德齊禮意非後世循吏可及馮異異敕吏士非交戰受敵常行諸營之後相逢引車避之由是無爭道變鬭者也案異見東觀記大樹將軍謙退不伐故其將士皆如此蓋延延與吳漢謀歸光武并與狐奴令王梁同勸寵案延見東觀記延時為彭寵護軍故然劉永别將許德攻襄邑延攻而拔之遂圍永于睢陽夜梯其城入永驚懼走出魚門案范書魚作東魚門或是門名也延為左馮翊視事四年人敬其威信案范不載岑彭彭鎮河內馮異先攻洛陽朱鮪大出軍欲擊彭時天霧鮪以為彭已去令其兵皆穫黍彭乃進擊大破之案彭見東觀記彭嘗為鮪校尉鮪守洛陽不肯下後帝令彭往說之遂降范但載圍城事此闕時更始尚書令謝躬將六將軍屯鄴兵橫暴為百姓所苦上先遣吳漢往收之故拜彭為刺姦將軍使督察諸營案范書彭之拜刺姦將軍以說降更始大將吕植也彭南擊荆州至城安昆陽犨葉舞陽堵陽平氏棘陽胡陽處處皆破其屯聚帝自將擊鄧奉至葉車騎不得前彭奔擊破之至堵陽奉令候伏道旁見車騎一日不絶歸語奉奉遂夜遁案二條范書不詳載彭募攻浮橋先登者偏將軍魯竒應募而前時天東風其櫕柱有反把鈎竒船不得去案此彭與吳漢等攻公孫述時事後竒等乘勢死戰飛炬燒橋遂大勝之蓋征南公習水戰故然今制設有水師營兵將皆當以彭為師也張印地皇三年王匡王鳯馬武及其黨朱鮪張印等入南陽號新市兵案新市及平林諸賊不過如陳勝吳廣輩為帝王驅除難耳印范書作卭來歙來歙擊隗囂徑至略陽斬囂守將金梁因保其城囂大驚曰何其神也乃悉兵數萬人圍略陽塹山築堤决水灌城歙與將士固死堅守矢盡乃發屋斷木以為箭案歙見東觀記王遵遵降封上雒侯案遵字子春霸陵人為隗囂將帝令來歙以書招遵故降祭遵上幸廣陽城門設祖道閲過諸將以遵新破漁陽令最在前案遵見東觀記范書六年春詔遵與耿弇等從天水伐公孫述故有此閲朱祐祐至南䜌為賊所傷上親候視之案祐見東觀記祐從征河北常力戰陷陳景丹南䜌賊迎擊上營得上鼓車輜重數乘丹縱突騎擊大破之案丹見東觀記時王即將兒宏等據南䜌也耿弇弇還檄與况陳上功德自嫌年少恐不見信宜自來况得檄立發至昌平見上案弇見東觀記弇時年二十一遂有大志求發兵以定邯鄲卒為光武北道主人見亦卓矣况弇父也時為朔調連率弇從光武北至薊歸食未巳薊中擾亂上駕出南城門頗遮絶輜重城中相掠弇既與上相失以馬與城門亭長乃得出案范書只㑹薊中亂四字不詳載光武居邯鄲晝卧溫明殿弇請間進說願歸幽州益發精兵以集大計上見弇言起坐曰卿失言我斬卿弇曰大王哀厚弇如父子故披赤心為大王陳事上曰我戲卿耳案范書但有光武大恱句不若續書情事如畫侯霸侯霸為臨淮太守王莽之敗霸保固自守卒全一郡更始徴霸百姓老弱相擕號哭遮使者車或當道而卧皆曰願乞侯君復留期年案霸見東觀記臨淮太守范作淮平大尹地名官名皆新莽所改也隂興隂興為衛尉每將逺征身行勞問無所愛惜案興見東觀記陰興字君陵為黃門侍郎筋力過人每從出入常操蓋障翳風雨險隘躬自履涉率先期門凡上所幸止先入清辟案興以椒房之戚宿衛至尊不憚勞瘁善夫其能以功名終也哉陳俊陳俊為琅邪太守撫恤貧弱表有行義百姓歌之案俊見東觀記時琅邪未平故徙俊守其郡領將軍如故俊既追斬張步悉平諸賊而又能拊循百姓若此何才之兼也杜林杜林字伯山為光祿勳內奉宿衛外總三署周密敬慎選舉稱平數薦名士案林見東觀記林承內外家學博物洽聞古文尚書之行自林始之林為光祿勳郎有好學者輒見誘進朝夕滿堂士以是高而慕附之案郎即三署之郎謂左右中郎將及五官中郎將也居官何必廢學其屬吏皆吾之弟子孔子仕魯原思仲由皆使為宰故學即所以為治治即所以為學理學事功未嘗分而為二事也豈同後世髙談性命徒召迂濶之譏哉杜伯山其庶幾乎第五倫第五倫遷㑹稽太守為政修理清淨不煩妻子自為炊爨俸祿常取赤米後坐法徴還百姓老小攀車叩馬啼呼案倫見東觀記俸祿取赤米句范作受俸裁留一月糧餘皆賤貿與民之貧羸者較此殊得大體今制官俸白糧兵役老米若必舍白取老是直沽名耳餘糧賤貿利物而物不知乃是聖賢所行之事董宣董宣為洛陽令寧平公主乳母奴白晝殺人主出行以奴驂乘宣叱奴下車格殺之主即馳車入宫上大怒召宣曰令欲死乎宣叩頭曰臣奉法之吏不敢縱法不欲死也上曰捶之宣曰願一言死無恨上曰何言宣曰陛下聖德中興而縱奴殺良民以奴殺臣臣死之後陛下何以治天下捶殺臣不如臣自殺即以頭觸楹血流被靣上令小黃門持之曰癡令叩頭謝主宣不從上敕頓癡令頭宣兩手據地不肯低頭因敕彊項令出詣大官賜食案宣見謝書今人但知彊項令不知有癡令二字當從續書拈出以供詞人之用寧平謝范俱作湖陽鮑永鮑永字君長為司𨽻校尉上叔父趙王良送來歙喪還入夏城門右中郎將相逢道迫良怒召門候詰責永走馬前奏良大不敬由是威權挫折百寮肅然數舉奏非法朝廷善之永辟右扶風平陵鮑恢以為都官從事恢亦抗直不避彊禦詔敇曰貴戚且斂手以避二鮑其見重如此案永見東觀記劾趙王事東觀煩而范簡此為得中詔敕曰范作帝常曰為是永為東郡太守孔子闕里荆棘自除從講堂至里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶案闕里樹則模楷草則靈蓍豈有荆棘惡木將以天下無道同于嗟鳯泣麟故不久而自除耶范同馬援援過北地任氏畜牧自援祖賓本客天水父仲又嘗為牧帥令是時員為護苑使者故人賔客皆依援案援見東觀記員乃援季兄也曹褒明帝永平十三年曹褒奏尚書璇璣鈐曰有帝漢出德洽作樂名太序帝善之下詔曰今且改太樂官曰太序丞以應圖䜟案褒見東觀記改樂繫褒父充事此誤充世為儒宗而援据䜟書奏定漢樂豈能紹咸莖遺響耶太序丞范作太豫樂褒遷將作大匠時有疾疫褒巡行病徒為致醫藥經理饘粥多䝉濟活七年遷為河南太守案褒居官多仁政而掩骼恤病其澤尤深范同曹褒字叔通遷圉令正身率下舉動遵禮以德化俗五穀豐熟盜賊咸感化之褒遷陳留圉令愛民救死為太守馬嚴疾惡免官百姓涕泣案范書時有他郡盜五人來圉界太守風縣殺之褒不肻從故奏褒耎弱免官夫元惡大憝往往逋逃幸免桹莠不除嘉禾日槁叔通此舉徒煦煦耳鮑昱鮑昱為泚陽盜賊省減案昱事詳見東觀記鮑昱字守文拜司𨽻校尉昱在職奉法守正有父風坐救火遲免官案昱為鮑永子故云有父風周澤周澤為太常清潔循行盡敬宗廟嘗卧疾齊宫其妻哀澤老病闞問所苦澤大怒以妻干犯齊禁遂收送詔獄謝罪當世疑其詭激時人為之語曰生世不諧作太常妻一歲三百六十日三百五十九日齊一日不齊醉如泥案澤見東觀記泥東海蟲名得水則活失水則如泥彭閎閎字作明案明帝以桓榮為歐陽博士榮讓之彭閎詳見謝書桓榮傳溫序溫序為護羌校尉行部至隴西為隗囂别將荀宇等所劫宇謂序曰子若與我併威同力天下可圖欲生降序宇止之曰義士欲死節賜劍令自裁序受劍銜鬚著口中嘆曰無令鬚汚土遂伏劍案序字次房太原祁人宇止之曰之上刪録過當遂不成語范載獨行傳後漢書補逸卷十八

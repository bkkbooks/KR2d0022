body:
  text: 後漢書補逸卷五監察御史姚之駰撰東觀漢記第五王梁王梁為中郎將與景丹祭遵合擊蠻中破之詔梁别北守天中關案梁字君嚴漁陽安陽人梁與吳漢等擊檀鄉而梁生不奉敕檻車送至月餘以為中郎將范無擊蠻中事天中關范作箕關邠任東平憲王蒼為驃騎開東閣延賢士薦鴻門邠任隱居教授辟為祭酒後朝㑹明帝戲之曰先帝徴君不來驃騎辟君而來何也任曰先帝秉德以㑹下臣可以禮進退驃騎執法御臣臣懼法而至月餘遂去官案范書無邠任名髙士傳序載荀恁事與此同疑即一人傳寫誤耳張酺張酺為東郡太守下車擢賢俊擊豪强賞賜分明郡中肅然案酺字孟侯汝南細陽人别作益侯誤范稱酺治東郡禁長吏殺盜徒以為令長受臧猶不至死饑寒傭保何足窮法乎夫充義至類之盡令長律盜固當誅殺而因此以宥盜徒則元惡大憝罔所忌憚為善者懼矣本書稱其賞賜分明抑别有擊豪之術與酺為東郡太守罰斷義勇遷魏郡太守百姓埀涕送之酺祖父充與光武同門學光武即位求問充充已死案酺曽從祖父受尚書范闕酺以尚書教授令入授皇太子太子家時為奢侈物未嘗不正諫甚見重焉案范稱酺為人質直守經義故能如此酺薦郡吏王青三世死節青從此除步兵司馬酺傷青不遂復舉其子孝亷案范書青祖文翁以攻王莽見害父隆為都尉功曹青為小史與父俱從行縣隆扞賊死青亦被矢貫咽音聲流喝故云三世死節范不載舉青子事元和二年帝幸東郡使酺講尚書一篇使尚書令王鮪與酺相難上甚欣悅案時章帝先備弟子之儀使酺講尚書畢然後修君臣之禮其重道崇儒之意至矣東漢以後罕有其匹酺為太尉父尚在酺每遷轉乃一到洛父來適㑹正臘公卿罷朝俱賀歲奉酒上酺父壽極歡莫不嘉其榮案孟子稱舜以天下養為孝之至太尉之養不幾亞于舜乎范書作酺雖在公位而父常居田里酺每有遷職輒一詣京師常來候酺云云語句有失倫處遜本書多矣永平元年詔為四姓小侯開置學五經師張酺以明經授于南宫案開四姓小侯學在永平九年九訛元也須誦須誦為郡主簿獲罪詣獄引械自椓口口出齒獲免案范書闕韋順韋順轉東平相賞罰必信有柿樹生㕔屋上徙庭中遂茂至孝行感于天地生也案稚子啖柿擲核屋頭徙之則茂何關鬼神順孝行不可考以為柿感而生則傅㑹過矣范闕王琳王琳年十餘喪父母遭大亂百姓奔逃惟琳兄弟獨守冡廬弟季出遇赤眉賊將為餔琳自縛請先季死賊矜而放之案琳汝南人范附趙孝傳賀𤣥賀𤣥遷鄴令政化大行案范書闕何熙何熙字闕溫為御史中丞羣僚憚之案范書闕趙孝趙孝字長平沛國蘄人兄弟怡怡鄉黨歸德王莽時天下亂人相食弟禮為賊所得孝聞即自縛詣賊曰禮久餓羸瘦不如孝肥賊並放之案孝以父任為郎即所稱田禾將軍子過郵亭不自名者也孝愛弟之意發于至誠非僥幸免死者故足以感賊范同建武初天下新定穀食尚少孝得榖炊將熟令弟禮夫婦使出比還孝夫妻共蔬食茹菜禮夫妻歸告言已食輒獨飯之案明帝嘉孝篤行徴為衛尉詔禮十日一就衛尉府大官送供具令共相對盡歡後禮卒帝令孝從官屬送喪歸葬其寵異若此帝褒江次翁所以教孝寵趙長平所以教弟故東京之治最為近古楊政楊政嘗過馬武武稱疾見政對几據牀欲令政拜牀下政入戶前排武徑上牀坐武帳言語不擇因把臂責之曰卿䝉恩稱藩臣不思求賢報國而驕天下英俊㑹信陽侯至責數武令為朋友也案政京兆人范作武難見政稱疾不為起政入戶徑升床排武把臂責之數語較徑而顯餘同信陽侯隂就也楊政字子行治梁丘易與京兆祁聖元同好俱名善說經書京師號曰說經鏗鏗楊子行案范書政從代郡范升受易無祁聖元名張湛張湛字子孝為光祿大夫數正諫威儀不如法度者湛常乘白馬光武每有異政輒曰白馬生且復諌矣案湛扶風平陵人范同湛為太中大夫病中居東門候舍故時人號為東門君數存問賞賜案時湛因郭后廢故以病乞身愧不能諫也范書作居中東門候舍故時人號曰中東門君漢宫儀曰洛陽十二門有上東中東門則中居二字或傳寫倒之耳張湛為馮翊見府寺門即下主簿進曰位尊德重不宜自輕湛曰禮下公門何謂輕哉案此本湛事或訛堪范同吳良吳良字大義齊國人為郡吏歲旦與掾史入賀門下掾王望舉觴上夀諂稱太守功德良于下坐勃然作色進曰望佞邪之人欺諂無狀願勿受其觴太守斂容而止宴罷轉良為功曹良恥以言受進終不肯謁案范書良字作大儀臨淄人良固諤諤而太守能改容受之其冲懷雅不可及東平王蒼薦吏吳良上以章示公卿曰蕭何舉韓信設壇即拜不復考試以良為議郎案范書全載東平疏文甚排奡良為郡議曹掾歲旦與掾史入賀門下掾王望言曰齊郡敗亂遭離盜賊不聞雞鳴犬吠之音明府視事五年土地開闢盜賊滅息五榖豐熟家給人足今日歲首請上雅夀掾史皆稱萬歲良時跪曰門下掾諂佞明府勿受其觴盜賊未盡人庶困乏今良曹掾尚無袴望曰議曹惰窳自無袴寧足為不家給人足耶太守曰此生言是賜良鰒魚百枚案此與前假同節録本書前假謹嚴有史法此則濃至曲盡各成妙趣是知援述古書亦須手筆范書同前假吳良為司徒長史以清白方正稱任隗建武八年始置將作大匠自任隗始案隗南陽宛人任光子也將作大匠自建武以來常謁者兼之肅宗于隗乃置真焉此抄撮之訛也任隗字仲和拜司空永元初外戚秉權朝臣畏悚莫敢抗者惟隗與袁安同心畢力數犯嚴諫案時秉權者竇憲也憲擊丐奴國用勞費隗奏議徴憲還前後十上范克范克為桂陽郡俗不種桑無蠶織之利民惰少鹿履冬皆以火燎克為令屬縣教民種桑柘養蠶織履數年之間大賴其利案范書闕民不知織教之以蠶此真豈弟父母之事桓虞桓虞字伯春遷尚書僕射據法斷事周密平正以為能擢為南陽太守案范書闕尹敏尹敏拜大司空府上以敏博通經記令校圖䜟敏對曰䜟書非聖人所作其中多近鄙别字頗類世俗之辭恐疑誤後生案敏字幼季南陽堵陽人後敏因䜟增之曰君無口為漢輔帝怪而問之敏曰臣見前人增損圖書敢不自量竊幸萬一亦可謂善于諷諫矣范列儒林傳尹敏與班彪親善每相遇與談常日旰忘食夜則達旦案范同一本作屏案不食馮衍馮衍其先上黨潞人曽祖父奉世徙杜陵祖野王生座襲父爵為關內侯座生衍案衍字敬通杜陵人衍更始時為偏將軍與鮑永相善更始既敗固守不以時下建武初為揚化大將軍掾辟鄧禹府數奏記于禹陳政言事案范書衍始受王莽將亷丹辟為掾丹死乃往以計說鮑永范具載其書章懷注云衍陳永一篇在東觀記皆為諌鄧禹之詞不知何據有此乖違駰案衍集流傳鈔撮不實作史者雜以序事采綴其文故各有舛謬然相其詞義說永為近故此不録鮑永鮑永遣弟升及子壻張舒等謀使永尉李匡先反涅城開門內兵殺其縣長馮晏立故謁者祝回為涅長案永上黨屯留人鮑宣子也涅縣名屬上黨更始以鮑永行大將軍事得置偏裨將五人更始殁永與馮欽共罷兵幅巾而居後歸世祖鮑永字君長上黨人也少有志操事後母至孝妻嘗于母前叱狗而永即去之案永之孝尤人所難者在事後母也與曽子蒸梨事同永拜僕射行將軍事將兵安撫河東性好文德雖行將軍常衣皂襜褕路稱鮑尚書兵馬案范書時更始二十年事也通典稱永常白襜路稱白衣尚書與此異光武遣諫議大夫儲大伯持節徴永永疑不從乃收繫大伯封所持節于晉陽傳舍壁中遣信人馳至長安案永是時方専意更始不知更始已為赤眉所害故遣人探之長安永說下懷上大喜與永對食賜洛陽上商里宅案時攻懷未拔遣永往說之河內太守即開城降上商里范作商里洛陽記曰上商里在洛陽東則是范脫誤耳永為司𨽻校尉時帝叔父趙王良從送中郎將來歙喪還大夏城門中與五官將軍相逢道迫良怒召門候岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎將來歙喪還車駕過須臾趙王良從後到與右中郎將張邯相逢城門中道迫狹叱邯旋車又召候岑尊詰責使前走數十步案良諸侯藩臣䝉恩入侍宜知尊帝城門候吏六百石而肆意加怒令叩頭都道奔走馬前無藩臣之禮大不敬也案永此疏抑尊戚崇朝廷帝由是有貴戚斂手之言其所稱不畏强禦者耶范書但言以事劾良大不敬而已不詳載永以度田不實被徴詔書迎拜永曰君晨夜冒犯霜露精神亦已勞矣以君帷幄近臣其以永為兖州牧案時郡守坐度田事多下獄而永獨詔書迎拜則帝之念功臣也田邑邑馮翊蓮芍人也其先齊諸田父豐為王莽著威將軍邑有大節涉學藝能善屬文案邑字伯玉馮翊人范附見馮衍傳邑初為上黨太守鄧禹使積弩將軍馮愔將兵擊邑愔悉得邑母弟妻子後邑聞更始敗乃歸世祖世祖遣騎都尉弓里游諫大夫何叔武即拜邑為上黨守馮衍與邑素誓刎頸俱受重任忿邑背前約乃遺書責邑案范書世祖遣宗正劉延攻天井關與田邑戰邑迎母弟妻子為延所獲與此異衍書具載范傳邑以書勸鮑永曰愚聞丈夫不釋故而改圖哲士不僥幸而出危今君長故主敗不能死新帝立不肯降擁衆而據壁欲襲六國之從與邑同事一朝內為刎頸之盟興兵背畔攻取涅城破君長之國壞父母之鄉首難結怨輕弄凶器人心難知何意君長當為此計昔者韓信將兵無敵天下功不世出略不再見威執項羽名出髙帝不知天時就烹于漢智伯分國既有三晉欲大無己身死地分頭為飲器君長御命出征擁帶徒士上黨厄不能救河東畔不能取朝有顛沛之憂國有分崩之禍上無仇牧之節下無不占之志天之所壞人不能支君長將兵不與韓信同日而論威行得衆不及智伯萬分之半不見天時不知厭足欲明人臣之義當先知故主之未然欲貪天下之利宜及新主之未為今故主既敗新主既成四海為羅網天下為敵人舉足遇害動搖觸患履深淵之薄氷不為號涉千鈞之發機不知懼何如其智也絶鮑氏之姓廢子都之業誦堯之言服桀之行悲夫命也張舒內行邪孽不遵孝友疏其父族外附妻黨已收三族將行其法能逃不自詣者舒也能夷舒宗者豫也永邑遂結怨焉案邑此書乃戰國說士餘習然其能知天時不讓班彪王命論也知幾甚微哲于馮鮑矣邑為漁陽太守未到官道病徴還為諫議大夫病卒觟陽鴻觟陽鴻字孟孫為世名儒永平中拜少府案鴻中山人以孟氏易教授范附窪丹傳注云觟陽姓鴻名或作鮭劉平劉平字公豫以仁孝著聞永平三年為宗正數薦逹名士承宫郇恁等案平楚郡彭城人本名曠顯宗改為平范列孝弟諸賢之首張堪張堪字君游試守蜀郡遷漁陽開治稻田八千餘頃教民種田百姓以殷富童謡歌曰桑無附枝麥穗兩岐張君為政樂不可為視事八年胸奴不敢犯塞案堪南陽宛人樂不可為范書為作支堪與吳漢并力討公孫述遂破蜀漢先遣堪入成都鎮撫吏民時述珍寶珠玉委積無數堪録簿上官秋毫無取案時吳漢以糧少將退兵堪馳見漢謂述必敗竟拔成都則破蜀之功當首推堪矣簿上珍寶清風卓然微計掾奏之亦將為吳公所掩也張堪去蜀郡乘折轅車白布被囊案此則計掾樊顯所奏也近本訛作張湛事非堪守蜀郡公孫述遣擊之堪有同心之士三千人相謂曰張君養我曹為今日也乃選習水軍三百人斬竹為竺二稗渡水遂免難案竺二稗音排一作􅀢大筏也范不載竇融竇融光武時數辭爵位因上疏曰臣融年五十三有一子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見䜟記誠欲令恭肅畏事恂恂修道不顯其有才能何况乃當傳以連城廣土享侯國哉案融字周公扶風平陵人融于雌雄未决之時獨能鋭意東向不為隴蜀所搖智士哉卒使河西五郡完富如舊功亦偉矣辭爵一疏何其小心寅畏也封竇融曰融允執忠孝扶微救危率屬五郡積兵諸羌畢至兵不血創而鹵土崩瓦解功既大矣篤意分明斷之不疑吾甚嘉之其以六安安豐陽泉蓼安風四縣封融為安豐侯案如本書所列則五縣矣范作安豐陽泉蓼安安風亦誤蓋廬江有蓼侯國無蓼安也俟考融數辭爵位不欲傳子他日㑹見迎詔融曰欲讓職還土今相見不宜論也案此假甚不明范書作融朝罷逡巡席後帝知欲有讓遂使左右傳出他日㑹見迎詔融曰日者知公欲讓職還土故命公暑熱且自便今相見宜論他事勿得復言云云一時情事如畫本書想當同之引述者刪抹過當耳竇融嗣子穆尚內黃公主而融弟友嗣子固尚沮陽公主穆長子勳尚東海公主女竇氏一公兩侯三公主四二千石自祖至孫官府廄第相望奴婢千數雖親戚功臣莫與為比案東海公主女應作東海恭王女此誤融于干戈搶攘之際獨能保全五郡使完富不改天道好還宜其奕葉責顯也河西太守竇融遣使獻槖駝案融在更始時初為張掖屬國都尉後凉州五郡官民推融為河西五郡大將軍非太守也獻槖駝范作獻馬融令弟友詣闕道絶馳還遣司馬虞封間行通書案范書虞作席時因隗囂叛故道絶也蔡順蔡順汝南人至孝王莽亂人相食順取桑椹赤黑異器賊問所以云黑與母赤自食賊異之遺鹽二斗受而不食案順字君仲以至性稱抱棺廽火聞雷泣冢皆其事也范闕採椹事鄭均鄭均兄中為縣游徼受禮遺均數諫止不聽即脫身出作歲餘得數萬錢歸以與兄曰錢盡可復得為吏坐臧終身捐棄兄感其語遂有亷潔稱案均字仲虞東平任城人均之感兄愛敬備至寓切偲于怡怡者也均拜侍御史月餘遷尚書章帝東巡過任城乃幸鄭均舍敕賜尚書祿以終身故時人號為白衣尚書案范書同均失兄養孤兒兄子甚篤已冠娶出令别居盡推財與之使得一尊其母然後隨護視賑給之案均之于兄其用心曲至若此夫贍寡嫂給孤兒原士君子所當然而常人于此未免萌其驕心于是豫奪由已多寡任意思雖有餘義實不足均推財與兄子使得一尊其母雖聖人處此無以逾之矣范略之何也均屢辟不詣公車特徴再遷尚書肅宗敬重之後以病告歸均遣子英奉章詣闕詔召見英問均所苦賜以冠幘錢布元和元年與毛義各賜羊一頭酒二斗終其身案范書具載詔詞劉􅯷劉􅯷字君久永平中以中庶子入侍講案范書闕鄧鴻永平六年鄧鴻行車騎將軍位在九卿上絶坐案范書闕宋均永平七年宋均徴為尚書令忠正直言數納䇿謀每駮議未嘗不合上意案均南陽安衆人性寬和不喜文法于明帝察察之朝大有裨益宋均字叔庠為九江太守有兩山名曰唐后山有神祠衆至共為嫁娶皆取百姓男女不復要娶巫家女百姓患之長吏莫敢改之均乃移書曰自今已去當為山娶巫家女其後乃絶案均祖述西門豹遺意以熄巫患法至良也此假文詞拖㳫不類本書中預透不復要娶巫家女一句真是村孰孺子之筆范作衆巫遂取百姓男女以為公嫗歲歲改易既而不敢嫁娶前守令莫敢禁均乃下書云云其好醜徑庭矣均為九江太守建武中山陽楚郡多蝗蜚南到九江輒東西别去由是名稱馬元馬元字叔山拜太僕視事减省諸費歲千萬以上案范書闕戴慿戴慿為侍中正旦朝賀帝令羣臣說經義不通者奪其席慿遂重五十餘席案慿字次仲汝南平輿人亦稱戴侍中習京氏易所稱解經不窮者也桓榮榮本齊桓公後也桓公作伯支庶用其諡立族命氏焉案榮字春卿沛郡龍亢人歐陽尚書博士缺上欲用桓榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭宏揚州從事臯𢎞帝曰俞往汝諧因拜榮為博士案東漢用人互相薦讓猶有唐虞稽拜之風范同榮遭亂與族人桓元卿相招投閒輒誦元卿曰當復何為榮後為太常元卿來候榮諸弟子謂曰平生笑氣力今何如元卿曰我安能知此哉案元卿譏榮有但自苦氣力語故榮門人借以覆之范書作元卿語曰我豈意學之為利若是㸃出利字甚冷雋彼今日所䝉稽古之力二語榮之所見與元卿將無同帝嘗幸太常令榮坐東面設几杖時執經生避位發難上輒謙曰太師在是案顯宗尊禮師傅逈出尋常萬萬惜桓榮専事章句徒使其主為經生問難之學于尚書修身治天下之道未之有得也明帝詔曰五更沛國桓榮以尚書授朕十有餘年詩云日就月將示我顯德行其賜爵關內侯食邑五百戶桓榮嘗寢病太子朝夕遣中人問疾賜以帷帳奴婢曰如有不諱無憂家室也後病愈入復侍講案范同桓榮拜議郎入侍太子每朝㑹輒令榮于公卿前敷奏經書帝稱善桓榮為太常上幸太常府榮東面坐設几㑹賔子郁以明經復為太常桓榮授皇太子經每朝㑹榮于公卿前說經上曰得卿幾晚因除博士案此與前假同引書者筆小異耳魏應魏應字君伯拜五官中郎將諸儒于白虎觀講論五經同異使應専掌難問案應任城人應初習魯詩及其掌難問辨同異則五經紛綸矣范同崔實崔實為五原太守五原土宜麻桑而俗不知紡績民冬月無衣積細草而卧其中見吏則衣草而出實至官勸種麻命工伐木作機紡車教民紡績案范書闕五原郡屬并州馮良馮良少作縣吏恥在厮役因壞車殺馬毁裂衣冠從杜撫學案良南陽人字君郎時奉檄迎督郵即路慨然恥而遁去蓋先陶栗里而得之范附周變傳桓文髙桓文髙每當直事駐車而傳漏雖居閒鎖署冠劍不解于身為郎二十載未嘗被奏三署服其重慎案范書不載此條與前所載樊梵字文髙事同傳鈔之誤乃至于此馬防馬防子巨為常從小侯六年正月齊宫中上欲冠巨夜拜為黃門郎御章臺下殿陳鼎爼自臨冠之案防馬援仲子范同防征西羌上喜防功令史官作頌頌其功伐案防征羌事具詳范傳防于伏波真能讀父書者馬防字公平為光祿勳宿衛宫省上數幸防府賞賜飲食案范書作字江平馬防字孝孫拜金吾性矜嚴公正數言政事多見採用案此豈又一馬防耶范稱防弟光自越騎校尉遷執金吾後又言拜防光祿勳光為衛尉防數言政事多見采用則防或又字孝孫但未拜金吾耳章帝建初三年馬防為車騎將軍班同三事馬防兄弟二人各六千戶防為潁陽侯特以前參醫藥勤勞綏定西羌以襄城羮亭一千二百戶增防防身帶三綬寵貴至盛案范書略上始欲征胸奴與竇固等議出兵調度皆以為塞外草美馬不須榖固等將兵到燉煌當出塞上請馬榖上以固言前後相違怒不與榖皆言按軍出塞無榖馬故事馬防曰宣帝時五將出征其奏言丐奴候騎得漢馬矢見其中有粟即知漢兵出乃去以是言之馬當與榖案絶域出師最難轉餉荒邉逐草正堪仰秣必欲榖馬則車牛塞途矣師何以進防之此䇿未為得也近讀冡宰張公鵬翮出使俄羅斯日記知塞外多無水草處是在嚮導者預知而備之耳馬防上言聖人作樂所以宣氣致和順隂陽也臣愚以為可因歲首發太簇之律奏雅頌之音以迎和氣時以作樂費多遂獨行十月迎氣樂案章帝五年冬始行月令迎氣樂從防言也防此奏深得聖人變理隂陽之意馬稜馬稜為㑹稽太守詔詰㑹稽車牛不務堅强車皆以桃枝細簟案稜伏波之族孫也范稱其治㑹稽有聲不詳桃枝竹名稜守廣陵蝗蟲入江海化為魚蝦興復陂湖增歲租十餘萬斛案范不載蝗化事餘同稜從兄毅張掖屬國都尉案稜少孤依毅共居及卒稜心喪三年徐匡永平中車駕出信陽侯隂就車騎干突鹵簿車府令齊國徐匡鉤就車收御者送獄詔書譴匡匡自繫吳良上言信陽侯驕無人臣禮匡執法守正而下獄恐政化由是而墮詔出匡左遷昻丘長案范書匡事附吳良傳上雖赦匡猶左遷良為縣長今直作匡遷矣又昻丘郡國志無之范作即丘屬東海郡此皆誤也鍾離意意在堂邑為政愛利輕刑慎罰撫循百姓如赤子初到縣市無屋意出奉錢帥人作屋人齎茅竹或持材木爭赴趨作决日而成功作既畢為解土祝曰興功役者令百姓無事如有禍祟令自當之人皆大悅案意字子阿㑹稽山隂人意從瑕丘令遷堂邑范不載此事顯宗時鍾離意為尚書交址太守坐臧千金徴還伏法詔以資物班賜羣臣意得珠璣悉以委地而不拜賜上怪問其故對曰臣聞孔子忍渴于盜泉之水曽參回車于勝母之閭惡其名也此臧穢之寶誠不敢拜受帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜之案意性雖清介而寬和愷悌遺言上書猶陳升平之世難以急化宜少寬假其諸異乎清而刻者與范同明帝欲起北宫尚書僕射上書諫出為魯相後起德陽殿殿成百官大㑹上謂公卿曰鍾離尚書若在不得成此殿案明帝義不勝欲故有德陽殿之舉然于諍臣之言若不敢去諸懷由其性本恭儉也閔仲叔司徒侯霸辟仲叔留與相見勞問之下不及政事仲叔曰被明公辟且喜且懼及奉見明公喜懼皆去所望明公問屬以為政美俗成化令日亷得所遂以辭出自劾案閔仲叔名貢以字行范髙士士傳序所載略同范文較徑閔仲叔太原人也與周黨相友黨每過仲叔共啜菽飲水無菜茹案黨與仲叔同郡亦貞介士也見范逸人傳周黨嘗遺仲叔生麻仲叔嘆曰我欲省煩耳受而不食案生麻范作生蒜皇甫謐髙士傳同閔仲叔居安邑家貧不能得錢買肉安邑令候之問諸子何飯食對曰但食猪肝屠者或不肯與之令出敕市後嘗買輒得仲叔怪問其子道狀如此乃嘆曰仲叔豈以口腹纍安邑耶遂去之案仲叔却蒜省煩食肝去纍清風亮節照耀千古范書簡老過此世說則更俊矣雖文筆不同要以刪潤者易為功也司馬均司馬均字少賔隱居教授誠信行乎州里鄉人有爭曲直者輒言敢祝少賔乎心不直者終不敢祝也案均東萊人位至侍中汝郁郁年五歲母病不能食郁常抱持啼泣亦不食母憐之强為餐飯欺言已愈郁視母色未平輒不食宗親共異之因字曰異案郁陳國人後為魯相以德教化百姓稱之與少賔皆賈長頭所薦士也范俱附見賈傳劉般劉般為太僕在朝盡節夙夜不怠案般宣帝之𤣥孫父紆因莽亂失候世祖時般復紹封劉般字伯興代名忠孝在朝竭忠盡節建初元年拜為宗正憂勤國事夙夜不怠教納嘉謀案般諸奏疏如弛二業寬度田皆嘉謀之當納者惟明帝欲置常平倉般以為不便而止夫常平法創于耿夀昌增減隨時百姓利焉惟在得其人以理之耳今恐豪右為姦而廢之是因噎而廢食也鄭興興從博士金子嚴為左氏春秋案興字少贛河南開封人興常師劉歆講大義少學公羊晚更善左氏也世言左氏者多祖于興後漢書補逸卷五

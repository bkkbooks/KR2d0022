body:
  text: 後漢書補逸巻十六監察御史姚之駰撰謝沈後漢書第一鄭敬隱居敬閒居不修人倫新遷都尉逼為功曹㕔事前樹時有清汁以為甘露敬曰明府政未能致甘露此青木汁耳辭病去隱處精學蛾陂中隂就虞延竝辟不行同郡鄧敬因折茇為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娛光武公車徴不行案范書敬字次都與郅惲同為汝南門下掾相厚甚後惲舉孝亷敬終不就茇坐荷盤千載韻事宜入世説棲逸巻中范附載郅惲傳胡廣定漢制太傅胡廣博綜舊儀立漢制度蔡邕因以為志譙周後改定以為禮儀志案范書禮儀志應係節録舊文謝書獨窮其源似不欲竟揜為己有者其厚薄何如近世著述家林立然徃徃有借昔人不傳之書掠美自衒甚則前賢成書無力鋟板從其子孫售之以為己作又否則抄蕞諸書類為一編不足當識者一哂矣竊人之財猶謂之盜況竊人之書以成己名乎蔡邕撰志蔡邕引中興以來所修者為祭祀志蔡邕撰建武以後星驗著明以續前志譙周接繼其下案邕徙朔方上書求還續成十志其後書旋告成譙周繼之亦邕之功臣也閔貢閔貢字仲叔案貢己見皇后配享上以公卿所奏明徳皇后在世祖廟坐位駁議示東平王蒼蒼上言文武宣元祖祫食髙廟皆以配先帝所制典法設張大雅曰昭哉來御慎其祖武又曰不愆不忘率由舊章明徳皇后宜配孝明皇帝於世祖廟同席而供饌案東平以遵祖制為典禮不事更張允為至當大雅詩今本作昭兹來許繩其祖武大水安帝永初元年郡國大水漂沒民人死者以千數案范書是時郡國四十一大水蝗延熹九年揚州六郡連水旱蝗害案范書不載雍郷燕有雍郷赤眉所改牛蘭山魯陽有牛蘭山案范志南陽郡魯陽有牛蘭累亭不言山參䜌參䜌有青山屬國降羌衆數千人居山田畜案參䜌在北地郡故屬安定見范志後漢書補逸巻十六

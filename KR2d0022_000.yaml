front:
  text: 欽定四庫全書史部四
  hash: sha256:607f6fc3903a942f795e30a3f03095836467f0a196c1fe41ce827ec4c38e184a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0022_WYG_000-1a, image: WYG0402/WYG0402-0325a.png}
body:
  text: 後漢書補逸别史類提要臣等謹案後漢書補逸二十一卷國朝姚之駰撰之駰字魯斯錢塘人康熙己丑進士官至監察御史是編搜輯後漢書之不傳于今者八家凡班固等東觀漢記八卷謝承後漢書四卷薛瑩後漢書張璠漢記華嶠後漢書謝沈後漢書袁嵩後漢書各一卷司馬彪續漢書四卷捃拾細瑣用力頗勤惟不著所出之書使讀者無從考證是其所短至司馬彪書雖佚而唐李賢嘗取其十志以補范書之遺今後漢書內劉昭所注即彪之書而之駰不究源流謂之范志乃别采他書之引司馬志者録之字句相同曾莫之悟其謬實為最甚然洪邁博極羣書而所著容齊隨筆亦以司馬志為范志則其誤有所承也至東觀漢記通考稱存者十卷明初其書尚在故永樂大典所載較之駰所收為多今已别加裒輯刋行祕府珍藏非草茅之士所能睹亦未可以踈漏咎之矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀後漢書補逸原序春秋魯史也一經宣尼之筆削而魯史逸焉等於芻狗自後司馬遷作史記憑空結撰絶無依傍而班固因之成漢書然不聞太初以前盡逸子長之書也後漢史書自當時人主命詞臣撰記後其踵作者為記為書凡十餘家蓋人人自擬遷固矣范蔚宗書最晚出不過集諸家之成以傾液而潄芳耳故當時雅重東觀記與遷固二書稱為三史而外此謝華諸書無一逸者裴松之注三國志亦多引之不專奉宣城也自唐章懷太子招文學之士同注范書于儀鳳初年上之有詔付祕書省自是而諸書稍稍泯矣故五代及初唐人其類事釋書尚多援引諸家者至六臣注文選其引范書已什之七八逮宋淳化中吳淑進注一字賦表枚舉謝承後漢書張璠漢記續漢書以為皆彼時所遺逸者意其時惟東觀記僅存耳後景祐初年余靖王洙奉詔校范書序其源委臚列東觀以下七種僅載卷帙之多寡而於章懷之注竟不能取諸書相參對則諸書之逸而不存已如逝水飄風矣夫范書簡而明踈而不漏史通固亟稱之然持論之間不無倒置議竇武何進之誅宦寺為違天理責張騫班勇之使西域為遺佛書抑謝夷吾李郃于方術枉董宣于酷吏崇蔡琰于列女而且志缺藝丈贊為贅語流觀逸史未必從同也蔚宗與甥姪書以為體大而思精諸序論贊筆勢放縱實天下之竒作善乎文中子之言曰古之史也辨道今之史也耀文范其耀文者乎且即以文論而創造者難工潤色者易好集衆文而潤之范亦不得專美於後也夫百末㫖酒非不美也乃飲醇而忘蘅杜之馨狐裘之價千金也而不知其成自衆腋此亦失先河後海之義矣今以蔚宗所定為正史而謝華諸書等諸芻狗是以春秋尊范書吾未之敢信也或曰古書之逸者多矣即如史官所記東漢以來其不傳者何限將按籍而補之恐有塞破世界之憂是又不然夫他書可逸惟史當補近史文煩或可逸古史文約尤當補今試以謝華諸史與范校其闕者半其同者半其闕者可以傳一朝之文獻其同者且可以參其是非較其優絀于史學庶乎其小補也爰是檢閲羣書鈔蕞成帙考核同異間以臆斷合為八種二十一卷遂使八百餘年已湮之籍一旦復裒然傳世日月潛曜麗天復光江河滔滔歸自潮汐豈非撰著家一快事哉第鯫生固陋其踈略之過未能善補尚俟博雅君子重補其闕云爾康熙癸巳夏五錢唐姚之駰魯斯氏謹題于東臯之露滌齊後漢書補逸例言一是編採自羣書概依原本間有大謬辨如注言其小疵纎誤統置闕如不敢妄更一列朝諸臣略次前後不盡案紀年而差之以作史者老韓尚可同傳而儒林循吏各歸一部原未嘗沾沾序列也一凡一人事跡隨得隨録亦不序其先後蓋條登縷載固非列傳體耳一史體為紀為傳為志各有所屬今八書既亡不能探其原帙但以帝王及諸臣標題而諸條麗其下其有採自諸志無人可附者特拈數字以便尋觀一有同此一條兩書引用互異者仍兼採並收不敢妄削一諸書多有從同或嫌冗復然參看有三善焉補亡一辨誤二較量行文髙下三一末學荒蕪既非行祕而藏書寂寥并鮮獺祭之功其有闕漏再俟增入
